app-id: com.base76.Claunux
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
sdk-version: '46'
command: claunux
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
modules:
  - name: claunux
    buildsystem: simple
    build-commands:
      - npm ci
      - npm run build
      - cargo build --release
      - install -Dm755 src-tauri/target/release/claunux /app/bin/claunux
    sources:
      - type: git
        url: https://github.com/base76-research-lab/claunux.git
        branch: main