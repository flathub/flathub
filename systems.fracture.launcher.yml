id: systems.fracture.launcher
# The GNOME runtime and sdk includes gtk
runtime: org.gnome.Platform
sdk: org.gnome.Sdk
sdk-extensions: 
  org.freedesktop.Sdk.Extension.llvm20/x86_64/25.08
  org.freedesktop.Sdk.Extension.rust-stable/x86_64/25.08
build-options: 
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm20/bin
  prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
runtime-version: "50"
command: launcher
modules:
  - name: launcher
    buildsystem: simple
    build-commands:
      - install -Dm644 fracture.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm755 fracture.desktop /app/share/applications/$FLATPAK_ID.desktop
      - install -Dm755 1.png /app/share/icons/hicolor/95x95/apps/$FLATPAK_ID.png
      - install -Dm755 2.png /app/share/icons/hicolor/32x32/apps/$FLATPAK_ID.png
      - install -Dm755 3.png /app/share/icons/hicolor/64x64/apps/$FLATPAK_ID.png
      - install -Dm755 4.png /app/share/icons/hicolor/128x128/apps/$FLATPAK_ID.png
      - install -Dm755 5.png /app/share/icons/hicolor/256x256/apps/$FLATPAK_ID.png
      - install -Dm755 6.png /app/share/icons/hicolor/512x512/apps/$FLATPAK_ID.png
      - sed -i "s|Icon=|Icon=$FLATPAK_ID|g" /app/share/applications/$FLATPAK_ID.desktop 
    sources:
      - type: file
        path: ./img/icon/95x95.png
        dest-filename: 1.png
      - type: file
        path: ./img/icon/32x32.png
        dest-filename: 2.png
      - type: file
        path: ./img/icon/64x64.png
        dest-filename: 3.png
      - type: file
        path: ./img/icon/128x128.png
        dest-filename: 4.png
      - type: file
        path: ./img/icon/256x256.png
        dest-filename: 5.png
      - type: file
        path: ./img/icon/512x512.png
        dest-filename: 6.png
      - type: file
        path: ./fracture.metainfo.xml
        dest-filename: fracture.metainfo.xml
      - type: file
        path: ./fracture.desktop
        dest-filename: fracture.desktop
        commands:
          - exec /app/share/applications/$FLATPAK_ID.desktop "$@"


  - name: fracture-build
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/fracture-build/cargo
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo build --offline --release --all-features
      - install -Dm0755 target/release/fracture /app/bin/fracture
    sources:
      - type: git
        url: https://github.com/parker-bryce-andrew/fracture.git
        commit: 45f523bdedff5b195c485c5ab9daa721a7ce9908
      - cargo-fracture-sources.json

  - name: launcher-build
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/launcher-build/cargo
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo build --offline --release --all-features
      - install -Dm0755 target/release/gsc-launcher /app/bin/launcher
    sources:
      - type: git
        url: https://github.com/parker-bryce-andrew/fracture-launcher.git
        commit: d40424ff57f2a99e3171fe8e0ce7801e13df1660
      - cargo-launcher-sources.json



finish-args:
  - --socket=wayland
  # This uses WebGPU and DmaBuffers with pipewire
  - --device=dri
  - --talk-name=org.freedesktop.Screencast
  - --filesystem=xdg-run/pipewire-0
  #
  # The rest is used only on GNOME
  #
  # It uses dconf to add a keyboard shortcut for Gnome users
  - --talk-name=org.freedesktop.Flatpak
  # GNOME users can optionally enable extension support allowing
  # them to easily launch on the active window.
  - --talk-name=org.gnome.Shell
  - --talk-name=org.gnome.Shell.Extensions
  - --talk-name=org.gnome.Mutter.ScreenCast
  # If the screencast fails with GNOME's version, it sends a Notification
  # and fails back to freedesktop.Screencast
  - --talk-name=org.freedesktop.Notifications

