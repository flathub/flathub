app-id: io.github.sonm.monfree
runtime: org.gnome.Platform
runtime-version: '48' # Matches the latest stable GNOME
sdk: org.gnome.Sdk
command: monfree

finish-args:
  # UI and Graphics
  - --share=ipc
  #- --socket=x11
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri        # Hardware acceleration for JUCE UI

  # Audio and MIDI (Crucial for a Sequencer)
  - --socket=pulseaudio # Standard audio
  - --device=all        # Permission for ALSA/MIDI hardware access
  - --filesystem=xdg-run/pipewire-0 # Essential for low-latency PipeWire support

  # Specific Folder Access
  - --filesystem=xdg-music:create
  - --filesystem=xdg-documents:create
  
modules:
  - name: monfree
    buildsystem: simple
    build-commands:
      # 1. Install the binary
      - chmod +x monfree
      - install -D monfree /app/bin/monfree
      # 2. Install the Desktop entry (must match App ID)
      - install -D io.github.sonm.monfree.desktop /app/share/applications/io.github.sonm.monfree.desktop
      # 3. Install the Icon (must match App ID)
      - install -D MonFree.png /app/share/icons/hicolor/256x256/apps/io.github.sonm.monfree.png
      # 4. Export AppData (Required by Flathub for the store page)
      - install -D io.github.sonm.monfree.metainfo.xml /app/share/metainfo/io.github.sonm.monfree.metainfo.xml

    sources:
      # This is the main binary archive from your GitHub Release
      - type: archive
        url: https://github.com/sonm/monfree/releases/download/v1.0.0/monfree-1.0.0-x86_64-flatpak-bin.tar.gz
        sha256: e423282323ee78346adcfc779d70b2a456bd7b17461bd3ef6b8d17ec85a96297
        strip-components: 0

      # The metadata files should be hosted in your repo's main branch 
      # so Flathub can download them directly.
      - type: file
        url: https://raw.githubusercontent.com/sonm/monfree/main/io.github.sonm.monfree.desktop
        sha256: 2f765d6d60d6579229a49eb6d7b3c51e68ea81750935c4d198d6c90ec93b1e00
      - type: file
        url: https://raw.githubusercontent.com/sonm/monfree/main/MonFree.png
        sha256: fa9e270e249b94a1c94bb9e0ad330a35558e5ec74602bc989bd9f45d590ab5ed
      - type: file
        url: https://raw.githubusercontent.com/sonm/monfree/main/io.github.sonm.monfree.metainfo.xml
        sha256: 48c04e905b95237b51c34099bf467a0013f6fd2d727bed478bd60ab639d767b3
