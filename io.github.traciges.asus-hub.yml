app-id: io.github.traciges.asus-hub
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: asus-hub

finish-args:
  # GTK / display
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Input devices – required for evdev touchpad gesture detection
  - --device=input
  - --require-version=1.16.0
  # System bus – hardware daemons (asusd, supergfxctl, iio-sensor-proxy)
  - --system-talk-name=xyz.ljones.Asusd
  - --system-talk-name=org.supergfxctl.Daemon
  - --system-talk-name=net.hadess.SensorProxy
  # Session bus – KDE / power management
  - --talk-name=org.kde.Solid.PowerManagement
  - --talk-name=org.kde.KWin
  - --talk-name=org.kde.plasmashell
  - --talk-name=org.kde.kglobalaccel
  # Required for flatpak-spawn --host (host command execution)
  - --talk-name=org.freedesktop.Flatpak
  # Required for system tray / status notifier items
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=org.kde.StatusNotifierItem-2-1

modules:
  - name: asus-hub
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/asus-hub/cargo
        CARGO_NET_OFFLINE: "true"
    build-commands:
      - cargo build --release --manifest-path Cargo.toml
      - install -Dm755 target/release/asus-hub -t /app/bin/
      - install -Dm644 packaging/io.github.traciges.asus-hub.desktop -t /app/share/applications/
      - install -Dm644 packaging/io.github.traciges.asus-hub.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 assets/io.github.traciges.asus-hub.png /app/share/icons/hicolor/512x512/apps/io.github.traciges.asus-hub.png
    sources:
      - type: archive
        url: https://github.com/Traciges/Asus-Hub/archive/refs/tags/v1.0.5.tar.gz
        sha256: 314e9dc83caaf8658cb8e7d49cbf6ea9a65a92f3c819fd6bff7622ac1bb3a7db
        strip-components: 1
      - cargo-sources.json
