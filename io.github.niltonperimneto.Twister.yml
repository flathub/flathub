id: io.github.niltonperimneto.Twister
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: twister

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --device=dri
  - --socket=fallback-x11
  - --system-talk-name=org.freedesktop.ratbag1

modules:
  - name: twister
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
      env:
        CARGO_HOME: /run/build/twister/cargo
        npm_config_cache: /run/build/twister/flatpak-node/npm-cache
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - npm ci --offline
      - npm run build
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/twister /app/bin/twister
      - install -Dm644 io.github.niltonperimneto.Twister.desktop
          /app/share/applications/io.github.niltonperimneto.Twister.desktop
      - install -Dm644 io.github.niltonperimneto.Twister.metainfo.xml
          /app/share/metainfo/io.github.niltonperimneto.Twister.metainfo.xml
      - install -Dm644 src-tauri/icons/32x32.png
          /app/share/icons/hicolor/32x32/apps/io.github.niltonperimneto.Twister.png
      - install -Dm644 src-tauri/icons/128x128.png
          /app/share/icons/hicolor/128x128/apps/io.github.niltonperimneto.Twister.png
      - install -Dm644 src-tauri/icons/128x128@2x.png
          /app/share/icons/hicolor/256x256/apps/io.github.niltonperimneto.Twister.png
    sources:
      - type: git
        url: https://github.com/niltonperimneto/twister.git
        tag: v0.1.7
        commit: 416e2cafa63a7d0d63c9e60dc429b17ce15283c8
      - cargo-sources.json
      - node-sources.json
