app-id: io.github.alejandroqh.term39
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: term39

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: term39
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/term39/cargo
        CARGO_NET_OFFLINE: 'true'
    build-commands:
      - cargo build --release --no-default-features --features clipboard,battery --offline
      - install -Dm755 target/release/term39 /app/bin/term39
      - install -Dm644 assets/io.github.alejandroqh.term39.desktop /app/share/applications/io.github.alejandroqh.term39.desktop
      - install -Dm644 assets/io.github.alejandroqh.term39.metainfo.xml /app/share/metainfo/io.github.alejandroqh.term39.metainfo.xml
      - install -Dm644 assets/io.github.alejandroqh.term39.svg /app/share/icons/hicolor/scalable/apps/io.github.alejandroqh.term39.svg
      - install -Dm644 LICENSE /app/share/licenses/io.github.alejandroqh.term39/LICENSE
    sources:
      - type: git
        url: https://github.com/alejandroqh/term39.git
        commit: 96dafc475c98953b94f3d1bf6674c3f5574672fd
      - cargo-sources.json
