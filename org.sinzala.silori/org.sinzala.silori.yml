app-id: org.sinzala.silori
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: silori

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-pictures

modules:
  - name: silori
    buildsystem: simple
    build-commands:
      - install -Dm755 wrapper /app/bin/silori
      - install -Dm755 apply_extra /app/bin/apply_extra
      - install -Dm644 org.sinzala.silori.desktop /app/share/applications/org.sinzala.silori.desktop
      - install -Dm644 org.sinzala.silori.metainfo.xml /app/share/metainfo/org.sinzala.silori.metainfo.xml
      - install -Dm644 org.sinzala.silori.png /app/share/icons/hicolor/512x512/apps/org.sinzala.silori.png
      - install -Dm644 LICENSE /app/share/licenses/org.sinzala.silori/LICENSE
    sources:
      - type: file
        path: org.sinzala.silori.desktop
      - type: file
        path: org.sinzala.silori.metainfo.xml
      - type: file
        path: org.sinzala.silori.png
      - type: file
        path: LICENSE
      - type: script
        dest-filename: wrapper
        commands:
          - exec /app/extra/bin/silori "$@"
      - type: script
        dest-filename: apply_extra
        commands:
          - tar -xzf silori-linux-x86_64-flatpak.tar.gz -C /app/extra
          - rm -f silori-linux-x86_64-flatpak.tar.gz
      - type: extra-data
        filename: silori-linux-x86_64-flatpak.tar.gz
        url: https://sinzala.org/downloads/silori/silori-linux-x86_64-flatpak.tar.gz
        sha256: 405b42e537cac36a3aebee9ed2f693b0a112b7141582fb02f2ccc1c805d4d8d6
        size: 176328
