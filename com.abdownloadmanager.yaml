app-id: com.abdownloadmanager.app
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: ABDownloadManager
finish-args:
  # Network access for downloading files
  - --share=network
  # X11 and Wayland display servers
  - --socket=x11
  - --socket=wayland
  # D-Bus access for notifications and system tray
  - --socket=system-bus
  - --socket=session-bus
  # Access to user's home directory for downloads
  - --filesystem=home
  # GPU acceleration
  - --device=dri
  # Custom PATH for application binaries
  - --env=PATH=/usr/bin:/app/bin
  # Notifications support
  - --talk-name=org.freedesktop.Notifications
  # System tray support via StatusNotifierWatcher
  - --talk-name=org.freedesktop.StatusNotifierWatcher
  - --own-name=org.freedesktop.StatusNotifierItem.com.abdownloadmanager.app

modules:
  - name: abdownloadmanager
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/amir1376/ab-download-manager.git
        tag: v1.0.0
    build-commands:
      - mkdir -p /app/bin /app/lib /app/share/icons/hicolor/256x256/apps /app/share/icons/hicolor/512x512/apps /app/share/applications /app/share/metainfo
      - cd desktop && ./gradlew :app:installDist && cd ..
      - cp -r desktop/app/build/install/app/* /app/
      - cp app/lib/ABDownloadManager.png /app/share/icons/hicolor/256x256/apps/com.abdownloadmanager.app.png
      - cp app/lib/ABDownloadManager.png /app/share/icons/hicolor/512x512/apps/com.abdownloadmanager.app.png
      - |
        if [ ! -f /app/share/applications/com.abdownloadmanager.app.desktop ]; then
          printf "[Desktop Entry]\nName=AB Download Manager\nExec=ABDownloadManager\nIcon=com.abdownloadmanager.app\nType=Application\nCategories=Network;FileTransfer;\n" > /app/share/applications/com.abdownloadmanager.app.desktop;
        fi
      - cp /home/yupanel/OpenSource/ab-download-manager/com.abdownloadmanager.app.metainfo.xml /app/share/metainfo/ 2>/dev/null || true

  - name: metainfo
    buildsystem: simple
    sources:
      - type: file
        path: com.abdownloadmanager.app.metainfo.xml
    build-commands:
      - mkdir -p /app/share/metainfo
      - cp com.abdownloadmanager.app.metainfo.xml /app/share/metainfo/
