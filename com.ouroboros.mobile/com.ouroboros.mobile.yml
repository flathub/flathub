app-id: com.ouroboros.mobile
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: ouroboros-mobile-wrapper
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=x11
  - --share=ipc
  - --share=network
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.secrets
  - --filesystem=xdg-run/keyring
  - --filesystem=xdg-config/dconf:ro
  - --metadata=X-DConf=comm/
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: ouroboros-mobile
    buildsystem: simple
    sources:
      - type: archive
        url: https://github.com/grebsu/ouroboros-mobile/releases/download/v1.1.1/bundle.tar.gz
        sha256: 76a44703f6bb8e185d78284f7bc74ab64b34c79e45fec0641dc308b3c077771b
      - type: file
        path: com.ouroboros.mobile.desktop
      - type: dir
        path: metainfo
        dest: metainfo
      - type: dir
        path: icons
        dest: icons
      - type: file
        path: ouroboros-mobile-wrapper
      - type: dir
        path: libs
        dest: extra-libs
    build-commands:
      - install -d /app/bin /app/lib /app/share/applications /app/share/metainfo /app/share/icons/hicolor
      - cp -r lib/* /app/lib/
      - cp -r extra-libs/* /app/lib/
      - cp -r data /app/
      - install -m 755 ouroboros_mobile /app/bin/
      - install -m 755 ouroboros-mobile-wrapper /app/bin/
      - ln -s /app/lib /app/bin/lib
      - ln -s /app/data /app/bin/data
      - install -m 644 com.ouroboros.mobile.desktop /app/share/applications/
      - cp -r metainfo/* /app/share/metainfo/
      - cp -r icons/* /app/share/icons/hicolor/
