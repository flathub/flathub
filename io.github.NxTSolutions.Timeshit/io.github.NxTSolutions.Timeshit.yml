app-id: io.github.NxTSolutions.Timeshit
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: timeshit
finish-args:
  - --share=network
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: timeshit
    buildsystem: simple
    build-commands:
      - install -D timeshit /app/bin/timeshit
      - install -D io.github.NxTSolutions.Timeshit.metainfo.xml /app/share/metainfo/io.github.NxTSolutions.Timeshit.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/NoahNxT/Toggl2Timeshit/releases/download/v1.2.0/timeshit-linux.tar.gz
        sha256: "32d5436b857f172458eef326342f7a719df6651b83fec9300ca9173af393223e"
        strip-components: 0
      - type: file
        path: io.github.NxTSolutions.Timeshit.metainfo.xml
