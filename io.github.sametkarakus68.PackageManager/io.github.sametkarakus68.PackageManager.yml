app-id: io.github.sametkarakus68.PackageManager
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: pkg-manager

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=host
  - --filesystem=/var/lib/flatpak
  - --filesystem=/var/lib/snapd
  - --system-talk-name=org.freedesktop.PolicyKit1
  - --system-talk-name=org.freedesktop.DBus
  - --talk-name=org.freedesktop.Flatpak

cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/man
  - '*.a'
  - '*.la'

modules:
  - name: pyqt6
    buildsystem: simple
    sources:
      - type: file
        path: wheels/pyqt6-6.11.0-cp310-abi3-manylinux_2_34_x86_64.whl
      - type: file
        path: wheels/pyqt6_qt6-6.11.0-py3-none-manylinux_2_34_x86_64.whl
      - type: file
        path: wheels/pyqt6_sip-13.11.1-cp312-cp312-manylinux1_x86_64.manylinux_2_5_x86_64.whl
    build-commands:
      - pip3 install --prefix=/app --no-index --find-links=. *.whl

  - name: pkg-manager
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/sametkarakus68/pkg-manager.git
        tag: v1.0.0
      - type: file
        path: flatpak/io.github.sametkarakus68.PackageManager.desktop
      - type: file
        path: flatpak/io.github.sametkarakus68.PackageManager.metainfo.xml
      - type: file
        path: flatpak/icons/io.github.sametkarakus68.PackageManager_16.png
      - type: file
        path: flatpak/icons/io.github.sametkarakus68.PackageManager_32.png
      - type: file
        path: flatpak/icons/io.github.sametkarakus68.PackageManager_48.png
      - type: file
        path: flatpak/icons/io.github.sametkarakus68.PackageManager_64.png
      - type: file
        path: flatpak/icons/io.github.sametkarakus68.PackageManager_128.png
      - type: file
        path: flatpak/icons/io.github.sametkarakus68.PackageManager_256.png
      - type: file
        path: flatpak/pkg-manager.sh
    build-commands:
      - install -Dm644 main.py /app/share/pkg-manager/main.py
      - install -Dm644 core.py /app/share/pkg-manager/core.py
      - install -Dm644 ui.py /app/share/pkg-manager/ui.py
      - install -Dm755 pkg-manager.sh /app/bin/pkg-manager
      - install -Dm644 io.github.sametkarakus68.PackageManager.desktop /app/share/applications/io.github.sametkarakus68.PackageManager.desktop
      - install -Dm644 io.github.sametkarakus68.PackageManager.metainfo.xml /app/share/metainfo/io.github.sametkarakus68.PackageManager.metainfo.xml
      - install -Dm644 io.github.sametkarakus68.PackageManager_16.png /app/share/icons/hicolor/16x16/apps/io.github.sametkarakus68.PackageManager.png
      - install -Dm644 io.github.sametkarakus68.PackageManager_32.png /app/share/icons/hicolor/32x32/apps/io.github.sametkarakus68.PackageManager.png
      - install -Dm644 io.github.sametkarakus68.PackageManager_48.png /app/share/icons/hicolor/48x48/apps/io.github.sametkarakus68.PackageManager.png
      - install -Dm644 io.github.sametkarakus68.PackageManager_64.png /app/share/icons/hicolor/64x64/apps/io.github.sametkarakus68.PackageManager.png
      - install -Dm644 io.github.sametkarakus68.PackageManager_128.png /app/share/icons/hicolor/128x128/apps/io.github.sametkarakus68.PackageManager.png
      - install -Dm644 io.github.sametkarakus68.PackageManager_256.png /app/share/icons/hicolor/256x256/apps/io.github.sametkarakus68.PackageManager.png
      - install -Dm644 requirements.txt /app/share/pkg-manager/requirements.txt
