app-id: gov.nasa.giss.Panoply
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk11
build-options:
  env:
    JAVA_HOME: /usr/lib/sdk/openjdk11/jvm/openjdk-11
finish-args:
  - --env=PATH=/app/bin:/app/jre/bin:/usr/bin
  - --env=JAVA_HOME=/app/jre
  - --share=ipc
  - --socket=x11
  - --filesystem=home
  - --share=network
command: panoply
modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk11/install.sh

  - name: panoply
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/panoply
      - cp -r jars/ /app/lib/panoply/jars/
      - install -Dm755 panoply.sh /app/lib/panoply/
      - mkdir -p /app/bin/
      - ln -sf /app/lib/panoply/panoply.sh /app/bin/panoply
      - install -Dm644 panoply_256x256.png /app/share/icons/hicolor/256x256/apps/gov.nasa.giss.Panoply.png
      - install -Dm644 gov.nasa.giss.Panoply.desktop /app/share/applications/gov.nasa.giss.Panoply.desktop
      - install -Dm644 gov.nasa.giss.Panoply.appdata.xml /app/share/metainfo/gov.nasa.giss.Panoply.appdata.xml
    sources:
      - type: archive
        url: http://www.giss.nasa.gov/tools/panoply/download/PanoplyJ-5.9.2.tgz
        sha256: 7cf68f77f6456e56573b0336c877973c852ffdbc46007922f636de1b61d37242
      - type: file
        path: panoply_256x256.png
      - type: file
        path: gov.nasa.giss.Panoply.desktop
      - type: file
        path: gov.nasa.giss.Panoply.appdata.xml
