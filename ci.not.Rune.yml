app-id: ci.not.Rune
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: rune
separate-locales: false
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --own-name=org.mpris.MediaPlayer2.rune_player.*
  - --talk-name=org.kde.StatusNotifierWatcher
modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  - name: rune
    buildsystem: simple
    build-commands:
      - sed -Ei 's#(Icon=).+#\1ci.not.Rune#' assets/rune.desktop
      - mkdir -p /app/share/applications
      - cp assets/rune.desktop /app/share/applications/ci.not.Rune.desktop
      - sed -Ei 's#(<id>)[a-z]+#\1ci.not.Rune#' assets/rune.metainfo.xml
      - sed -Ei 's#(<launchable type="desktop-id">)[a-z\.]+#\1ci.not.Rune.desktop#'
        assets/rune.metainfo.xml
      - mkdir -p /app/share/metainfo
      - cp assets/rune.metainfo.xml /app/share/metainfo/ci.not.Rune.metainfo.xml
      - rm -fr assets/icons/1024x1024
      - find . -type f -name '*.png' -execdir mv {} ci.not.Rune.png \;
      - mkdir -p /app/share/icons
      - cp -r assets/icons /app/share/icons/hicolor
      - rm -fr assets
      - cp -r . /app/share/rune
      - chmod +x /app/share/rune/rune /app/share/rune/lib/*
      - ln -s /app/share/rune/rune /app/bin/rune
    sources:
      - type: archive
        only-arches:
          - aarch64
        url: https://github.com/Losses/rune/releases/download/v1.0.0-beta.5/Rune-v1.0.0-beta.5-linux-aarch64.zip
        sha256: 76c89c66d891f41f70f75c5b02c49abe39ec4b9143f65d8470a8f20c9eafdbdd
        strip-components: 0
        x-checker-data:
          type: json
          url: https://api.github.com/repos/Losses/rune/releases/latest
          version-query: .tag_name
          url-query: '"https://github.com/Losses/rune/releases/download/" + $version
            + "/Rune-" + $version + "-linux-aarch64.zip"'
      - type: archive
        only-arches:
          - x86_64
        url: https://github.com/Losses/rune/releases/download/v1.0.0-beta.5/Rune-v1.0.0-beta.5-linux-amd64.zip
        sha256: 47e4bee43ceb680a0af6918d834112bddc0e5bd164c48c7f8ae30e4e61da1da0
        strip-components: 0
        x-checker-data:
          type: json
          url: https://api.github.com/repos/Losses/rune/releases/latest
          version-query: .tag_name
          url-query: '"https://github.com/Losses/rune/releases/download/" + $version
            + "/Rune-" + $version + "-linux-amd64.zip"'
