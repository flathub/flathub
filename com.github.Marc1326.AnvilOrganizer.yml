app-id: com.github.Marc1326.AnvilOrganizer
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: anvil-organizer

finish-args:
  # GUI
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # File access (home for mod instances, game dirs)
  - --filesystem=home
  # Removable media (USB drives with mods)
  - --filesystem=/media:ro
  - --filesystem=/mnt:ro
  - --filesystem=/run/media:ro
  # Network (Nexus API, NXM downloads)
  - --share=network
  # Desktop integration
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # NXM URL handler
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: python-lz4
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/l/lz4/lz4-4.3.3.tar.gz
        sha256: 01fe674ef2889dbb9899d8a67361e0c4a2c833af5aeb37dd505727cf5d2a131e

  - name: python-shiboken6
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app shiboken6-*.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/76/a1/f1958c9d00176044ab00464cd89b6969ef3a7d2ed12d316ff1eda3dec88f/shiboken6-6.8.3-cp39-abi3-manylinux_2_28_x86_64.whl
        sha256: 295a003466ca2cccf6660e2f2ceb5e6cef4af192a48a196a32d46b6f0c9ec5cb

  - name: python-pyside6-essentials
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app PySide6_Essentials-*.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/f0/b2/3205336262bf88d57f01503df81ede2a0b1eecbb2a7d58978a5e5625f7c1/PySide6_Essentials-6.8.3-cp39-abi3-manylinux_2_28_x86_64.whl
        sha256: fd57fa0c886ef99b3844173322c0023ec77cc946a0c9a0cdfbc2ac5c511053c1

  - name: python-pyside6
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --prefix=/app PySide6-*.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/f0/00/67c41f7280ed9d1c53a50bdaa5a6050134875341f0be96a58d329fe71ade/PySide6-6.8.3-cp39-abi3-manylinux_2_28_x86_64.whl
        sha256: 8e53e2357bfbdee1fa86c48312bf637460a2c26d49e7af0b3fae2e179ccc7052

  - name: anvil-organizer
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --no-deps --prefix=/app .
      - install -Dm644 anvil-organizer.desktop
          /app/share/applications/com.github.Marc1326.AnvilOrganizer.desktop
      - install -Dm644 anvil/resources/logo.png
          /app/share/icons/hicolor/256x256/apps/com.github.Marc1326.AnvilOrganizer.png
      - install -Dm644 packaging/flatpak/com.github.Marc1326.AnvilOrganizer.metainfo.xml
          /app/share/metainfo/com.github.Marc1326.AnvilOrganizer.metainfo.xml
    sources:
      - type: git
        url: https://github.com/Marc1326/Anvil-Organizer.git
        branch: main
