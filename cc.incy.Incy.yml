app-id: cc.incy.Incy
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: incy

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --socket=pulseaudio

modules:
  - name: incy
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra /app/bin/apply_extra
      - install -Dm755 incy-wrapper.sh /app/bin/incy
      - install -Dm644 cc.incy.Incy.desktop /app/share/applications/cc.incy.Incy.desktop
      - install -Dm644 cc.incy.Incy.png /app/share/icons/hicolor/512x512/apps/cc.incy.Incy.png
      - install -Dm644 cc.incy.Incy.metainfo.xml /app/share/metainfo/cc.incy.Incy.metainfo.xml
      - install -Dm644 LICENSE /app/share/licenses/cc.incy.Incy/LICENSE

    sources:
      - type: script
        dest-filename: apply_extra
        commands:
          - bsdtar -xf incy.rpm
          - rm -f incy.rpm
          - chmod 755 opt/incy/lib/app/resources/bin/hev-socks5-tunnel
          - chmod 755 opt/incy/lib/app/resources/bin/libincycore.so

      - type: script
        dest-filename: incy-wrapper.sh
        commands:
          - exec /app/extra/opt/incy/bin/incy "$@"

      - type: file
        path: cc.incy.Incy.desktop

      - type: file
        path: cc.incy.Incy.png

      - type: file
        path: cc.incy.Incy.metainfo.xml

      - type: file
        path: LICENSE

      - type: extra-data
        filename: incy.rpm
        url: https://github.com/INCY-DEV/incy-platforms/releases/download/desktop-v2.0.8/incy-linux-x64.rpm
        sha256: 00bde606b4c8561cb08d949debf14667054089451b6ba6e7ac0cf215f127242d
        size: 145538615
        installed-size: 460000000
        only-arches:
          - x86_64

      - type: extra-data
        filename: incy.rpm
        url: https://github.com/INCY-DEV/incy-platforms/releases/download/desktop-v2.0.8/incy-linux-arm64.rpm
        sha256: 95e9b3b0f9e43c1cf9cf5dce9f9a4aaa73d4d6dda0b852e2d95c26ffb028b675
        size: 141743989
        installed-size: 460000000
        only-arches:
          - aarch64
