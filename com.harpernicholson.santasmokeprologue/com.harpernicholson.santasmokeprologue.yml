app-id: com.harpernicholson.santasmokeprologue
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk

command: SantaSmokePrologue

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --share=ipc

modules:
  - name: santasmokeprologue
    buildsystem: simple

    build-commands:
        - install -D SantaSmokePrologue /app/bin/SantaSmokePrologue
        - install -D SantaSmokePrologue.pck /app/bin/SantaSmokePrologue.pck
        - install -D com.harpernicholson.santasmokeprologue.desktop /app/share/applications/com.harpernicholson.santasmokeprologue.desktop
        - install -D com.harpernicholson.santasmokeprologue.png /app/share/icons/hicolor/512x512/apps/com.harpernicholson.santasmokeprologue.png
        - install -D com.harpernicholson.santasmokeprologue.metainfo.xml /app/share/metainfo/com.harpernicholson.santasmokeprologue.metainfo.xml
        - install -D LICENSE /app/share/licenses/com.harpernicholson.santasmokeprologue/LICENSE

    sources:
      - type: archive
        url: https://github.com/HarperNicholson/Santa-Smoke-Prologue/releases/download/1.0/game.zip
        sha256: e52c03f0f3dbfec7a4d38ea81e6b2e4ed460c51e311e6967065328fbd012c031

      - type: file
        path: com.harpernicholson.santasmokeprologue.desktop

      - type: file
        path: com.harpernicholson.santasmokeprologue.png

      - type: file
        path: com.harpernicholson.santasmokeprologue.metainfo.xml

      - type: file
        path: LICENSE
