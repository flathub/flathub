id: ai.opencode.opencode
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: OpenCode
rename-desktop-file: OpenCode.desktop
rename-icon: OpenCode

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=host

modules:
  - name: opencode
    buildsystem: simple
    build-options:
      no-debuginfo: true
    build-commands:
      - ar x opencode-desktop-linux*.deb
      - tar xf data.tar.gz
      - mv usr/* /app
    sources:
      - type: file
        only-arches: [x86_64]
        url: https://github.com/sst/opencode/releases/download/v1.1.61/opencode-desktop-linux-amd64.deb
        sha256: 5d324f0daa7c0aebda6cff1cc3a96e49fe8e6a42151020d62eb76557b2231bdd
      - type: file
        only-arches: [aarch64]
        url: https://github.com/sst/opencode/releases/download/v1.1.61/opencode-desktop-linux-arm64.deb
        sha256: a29a5285fdc796d5df7163f1cac9ebc35e399d980ffdbe4fe5c36ca2226c5995
