id: com.glass.music
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
command: glass-music
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --filesystem=xdg-music:ro
  - --device=dri
modules:
  - name: glass-music
    buildsystem: simple
    build-commands:
      - install -D glass-music /app/bin/glass-music
    sources:
      - type: git
        url: https://github.com/dvytvs/Glass-Music.git
        branch: main
