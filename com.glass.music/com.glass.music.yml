app-id: com.glass.music
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
command: glass-music
separate-locales: false
modules:
  - name: glass-music
    buildsystem: simple
    build-commands:
      - npm install
      - npm run dist
      # Дальше идут команды перемещения готового билда в папки системы
    sources:
      - type: git
        url: https://github.com/dvytvs/Glass-Music.git
        tag: 1.8.2
