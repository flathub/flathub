app-id: dev.boxxy.BoxxyTerminal
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
    - org.freedesktop.Sdk.Extension.rust-stable
command: boxxy-terminal

finish-args:
    - --allow=devel
    - --device=dri
    - --filesystem=host
    - --share=ipc
    - --share=network
    - --socket=fallback-x11
    - --socket=wayland
    - --socket=session-bus
    - --socket=pulseaudio
    - --talk-name=org.freedesktop.Flatpak

cleanup:
    - /etc
    - /include
    - /lib/pkgconfig
    - /share/doc
    - /share/gtk-doc
    - /share/man
    - /share/pkgconfig
    - "*.la"
    - "*.a"

build-options:
    append-path: /usr/lib/sdk/rust-stable/bin
    env:
        CARGO_HOME: /run/build/boxxy-terminal/cargo

modules:
    - name: boxxy-terminal
      buildsystem: simple
      build-commands:
          - cargo --offline fetch --manifest-path Cargo.toml
          - cargo --offline build --release --manifest-path Cargo.toml
          - install -Dm755 target/release/boxxy-terminal -t /app/bin/
          - install -Dm755 target/release/boxxy-agent -t /app/libexec/
          - install -Dm644 resources/icons/dev.boxxy.BoxxyTerminal.png
            /app/share/icons/hicolor/256x256/apps/dev.boxxy.BoxxyTerminal.png
          - install -Dm644 flatpak/dev.boxxy.BoxxyTerminal.desktop
            /app/share/applications/dev.boxxy.BoxxyTerminal.desktop
          - install -Dm644 flatpak/dev.boxxy.BoxxyTerminal.metainfo.xml
            /app/share/metainfo/dev.boxxy.BoxxyTerminal.metainfo.xml
      sources:
          - type: git
            url: https://github.com/miifrommera/boxxy
            commit: 6e10e2b4b9eca21c2ca1b3c7f801d9ca577fe1c9
          - cargo-sources.json
