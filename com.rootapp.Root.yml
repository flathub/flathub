app-id: com.rootapp.Root
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: root
separate-locales: false

finish-args:
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=x11
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
  - --device=all
  - --filesystem=xdg-videos:ro
  - --filesystem=xdg-pictures:ro
  - --filesystem=xdg-download
  - --filesystem=xdg-run/pipewire-0
  - --filesystem=xdg-run/speech-dispatcher
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

modules:
  - name: root
    buildsystem: simple
    build-commands:
      - chmod +x Root.AppImage
      - ./Root.AppImage --appimage-extract
      - desktop-file-edit --set-key="Exec" --set-value="root %U" --set-icon=$FLATPAK_ID
        squashfs-root/Root.desktop
      - install -D squashfs-root/Root.png /app/share/icons/hicolor/256x256/apps/com.rootapp.Root.png
      - install -D squashfs-root/Root.desktop /app/share/applications/com.rootapp.Root.desktop
      - install -D com.rootapp.Root.metainfo.xml -t /app/share/metainfo/
      - mkdir -p /app/bin
      - mv squashfs-root /app/bin/root-app
      - mkdir -p /app/bin/root-app/usr/bin/.local/share
      - install -Dm755 root /app/bin/root

    sources:
      - type: file
        path: root

      - type: file
        path: com.rootapp.Root.metainfo.xml

      - type: file
        url: https://installer.rootapp.com/installer/Linux/X64/Root.AppImage
        dest-filename: Root.AppImage
        sha256: b81d23935e1db25e5dc5f857944fe71e072e3895db1c0c8195bd178374737206
        only-arches: [x86_64]

      - type: file
        url: https://installer.rootapp.com/installer/Linux/Arm64/Root.AppImage
        dest-filename: Root.AppImage
        sha256: a18f0e050a4c42f6e6eb77cfb7e54b531c9c13de37d7e64e353b8b10c8022fc8
        only-arches: [aarch64]