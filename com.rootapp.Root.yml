app-id: com.rootapp.Root
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: root
separate-locales: false

finish-args:
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --socket=x11 # X11, Avalonia doesn't support Wayland https://github.com/AvaloniaUI/Avalonia/issues/1243
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.ScreenSaver
  - --device=all
  - --filesystem=xdg-run/pipewire-0
  - --filesystem=host
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

modules:
  - name: vlc
    rm-configure: true
    config-opts:
      - BUILDCC=/usr/bin/gcc -std=gnu99
      - --disable-a52
      - --disable-alsa
      - --disable-avcodec
      - --disable-avformat
      - --disable-bluray
      - --disable-chromecast
      - --disable-dbus
      - --disable-dca
      - --disable-dvbpsi
      - --disable-dvdnav
      - --disable-dvdread
      - --disable-flac
      - --disable-fluidsynth
      - --disable-freetype
      - --disable-fribidi
      - --disable-glx
      - --disable-gnutls
      - --disable-harfbuzz
      - --disable-jack
      - --disable-kate
      - --disable-libass
      - --disable-libgcrypt
      - --disable-libmpeg2
      - --disable-libxml2
      - --disable-live555
      - --disable-lua
      - --disable-mad
      - --disable-matroska
      - --disable-mod
      - --disable-mpc
      - --disable-ncurses
      - --disable-ogg
      - --disable-opus
      - --disable-png
      - --disable-postproc
      - --disable-projectm
      - --disable-qt
      - --disable-qtbase
      - --disable-schroedinger
      - --disable-sdl-image
      - --disable-shout
      - --disable-skins2
      - --disable-smbclient
      - --disable-speex
      - --disable-sqlite
      - --disable-svg
      - --disable-svgdec
      - --disable-swscale
      - --disable-taglib
      - --disable-theora
      - --disable-twolame
      - --disable-upnp
      - --disable-vdpau
      - --disable-vlc
      - --disable-vorbis
      - --disable-xcb
      - --disable-xvideo
      - --disable-zvbi
      - --enable-run-as-root
      - --enable-shared
      - --disable-static
    sources:
      - type: archive
        url: https://get.videolan.org/vlc/3.0.21/vlc-3.0.21.tar.xz
        sha256: 24dbbe1d7dfaeea0994d5def0bbde200177347136dbfe573f5b6a4cee25afbb0
        x-checker-data:
          type: anitya
          project-id: 6504
          stable-only: true
          url-template: https://get.videolan.org/vlc/$version/vlc-$version.tar.xz

  - name: root
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra /app/bin/apply_extra
      - desktop-file-edit --set-key="Exec" --set-value="root %U" --set-icon=$FLATPAK_ID Root.desktop
      - install -D Root.png /app/share/icons/hicolor/256x256/apps/com.rootapp.Root.png
      - install -D Root.desktop /app/share/applications/com.rootapp.Root.desktop
      - install -D com.rootapp.Root.metainfo.xml -t /app/share/metainfo/
      - install -Dm755 root.sh /app/bin/root

    sources:
      - type: file
        path: root.sh

      - type: file
        path: com.rootapp.Root.metainfo.xml

      - type: file
        path: Root.desktop

      - type: file
        path: Root.png

      - type: script
        dest-filename: apply_extra
        commands:
          - chmod +x Root.AppImage
          - ./Root.AppImage --appimage-extract
          - rm Root.AppImage
          - mv squashfs-root root-app
          - rm -f root-app/usr/bin/xdg-open
          - ln -s /usr/bin/xdg-open root-app/usr/bin/xdg-open

      - type: extra-data
        filename: Root.AppImage
        url: https://installer.rootapp.com/installer/Linux/X64/Root.AppImage
        size: 371324096
        sha256: b81d23935e1db25e5dc5f857944fe71e072e3895db1c0c8195bd178374737206
        only-arches: [x86_64]

      - type: extra-data
        filename: Root.AppImage
        url: https://installer.rootapp.com/installer/Linux/Arm64/Root.AppImage
        size: 373232000
        sha256: a18f0e050a4c42f6e6eb77cfb7e54b531c9c13de37d7e64e353b8b10c8022fc8
        only-arches: [aarch64]