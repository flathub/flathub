app-id: com.rootapp.Root
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: root
separate-locales: false

finish-args:
  - --share=ipc
  - --share=network
  - --socket=pulseaudio # PulseAudio is needed for ALSA device access
  - --socket=x11 # X11, Avalonia doesn't support Wayland https://github.com/AvaloniaUI/Avalonia/issues/1243
  - --device=all # Webcam devices support
  - --filesystem=xdg-run/pipewire-0:ro # Audio support through pipewire
  
modules:
  - name: vlc
    rm-configure: true
    config-opts:
      - BUILDCC=/usr/bin/gcc -std=gnu99
      - --disable-a52
      - --disable-alsa
      - --disable-avcodec
      - --disable-avformat
      - --disable-bluray
      - --disable-chromecast
      - --disable-dbus
      - --disable-dca
      - --disable-dvbpsi
      - --disable-dvdnav
      - --disable-dvdread
      - --disable-flac
      - --disable-fluidsynth
      - --disable-freetype
      - --disable-fribidi
      - --disable-glx
      - --disable-gnutls
      - --disable-harfbuzz
      - --disable-jack
      - --disable-kate
      - --disable-libass
      - --disable-libgcrypt
      - --disable-libmpeg2
      - --disable-libxml2
      - --disable-live555
      - --disable-lua
      - --disable-mad
      - --disable-matroska
      - --disable-mod
      - --disable-mpc
      - --disable-ncurses
      - --disable-ogg
      - --disable-opus
      - --disable-png
      - --disable-postproc
      - --disable-projectm
      - --disable-qt
      - --disable-qtbase
      - --disable-schroedinger
      - --disable-sdl-image
      - --disable-shout
      - --disable-skins2
      - --disable-smbclient
      - --disable-speex
      - --disable-sqlite
      - --disable-svg
      - --disable-svgdec
      - --disable-swscale
      - --disable-taglib
      - --disable-theora
      - --disable-twolame
      - --disable-upnp
      - --disable-vdpau
      - --disable-vlc
      - --disable-vorbis
      - --disable-xcb
      - --disable-xvideo
      - --disable-zvbi
      - --enable-run-as-root
      - --enable-shared
      - --disable-static
    sources:
      - type: archive
        url: https://get.videolan.org/vlc/3.0.23/vlc-3.0.23.tar.xz
        sha256: e891cae6aa3ccda69bf94173d5105cbc55c7a7d9b1d21b9b21666e69eff3e7e0
        x-checker-data:
          type: anitya
          project-id: 6504
          stable-only: true
          url-template: https://get.videolan.org/vlc/$version/vlc-$version.tar.xz

  - shared-modules/squashfs-tools/squashfs-tools.json # Added Squashfs from https://github.com/flathub/shared-modules

  - name: root
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra /app/bin/apply_extra
      - desktop-file-edit --set-key="Exec" --set-value="root %U" --set-icon=$FLATPAK_ID Root.desktop
      - install -D Root.png /app/share/icons/hicolor/256x256/apps/com.rootapp.Root.png
      - install -D Root.desktop /app/share/applications/com.rootapp.Root.desktop
      - install -D com.rootapp.Root.metainfo.xml -t /app/share/metainfo/
      - install -Dm755 root.sh /app/bin/root

    sources:
      - type: file
        path: root.sh

      - type: file
        path: com.rootapp.Root.metainfo.xml

      - type: file
        path: Root.desktop

      - type: file
        path: Root.png

      - type: script
        dest-filename: apply_extra
        commands:
          - "offset=$(grep -abo 'hsqs' Root.AppImage | awk -F: '$1 > 100000 {print $1; exit}')" # Issues during extraction with SquashFS (Can't find a valid SQUASHFS superblock on Root.AppImage), fixed this trick from here: https://github.com/flathub/com.httpie.Httpie/blob/master/com.httpie.Httpie.yml
          - /app/bin/unsquashfs -d root-app -o $offset Root.AppImage
          - rm Root.AppImage
          - rm -f root-app/usr/bin/xdg-open
          - ln -s /usr/bin/xdg-open root-app/usr/bin/xdg-open
          - ln -s /tmp/.rootapp-local root-app/usr/bin/.local

      - type: extra-data
        filename: Root.AppImage
        url: https://installer.rootapp.com/installer/Linux/X64/Root.AppImage
        size: 371344576
        sha256: 8896f6a96ffd8b88f7531db90a894f2e42b6f935da92ed04066b716368175f8d
        only-arches: [x86_64]


      - type: extra-data
        filename: Root.AppImage
        url: https://installer.rootapp.com/installer/Linux/Arm64/Root.AppImage
        size: 373227904
        sha256: 9078466316a52d15579f080d0ff4e04131a1d811d51f31f6c63ac2eff371648c
        only-arches: [aarch64]