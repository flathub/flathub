app-id: org.fcitx.Fcitx5.Addon.Skk
runtime: org.fcitx.Fcitx5
runtime-version: stable
sdk: org.kde.Sdk//6.10
sdk-extensions:
  - org.freedesktop.Sdk.Extension.vala
build-extension: true
separate-locales: false
build-options:
  prefix: /app/addons/Skk
  prepend-path: /app/addons/Skk/bin
  prepend-pkg-config-path: /app/addons/Skk/lib/pkgconfig
  cflags: -I/app/addons/Skk/include
  append-path: /usr/lib/sdk/vala/bin
  prepend-ld-library-path: /usr/lib/sdk/vala/lib
  no-debuginfo: true
  strip: true
cleanup:
  - /bin
  - /include
  - /lib/pkgconfig
  - /lib/python*
  - /lib/vala*
  - /lib/gir*
  - /share/vala*
  - /share/gir*
  - /share/intltool
  - '*.la'
modules:
  - modules/gnome-common.yaml
  - shared-modules/intltool/intltool-0.51.json
  - modules/libgee.yaml
  - name: libskk
    sources:
      - type: archive
        url: https://github.com/ueno/libskk/archive/1.1.1.tar.gz
        sha512: b724e8ba7c4e554848627af932a292ad3fe065a206c7c2529e0c50e2fd8252ec8ec01fe751105d8846dee882d5a7c613be5b16744e05da132684c00b4ad566ca
        x-checker-data:
          type: anitya
          project-id: 228903
          stable-only: true
          url-template: https://github.com/ueno/libskk/archive/${version}.tar.gz
    build-options:
      cflags: -Wno-int-conversion
      env:
        ACLOCAL_PATH: /app/addons/Skk/share/aclocal
        VALAFLAGS: --vapidir /app/addons/Skk/share/vala/vapi
        XDG_DATA_DIRS: /app/addons/Skk/share:/app/share:/usr/share
      prepend-ld-library-path: /app/addons/Skk/lib
    make-args:
      - V=1
  - name: skk-jisyo
    buildsystem: simple
    build-commands:
      - install -Dm644 SKK-JISYO.* -t ${FLATPAK_DEST}/share/skk/
    sources:
      - type: git
        url: https://github.com/skk-dev/dict
        commit: 4eb91a3bbfef70bde940668ec60f3beae291e971
  - name: fcitx5-skk
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DUSE_QT6=On
      - -DSKK_PATH=/app/addons/Skk/share/skk
    sources:
      - type: git
        url: https://github.com/fcitx/fcitx5-skk
        tag: 5.1.10
        commit: 7f47d507e9b6af7468151991eedbccf89591426c
