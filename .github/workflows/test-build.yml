name: Build & Test Flatpak

on:
  push:
    branches:
      - new-pr
  pull_request:

jobs:
  flatpak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Flatpak
        run: |
          sudo apt update
          sudo apt install -y flatpak curl unzip

      - name: Add Flathub repo (user)
        run: |
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install Flathub Builder
        run: |
          flatpak install -y flathub org.flatpak.Builder

      - name: Build Flatpak
        run: |
          dbus-run-session -- bash -c '
            flatpak run --command=flathub-build org.flatpak.Builder --install org.anirudhsevugan.SimpliPlay.yml
          '

      - name: Test Flatpak run for 10 seconds
        run: |
          # Run the Flatpak in the background
          flatpak run --user org.anirudhsevugan.SimpliPlay &
          PID=$!
          # Wait 10 seconds
          sleep 10
          # Kill the Flatpak
          kill $PID || true
