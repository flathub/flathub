name: Build Flatpak

on:
  push:
    branches:
      - new-pr
  pull_request:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Flatpak
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder curl unzip git

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            build-dir \
            org.anirudhsevugan.SimpliPlay.yml
