name: Build & Test Flatpak

on:
  push:
    branches:
      - simpliplay-submission
  pull_request:

jobs:
  flatpak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3


      - run: |
          sudo apt update
          sudo apt install -y flatpak curl unzip


      - run: |
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo


      - run: |
          flatpak install --user -y flathub org.flatpak.Builder


      - run: |
          dbus-run-session -- bash -c '
            flatpak run --command=flathub-build org.flatpak.Builder --install me.anirudhsevugan.SimpliPlay.yml
          '
          
      - uses: actions/upload-artifact@v4
        with:
          name: simpliplay-flatpak-repo
          path: repo
          
      - run: |
          flatpak build-bundle repo \
            simpliplay.flatpak \
            me.anirudhsevugan.SimpliPlay \
            --runtime-repo=https://dl.flathub.org/repo/flathub.flatpakrepo
      
      - uses: actions/upload-artifact@v4
        with:
          name: simpliplay-flatpak
          path: simpliplay.flatpak

      - name: test for 10s
        run: |
         dbus-run-session -- bash -c '
            # Run the Flatpak in the background
            flatpak run --user me.anirudhsevugan.SimpliPlay &
            PID=$!
            # Wait 10 seconds
            sleep 10
            # Kill the Flatpak
            kill $PID || true
         '
