name: CI Build Test
on: [push, pull_request, workflow_dispatch]

jobs:
  flatpak-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Flatpak-Builder Action
        uses: flatpak/flatpak-github-actions/flatpak-builder@master
        with:
          bundle: anura-test.flatpak
          # Parametro corretto: manifest-path invece di manifest
          manifest-path: com.github.d3msudo.anura.json
          # Disabilitiamo la cache per evitare conflitti durante il test dell'inlining
          cache: false
          # Specifica l'architettura se necessario (opzionale)
          arch: x86_64
