name: CI Build Test
on: [push, pull_request, workflow_dispatch]

jobs:
  flatpak-build:
    runs-on: ubuntu-latest
    container:
      # Utilizziamo un'immagine che contiene già flatpak-builder per massima stabilità
      image: bilelmoussaoui/flatpak-github-actions:gnome-47 
      options: --privileged
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Flatpak-Builder Action
        uses: flatpak/flatpak-github-actions/flatpak-builder@master
        with:
          bundle: anura-test.flatpak
          manifest-path: com.github.d3msudo.anura.json
          cache: false
          restore-cache: false
          arch: x86_64
