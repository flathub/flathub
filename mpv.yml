name: mpv
buildsystem: meson
config-opts:
  - -Dalsa=disabled
  - -Dbuild-date=false
  - -Dcdda=disabled
  - -Dcplayer=false
  - -Dcplugins=disabled
  - -Dcuda-hwaccel=disabled
  - -Dcuda-interop=disabled
  - -Ddmabuf-wayland=enabled
  - -Ddrm=enabled
  - -Ddvbin=disabled
  - -Ddvdnav=disabled
  - -Degl-drm=enabled
  - -Degl-wayland=enabled
  - -Degl-x11=disabled
  - -Degl=enabled
  - -Dgbm=enabled
  - -Dgl-x11=disabled
  - -Dgl=enabled
  - -Dhtml-build=disabled
  - -Diconv=enabled
  - -Djack=disabled
  - -Djavascript=disabled
  - -Djpeg=disabled
  - -Dlcms2=disabled
  - -Dlibarchive=disabled
  - -Dlibavdevice=disabled
  - -Dlibbluray=disabled
  - -Dlibmpv=true
  - -Dlua=disabled
  - -Dmanpage-build=disabled
  - -Dopenal=disabled
  - -Dpipewire=enabled
  - -Dplain-gl=enabled
  - -Dpulse=disabled
  - -Drubberband=disabled
  - -Duchardet=disabled
  - -Dvaapi-drm=enabled
  - -Dvaapi-wayland=enabled
  - -Dvaapi-x11=disabled
  - -Dvaapi=enabled
  - -Dvapoursynth=disabled
  - -Dvdpau-gl-x11=disabled
  - -Dvdpau=disabled
  - -Dvector=enabled
  - -Dvulkan=enabled
  - -Dwayland=enabled
  - -Dwerror=false
  - -Dx11=disabled
  - -Dxv=disabled
  - -Dzimg=enabled
  - -Dzlib=enabled
cleanup:
  - /bin/mpv
  - /etc/mpv
  - /share/applications
  - /share/bash-completion
  - /share/icons
  - /share/man
  - /share/zsh
sources:
  - type: git
    url: https://github.com/mpv-player/mpv.git
    tag: v0.41.0
    commit: 41f6a645068483470267271e1d09966ca3b9f413
    x-checker-data:
      type: git
      tag-pattern: ^v([\d.]+)$
      is-main-source: true

modules:
  - name: hwdata
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/vcrhonek/hwdata/archive/refs/tags/v0.394.tar.gz
        sha256: b7c3fd7214a3b7c49d2661db127a712dc11cffd1799f793947aa1cb20aaf3298

  - name: libdisplay-info
    buildsystem: meson
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/emersion/libdisplay-info/-/archive/0.2.0/libdisplay-info-0.2.0.tar.gz
        sha256: f7331fcaf5527251b84c8fb84238d06cd2f458422ce950c80e86c72927aa8c2b

  - name: zimg
    config-opts:
      - --disable-static
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/doc
    sources:
      - type: archive
        archive-type: tar
        url: https://api.github.com/repos/sekrit-twc/zimg/tarball/release-3.0.6
        sha256: 15140e491c4ce9db5f02a038d8a1eb53e9151b55eeed06a2899425a6ebfef367
        x-checker-data:
          type: json
          url: https://api.github.com/repos/sekrit-twc/zimg/releases/latest
          url-query: .tarball_url
          version-query: .tag_name | sub("^release-"; "")
          timestamp-query: .published_at

  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Dvulkan=enabled
      - -Dshaderc=enabled
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
