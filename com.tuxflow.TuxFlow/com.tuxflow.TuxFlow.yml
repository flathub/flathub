app-id: com.tuxflow.TuxFlow
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: tuxflow

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=session-bus
  - --device=dri
  - --share=network
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=home

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/tuxflow/cargo
    CARGO_NET_OFFLINE: 'true'
    RUST_BACKTRACE: '1'

modules:
  - name: vte
    buildsystem: meson
    config-opts:
      - -Dgtk4=true
      - -Dgtk3=false
      - -Dvapi=false
      - -Ddocs=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/vte/0.76/vte-0.76.0.tar.xz
        sha256: bbce30702bcc41e49d3e3d0d0ee1e460c8cbe050cfb9e090cc0a109845e3e3ab

  - name: tuxflow
    buildsystem: simple
    build-commands:
      - cargo build --release --offline
      - install -Dm755 target/release/tuxflow /app/bin/tuxflow
      - install -Dm755 target/release/tuxflow-mcp /app/bin/tuxflow-mcp
      - install -Dm644 data/com.tuxflow.TuxFlow.desktop /app/share/applications/com.tuxflow.TuxFlow.desktop
      - install -Dm644 data/com.tuxflow.TuxFlow.metainfo.xml /app/share/metainfo/com.tuxflow.TuxFlow.metainfo.xml
      - install -Dm644 data/icons/com.tuxflow.TuxFlow.svg /app/share/icons/hicolor/scalable/apps/com.tuxflow.TuxFlow.svg
    sources:
      - type: git
        url: https://github.com/markovic-nikola/tuxflow.git
        commit: d7b4ab102a3f6f418662fd2d3277b0cd03071cb8
      - cargo-sources.json
