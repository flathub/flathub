app-id: net.ladstatt.apps.camera.CameraApp
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: CameraApp
finish-args:
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  - --device=all
  - --talk-name=org.freedesktop.portal.Desktop
modules:
  - name: CameraApp
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/CameraApp/
      - cp -ar binaries/CameraApp/* /app/lib/CameraApp/
      - mkdir -p /app/bin
      - ln -s /app/lib/CameraApp/bin/CameraApp /app/bin/CameraApp
      - install -Dm644 icons/camera-app-icon-16.png /app/share/icons/hicolor/16x16/apps/net.ladstatt.apps.camera.CameraApp.png
      - install -Dm644 icons/camera-app-icon-32.png /app/share/icons/hicolor/32x32/apps/net.ladstatt.apps.camera.CameraApp.png
      - install -Dm644 icons/camera-app-icon-64.png /app/share/icons/hicolor/64x64/apps/net.ladstatt.apps.camera.CameraApp.png
      - install -Dm644 icons/camera-app-icon-128.png /app/share/icons/hicolor/128x128/apps/net.ladstatt.apps.camera.CameraApp.png
      - install -Dm644 icons/camera-app-icon-256.png /app/share/icons/hicolor/256x256/apps/net.ladstatt.apps.camera.CameraApp.png
      - install -Dm644 icons/camera-app-icon-512.png /app/share/icons/hicolor/512x512/apps/net.ladstatt.apps.camera.CameraApp.png
      - install -Dm644 meta/net.ladstatt.apps.camera.CameraApp.metainfo.xml /app/share/metainfo/net.ladstatt.apps.camera.CameraApp.metainfo.xml
      - install -Dm644 meta/net.ladstatt.apps.camera.CameraApp.desktop -t /app/share/applications
    sources:
      - type: archive
        url: https://www.ladstatt.net/apps/CameraApp/26.3.0/flatpak-package-26.3.0-aarch64.tar.gz
        sha256: 84a9cbed6c47e7773f7c64a5e3d91ae1c087da1efcaa3e0871dbc0791c82c1d2
        strip-components: 2
        only-arches:
          - aarch64
      - type: archive
        url: https://www.ladstatt.net/apps/CameraApp/26.3.0/flatpak-package-26.3.0-amd64.tar.gz
        sha256: f37d2bdf9deef15045f4531a5e0603e34895293db25e5194ca61e32712d00c0d
        strip-components: 2
        only-arches:
          - x86_64
