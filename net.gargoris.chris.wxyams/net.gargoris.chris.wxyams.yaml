id: net.gargoris.chris.wxyams
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk21
command: wxyams-wrapper

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --env=JAVA_HOME=/app/jre

modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk21/install.sh

  - name: wxyams
    buildsystem: simple
    build-commands:
      - install -Dm644 wxyams.jar /app/lib/wxyams.jar
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png
      - install -Dm644 ${FLATPAK_ID}.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - mkdir -p /app/bin
      - |
        cat > /app/bin/wxyams-wrapper << 'SCRIPT'
        #!/bin/bash
        exec /app/jre/bin/java \
          -Dwxyams.production=true \
          --add-modules jdk.httpserver \
          -jar /app/lib/wxyams.jar "$@"
        SCRIPT
      - chmod +x /app/bin/wxyams-wrapper
    sources:
      - type: file
        url: https://wxyams.com/releases/wxyams-2.1.4.jar
        sha256: f318b104081f7dcf6e9a3f4a2f72406e9cd36b6e79c12096df0b22d0bca8f960
        dest-filename: wxyams.jar
      - type: file
        path: icon.png
      - type: file
        path: net.gargoris.chris.wxyams.desktop
      - type: file
        path: net.gargoris.chris.wxyams.metainfo.xml
