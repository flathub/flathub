app-id: org.qora.shift
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: qora-shift
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --filesystem=home
  - --share=network
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.xfce.Xfconf
  - --talk-name=org.gnome.SettingsDaemon.SettingsHost
  - --own-name=org.qora.shift
  - --env=PYTHONPATH=/app/share/qora-shift/src

modules:
  - name: python3-psutil
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app psutil
    sources:
      - type: git
        url: https://github.com/giampaolo/psutil.git
        tag: release-5.9.8

  - name: python3-pyudev
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app pyudev
    sources:
      - type: git
        url: https://github.com/pyudev/pyudev.git
        tag: v0.24.1

  - name: qora-shift
    buildsystem: simple
    build-commands:
      # Create directories
      - mkdir -p /app/share/qora-shift
      - mkdir -p /app/share/icons/hicolor/scalable/apps
      - mkdir -p /app/share/metainfo
      
      # Copy Source Code and Data
      - cp -r src /app/share/qora-shift/
      - cp -r data /app/share/qora-shift/
      - cp -r profiles /app/share/qora-shift/
      
      # Install Executable
      - install -D qora-shift-wrapper.sh /app/bin/qora-shift
      
      # Install Desktop File
      - install -D data/org.qora.shift.desktop /app/share/applications/org.qora.shift.desktop
      
      # Install Icon
      - install -D data/icons/org.qora.shift.svg /app/share/icons/hicolor/scalable/apps/org.qora.shift.svg
      
      # Install Metainfo (AppStream)
      - install -D data/org.qora.shift.metainfo.xml /app/share/metainfo/org.qora.shift.metainfo.xml
      
    sources:
      # Flathub Submission Configuration
      - type: git
        url: https://github.com/VastSea0/qora-shift.git
        tag: v1.0.0
         

