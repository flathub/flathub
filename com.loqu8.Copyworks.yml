app-id: com.loqu8.Copyworks
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: copyworks

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --socket=cups
  - --filesystem=home

modules:
  - name: copyworks
    buildsystem: simple
    build-commands:
      - install -d /app/bin /app/lib /app/data
      - install -Dm755 bundle/copyworks /app/bin/copyworks
      - cp -a bundle/lib/* /app/lib/
      - cp -a bundle/data/* /app/data/
      - install -Dm644 com.loqu8.Copyworks.desktop /app/share/applications/com.loqu8.Copyworks.desktop
      - install -Dm644 copyworks-256.png /app/share/icons/hicolor/256x256/apps/com.loqu8.Copyworks.png
      - install -Dm644 com.loqu8.Copyworks.metainfo.xml /app/share/metainfo/com.loqu8.Copyworks.metainfo.xml
    sources:
      - type: archive
        url: https://releases.loqu8.com/downloads/copyworks/0.8.4/copyworks-0.8.4-linux-x64.tar.gz
        sha256: d85b6a1c6e0087521c3a76056a8338c72a17429c981a923e03dde97b4926cb4f
      - type: file
        path: com.loqu8.Copyworks.desktop
      - type: file
        path: copyworks-256.png
      - type: file
        path: com.loqu8.Copyworks.metainfo.xml
