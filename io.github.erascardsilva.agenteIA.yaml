app-id: io.github.erascardsilva.agenteIA
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
  - org.freedesktop.Sdk.Extension.node20
command: agenteIA
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.SpeechDispatcher
  - --talk-name=org.speech_dispatcher.SpeechDispatcher
build-options:
  append-path: /usr/lib/sdk/golang/bin:/usr/lib/sdk/node20/bin
  env:
    - GOLANG_EXTENSION: /usr/lib/sdk/golang
    - NODE_EXTENSION: /usr/lib/sdk/node20
modules:
  - name: agenteIA
    buildsystem: simple
    build-commands:
      # Build the application using wails
      - . /usr/lib/sdk/node20/enable.sh && cd frontend && npm install && npm run build && cd ..
      # Note: We need to ensure go environment is ready
      - go version
      - go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - $(go env GOPATH)/bin/wails build -platform linux/amd64
      # Install files
      - install -D build/bin/agenteIA /app/bin/agenteIA
      - install -D build/linux/io.github.erascardsilva.agenteIA.desktop /app/share/applications/io.github.erascardsilva.agenteIA.desktop
      - install -D build/linux/io.github.erascardsilva.agenteIA.metainfo.xml /app/share/metainfo/io.github.erascardsilva.agenteIA.metainfo.xml
      - install -D build/appicon.png /app/share/icons/hicolor/512x512/apps/io.github.erascardsilva.agenteIA.png
    sources:
      - type: git
        url: https://github.com/erascardsilva/agenteIA.git
        commit: 56f589e6eb5a8220bc0a8f895abbd52367d510e8
