app-id: io.github.gimletlove.imagecompare
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: imagecompare

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/man

modules:
  - name: vips
    buildsystem: meson
    config-opts:
      - -Ddeprecated=false
    sources:
      - type: archive
        url: https://github.com/libvips/libvips/releases/download/v8.18.0/vips-8.18.0.tar.xz
        sha256: b85ab92280c30d22f5c8fe2f68b809cddb7eaac437d8c33474475dac84ddc574

  - name: imagecompare
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/gimletlove/imagecompare/archive/refs/tags/1.0.2.tar.gz
        sha256: 0eaddd7da7cbcc70336288ca76d9f12c28797b72e02368b25a819457603e3e68
