app-id: io.github.sugarycandybar.Hosty
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: hosty
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - name: python-deps
    buildsystem: simple
    build-commands:
      - python3 -m pip install --prefix=/app --no-build-isolation --no-index --find-links="file://${PWD}" requests psutil pillow
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/d7/8e/7540e8a2036f79a125c1d2ebadf69ed7901608859186c856fa0388ef4197/requests-2.33.1-py3-none-any.whl
        sha256: 4e6d1ef462f3626a1f0a0a9c42dd93c63bad33f9f1c1937509b8c5c8718ab56a
      - type: file
        url: https://files.pythonhosted.org/packages/9a/3c/c17fb3ca2d9c3acff52e30b309f538586f9f5b9c9cf454f3845fc9af4881/certifi-2026.2.25-py3-none-any.whl
        sha256: 027692e4402ad994f1c42e52a4997a9763c646b73e4096e4d5d6db8af1d6f0fa
      - type: file
        url: https://files.pythonhosted.org/packages/db/8f/61959034484a4a7c527811f4721e75d02d653a35afb0b6054474d8185d4c/charset_normalizer-3.4.7-py3-none-any.whl
        sha256: 3dce51d0f5e7951f8bb4900c257dad282f49190fdbebecd4ba99bcc41fef404d
      - type: file
        url: https://files.pythonhosted.org/packages/0e/61/66938bbb5fc52dbdf84594873d5b51fb1f7c7794e9c0f5bd885f30bc507b/idna-3.11-py3-none-any.whl
        sha256: 771a87f49d9defaf64091e6e6fe9c18d4833f140bd19464795bc32d966ca37ea
      - type: file
        url: https://files.pythonhosted.org/packages/39/08/aaaad47bc4e9dc8c725e68f9d04865dbcb2052843ff09c97b08904852d84/urllib3-2.6.3-py3-none-any.whl
        sha256: bf272323e553dfb2e87d9bfd225ca7b0f467b919d7bbd355436d3fd37cb0acd4
      - type: file
        url: https://files.pythonhosted.org/packages/aa/c6/d1ddf4abb55e93cebc4f2ed8b5d6dbad109ecb8d63748dd2b20ab5e57ebe/psutil-7.2.2.tar.gz
        sha256: 0746f5f8d406af344fd547f1c8daa5f5c33dbc293bb8d6a16d80b4bb88f59372
      - type: file
        url: https://files.pythonhosted.org/packages/f3/0d/d0d6dea55cd152ce3d6767bb38a8fc10e33796ba4ba210cbab9354b6d238/pillow-11.3.0.tar.gz
        sha256: 3828ee7586cd0b2091b6209e5ad53e20d0649bbe87164a459d0676e035e8f523
  - name: hosty
    buildsystem: simple
    build-commands:
      - install -d /app/share
      - cp -a hosty /app/share/
      - install -Dm755 hosty.py /app/share/hosty.py
      - install -Dm755 packaging/flatpak/hosty-wrapper.sh /app/bin/hosty
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Hosty.desktop /app/share/applications/io.github.sugarycandybar.Hosty.desktop
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Hosty.metainfo.xml /app/share/metainfo/io.github.sugarycandybar.Hosty.metainfo.xml
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Hosty.svg /app/share/icons/hicolor/scalable/apps/io.github.sugarycandybar.Hosty.svg
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Hosty-symbolic.svg /app/share/icons/hicolor/symbolic/apps/io.github.sugarycandybar.Hosty-symbolic.svg
      - install -d /app/share/app-info/media/io.github.sugarycandybar.Hosty
      - install -Dm644 packaging/linux/screenshots/connect.png /app/share/app-info/media/io.github.sugarycandybar.Hosty/connect.png
      - install -Dm644 packaging/linux/screenshots/files.png /app/share/app-info/media/io.github.sugarycandybar.Hosty/files.png
      - install -Dm644 packaging/linux/screenshots/console.png /app/share/app-info/media/io.github.sugarycandybar.Hosty/console.png
      - install -Dm644 packaging/linux/screenshots/mods.png /app/share/app-info/media/io.github.sugarycandybar.Hosty/mods.png
      - install -Dm644 packaging/linux/screenshots/performance.png /app/share/app-info/media/io.github.sugarycandybar.Hosty/performance.png
    sources:
      - type: dir
        path: ../..
