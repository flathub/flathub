app-id: io.github.sugarycandybar.Hosty
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: hosty
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - python3-requirements.json
  - name: hosty
    buildsystem: simple
    build-commands:
      - install -d /app/share
      - cp -a hosty /app/share/
      - install -Dm755 hosty.py /app/share/hosty.py
      - install -Dm755 packaging/flatpak/hosty-wrapper.sh /app/bin/hosty
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Hosty.desktop /app/share/applications/io.github.sugarycandybar.Hosty.desktop
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Hosty.metainfo.xml /app/share/metainfo/io.github.sugarycandybar.Hosty.metainfo.xml
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Hosty.svg /app/share/icons/hicolor/scalable/apps/io.github.sugarycandybar.Hosty.svg
      - install -Dm644 packaging/linux/io.github.sugarycandybar.Hosty-symbolic.svg /app/share/icons/hicolor/symbolic/apps/io.github.sugarycandybar.Hosty-symbolic.svg
    sources:
      - type: git
        url: https://github.com/sugarycandybar/Hosty.git
        commit: 6d960485f576bf01160caaf4c24d346d03663fc1
