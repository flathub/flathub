app-id: pl.kir.szafir
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: start-szafir-app.sh

sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk25

finish-args:
  - --socket=pcsc
  - --share=network
  - --socket=x11
  - --share=ipc
  - --filesystem=xdg-documents
  - --persist=.java
  - --persist=KIR
  - --env=PATH=/app/jre/bin:/app/bin:/usr/bin
  - --env=JAVA_HOME=/app/jre
  - --env=GDK_BACKEND=x11

cleanup:
  - /include
  - /bin/pcsc-spy
  - /lib/libpcscspy*
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - /sbin

modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk25/install.sh

  - name: pcsc-lite
    buildsystem: meson
    config-opts:
      - -Dlibudev=false
      - -Dlibsystemd=false
      - -Dusb=false
      - -Dlibusb=false
      - -Dpolkit=false
      - -Dserial=false
      - -Dipcdir=/run/pcscd
    post-install:
      - install -Dm644 ../COPYING /app/share/licenses/$FLATPAK_ID/pcsc-lite/COPYING
    sources:
      - type: archive
        url: https://pcsclite.apdu.fr/files/pcsc-lite-2.3.3.tar.xz
        sha256: cdff7d7153a0b37aa74e26dfec89ec7dc5c5286aa21b91b903e38739d227e8e7

  - name: szafir
    buildsystem: simple
    build-commands:
      - install -D -m 755 apply_extra_szafir.sh /app/bin/apply_extra
      - install -D -m 755 start-szafir-app.sh /app/bin/start-szafir-app.sh
      - install -D -m 644 pl.kir.szafir.metainfo.xml /app/share/metainfo/pl.kir.szafir.metainfo.xml
      - install -D -m 644 pl.kir.szafir.desktop /app/share/applications/pl.kir.szafir.desktop
      - install -D -m 644 free_icon.svg /app/share/icons/hicolor/scalable/apps/pl.kir.szafir.svg
    sources:
      - type: file
        path: start-szafir-app.sh
      - type: file
        path: apply_extra_szafir.sh
      - type: file
        path: pl.kir.szafir.desktop
      - type: file
        path: pl.kir.szafir.metainfo.xml
      - type: file
        path: free_icon.svg
      - type: extra-data
        filename: szafir_Linux.zip
        url: https://storage.googleapis.com/cdn.elektronicznypodpis.pl/Szafir/szafir_Linux.zip
        sha256: 50a3f4a25a427e1ea2e780d52796393ca6aa7e26faa5f477bbff67942b2c5cd5
        size: 48801916
