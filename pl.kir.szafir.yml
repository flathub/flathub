app-id: pl.kir.szafir
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: start-szafir-app.sh

sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk25

finish-args:
  - --socket=pcsc
  - --share=network
  - --socket=x11
  - --share=ipc
  - --filesystem=xdg-documents
  - --persist=.java
  - --persist=KIR
  - --env=PATH=/app/jre/bin:/app/bin:/usr/bin
  - --env=JAVA_HOME=/app/jre
  - --env=GDK_BACKEND=x11

modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk25/install.sh

  - modules/pcsc-lite.yml

  - name: szafir
    buildsystem: simple
    build-commands:
      - install -D -m 755 apply_extra_szafir.sh /app/bin/apply_extra
      - install -D -m 755 start-szafir-app.sh /app/bin/start-szafir-app.sh
      - install -D -m 644 pl.kir.szafir.metainfo.xml /app/share/metainfo/pl.kir.szafir.metainfo.xml
      - install -D -m 644 pl.kir.szafir.desktop /app/share/applications/pl.kir.szafir.desktop
    sources:
      - type: file
        path: start-szafir-app.sh
      - type: file
        path: apply_extra_szafir.sh
      - type: file
        path: pl.kir.szafir.desktop
      - type: file
        path: pl.kir.szafir.metainfo.xml
      - type: extra-data
        filename: szafir_Linux.zip
        url: https://storage.googleapis.com/cdn.elektronicznypodpis.pl/Szafir/szafir_Linux.zip
        sha256: 50a3f4a25a427e1ea2e780d52796393ca6aa7e26faa5f477bbff67942b2c5cd5
        size: 48801916
