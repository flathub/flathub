app-id: me.tyrrrz.DiscordChatExporter
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: DiscordChatExporter

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --filesystem=xdg-download
  - --env=DISCORDCHATEXPORTER_SETTINGS_PATH=/var/config/settings.json
  - --env=DISCORDCHATEXPORTER_ALLOW_AUTO_UPDATE=false

modules:
  - name: DiscordChatExporter
    buildsystem: simple

    build-commands:
      - install -d /app/DiscordChatExporter
      - cp -r . /app/DiscordChatExporter/
      - chmod +x /app/DiscordChatExporter/DiscordChatExporter
      - install -d /app/bin
      - ln -s /app/DiscordChatExporter/DiscordChatExporter /app/bin/DiscordChatExporter
      - install -Dm644 me.tyrrrz.DiscordChatExporter.desktop /app/share/applications/me.tyrrrz.DiscordChatExporter.desktop
      - install -Dm644 me.tyrrrz.DiscordChatExporter.metainfo.xml /app/share/metainfo/me.tyrrrz.DiscordChatExporter.metainfo.xml
      - install -Dm644 favicon.png /app/share/icons/hicolor/256x256/apps/me.tyrrrz.DiscordChatExporter.png

    sources:
      - type: archive
        only-arches: [x86_64]
        url: https://github.com/Tyrrrz/DiscordChatExporter/releases/download/2.47.1/DiscordChatExporter.linux-x64.zip
        sha256: 63551e4411b50fa482e190ea52fef6ffe327e45a11a072ee1434112fbb2ad837
        x-checker-data:
          type: json
          url: https://api.github.com/repos/Tyrrrz/DiscordChatExporter/releases/latest
          version-query: .tag_name
          url-query: >-
            .assets[] | select(.name == "DiscordChatExporter.linux-x64.zip") | .browser_download_url

      - type: archive
        only-arches: [arm]
        url: https://github.com/Tyrrrz/DiscordChatExporter/releases/download/2.47.1/DiscordChatExporter.linux-arm.zip
        sha256: 60acb28e1ec21731a9778b479d4ceba8daee06c76588cc7264b600e08dc45a97
        x-checker-data:
          type: json
          url: https://api.github.com/repos/Tyrrrz/DiscordChatExporter/releases/latest
          version-query: .tag_name
          url-query: >-
            .assets[] | select(.name == "DiscordChatExporter.linux-arm.zip") | .browser_download_url

      - type: archive
        only-arches: [aarch64]
        url: https://github.com/Tyrrrz/DiscordChatExporter/releases/download/2.47.1/DiscordChatExporter.linux-arm64.zip
        sha256: bfca736449a8c2c6265219989a197aaecb93a864055cb690265f55cdafe41c1b
        x-checker-data:
          type: json
          url: https://api.github.com/repos/Tyrrrz/DiscordChatExporter/releases/latest
          version-query: .tag_name
          url-query: >-
            .assets[] | select(.name == "DiscordChatExporter.linux-arm64.zip") | .browser_download_url

      - type: file
        path: me.tyrrrz.DiscordChatExporter.desktop

      - type: file
        path: me.tyrrrz.DiscordChatExporter.metainfo.xml

      - type: file
        url: https://raw.githubusercontent.com/Tyrrrz/DiscordChatExporter/2.47.1/favicon.png
        sha256: 36ea0d21cf80c7e15779b1db7a241dadfa45a1a21890242df1a18a9290d96d8a
        dest-filename: favicon.png
