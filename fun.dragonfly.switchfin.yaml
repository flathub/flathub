app-id: fun.dragonfly.switchfin
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: Switchfin
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # This program is designed for controller
  - --device=all
  - --share=network
  - --socket=pulseaudio
  # inhibiting screen saver
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.PowerManagement
  - --talk-name=org.gnome.SessionManager
  - --talk-name=org.mate.SessionManager
  # control steam client
  - --filesystem=~/.steam
cleanup-commands:
  - mkdir -p /app/lib/ffmpeg
cleanup:
  - "*.a"
  - "*.la"
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /man
  - /share/man
  - /share/gtk-doc

modules:
  - name: libmpv
    buildsystem: meson
    config-opts:
      - --buildtype=release
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dtests=false
      - -Dlibarchive=disabled
      - -Dmanpage-build=disabled
      - -Dlua=disabled
      - -Dvulkan=disabled
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/v0.41.0.tar.gz
        sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209
        x-checker-data:
          type: anitya
          project-id: 5348
          stable-only: true
          url-template: https://github.com/mpv-player/mpv/archive/v$version.tar.gz
    modules:
      - name: libXpresent
        buildsystem: autotools
        sources:
          - type: archive
            url: https://xorg.freedesktop.org/archive/individual/lib/libXpresent-1.0.2.tar.xz
            sha256: 4e5b21b4812206a4b223013606ae31170502c1043038777a1ef8f70c09d37602
            x-checker-data:
              type: anitya
              project-id: 17166
              stable-only: true
              url-template: https://xorg.freedesktop.org/archive/individual/lib/libXpresent-$version.tar.xz

      - name: libdisplay-info
        cleanup:
          - /bin
        buildsystem: meson
        sources:
          - type: archive
            url: https://gitlab.freedesktop.org/emersion/libdisplay-info/-/releases/0.3.0/downloads/libdisplay-info-0.3.0.tar.xz
            sha256: 6ae77cd937f9cf7d1321d35c116062c4911e8447010a6a713ac4286f7a9d5987
        modules:
          - name: hwdata
            cleanup:
              - "*"
            config-opts:
              - --disable-blacklist
            sources:
              - type: archive
                url: https://github.com/vcrhonek/hwdata/archive/v0.402.tar.gz
                sha256: e390fe2f5f5ef7ed9ccbe62eb7cd40d4ee2b57389e7869c0dc96433c81812e7a

      - name: libplacebo
        buildsystem: meson
        config-opts:
          - -Dglslang=disabled
          - -Ddemos=false
          - -Ddovi=enabled
          - -Dlcms=disabled
          - -Dvulkan=disabled
        sources:
          - type: git
            url: https://github.com/haasn/libplacebo.git
            tag: v7.360.0
            commit: b2ea27dceb6418aabfe9121174c6dbb232942998
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$

      - name: libass
        config-opts:
          - --disable-static
        sources:
          - type: archive
            url: https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.xz
            sha256: 78f1179b838d025e9c26e8fef33f8092f65611444ffa1bfc0cfac6a33511a05a
            x-checker-data:
              type: anitya
              project-id: 1560
              stable-only: true
              url-template: https://github.com/libass/libass/releases/download/$version/libass-$version.tar.xz

      - name: uchardet
        buildsystem: cmake-ninja
        config-opts:
          - -DCMAKE_BUILD_TYPE=Release
          - -DBUILD_STATIC=0
        sources:
          - type: archive
            url: https://www.freedesktop.org/software/uchardet/releases/uchardet-0.0.8.tar.xz
            sha256: e97a60cfc00a1c147a674b097bb1422abd9fa78a2d9ce3f3fdcc2e78a34ac5f0
            x-checker-data:
              type: anitya
              project-id: 9265
              stable-only: true
              url-template: https://www.freedesktop.org/software/uchardet/releases/uchardet-$version.tar.xz

      - name: ffmpeg
        cleanup:
          - /share/ffmpeg/examples
        config-opts:
          - --enable-shared
          - --disable-static
          - --enable-gnutls
          - --enable-gpl
          - --disable-autodetect
          - --disable-doc
          - --disable-programs
          - --disable-encoders
          - --disable-muxers
          - --disable-filters
          - --enable-filter=hflip,vflip,transpose
          - --enable-libdrm
          - --enable-vaapi
          - --enable-vdpau
          - --enable-nvdec
          - --enable-ffnvcodec
          - --enable-libdav1d
          - --enable-zlib
          - --enable-bzlib
          - --enable-libass
        sources:
          - type: archive
            url: https://ffmpeg.org/releases/ffmpeg-8.0.1.tar.xz
            sha256: 05ee0b03119b45c0bdb4df654b96802e909e0a752f72e4fe3794f487229e5a41
            x-checker-data:
              type: anitya
              project-id: 5405
              url-template: https://ffmpeg.org/releases/ffmpeg-$version.tar.xz
        modules:
          - name: nv-codec-headers
            cleanup:
              - "*"
            no-autogen: true
            make-install-args:
              - PREFIX=/app
            sources:
              - type: archive
                url: https://github.com/FFmpeg/nv-codec-headers/archive/n13.0.19.0.tar.gz
                sha256: 86d15d1a7c0ac73a0eafdfc57bebfeba7da8264595bf531cf4d8db1c22940116
                x-checker-data:
                  type: anitya
                  project-id: 223796
                  stable-only: true
                  url-template: https://github.com/FFmpeg/nv-codec-headers/archive/n$version.tar.gz
          - name: libssh2
            buildsystem: cmake-ninja
            config-opts:
              - -DCMAKE_BUILD_TYPE=Release
              - -DBUILD_SHARED_LIBS=ON
              - -DBUILD_STATIC_LIBS=OFF
              - -DBUILD_EXAMPLES=ON
              - -DBUILD_TESTING=OFF
            sources:
              - type: archive
                url: https://libssh2.org/download/libssh2-1.11.1.tar.xz
                sha256: 9954cb54c4f548198a7cbebad248bdc87dd64bd26185708a294b2b50771e3769

  - name: glfw
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DGLFW_BUILD_EXAMPLES=OFF
      - -DGLFW_BUILD_TESTS=OFF
      - -DGLFW_BUILD_DOCS=OFF
      - -DBUILD_SHARED_LIBS=ON
      - -DGLFW_BUILD_WAYLAND=ON
      - -DGLFW_BUILD_X11=ON
    sources:
      - type: git
        url: https://github.com/dragonflylee/glfw.git
        commit: db08cc163dacbabfb37fb62d70ab7f62865008c6

  - name: switchfin
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DPLATFORM_DESKTOP=ON
      - -DUSE_SYSTEM_GLFW=ON
      - -USE_GLES2=OFF
      - -DUSE_EGL=ON
      - -DCMAKE_INSTALL=ON
    builddir: true
    sources:
      - type: git
        url: https://github.com/dragonflylee/switchfin.git
        tag: 0.8.3
        commit: 8985ca4a5ac5d9762e049414b8feae9532759c63
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
