app-id: io.github.athanor_dev.athanor-launcher
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: athanor


finish-args:
  - --socket=wayland
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --device=dri
  - --socket=fallback-x11

modules:
  - name: nwjs
    buildsystem: simple
    build-commands:
      - mkdir -p /app/nwjs
      - cp -r * /app/nwjs
    sources:
      - type: archive
        url: https://dl.nwjs.io/v0.110.1/nwjs-sdk-v0.110.1-linux-x64.tar.gz
        sha256: "4f82bfdc6102a5a9a224e8f26ab586c2e6f7202c774aad621d067becdba0d402"

  - name: athanor
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/athanor-dev/athanor-launcher.git
        tag: v0.2.1
        commit: 9be535da747a7fdad5ff7039e11fa2fcf8c2b5ec