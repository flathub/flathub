app-id: io.github.maniacx.BudsLink
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: budslink

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --env=PULSE_PROP_media.category=Manager
  - --system-talk-name=org.bluez
  - --talk-name=org.mpris.MediaPlayer2.*
  - --socket=pulseaudio
  - --device=dri

cleanup:
  - /share/io.github.maniacx.BudsLink/Gvc-1.0.gir

modules:
  - name: BudsLink
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/maniacx/BudsLink/releases/download/v0.1.3/BudsLink-v0.1.3.tar.gz
        sha256: 7f79be5f9d9e86db8741b3b59413fc164df77f5c41582d521526de79ab6ad16d
