app-id: io.github.maniacx.BudsLink
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: budslink

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --env=PULSE_PROP_media.category=Manager
  - --system-talk-name=org.bluez
  - --talk-name=org.mpris.MediaPlayer2.*
  - --socket=pulseaudio
  - --device=dri

cleanup:
  - /share/io.github.maniacx.BudsLink/Gvc-1.0.gir

modules:
  - name: BudsLink
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/maniacx/BudsLink/releases/download/v0.1.2/BudsLink-v0.1.2.tar.gz
        sha256: f03f9f293f0bebcefce9b6e278a138f9d5ae7f7d95cb072dce3b585568ba83bb
