# Arquivo de Manifesto Flatpak para o Bereia Versículos
# Salvo como: br.com.irse.verse.yml

app-id: br.com.irse.verse
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: bereiaverse

# Permissões do Sandbox: Define o que o aplicativo pode acessar.
finish-args:
  # Acesso à placa de vídeo e memória compartilhada (Essencial para Skia/Skiko)
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Permissões extras para Wayland/Hyprland
  - --filesystem=xdg-run/hypr:ro
  # Variáveis de Renderização: Tenta OpenGL, mas permite fallback
  - --env=JAVA_TOOL_OPTIONS=-Dorg.jetbrains.skiko.renderApi=OPENGL -Dskiko.linux.display.server=Wayland
  - --env=GDK_BACKEND=wayland,x11
  # Acesso à rede e outros serviços
  - --share=network
  - --talk-name=org.freedesktop.secrets
  - --filesystem=xdg-documents
  - --filesystem=xdg-download

# Módulos: Componentes necessários para construir o app.
modules:
  # --- Módulo 1: Instala o Java (JDK 21) ---
  - name: openjdk
    buildsystem: simple
    build-commands:
      - mkdir -p /app/jre
      - mv * /app/jre/
    sources:
      - type: archive
        url: https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.2%2B13/OpenJDK21U-jdk_x64_linux_hotspot_21.0.2_13.tar.gz
        sha256: 454bebb2c9fe48d981341461ffb6bf1017c7b7c6e15c6b0c29b959194ba3aaa5
        strip-components: 1
        
  # --- Módulo 2: Instala o Gradle ---
  - name: gradle
    buildsystem: simple
    build-commands:
      - mkdir -p /app/gradle
      - mv * /app/gradle/
    sources:
      - type: archive
        url: https://services.gradle.org/distributions/gradle-9.0-bin.zip
        sha256: 8fad3d78296ca518113f3d29016617c7f9367dc005f932bd9d93bf45ba46072b

  # --- Módulo 3: Constrói o aplicativo Bereia Versículos ---
  - name: bereia-verse
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      # Agrupa os comandos para que sejam executados na mesma shell, preservando as variáveis.
      - |
        export JAVA_HOME=/app/jre
        export GRADLE_HOME=/app/gradle
        export PATH=$JAVA_HOME/bin:$GRADLE_HOME/bin:$PATH
        gradle -p app createDistributable --no-configuration-cache --no-daemon
      # Cópia cirúrgica mantendo a estrutura relativa bin/ e lib/
      - mkdir -p /app/bin /app/lib
      - cp -r app/composeApp/build/compose/binaries/main/app/bereiaverse/bin/* /app/bin/
      - cp -r app/composeApp/build/compose/binaries/main/app/bereiaverse/lib/* /app/lib/
      # Garante que o launcher seja executável
      - chmod +x /app/bin/bereiaverse
    post-install:
      - install -Dm644 br.com.irse.verse.desktop /app/share/applications/br.com.irse.verse.desktop
      - install -Dm644 br.com.irse.verse.appdata.xml /app/share/metainfo/br.com.irse.verse.appdata.xml
      - install -Dm644 app/composeApp/src/desktopMain/resources/bereiaverse.png /app/share/icons/hicolor/256x256/apps/br.com.irse.verse.png
    sources:
      - type: dir
        path: .
