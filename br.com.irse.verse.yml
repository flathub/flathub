# Arquivo de Manifesto Flatpak para o Bereia Versículos
app-id: br.com.irse.verse
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: bereiaverse

finish-args:
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --filesystem=xdg-run/hypr:ro
  - --env=JAVA_TOOL_OPTIONS=-Dorg.jetbrains.skiko.renderApi=OPENGL -Dskiko.linux.display.server=Wayland
  - --env=GDK_BACKEND=wayland,x11
  - --share=network
  - --talk-name=org.freedesktop.secrets
  - --filesystem=xdg-documents
  - --filesystem=xdg-download

modules:
  - name: bereia-verse
    buildsystem: simple
    build-commands:
      # Instala binários e libs da release
      - mkdir -p /app/bin /app/lib
      - cp -r bereiaverse/bin/* /app/bin/
      - cp -r bereiaverse/lib/* /app/lib/
      - chmod +x /app/bin/bereiaverse
      # Instala metadados (usando os arquivos locais da pasta flathub)
      - install -Dm644 br.com.irse.verse.desktop /app/share/applications/br.com.irse.verse.desktop
      - install -Dm644 br.com.irse.verse.appdata.xml /app/share/metainfo/br.com.irse.verse.appdata.xml
      - install -Dm644 bereiaverse/lib/bereiaverse.png /app/share/icons/hicolor/256x256/apps/br.com.irse.verse.png
    sources:
      # Binário da release
      - type: archive
        url: https://github.com/Instituto-Reformado-Santo-Evangelho/bereia-verse/releases/download/master/bereiaverse-linux-1.2.0.tar.gz
        sha256: 199ba409cafeb3f8cb13c63dfa38260c4efecbdd56a931d6c1e5bc10ae429cdd
      # Metadados locais (já presentes na pasta flathub/)
      - type: file
        path: br.com.irse.verse.desktop
      - type: file
        path: br.com.irse.verse.appdata.xml
