app-id: org.jeffvli.feishin
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
command: feishin
separate-locales: false

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24

finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --filesystem=xdg-music
  - --filesystem=xdg-run/pipewire-0:ro
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
  - --own-name=org.mpris.MediaPlayer2.Feishin
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

cleanup:
  - /share/applications/mpv.desktop
  - /share/icons/*/*/apps/mpv*
  - /share/metainfo/mpv.metainfo.xml
  - /share/bash-completion
  - /share/doc
  - /share/fish
  - /share/zsh
  - /include
  - /lib/pkgconfig
  - /lib/*.la

modules:
  - name: mpv
    buildsystem: meson
    config-opts:
      - -Dbuildtype=release
      - -Ddebug=false
      - -Dstrip=true
      - -Dbuild-date=false
      - -Dmanpage-build=disabled
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
        commit: 41f6a645068483470267271e1d09966ca3b9f413
        tag: v0.41.0
    post-install:
      - install -Dm0644 ../LICENSE.LGPL -t ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/mpv
    modules:
      - name: libplacebo
        buildsystem: meson
        config-opts:
          - -Ddemos=false
          - -Dshaderc=disabled
        sources:
          - type: git
            url: https://github.com/haasn/libplacebo.git
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$
            commit: cee9b076f2c63104ccfd497fa79c39a867293ec4
            tag: v7.360.1
        post-install:
          - install -Dm0644 ../LICENSE -t ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/libplacebo
      - name: libass
        config-opts:
          - --enable-shared
          - --disable-static
        sources:
          - type: git
            url: https://github.com/libass/libass.git
            x-checker-data:
              type: git
              tag-pattern: ^([\d.]+)$
            commit: bbb3c7f1570a4a021e52683f3fbdf74fe492ae84
            tag: 0.17.4
        post-install:
          - install -Dm0644 COPYING -t ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/libass
  - name: feishin
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node24/bin:/run/build/feishin/pnpm/bin
      env:
        XDG_CACHE_HOME: /run/build/feishin/flatpak-node/cache
        npm_config_store_dir: /run/build/feishin/flatpak-node/pnpm-store
        npm_config_nodedir: /usr/lib/sdk/node24
    subdir: main
    build-commands:
      - ln ../pnpm/bin/pnpm.cjs ../pnpm/bin/pnpm
      - pnpm install --frozen-lockfile --offline
      - pnpm run build
      - npx electron-builder --linux dir
      - |
        build_dir=dist/linux*unpacked
        for i in 128x128 256x256 512x512; do
          install -Dm 644 ${build_dir}/resources/assets/icons/${i}.png ${FLATPAK_DEST}/share/icons/hicolor/${i}/apps/${FLATPAK_ID}.png
        done
        cp -ar ${build_dir} /app/main
      - envsubst < feishin.desktop.tmpl > ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - chmod 0644 ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm 644 ../org.jeffvli.feishin.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm 755 ../feishin.sh /app/bin/feishin
    sources:
      - type: git
        url: https://github.com/jeffvli/feishin.git
        dest: main
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
        commit: 3f99acf473f07f46faeb08a99fb83d9a819ef284
        tag: v1.9.0
      - type: file
        url: https://github.com/jeffvli/feishin/releases/download/v1.9.0/org.jeffvli.feishin.metainfo.xml
        sha256: 9d5fb6faa00750166f987415d0f2e1b51cfa9969407e313b7bb75253931bb05d
        x-checker-data:
          type: json
          url: https://api.github.com/repos/jeffvli/feishin/releases/latest
          tag-query: .tag_name
          version-query: $tag | sub("^v"; "")
          url-query: .assets[] | select(.name == "org.jeffvli.feishin.metainfo.xml") | .browser_download_url
      - type: archive
        dest: pnpm
        url: https://registry.npmjs.org/pnpm/-/pnpm-10.33.0.tgz
        sha256: bfcc1bcbad279b13a516c446a75b3c58b6904b45d57a1951411015e50b751a80
        x-checker-data:
          type: json
          url: https://registry.npmjs.org/pnpm/latest
          version-query: .version
          url-query: .dist.tarball
      - generated-sources.json
      - type: script
        dest-filename: feishin.sh
        commands:
          - >
            for i in {0..9}; do
                test -S $XDG_RUNTIME_DIR/discord-ipc-$i || ln -sf {app/com.discordapp.Discord,$XDG_RUNTIME_DIR}/discord-ipc-$i;
            done
          - zypak-wrapper /app/main/feishin "$@"
