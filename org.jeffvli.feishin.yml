app-id: org.jeffvli.feishin
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
command: feishin
separate-locales: false

finish-args:
  - --device=dri
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --share=network
  - --filesystem=xdg-music
  - --filesystem=xdg-run/pipewire-0:ro
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
  - --own-name=org.mpris.MediaPlayer2.Feishin
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

cleanup:
  - /share/applications/mpv.desktop
  - /share/icons/*/*/apps/mpv*
  - /share/metainfo/mpv.metainfo.xml
  - /share/bash-completion
  - /share/doc
  - /share/fish
  - /share/zsh
  - /include
  - /lib/pkgconfig
  - /lib/*.la

modules:
  - name: mpv
    buildsystem: meson
    config-opts:
      - -Dbuildtype=release
      - -Ddebug=false
      - -Dstrip=true
      - -Dbuild-date=false
      - -Dmanpage-build=disabled
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
        commit: 41f6a645068483470267271e1d09966ca3b9f413
        tag: v0.41.0
    post-install:
      - install -Dm0644 ../LICENSE.LGPL -t ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/mpv
    modules:
      - name: libplacebo
        buildsystem: meson
        config-opts:
          - -Ddemos=false
          - -Dshaderc=disabled
        sources:
          - type: git
            url: https://github.com/haasn/libplacebo.git
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$
            commit: b2ea27dceb6418aabfe9121174c6dbb232942998
            tag: v7.360.0
        post-install:
          - install -Dm0644 ../LICENSE -t ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/libplacebo
      - name: libass
        config-opts:
          - --enable-shared
          - --disable-static
        sources:
          - type: git
            url: https://github.com/libass/libass.git
            x-checker-data:
              type: git
              tag-pattern: ^([\d.]+)$
            commit: bbb3c7f1570a4a021e52683f3fbdf74fe492ae84
            tag: 0.17.4
        post-install:
          - install -Dm0644 COPYING -t ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/libass
  - name: feishin
    buildsystem: simple
    subdir: main
    build-commands:
      - >
        for i in 128x128 256x256 512x512; do 
          install -Dm 644 resources/assets/icons/${i}.png ${FLATPAK_DEST}/share/icons/hicolor/${i}/apps/${FLATPAK_ID}.png
        done
      - cp -ar . /app/main
      - envsubst < ../source/feishin.desktop.tmpl > ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - chmod 0644 ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm 644 ../org.jeffvli.feishin.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm 755 ../feishin.sh /app/bin/feishin
    sources:
      - type: git
        url: https://github.com/jeffvli/feishin.git
        dest: source
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
        commit: ecda918b46747e9f198a3a159a31acff0b953a32
        tag: v1.8.0
      - type: archive
        url: https://github.com/jeffvli/feishin/releases/download/v1.8.0/Feishin-linux-x64.tar.xz
        sha256: f0161c47d6e429cabc53349f3e4d690c7e6a63e44537fe785813140f1c6c28fc
        dest: main
        only-arches:
          - x86_64
        x-checker-data:
          type: json
          url: https://api.github.com/repos/jeffvli/feishin/releases/latest
          tag-query: .tag_name
          version-query: $tag | sub("^v"; "")
          url-query: .assets[] | select(.name == "Feishin-linux-x64.tar.xz") | .browser_download_url
      - type: file
        url: https://github.com/jeffvli/feishin/releases/download/v1.8.0/org.jeffvli.feishin.metainfo.xml
        sha256: c58ea98d908de2d2b126ea47ed745e09a111d40a3f36d71e1c734b7bab176877
        x-checker-data:
          type: json
          url: https://api.github.com/repos/jeffvli/feishin/releases/latest
          tag-query: .tag_name
          version-query: $tag | sub("^v"; "")
          url-query: .assets[] | select(.name == "org.jeffvli.feishin.metainfo.xml") | .browser_download_url
      - type: script
        dest-filename: feishin.sh
        commands:
          - >
            for i in {0..9}; do
                test -S $XDG_RUNTIME_DIR/discord-ipc-$i || ln -sf {app/com.discordapp.Discord,$XDG_RUNTIME_DIR}/discord-ipc-$i;
            done
          - zypak-wrapper /app/main/feishin "$@"
