app-id: org.jeffvli.feishin
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
command: feishin
separate-locales: false

finish-args:
  - --device=dri
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --share=network
  - --filesystem=xdg-music
  - --filesystem=xdg-run/pipewire-0:ro
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
  - --own-name=org.mpris.MediaPlayer2.Feishin
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

cleanup:
  - /share
  - /include
  - /lib/pkgconfig
  - /lib/*.la

modules:
  - name: mpv
    buildsystem: meson
    config-opts:
      - -Dbuildtype=release
      - -Ddebug=false
      - -Dstrip=true
      - -Dbuild-date=false
      - -Dmanpage-build=disabled
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
        commit: 41f6a645068483470267271e1d09966ca3b9f413
        tag: v0.41.0
    post-install:
      - install -Dm0644 ../LICENSE.LGPL -t ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/mpv
    modules:
      - name: libplacebo
        buildsystem: meson
        config-opts:
          - -Ddemos=false
          - -Dshaderc=disabled
        sources:
          - type: git
            url: https://github.com/haasn/libplacebo.git
            x-checker-data:
              type: git
              tag-pattern: ^v([\d.]+)$
            commit: b2ea27dceb6418aabfe9121174c6dbb232942998
            tag: v7.360.0
        post-install:
          - install -Dm0644 ../LICENSE -t ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/libplacebo
      - name: libass
        config-opts:
          - --enable-shared
          - --disable-static
        sources:
          - type: git
            url: https://github.com/libass/libass.git
            x-checker-data:
              type: git
              tag-pattern: ^([\d.]+)$
            commit: bbb3c7f1570a4a021e52683f3fbdf74fe492ae84
            tag: 0.17.4
        post-install:
          - install -Dm0644 COPYING -t ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/libass
  - name: feishin
    buildsystem: simple
    subdir: main
    build-commands:
      - >
        for i in 128x128 256x256 512x512; do 
          install -Dm 644 resources/assets/icons/${i}.png /app/share/icons/hicolor/${i}/apps/${FLATPAK_ID}.png
        done
      - cp -ar . /app/main
      - envsubst < ../source/feishin.desktop.tmpl > /app/share/applications/${FLATPAK_ID}.desktop
      - chmod 0644 /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm 644 ../default.json /app/main/resources/default.json
      - install -Dm 644 ../org.jeffvli.feishin.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm 755 ../feishin.sh /app/bin/feishin
    sources:
      - type: git
        url: https://github.com/jeffvli/feishin.git
        dest: source
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
        commit: 49ff9284140f2904a92f5562aef613381d40ce9c
        tag: v1.7.0
      - type: archive
        url: https://github.com/jeffvli/feishin/releases/download/v1.7.0/Feishin-linux-x64.tar.xz
        sha256: 865e25a067b2bbdd56f17e59a703695bb3a21e7e6b3abccc10eea8565833f0aa
        dest: main
        only-arches:
          - x86_64
        x-checker-data:
          type: json
          url: https://api.github.com/repos/jeffvli/feishin/releases/latest
          tag-query: .tag_name
          version-query: $tag | sub("^v"; "")
          url-query: .assets[] | select(.name == "Feishin-linux-x64.tar.xz") | .browser_download_url
      - type: file
        url: https://github.com/jeffvli/feishin/releases/download/v1.7.0/org.jeffvli.feishin.metainfo.xml
        sha256: 4be4c45f19fe7010cf89f9d7c97ca2e8aa6dbdb9b3c8a130485185bc8962a274
        x-checker-data:
          type: json
          url: https://api.github.com/repos/jeffvli/feishin/releases/latest
          tag-query: .tag_name
          version-query: $tag | sub("^v"; "")
          url-query: .assets[] | select(.name == "org.jeffvli.feishin.metainfo.xml") | .browser_download_url
      - type: file
        path: default.json
        dest-filename: default.json
      - type: script
        dest-filename: feishin.sh
        commands:
          - >
            for i in {0..9}; do
                test -S $XDG_RUNTIME_DIR/discord-ipc-$i || ln -sf {app/com.discordapp.Discord,$XDG_RUNTIME_DIR}/discord-ipc-$i;
            done
          - mkdir -p $XDG_CONFIG_HOME/feishin/ && cp -n /app/main/resources/default.json $XDG_CONFIG_HOME/feishin/config.json
          # Merge default.json and existing.json if it exists
          - >
            {
              jq -sS '.[0] * .[1]' /app/main/resources/default.json $XDG_CONFIG_HOME/feishin/config.json > /tmp/config.json
              mv /tmp/config.json $XDG_CONFIG_HOME/feishin/config.json
            } || true
          - zypak-wrapper /app/main/feishin "$@"
