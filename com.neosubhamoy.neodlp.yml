id: com.neosubhamoy.neodlp

runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node24

command: neodlp
finish-args:
  - --socket=wayland # Show app window on wayland
  - --socket=fallback-x11 # Fallback to X11 if wayland is not available
  - --device=dri # Use OpenGL
  - --share=ipc
  - --share=network # Allow network access
  - --filesystem=xdg-download # Allow access to downloads folder for storing downloaded files
  - --filesystem=~/.config/google-chrome/NativeMessagingHosts:create # Allow read-write (create) access to Chrome native messaging hosts for browser extension support
  - --filesystem=~/.config/chromium/NativeMessagingHosts:create # Allow read-write (create) access to Chromium native messaging hosts for browser extension support
  - --filesystem=~/.mozilla/native-messaging-hosts:create # Allow read-write (create) access to Firefox native messaging hosts for browser extension support
  - --filesystem=~/.local/bin:rw # Allow read-write access to local bin for neodlp-msghost installation
  - --filesystem=~/.config/BraveSoftware/Brave-Browser:ro # Allow read-only access to Brave browser config for yt-dlp cookie extraction
  - --filesystem=~/.config/google-chrome:ro # Allow read-only access to Chrome browser config for yt-dlp cookie extraction
  - --filesystem=~/.config/chromium:ro # Allow read-only access to Chromium browser config for yt-dlp cookie extraction
  - --filesystem=~/.config/microsoft-edge:ro # Allow read-only access to Edge browser config for yt-dlp cookie extraction
  - --filesystem=~/.mozilla/firefox:ro # Allow read-only access to Firefox browser for yt-dlp cookie extraction
  - --filesystem=~/.config/mozilla/firefox:ro # Allow read-only access to Firefox browser config for yt-dlp cookie extraction
  - --filesystem=~/snap/firefox/common/.mozilla/firefox:ro # Allow read-only access to Firefox browser (snap) config for yt-dlp cookie extraction
  - --filesystem=~/.config/opera:ro # Allow read-only access to Opera browser config for yt-dlp cookie extraction
  - --filesystem=~/.config/vivaldi:ro # Allow read-only access to Vivaldi browser config for yt-dlp cookie extraction
  - --filesystem=~/.config/naver-whale:ro # Allow read-only access to Whale browser config for yt-dlp cookie extraction
  - --env=FLATPAK=1 # Used to determine flatpak environment on app side
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

build-options:
  append-path: /usr/lib/sdk/node24/bin:/usr/lib/sdk/rust-stable/bin

modules:
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json
  - name: neodlp
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/neosubhamoy/neodlp.git
        branch: main

      # flatpak-node-generator npm -o flatpak/node-sources.json package-lock.json
      - node-sources.json

      # flatpak-cargo-generator.py -d ./src-tauri/Cargo.lock -o flatpak/cargo-sources.json
      - cargo-sources.json

      # Tauri sidecar binary sources
      - sidecar-sources.json

    build-options:
      env:
        CARGO_HOME: /run/build/neodlp/cargo
        XDG_CACHE_HOME: /run/build/neodlp/flatpak-node/cache
        npm_config_cache: /run/build/neodlp/flatpak-node/npm-cache
        npm_config_offline: "true"

    build-commands:
      # Install Node.js packages offline
      - npm ci --offline
      # Install Rust packages offline
      - cargo --offline fetch --manifest-path src-tauri/Cargo.toml --verbose
      # Make sidecar binaries executable
      - chmod +x src-tauri/binaries/*
      # Run offline tauri build without bundling
      - npm run --offline tauri build -- --no-bundle --config src-tauri/tauri.linux-flatpak.conf.json
      
      # Install app
      - install -Dm644 -t /app/share/metainfo/ com.neosubhamoy.neodlp.metainfo.xml
      - install -Dm644 -t /app/share/applications/ com.neosubhamoy.neodlp.desktop
      - install -Dm755 -t /app/bin/ src-tauri/target/release/neodlp
      - install -Dm755 -t /app/bin/ src-tauri/target/release/yt-dlp
      - install -Dm755 -t /app/bin/ src-tauri/target/release/ffmpeg
      - install -Dm755 -t /app/bin/ src-tauri/target/release/ffprobe
      - install -Dm755 -t /app/bin/ src-tauri/target/release/aria2c
      - install -Dm755 -t /app/bin/ src-tauri/target/release/deno
      - install -Dm755 -t /app/bin/ src-tauri/target/release/neodlp-pot

      # Copy yt-dlp plugins
      - cp -rf src-tauri/resources/plugins/yt-dlp-plugins /app/bin

      # Install icons
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.neosubhamoy.neodlp.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.neosubhamoy.neodlp.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/com.neosubhamoy.neodlp.png
      - install -Dm644 src-tauri/icons/icon.png /app/share/icons/hicolor/256x256@2/apps/com.neosubhamoy.neodlp.png

      # Copy resources
      - mkdir -p /app/lib/neodlp
      - cp src-tauri/resources/msghost-manifest/linux/chrome.json /app/lib/neodlp
      - cp src-tauri/resources/msghost-manifest/linux/firefox.json /app/lib/neodlp

    post-install:
      - install -Dm644 LICENSE /app/share/licenses/com.neosubhamoy.neodlp/LICENSE