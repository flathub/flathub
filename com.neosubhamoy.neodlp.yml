id: com.neosubhamoy.neodlp

runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node24

command: neodlp
finish-args:
  - --socket=wayland # Show app window on wayland
  - --socket=fallback-x11 # Fallback to X11 if wayland is not available
  - --device=dri # Use OpenGL
  - --share=ipc # Needed for good X11 performance
  - --share=network # Allow network access
  - --filesystem=xdg-download # Allow access to downloads folder for storing downloaded files
  - --env=FLATPAK=1 # Used to determine flatpak environment on app side
  - --talk-name=org.kde.StatusNotifierWatcher # Needed for showing tray icon

build-options:
  append-path: /usr/lib/sdk/node24/bin:/usr/lib/sdk/rust-stable/bin

modules:
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json
   
  # yt-dlp stable python module -> python3 flatpak-pip-generator.py --runtime='org.gnome.Sdk//49' yt-dlp[default,curl-cffi]
  - python3-yt-dlp.json

  - name: aria2
    buildsystem: autotools
    config-opts:
      - --with-ca-bundle=/etc/ssl/certs/ca-certificates.crt
    sources:
      - type: git
        url: https://github.com/aria2/aria2.git
        tag: release-1.37.0
        commit: 02f2d0d8472b3c38c29b4dba8c75ebd5fdd2899a
      - type: shell
        commands:
          - autoreconf -i
  
  - name: neodlp
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/neosubhamoy/neodlp.git
        tag: v0.4.3
        commit: 2211f252c7af5ac6e0a3df50123b4d0a22d2d041
      # Node.js package sources -> flatpak-node-generator npm -o flatpak/node-sources.json package-lock.json
      - node-sources.json
      # Rust package sources -> python3 flatpak-cargo-generator.py src-tauri/Cargo.lock -o flatpak/cargo-sources.json
      - cargo-sources.json
      # deno stable binary archive sources
      - type: archive
        url: https://github.com/denoland/deno/releases/download/v2.7.4/deno-x86_64-unknown-linux-gnu.zip
        sha256: aef56590931e785af10bdab2077a2a01344b620c78b7086b88ebca73962ef25d
        dest: src-tauri/resources/downloads
        dest-filename: deno-x86_64-unknown-linux-gnu.zip
        only-arches:
          - x86_64
      - type: archive
        url: https://github.com/denoland/deno/releases/download/v2.7.4/deno-aarch64-unknown-linux-gnu.zip
        sha256: d2b99d1c072cab6ec8ececda1a1bd5889a9ea5217fafd9a9a9f5b0e56ef5e9cd
        dest: src-tauri/resources/downloads
        dest-filename: deno-aarch64-unknown-linux-gnu.zip
        only-arches:
          - aarch64
      # Copy extracted deno binaries to src-tauri/binaries
      - type: shell
        commands:
          - cp src-tauri/resources/downloads/deno src-tauri/binaries/deno-x86_64-unknown-linux-gnu
        only-arches:
          - x86_64
      - type: shell
        commands:
          - cp src-tauri/resources/downloads/deno src-tauri/binaries/deno-aarch64-unknown-linux-gnu
        only-arches:
          - aarch64

    build-options:
      env:
        CARGO_HOME: /run/build/neodlp/cargo
        XDG_CACHE_HOME: /run/build/neodlp/flatpak-node/cache
        npm_config_cache: /run/build/neodlp/flatpak-node/npm-cache
        npm_config_offline: "true"

    build-commands:
      # Install Node.js packages offline
      - npm ci --offline
      # Install Rust packages offline
      - cargo --offline fetch --manifest-path src-tauri/Cargo.toml --verbose
      # Make sidecar binaries executable
      - chmod +x src-tauri/binaries/*
      # Run offline tauri build without bundling
      - npm run --offline tauri build -- --no-bundle --config src-tauri/tauri.linux-flatpak.conf.json
      # Install app
      - install -Dm644 -t /app/share/metainfo/ com.neosubhamoy.neodlp.metainfo.xml
      - install -Dm644 -t /app/share/applications/ com.neosubhamoy.neodlp.desktop
      - install -Dm755 -t /app/bin/ src-tauri/target/release/neodlp
      - install -Dm755 -t /app/bin/ src-tauri/target/release/deno
      # Install icons
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.neosubhamoy.neodlp.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.neosubhamoy.neodlp.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/com.neosubhamoy.neodlp.png
      - install -Dm644 src-tauri/icons/icon.png /app/share/icons/hicolor/256x256@2/apps/com.neosubhamoy.neodlp.png

    post-install:
      - install -Dm644 LICENSE /app/share/licenses/com.neosubhamoy.neodlp/LICENSE