app-id: com.aurel.Nexus
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
command: nexus
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: nexus
    buildsystem: simple
    build-commands:
      - install -D nexus /app/bin/nexus
      - install -Dm644 com.aurel.Nexus.desktop /app/share/applications/com.aurel.Nexus.desktop
      - install -Dm644 com.aurel.Nexus.metainfo.xml /app/share/metainfo/com.aurel.Nexus.metainfo.xml
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/com.aurel.Nexus.png
    sources:
      - type: file
        url: https://github.com/KOUSSEMON-Aurel/Nexus-Storage/releases/download/app-v__VERSION__/nexus___VERSION___amd64.AppImage
        sha256: __SHA256__
        dest-filename: nexus
      - type: file
        path: com.aurel.Nexus.desktop
      - type: file
        path: com.aurel.Nexus.metainfo.xml
      - type: file
        path: icon.png
        dest-filename: icon.png
