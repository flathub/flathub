app-id: com.alfie.convertus
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk

command: convertus

modules:
  - name: convertus
    buildsystem: simple
    build-commands:
      - g++ main.cpp -o convertus -std=c++20 -O2
      - install -Dm755 convertus /app/bin/convertus
    sources:
      - type: file
        path: main.cpp
