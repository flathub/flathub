app-id: com.brainscanmedia.SafeScript
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: SafeScript
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --filesystem=home
  - --device=dri
modules:
  - name: SafeScript
    buildsystem: qmake
    no-make-install: true
    sources:
      - type: file
        path: /home/bsm/Documents/SafeScript/SafeScript/SafeScript.pro
      - type: file
        path: /home/bsm/Documents/SafeScript/SafeScript/main.cpp
      - type: file
        path: /home/bsm/Documents/SafeScript/SafeScript/mainwindow.cpp
      - type: file
        path: /home/bsm/Documents/SafeScript/SafeScript/mainwindow.h
      - type: file
        path: /home/bsm/Documents/SafeScript/SafeScript/databasemanager.cpp
      - type: file
        path: /home/bsm/Documents/SafeScript/SafeScript/databasemanager.h
      - type: file
        path: /home/bsm/Documents/SafeScript/SafeScript/resources.qrc
      - type: file
        path: /home/bsm/Documents/SafeScript/SafeScript/safescript.png
      - type: file
        path: safescript.desktop
      - type: file
        path: /home/bsm/Documents/SafeScript/SafeScript/com.brainscanmedia.SafeScript.metainfo.xml
    post-install:
      - install -Dm755 SafeScript /app/bin/SafeScript
      - install -Dm644 safescript.png /app/share/icons/hicolor/256x256/apps/com.brainscanmedia.SafeScript.png
      - install -Dm644 safescript.desktop /app/share/applications/com.brainscanmedia.SafeScript.desktop
      - install -Dm644 com.brainscanmedia.SafeScript.metainfo.xml /app/share/metainfo/com.brainscanmedia.SafeScript.metainfo.xml
