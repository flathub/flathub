id: br.edu.ifpe.xppc
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: xppc
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk25
finish-args:
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --env=JAVA_HOME=/app/jre
  - --filesystem=xdg-documents
modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - "/usr/lib/sdk/openjdk25/install.sh"
  - name: xppc
    buildsystem: simple
    build-commands:
      - JAVA_HOME=/usr/lib/sdk/openjdk25/jvm/openjdk-25 PATH=/usr/lib/sdk/openjdk25/jvm/openjdk-25/bin:/usr/bin ./gradle-bin/bin/gradle --offline distTar
      - mkdir -p /app/xppc
      - tar -xf build/distributions/xppc-*.tar -C /app/xppc --strip-components=1
      - install -Dm755 packaging/flatpak/xppc.sh /app/bin/xppc
      - install -D packaging/flatpak/br.edu.ifpe.xppc.desktop /app/share/applications/br.edu.ifpe.xppc.desktop
      - install -D packaging/flatpak/br.edu.ifpe.xppc.svg /app/share/icons/hicolor/scalable/apps/br.edu.ifpe.xppc.svg
      - install -Dm644 packaging/flatpak/br.edu.ifpe.xppc.metainfo.xml /app/share/metainfo/br.edu.ifpe.xppc.metainfo.xml
    sources:
      - type: git
        url: https://github.com/Nasc1mento/xppc-app.git
        commit: d3d0a5be4b968beb7bc2bbd3ce5e7eb1c099db97
      - type: archive
        url: https://services.gradle.org/distributions/gradle-9.4.1-bin.zip
        sha256: 2ab2958f2a1e51120c326cad6f385153bb11ee93b3c216c5fccebfdfbb7ec6cb
        dest: gradle-bin
      - flatpak-sources.json