app-id: io.github.dev.Echoa
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: start-app.sh

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=x11
  - --filesystem=xdg-download

modules:
  - name: echoa-app
    buildsystem: simple
    build-commands:
      # Instalação dos arquivos que virão do seu GitHub
      - install -D app.py /app/bin/app.py
      - install -D io.github.dev.Echoa.desktop /app/share/applications/io.github.dev.Echoa.desktop
      - install -D io.github.dev.Echoa.metainfo.xml /app/share/metainfo/io.github.dev.Echoa.metainfo.xml
      - install -D io.github.dev.Echoa.png /app/share/icons/hicolor/128x128/apps/io.github.dev.Echoa.png
      
      # Instalação dos arquivos que vêm de scripts ou URLs externas
      - install -D -m 755 start-app.sh /app/bin/start-app.sh
      - install -D -m 755 yt-dlp /app/bin/yt-dlp
    sources:
      # FONTE 1: Seu Repositório (Contém app.py, desktop, xml e png)
      - type: git
        url: https://github.com/yorrany/eChoa.git
        tag: v1.0.0  # Certifique-se de que essa tag existe no GitHub!
      
      # FONTE 2: O script de inicialização
      - type: script
        dest-filename: start-app.sh
        commands:
          - python3 /app/bin/app.py
      
      # FONTE 3: O executável yt-dlp externo
      - type: file
        url: https://github.com/yt-dlp/yt-dlp/releases/download/2025.01.15/yt-dlp
        sha256: 3538632719208b53e74a4f13ea3dcea3107ba2d5dd48022118781908edfbc539
