<?xml version="1.0" encoding="UTF-8"?>
<component type="desktop-application">
  <id>io.github.dev.Echoa</id>
  <metadata_license>CC0-1.0</metadata_license>
  <project_license>MIT</project_license>
  <name>Echoa</name>
  <summary>Baixe áudios do YouTube de forma simples e rápida</summary>

  <description>
    <p>
      O Echoa é um utilitário moderno projetado para quem deseja extrair áudio de vídeos do YouTube com o mínimo de esforço. 
      Com uma interface limpa baseada em GTK3, ele oferece uma experiência nativa e fluida para usuários de Linux.
    </p>
    <ul>
      <li>Suporte a múltiplas qualidades de áudio (kbps).</li>
      <li>Pré-visualização de miniaturas e títulos de vídeos.</li>
      <li>Integração total com o ambiente GNOME.</li>
      <li>Processamento rápido utilizando o motor do yt-dlp.</li>
    </ul>
  </description>

  <launchable type="desktop-id">io.github.dev.Echoa.desktop</launchable>
  
  <screenshots>
    <screenshot type="default">
      <caption>Interface principal do Echoa</caption>
      <image>https://raw.githubusercontent.com/yorrany/eChoa/main/screenshot.png</image>
    </screenshot>
  </screenshots>

  <url type="homepage">https://github.com/yorrany/eChoa</url>
</component>
