app-id: io.github.thedavidweng.OpenKara
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
  - org.freedesktop.Sdk.Extension.rust-stable
command: openkara
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
build-options:
  append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/openkara/cargo
    CARGO_NET_OFFLINE: "true"
    XDG_CACHE_HOME: /run/build/openkara/.cache
modules:
  - name: openkara
    buildsystem: simple
    build-commands:
      - mkdir -p .cargo
      - cp -f cargo/config .cargo/config.toml
      - corepack enable
      - pnpm install --offline --frozen-lockfile
      - pnpm tauri build --config packaging/flatpak/tauri.flatpak.conf.json --bundles none
      - install -Dm0755 src-tauri/target/release/openkara ${FLATPAK_DEST}/bin/openkara
      - install -Dm0644 packaging/flatpak/io.github.thedavidweng.OpenKara.desktop ${FLATPAK_DEST}/share/applications/io.github.thedavidweng.OpenKara.desktop
      - install -Dm0644 packaging/flatpak/io.github.thedavidweng.OpenKara.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.thedavidweng.OpenKara.metainfo.xml
      - install -Dm0644 src-tauri/icons/128x128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/io.github.thedavidweng.OpenKara.png
    sources:
      - type: archive
        url: https://github.com/thedavidweng/OpenKara/archive/refs/tags/v0.2.0.tar.gz
        sha256: aaba8240db0969cb3c56cac0753bf277d00fba467c59dd256e955cd9ddd37989
        strip-components: 1
      - type: file
        path: packaging/flatpak/generated/cargo-sources.json
      - type: file
        path: packaging/flatpak/generated/node-sources.0.json
