id: io.github.fjrevoredo.mini-diarium
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: mini-diarium

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri

modules:
  - name: mini-diarium
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
      env:
        CARGO_HOME: /run/build/mini-diarium/cargo
        npm_config_cache: /run/build/mini-diarium/flatpak-node/npm-cache
        npm_config_offline: 'true'
        ESBUILD_BINARY_PATH: /run/build/mini-diarium/flatpak-node/cache/esbuild/bin/esbuild-current
    build-commands:
      - npm ci --offline --legacy-peer-deps
      - npm run build
      - cargo build --release --features custom-protocol --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/mini-diarium /app/bin/mini-diarium
      - install -Dm644 data/linux/io.github.fjrevoredo.mini-diarium.desktop /app/share/applications/io.github.fjrevoredo.mini-diarium.desktop
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/io.github.fjrevoredo.mini-diarium.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.fjrevoredo.mini-diarium.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/io.github.fjrevoredo.mini-diarium.png
      - install -Dm644 data/linux/io.github.fjrevoredo.mini-diarium.metainfo.xml /app/share/metainfo/io.github.fjrevoredo.mini-diarium.metainfo.xml
      - install -Dm644 LICENSE /app/share/licenses/io.github.fjrevoredo.mini-diarium/mini-diarium/LICENSE
    sources:
      - type: git
        url: https://github.com/fjrevoredo/mini-diarium
        commit: 027b01db6f67cc567addeaa4775c26ef91141407
      - node-sources.json
      - cargo-sources.json
