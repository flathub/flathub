app-id: com.MarkJBobak.NimApp
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: nimapp

finish-args:
  - --socket=wayland
  - --socket=x11
  - --share=ipc
  - --device=dri

modules:
  - name: nimapp
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/mbobak/NimApp.git   # ← CHANGE TO YOUR REAL REPO
        commit: HEAD
    build-commands:
      - nimble build -d:release
      - install -Dm755 nimapp /app/bin/nimapp
      - install -Dm644 data/com.MarkJBobak.NimApp.desktop /app/share/applications/com.MarkJBobak.NimApp.desktop
      - install -Dm644 data/com.MarkJBobak.NimApp.metainfo.xml /app/share/metainfo/com.MarkJBobak.NimApp.metainfo.xml
