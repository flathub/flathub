app-id: io.github.henriquejsza.farmmod_hub
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: farmmod-hub

cleanup:
  - /include
  - /share/man
  - /share/doc

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - "--filesystem=xdg-documents/My Games"
  - --filesystem=~/.local/share/Steam/steamapps/compatdata
  - --filesystem=~/.steam/steam/steamapps/compatdata
  - --filesystem=~/.var/app/com.valvesoftware.Steam/.local/share/Steam/steamapps/compatdata

modules:
  - name: farmmod-hub
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-deps --no-build-isolation --prefix=/app .
      - install -Dm644 LICENSE /app/share/licenses/io.github.henriquejsza.farmmod_hub/farmmod-hub/LICENSE
      - install -Dm644 flatpak/io.github.henriquejsza.farmmod_hub.desktop /app/share/applications/io.github.henriquejsza.farmmod_hub.desktop
      - install -Dm644 flatpak/io.github.henriquejsza.farmmod_hub.metainfo.xml /app/share/metainfo/io.github.henriquejsza.farmmod_hub.metainfo.xml
      - install -Dm644 data/logo/io.github.henriquejsza.farmmod_hub.png /app/share/icons/hicolor/512x512/apps/io.github.henriquejsza.farmmod_hub.png
      - install -Dm644 data/logo/io.github.henriquejsza.farmmod_hub.png /app/share/icons/hicolor/256x256/apps/io.github.henriquejsza.farmmod_hub.png
      - install -Dm644 data/logo/io.github.henriquejsza.farmmod_hub.png /app/share/icons/hicolor/128x128/apps/io.github.henriquejsza.farmmod_hub.png
    sources:
      - type: git
        url: https://github.com/henriquejsza/farmmod-hub.git
        tag: v0.1.1
        commit: 618c565eb395069745ba9590d42b40f21e766328
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
