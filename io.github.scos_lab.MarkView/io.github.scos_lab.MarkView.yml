app-id: io.github.scos_lab.MarkView
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

command: markview

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=home:ro
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --filesystem=xdg-desktop
  - --persist=.local/share/markview
  - --persist=.config/markview
  - --talk-name=org.freedesktop.Flatpak
  - --system-talk-name=org.freedesktop.NetworkManager

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
  env:
    CARGO_HOME: /run/build/markview/cargo
    XDG_CACHE_HOME: /run/build/markview/flatpak-node/cache
    npm_config_cache: /run/build/markview/flatpak-node/npm-cache

modules:
  - name: markview
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/scos-lab/markview.git
        commit: 77b4112a42e8aea211db9136b5f67aeb21cb8007

      # Offline crate sources (generated by flatpak-cargo-generator.py)
      - cargo-sources.json

      # Offline npm sources (generated by flatpak-node-generator)
      - node-sources.json

    build-commands:
      # Configure cargo to use vendored crates (offline build)
      - |
        mkdir -p cargo
        cat > cargo/config.toml <<CARGO_EOF
        [source.crates-io]
        replace-with = "vendored-sources"

        [source.vendored-sources]
        directory = "/run/build/markview/cargo/vendor"
        CARGO_EOF

      # Build frontend (offline npm)
      - cd markview && npm install --offline
      - cd markview && npm run build

      # Build Tauri binary (offline cargo)
      - cd markview/src-tauri && cargo build --release --offline

      # Install binary
      - install -Dm755 markview/src-tauri/target/release/markview /app/bin/markview

      # Install AppStream metainfo (source uses hyphen, Flatpak ID uses underscore)
      - install -Dm644 markview/packaging/io.github.scos-lab.MarkView.metainfo.xml
          /app/share/metainfo/io.github.scos_lab.MarkView.metainfo.xml
      - sed -i 's/scos-lab/scos_lab/g'
          /app/share/metainfo/io.github.scos_lab.MarkView.metainfo.xml

      # Install icons at multiple sizes
      - install -Dm644 markview/src-tauri/icons/32x32.png
          /app/share/icons/hicolor/32x32/apps/io.github.scos_lab.MarkView.png
      - install -Dm644 markview/src-tauri/icons/128x128.png
          /app/share/icons/hicolor/128x128/apps/io.github.scos_lab.MarkView.png
      - install -Dm644 markview/src-tauri/icons/128x128@2x.png
          /app/share/icons/hicolor/256x256/apps/io.github.scos_lab.MarkView.png
      - install -Dm644 markview/src-tauri/icons/icon.png
          /app/share/icons/hicolor/512x512/apps/io.github.scos_lab.MarkView.png

      # Install .desktop file
      - |
        mkdir -p /app/share/applications
        cat > /app/share/applications/io.github.scos_lab.MarkView.desktop <<DESKTOP_EOF
        [Desktop Entry]
        Type=Application
        Name=MarkView
        GenericName=Markdown Reader
        Comment=Open AI-generated Markdown files with diagrams and formulas rendered
        Exec=markview %f
        Icon=io.github.scos_lab.MarkView
        Terminal=false
        Categories=Office;TextEditor;Viewer;
        MimeType=text/markdown;text/x-markdown;
        StartupWMClass=markview
        StartupNotify=true
        DESKTOP_EOF
