id: tech.dongdongbh.mindwtr
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20
command: mindwtr
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network

modules:
  - name: mindwtr
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node22/bin:/usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm20/bin
      env:
        CARGO_HOME: /run/build/mindwtr/cargo
        CARGO_NET_OFFLINE: 'true'
        LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib
        XDG_CACHE_HOME: /run/build/mindwtr/flatpak-node/cache
        npm_config_cache: /run/build/mindwtr/flatpak-node/npm-cache
        npm_config_nodedir: /usr/lib/sdk/node22
        npm_config_offline: 'true'
        npm_config_audit: 'false'
        npm_config_fund: 'false'
        npm_config_update_notifier: 'false'
    build-commands:
      - cp tech.dongdongbh.mindwtr.package-lock.json apps/desktop/package-lock.json
      - >-
        node -e "const fs=require('fs'); const path='apps/desktop/package.json';
        const pkg=JSON.parse(fs.readFileSync(path,'utf8'));
        pkg.dependencies['@mindwtr/core']='file:../../packages/core';
        pkg.dependencies['react-markdown']='^10.1.0';
        pkg.dependencies['remark-gfm']='^4.0.1';
        fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');"
      - npm ci --prefix=apps/desktop --offline --legacy-peer-deps
      - ln -sfn ../../apps/desktop/node_modules packages/core/node_modules
      - cd apps/desktop && npm exec vite build
      - mkdir -p .cargo
      - cp cargo/config .cargo/config.toml
      - cargo --offline build --manifest-path apps/desktop/src-tauri/Cargo.toml --release
      - install -Dm755 apps/desktop/src-tauri/target/release/mindwtr /app/bin/mindwtr
      - install -Dm644 apps/desktop/src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/tech.dongdongbh.mindwtr.png
      - install -Dm644 apps/desktop/src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/tech.dongdongbh.mindwtr.png
      - install -Dm644 tech.dongdongbh.mindwtr.desktop /app/share/applications/tech.dongdongbh.mindwtr.desktop
      - install -Dm644 tech.dongdongbh.mindwtr.metainfo.xml /app/share/metainfo/tech.dongdongbh.mindwtr.metainfo.xml
      - install -Dm644 LICENSE /app/share/licenses/tech.dongdongbh.mindwtr/LICENSE
    sources:
      - type: git
        url: https://github.com/dongdongbh/Mindwtr.git
        tag: v0.7.4
        commit: 06014dce157a22ef77a6c7695edd8f058af5cfb4
      - type: file
        path: tech.dongdongbh.mindwtr.desktop
      - type: file
        path: tech.dongdongbh.mindwtr.metainfo.xml
      - type: file
        path: tech.dongdongbh.mindwtr.package-lock.json
      - tech.dongdongbh.mindwtr.node-sources.json
      - tech.dongdongbh.mindwtr.cargo-sources.json
