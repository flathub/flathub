---
id: io.github.msx80.DoorsOfDoomOmicron
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: doorsofdoomLauncher
separate-locales: false
sdk-extensions:
- org.freedesktop.Sdk.Extension.openjdk21
finish-args:
- "--socket=x11"
- "--device=dri"
- "--share=ipc"
- "--socket=pulseaudio"
modules:
- name: openjdk
  buildsystem: simple
  build-commands:
  - "/usr/lib/sdk/openjdk21/install.sh"
- name: doorsofdoom
  buildsystem: simple
  build-options:
    env:
      JAVA_HOME: /usr/lib/sdk/openjdk21/jvm/openjdk-21  
  build-commands:
  - git lfs pull
  - /usr/lib/sdk/openjdk21/bin/mvn -DskipTests -Dmaven.repo.local=.m2/repository -f doorsofdoom/pom.xml -o -B -Pdesktop clean package
  - install -D doorsofdoomLauncher /app/bin/doorsofdoomLauncher
  - install -D ./doorsofdoom/doorsofdoom-desktop.jar /app/share/doorsofdoom-desktop.jar
  - install -Dm644 io.github.msx80.DoorsOfDoomOmicron.png /app/share/icons/hicolor/512x512/apps/io.github.msx80.DoorsOfDoomOmicron.png
  - install -Dm644 io.github.msx80.DoorsOfDoomOmicron.desktop /app/share/applications/io.github.msx80.DoorsOfDoomOmicron.desktop
  - install -Dm644 io.github.msx80.DoorsOfDoomOmicron.metainfo.xml /app/share/metainfo/io.github.msx80.DoorsOfDoomOmicron.metainfo.xml
  sources:
  - maven-dependencies.yaml
  - type: script
    dest-filename: doorsofdoomLauncher
    commands:
    - exec /app/jre/bin/java -Duser.home=$XDG_DATA_HOME -jar /app/share/doorsofdoom-desktop.jar
      "$@"
  - type: file
    url: https://raw.githubusercontent.com/msx80/DoorsOfDoomOmicron/refs/tags/v0.0.9/fastlane/metadata/android/en-US/images/icon.png
    sha256: 9a4c31eaa3523d4b2604eae50acf5a63ca26016cfe61a3b0db5f77ec8e3e40fb
    dest-filename: io.github.msx80.DoorsOfDoomOmicron.png
  - type: file
    url: https://raw.githubusercontent.com/msx80/DoorsOfDoomOmicron/cebe3eb7e328538d550ff3e0588b62b331bf3a6d/flatpak/io.github.msx80.DoorsOfDoomOmicron.desktop
    sha256: 'ac5fe045105ff0e4b63809de7772da7b9cd1081108b73c6efb3d792b3db6f716'
  - type: file
    url: https://raw.githubusercontent.com/msx80/DoorsOfDoomOmicron/cebe3eb7e328538d550ff3e0588b62b331bf3a6d/flatpak/io.github.msx80.DoorsOfDoomOmicron.metainfo.xml
    sha256: 72316b49cf4e15b8420c526caea5b7ed2db828269211bb7cbc068475736710b6
  - type: git
    url: https://github.com/msx80/DoorsOfDoomOmicron.git
    commit: 91dbbc76f65c90b7addf540a2cd2e36629b97ea9
    disable-submodules: true


      


