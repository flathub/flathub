id: io.github.mattianelo.Deployd
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: deployd

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # Read Heroic Launcher's game catalogue and per-game Wine config (read-only;
  # the actual game folders are accessed via the file-chooser portal below).
  - --filesystem=~/.var/app/com.heroicgameslauncher.hgl/config:ro
  - --filesystem=~/.var/app/com.heroicgameslauncher.hgl/data:ro
  # Steam (Flatpak) game files — write access required for mod hardlinks/copies.
  - --filesystem=~/.var/app/com.valvesoftware.Steam/.local/share/Steam:rw
  # Native Steam at the default XDG data location.
  - --filesystem=~/.local/share/Steam:rw
  # Game folders outside the paths above (e.g. Heroic games in ~/Games, or
  # libraries on non-default locations) are accessed through the XDG
  # file-chooser portal: on first deploy the user is prompted to confirm the
  # detected path, which grants sandbox access for that session and is
  # persisted as a hint for future sessions.  This also covers external drives
  # regardless of mount point.
  #
  # Tool Manager: xEdit/SSEEdit and other Windows modding tools run via Wine
  # inside Heroic's Proton/Wine environment.  When Heroic is a Flatpak,
  # we must invoke it through `flatpak run --command=<wine>
  # com.heroicgameslauncher.hgl`; when Deployd itself is a Flatpak we use
  # `flatpak-spawn --host` to reach the host Wine binary or the Heroic
  # sandbox.  Both operations require talking to the Flatpak session bus.
  # Without this permission the Tool Manager panel is non-functional but
  # all mod install / deploy / purge operations continue to work normally.
  - --talk-name=org.freedesktop.Flatpak

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/deployd/cargo

# x86_64 only: the loot feature links against libloot, a
# C++ shared library that ships x86_64 prebuilts only.

modules:
  - name: deployd
    buildsystem: simple
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --features loot,libarchive-fallback --verbose
      - install -Dm755 ./target/release/deployd /app/bin/deployd
      - install -Dm644 data/io.github.mattianelo.Deployd.desktop /app/share/applications/io.github.mattianelo.Deployd.desktop
      - install -Dm644 data/io.github.mattianelo.Deployd.metainfo.xml /app/share/metainfo/io.github.mattianelo.Deployd.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/io.github.mattianelo.Deployd.svg /app/share/icons/hicolor/scalable/apps/io.github.mattianelo.Deployd.svg
      - install -Dm644 LICENSE /app/share/licenses/io.github.mattianelo.Deployd/LICENSE
    sources:
      - type: git
        url: https://github.com/mattianelo/deployd.git
        tag: v0.9.0
        commit: a64a4908a13854a38eb5c65c04d2bb382b4aae1d
      - cargo-sources.json

