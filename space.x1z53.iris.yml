id: space.x1z53.iris
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.vala
command: iris
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio
  - --socket=wayland
build-options:
  append-path: /usr/lib/sdk/vala/bin
  prepend-ld-library-path: /usr/lib/sdk/vala/lib
cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - /share/vala
  - "*.la"
  - "*.a"
modules:
  - name: api-base
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://altlinux.space/rirusha/libapi-base.git
        tag: v7.0
        commit: 6bc853b5edde70852451d8e5509e829b93219428
  - name: yummy-anime-gtk
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://altlinux.space/x1z53/iris
        tag: 0.2.0
        commit: f9d7b9fa845b121452cb4a6103e24c08a955286c
