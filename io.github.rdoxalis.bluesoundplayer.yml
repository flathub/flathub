id: io.github.rdoxalis.bluesoundplayer
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: bluesoundplayer

finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --share=ipc
  - --device=dri

modules:
  - name: bluesoundplayer
    buildsystem: simple
    sources:
      - type: archive
        url: https://github.com/rdOxalis/bluesoundplayer/releases/download/v1.0.0/BlueSoundController-linux-x64.tar.gz
        sha256: 542f5cbeeab9d3eed161824b5dadedb5266029825b5aeebf1bf3baf133523729
      - type: git
        url: https://github.com/rdOxalis/bluesoundplayer.git
        tag: v1.0.0
        dest: upstream
    build-commands:
      - install -d /app/share/bluesoundplayer
      - install -Dm755 bluesoundplayer_flutter /app/share/bluesoundplayer/bluesoundplayer
      - cp -r lib /app/share/bluesoundplayer/
      - cp -r data /app/share/bluesoundplayer/
      - mkdir -p /app/bin
      - echo '#!/bin/sh' > /app/bin/bluesoundplayer
      - echo 'exec /app/share/bluesoundplayer/bluesoundplayer "$@"' >> /app/bin/bluesoundplayer
      - chmod 755 /app/bin/bluesoundplayer
      - install -Dm644 upstream/flatpak/io.github.rdoxalis.bluesoundplayer.desktop /app/share/applications/io.github.rdoxalis.bluesoundplayer.desktop
      - install -Dm644 upstream/flatpak/io.github.rdoxalis.bluesoundplayer.metainfo.xml /app/share/metainfo/io.github.rdoxalis.bluesoundplayer.metainfo.xml
      - install -Dm644 upstream/flatpak/io.github.rdoxalis.bluesoundplayer.png /app/share/icons/hicolor/256x256/apps/io.github.rdoxalis.bluesoundplayer.png
