app-id: com.blazinghotcode.CircuitSim
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk21
command: circuitsim
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
modules:
  - name: circuitsim
    buildsystem: simple
    build-commands:
      - install -Dm755 circuitsim.sh /app/bin/circuitsim
      - install -Dm644 CircuitSim.jar /app/lib/CircuitSim.jar
      - install -Dm644 com.blazinghotcode.CircuitSim.desktop /app/share/applications/com.blazinghotcode.CircuitSim.desktop
      - install -Dm644 com.blazinghotcode.CircuitSim.metainfo.xml /app/share/metainfo/com.blazinghotcode.CircuitSim.metainfo.xml
      - install -Dm644 com.blazinghotcode.CircuitSim.png /app/share/icons/hicolor/256x256/apps/com.blazinghotcode.CircuitSim.png
    sources:
      - type: file
        url: https://github.com/BlazingHotCode/CircuitSim/releases/download/v1.1.5/CircuitSim-1.1.5.jar
        sha256: 4a9010294c5380488baed52a61ebed2725dd79d328df04e8113d96997aefa0db
        dest-filename: CircuitSim.jar
      - type: file
        path: ./circuitsim.sh
      - type: file
        path: ./com.blazinghotcode.CircuitSim.desktop
      - type: file
        path: ./com.blazinghotcode.CircuitSim.metainfo.xml
      - type: file
        path: ./com.blazinghotcode.CircuitSim.png
