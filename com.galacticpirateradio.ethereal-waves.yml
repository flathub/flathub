app-id: com.galacticpirateradio.ethereal-waves
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/cargo

command: ethereal-waves

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=ipc
  - --device=dri
  - --filesystem=xdg-music:ro
  - --own-name=org.mpris.MediaPlayer2.ethereal-waves

modules:
  - name: ethereal-waves
    buildsystem: simple
    build-commands:
      - mkdir -p .cargo
      - cp cargo/config .cargo/config.toml

      # Build
      - cargo build --release --offline --frozen

      # Install
      - install -Dm755 target/release/ethereal-waves /app/bin/ethereal-waves
      - install -Dm644 resources/com.galacticpirateradio.ethereal-waves.desktop /app/share/applications/com.galacticpirateradio.ethereal-waves.desktop
      - install -Dm644 resources/com.galacticpirateradio.ethereal-waves.metainfo.xml /app/share/metainfo/com.galacticpirateradio.ethereal-waves.metainfo.xml
      - install -Dm644 resources/icons/hicolor/scalable/apps/com.galacticpirateradio.ethereal-waves.svg /app/share/icons/hicolor/scalable/apps/com.galacticpirateradio.ethereal-waves.svg
      - install -Dm644 cargo/vendor/libcosmic/cosmic-icons/index.theme /app/share/icons/Cosmic/index.theme
      - cd cargo/vendor/libcosmic/cosmic-icons/freedesktop && find ./scalable -type f -exec install -Dm644 {} /app/share/icons/Cosmic/{} \;
      - cd cargo/vendor/libcosmic/cosmic-icons/extra && find ./scalable -type f -exec install -Dm644 {} /app/share/icons/Cosmic/{} \;

    sources:
      - type: git
        url: https://github.com/cosmic-utils/ethereal-waves.git
        commit: 65969865cd23c23ee7ec9c6247c564aec861cbad

      - cargo-sources.json
