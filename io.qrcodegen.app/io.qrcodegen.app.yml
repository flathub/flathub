app-id: io.qrcodegen.app
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
command: run.sh
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --env=XDG_CURRENT_DESKTOP=ubuntu:GNOME

build-options:
  append-path: /usr/lib/sdk/node20/bin
  env:
    NPM_CONFIG_LOGLEVEL: info

modules:
  - name: qrcodegen
    buildsystem: simple
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/qrcodegen/flatpak-node/cache
        npm_config_cache: /run/build/qrcodegen/flatpak-node/npm-cache
        npm_config_offline: 'true'
    build-commands:
      - npm install --offline
      # 手动组装 linux-unpacked，绕过 electron-builder 下载（解决沙箱内 DNS 不可用）
      - chmod +x flatpak/flatpak-build.sh && bash flatpak/flatpak-build.sh
      - install -Dm755 run.sh /app/bin/run.sh
      - install -Dm644 io.qrcodegen.app.desktop /app/share/applications/io.qrcodegen.app.desktop
      - install -Dm644 io.qrcodegen.app.metainfo.xml /app/share/metainfo/io.qrcodegen.app.metainfo.xml
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/io.qrcodegen.app.png
    sources:
    - type: git
      url: https://gitee.com/kettle_download/qr-code_gen.git
      tag: v1.0.0  # 确保此标签存在
    - type: file
      url: https://npmmirror.com/mirrors/electron/29.4.6/electron-v29.4.6-linux-x64.zip
      sha256: 2346338e2ffa12276f5b3bc6d63ff357c39f42d260ad45f19471ef7bbf18a389
      dest-filename: electron-v29.4.6-linux-x64.zip
    - generated-sources.json
    - type: file
      path: io.qrcodegen.app.desktop
    - type: file
      path: io.qrcodegen.app.metainfo.xml
    - type: file
      path: run.sh
    - type: file  # 确保图标文件在同级目录
      path: icon.png