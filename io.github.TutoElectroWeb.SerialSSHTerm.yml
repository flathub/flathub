app-id: io.github.TutoElectroWeb.SerialSSHTerm
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: serial-ssh-term

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=all
  - --talk-name=org.freedesktop.secrets

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/serial-ssh-term/cargo
    CARGO_NET_OFFLINE: "true"

modules:
  - name: serial-ssh-term
    buildsystem: simple
    build-commands:
      - mkdir -p .cargo
      - |
        cat > .cargo/config.toml << 'EOF'
        [source.crates-io]
        replace-with = "vendored-sources"

        [source.vendored-sources]
        directory = "cargo/vendor"
        EOF
      - cargo build --release --offline
      - install -Dm755 target/release/serial-ssh-term /app/bin/serial-ssh-term
    sources:
      - type: git
        url: https://github.com/TutoElectroWeb/SerialSSHTerm.git
        tag: v1.0.0-flathub1
        commit: edf9a8afb0e7ff95fe788f04a23cc493dcc5ea2c
      - io.github.TutoElectroWeb.SerialSSHTerm.cargo-sources.json

  - name: serial-ssh-term-launcher
    buildsystem: simple
    build-commands:
      - sed 's/Icon=serial-ssh-term/Icon=io.github.TutoElectroWeb.SerialSSHTerm/' debian/serial-ssh-term.desktop > io.github.TutoElectroWeb.SerialSSHTerm.desktop
      - install -Dm644 io.github.TutoElectroWeb.SerialSSHTerm.desktop /app/share/applications/io.github.TutoElectroWeb.SerialSSHTerm.desktop
    sources:
      - type: git
        url: https://github.com/TutoElectroWeb/SerialSSHTerm.git
        tag: v1.0.0-flathub1
        commit: edf9a8afb0e7ff95fe788f04a23cc493dcc5ea2c

  - name: serial-ssh-term-metadata
    buildsystem: simple
    build-commands:
      - install -Dm644 packaging/flatpak/io.github.TutoElectroWeb.SerialSSHTerm.metainfo.xml /app/share/metainfo/io.github.TutoElectroWeb.SerialSSHTerm.metainfo.xml
      - install -Dm644 assets/icon.svg /app/share/icons/hicolor/scalable/apps/io.github.TutoElectroWeb.SerialSSHTerm.svg
    sources:
      - type: git
        url: https://github.com/TutoElectroWeb/SerialSSHTerm.git
        tag: v1.0.0-flathub1
        commit: edf9a8afb0e7ff95fe788f04a23cc493dcc5ea2c
