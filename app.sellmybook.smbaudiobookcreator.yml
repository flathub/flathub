app-id: app.sellmybook.smbaudiobookcreator
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet8
command: smb-ab-creator
build-options:
  prepend-path: /usr/lib/sdk/dotnet8/bin
  append-ld-library-path: /usr/lib/sdk/dotnet8/lib
  prepend-pkg-config-path: /usr/lib/sdk/dotnet8/lib/pkgconfig
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - build-aux/tone.json

  - name: smb-ab-creator
    buildsystem: simple
    build-commands:
      - install -Dm755 src/main.py /app/bin/smb-ab-creator
      - install -Dm644 data/gmb-page.png /app/share/smb-ab-creator/data/gmb-page.png
      - install -Dm644 data/app.sellmybook.smbaudiobookcreator.desktop /app/share/applications/app.sellmybook.smbaudiobookcreator.desktop
      - install -Dm644 data/app.sellmybook.smbaudiobookcreator.metainfo.xml /app/share/metainfo/app.sellmybook.smbaudiobookcreator.metainfo.xml
      - install -Dm644 data/app.sellmybook.smbaudiobookcreator.svg /app/share/icons/hicolor/scalable/apps/app.sellmybook.smbaudiobookcreator.svg
      - install -Dm644 data/app.sellmybook.smbaudiobookcreator.png /app/share/icons/hicolor/512x512/apps/app.sellmybook.smbaudiobookcreator.png
    sources:
      - type: archive
        url: https://github.com/EvolveSystemsGroup/SMB_Audiobook_Creator/archive/refs/tags/v2.0.5.tar.gz
        sha256: d78d69a4e095c19dcdf73bf2fd229ed99e81e4823dd187a06e35526de8bd733a
