app-id: app.sellmybook.smbaudiobookcreator
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet8
command: smb-ab-creator
build-options:
  prepend-path: /usr/lib/sdk/dotnet8/bin
  append-ld-library-path: /usr/lib/sdk/dotnet8/lib
  prepend-pkg-config-path: /usr/lib/sdk/dotnet8/lib/pkgconfig
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - build-aux/tone.json

  - name: smb-ab-creator
    buildsystem: simple
    build-commands:
      - make PREFIX=/app install
    sources:
      - type: archive
        url: https://github.com/EvolveSystemsGroup/SMB_Audiobook_Creator/archive/refs/tags/v2.0.6.tar.gz
        sha256: affb01dba44a564ecce976f0a69fc0209cadb665617f6cd8c9af62835e3ba1d0
