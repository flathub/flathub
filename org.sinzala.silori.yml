app-id: org.sinzala.silori
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: silori

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-pictures:create

modules:
  - name: silori
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSILORI_BUILD_TESTS=OFF
      - -DSILORI_ENABLE_QT_DEPLOY=OFF
    sources:
      - type: archive
        url: https://sinzala.org/downloads/silori/silori-source-0.1.1.tar.gz
        sha256: e835629197653d7b4424477a0ebde12259add7b95b2c86ff911173199b991ed1
        strip-components: 0
