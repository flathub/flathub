app-id: org.sinzala.silori
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: silori

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

modules:
  - name: silori
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSILORI_BUILD_TESTS=OFF
      - -DSILORI_ENABLE_QT_DEPLOY=OFF
    sources:
      - type: archive
        url: https://sinzala.org/downloads/silori/silori-source-0.1.0.tar.gz
        sha256: 57e481fa4b8d7787fff87d7ceacfe88cf742100d04dfe79395c80bb29f649765
        strip-components: 0
