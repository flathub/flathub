app-id: org.sinzala.silori
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: silori

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

modules:
  - name: silori
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSILORI_BUILD_TESTS=OFF
      - -DSILORI_ENABLE_QT_DEPLOY=OFF
    sources:
      - type: archive
        url: https://sinzala.org/downloads/silori/silori-source-0.1.0.tar.gz
        sha256: 0cde6d9dfbb784cbb0d4c5952d6a967327516bb466c066df6db6d1c60b0104d6
        strip-components: 0
