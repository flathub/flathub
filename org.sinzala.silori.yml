app-id: org.sinzala.silori
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: silori

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-pictures:create

modules:
  - name: silori
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSILORI_BUILD_TESTS=OFF
      - -DSILORI_ENABLE_QT_DEPLOY=OFF
    sources:
      - type: archive
        url: https://sinzala.org/downloads/silori/silori-source-0.1.1.tar.gz
        sha256: 0eabceea20c7590435fb12478d42cb884c55cde1a9138d3940d9d848c0f551f7
        strip-components: 0
