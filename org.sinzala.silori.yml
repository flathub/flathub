app-id: org.sinzala.silori
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: silori

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

modules:
  - name: silori
    buildsystem: simple
    build-commands:
      - install -Dm755 wrapper /app/bin/silori
      - install -Dm755 apply_extra /app/bin/apply_extra
      - install -Dm644 org.sinzala.silori.desktop /app/share/applications/org.sinzala.silori.desktop
      - install -Dm644 org.sinzala.silori.metainfo.xml /app/share/metainfo/org.sinzala.silori.metainfo.xml
      - install -Dm644 org.sinzala.silori.png /app/share/icons/hicolor/512x512/apps/org.sinzala.silori.png
      - install -Dm644 LICENSE /app/share/licenses/org.sinzala.silori/LICENSE
    sources:
      - type: archive
        url: https://sinzala.org/downloads/silori/silori-flathub-source-0.1.0.tar.gz
        sha256: 660cf8eca19b9b8a9a359dee502a3fa12c8a19fc5c847e84770b5d899258e57b
      - type: extra-data
        filename: silori-linux-x86_64-flatpak.tar.gz
        url: https://sinzala.org/downloads/silori/silori-linux-x86_64-flatpak.tar.gz
        sha256: de6665e29516d9cbb206b826eef875296638723744a1754e2637d10a905de30e
        size: 178182
