app-id: org.sinzala.silori
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: silori

finish-args:
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --env=QT_QPA_PLATFORM=xcb
  - --filesystem=xdg-pictures:create

modules:
  - name: silori
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSILORI_BUILD_TESTS=OFF
      - -DSILORI_ENABLE_QT_DEPLOY=OFF
    sources:
      - type: archive
        url: https://sinzala.org/downloads/silori/silori-source-0.1.1.tar.gz
        sha256: 9abf9ecf407d9c1dc637d65382698b2698d47ecb03cc5c3e38365550c2ea992b
        strip-components: 0
