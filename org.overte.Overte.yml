app-id: org.overte.Overte
runtime: org.kde.Platform
runtime-version: '5.15-25.08'
sdk: org.kde.Sdk
base: io.qt.qtwebengine.BaseApp
base-version: '5.15-25.08'
command: Overte
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc # For Discord integration. Also required by X11.
  - --device=dri # Graphics driver
  - --socket=pulseaudio
  # Overte requires OpenGL ES 3.2. While most Mesa drivers don't have this fully implemented,
  # we try anyway, since it works on some devices.
  - --env=MESA_GLES_VERSION_OVERRIDE=3.2
  # QtWebEngine is shipped by the baseapp and not by the Sdk, which makes it use a non-standard path.
  - --env=QTWEBENGINEPROCESS_PATH=/app/bin/QtWebEngineProcess
  # While we technically support Wayland, there are issues with mouse capture: https://github.com/overte-org/overte/issues/628
  - --socket=x11
  - --env=QT_QPA_PLATFORM=xcb
cleanup-commands:
  - /app/cleanup-BaseApp.sh
modules:
  - name: Overte
    buildsystem: simple
    sources:
      - type: file
        only-arches:
          - x86_64
        url: https://public.overte.org/build/overte/release/2025.12.1/Overte-2025.12.1-x86_64.AppImage
        sha256: 154f33d494bed7faf940dcc7f625deb5ab3933d7f38f690e08e00d1d505b0940
        dest-filename: Overte.AppImage
        # This update checker may be unreliable.
        x-checker-data:
          type: html
          url: https://overte.org/downloads.html
          version-pattern: "The current release of Overte is version ([\\d\\.-]+)"
          url-template: "https://public.overte.org/build/overte/release/$version0.$version1.$version2/Overte-$version0.$version1.$version2-x86_64.AppImage"

      - type: file
        only-arches:
          - aarch64
        url: https://public.overte.org/build/overte/release/2025.12.1/Overte-2025.12.1-aarch64.AppImage
        sha256: 40a889895cacfae5f0d50722588469d8c13e714089e2b7bc703bd5039ab9aef9
        dest-filename: Overte.AppImage

      - type: script
        dest-filename: Overte
        commands:
          - exec /app/usr/bin/interface "$@"

      - type: file
        url: https://raw.githubusercontent.com/overte-org/overte/baf6fcb32bbded6eed5386f802a79f655f1af0f3/interface/org.overte.Overte.metainfo.xml
        sha256: add388c89a31ee31852123e305d2b3129dc50af1651cad7734f3a57031f82d79
        dest-filename: org.overte.Overte.metainfo.xml

    build-commands:
      - chmod +x Overte.AppImage
      - ./Overte.AppImage --appimage-extract
      # Remove Qt shipped with AppImage
      - rm -rf squashfs-root/usr/lib/libQt*
      - rm squashfs-root/usr/bin/qt.conf
      - mv squashfs-root/* ${FLATPAK_DEST}/
      - install Overte "${FLATPAK_DEST}/bin/"
      - install -Dm644 ${FLATPAK_DEST}/org.overte.interface.desktop "${FLATPAK_DEST}/share/applications/org.overte.Overte.desktop"
      - rm ${FLATPAK_DEST}/org.overte.interface.desktop
      - desktop-file-edit --set-key="Exec" --set-value="Overte" --set-icon=org.overte.Overte --set-key="Categories" --set-value="Game;Network;Qt;" "${FLATPAK_DEST}/share/applications/org.overte.Overte.desktop"
      - install -Dm644 org.overte.Overte.metainfo.xml "${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml"
      - install -Dm644 ${FLATPAK_DEST}/usr/share/icons/hicolor/scalable/apps/interface.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/org.overte.Overte.svg
      - rm ${FLATPAK_DEST}/usr/share/icons/hicolor/scalable/apps/interface.svg
