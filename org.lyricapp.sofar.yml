app-id: org.lyricapp.sofar
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: sofarhangolo

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --socket=pulseaudio

modules:
  - name: sofar-hangolo
    buildsystem: simple
    build-options:
      append-path: /run/build/sofar-hangolo/flutter/bin
      env:
        PUB_CACHE: /run/build/sofar-hangolo/.pub-cache
    build-commands:
      - flutter --version
      - flutter pub get
      - dart run build_runner build --delete-conflicting-outputs
      - flutter build linux --release --no-pub
      - mkdir -p /app/lib/sofarhangolo
      - install -D build/linux/x64/release/bundle/sofarhangolo /app/lib/sofarhangolo/sofarhangolo
      - cp -r build/linux/x64/release/bundle/lib /app/lib/sofarhangolo/
      - mkdir -p /app/lib/sofarhangolo/data
      - cp -r build/linux/x64/release/bundle/data/flutter_assets /app/lib/sofarhangolo/data/flutter_assets
      - install -D build/linux/x64/release/bundle/data/icudtl.dat /app/lib/sofarhangolo/data/icudtl.dat
      - mkdir -p /app/bin
      - ln -sf /app/lib/sofarhangolo/sofarhangolo /app/bin/sofarhangolo
      - cp -r build/linux/x64/release/bundle/share /app/
      - desktop-file-edit --set-key=Exec --set-value=sofarhangolo --remove-key=Version /app/share/applications/org.lyricapp.sofar.desktop
      - appstreamcli validate --no-net /app/share/metainfo/org.lyricapp.sofar.metainfo.xml
    sources:
      - type: git
        url: https://github.com/reformatus/lyric.git
        tag: 1.0.2+102
        disable-submodules: true
      - type: archive
        url: https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.38.7-stable.tar.xz
        sha256: 2d72de31119ccba1421391aa9ab53891a3e4905987a13f8272766ad78e3bbf93
        dest: flutter
