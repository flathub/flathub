app-id: io.github.samuelkriegerbonini_dev.AstroBurst
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: astroburst

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --env=WEBKIT_DISABLE_COMPOSITING_MODE=1

modules:
  - name: astroburst
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/astroburst/cargo
        CARGO_NET_OFFLINE: 'true'
        XDG_CACHE_HOME: /run/build/astroburst/flatpak-node/cache
        npm_config_cache: /run/build/astroburst/flatpak-node/npm-cache
        npm_config_offline: 'true'
    sources:
      - type: git
        url: https://github.com/samuelkriegerbonini-dev/AstroBurst.git
        tag: v0.4.7
        commit: b95ece44f72b2b72dfc172e1c3ac3c3ee14dcf8b
      - node-sources.json
      - cargo-sources.json
    build-commands:
      - corepack enable --install-directory="${FLATPAK_DEST}/bin" pnpm
      - pnpm install --offline --frozen-lockfile
      - cargo --offline fetch --manifest-path src-tauri/Cargo.toml
      - pnpm tauri build --no-bundle
      - install -Dm755 src-tauri/target/release/astroburst /app/bin/astroburst
      - install -Dm644 data/io.github.samuelkriegerbonini_dev.AstroBurst.desktop /app/share/applications/io.github.samuelkriegerbonini_dev.AstroBurst.desktop
      - install -Dm644 data/io.github.samuelkriegerbonini_dev.AstroBurst.metainfo.xml /app/share/metainfo/io.github.samuelkriegerbonini_dev.AstroBurst.metainfo.xml
      - install -Dm644 data/io.github.samuelkriegerbonini_dev.AstroBurst.xml /app/share/mime/packages/io.github.samuelkriegerbonini_dev.AstroBurst.xml
      - install -Dm644 data/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.samuelkriegerbonini_dev.AstroBurst.png
      - install -Dm644 data/icons/256x256.png /app/share/icons/hicolor/256x256/apps/io.github.samuelkriegerbonini_dev.AstroBurst.png
      - install -Dm644 data/icons/512x512.png /app/share/icons/hicolor/512x512/apps/io.github.samuelkriegerbonini_dev.AstroBurst.png