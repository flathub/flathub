app-id: io.github.Pavle012.Skakavi-krompir
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: skakavi-krompir
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
modules:
  - python3-requirements.json
  - name: skakavi-krompir
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/Pavle012/Skakavi-krompir/archive/refs/tags/v2.0.3.tar.gz
        sha256: bc3f53e0924d82dec0e91cfbd7cd25029522f04daeb1f3f31bf1726a9d493045
    post-install:
      - install -Dm644 LICENSE /app/share/licenses/io.github.Pavle012.Skakavi-krompir/LICENSE
      - sed -i 's/<project_license>[^<]*<\/project_license>/<project_license>MIT<\/project_license>/' /app/share/metainfo/io.github.Pavle012.Skakavi-krompir.metainfo.xml
      - sed -i 's/<metadata_license>[^<]*<\/metadata_license>/<metadata_license>CC0-1.0<\/metadata_license>/' /app/share/metainfo/io.github.Pavle012.Skakavi-krompir.metainfo.xml



