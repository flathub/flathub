app-id: io.github.Pavle012.Skakavi-krompir
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: skakavi-krompir
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
modules:
  - python3-requirements.json
  - name: skakavi-krompir
    buildsystem: simple
    build-commands:
      # Install the python scripts
      - install -d /app/share/skakavi-krompir
      - cp -r *.py assets /app/share/skakavi-krompir/
      
      # Install launch script
      - install -D -m 755 skakavi-krompir.sh /app/bin/skakavi-krompir
      
      # Install required Flathub metadata: Icon, Desktop, and Metainfo
      - install -D -m 644 assets/io.github.Pavle012.Skakavi-krompir.png /app/share/icons/hicolor/256x256/apps/io.github.Pavle012.Skakavi-krompir.png
      - install -D -m 644 io.github.Pavle012.Skakavi-krompir.desktop /app/share/applications/io.github.Pavle012.Skakavi-krompir.desktop
      - install -D -m 644 io.github.Pavle012.Skakavi-krompir.metainfo.xml /app/share/metainfo/io.github.Pavle012.Skakavi-krompir.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/Pavle012/Skakavi-krompir/archive/refs/tags/v2.0.1.tar.gz
        sha256: 0638b14733d5695efa2d9edcc6736fbfaed0544da7e92d3a5d59b89dd8a2892b
        
      - type: script
        dest-filename: skakavi-krompir.sh
        commands:
          - cd /app/share/skakavi-krompir
          - exec python3 main.py "$@"
