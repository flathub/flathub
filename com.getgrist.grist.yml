app-id: com.getgrist.grist
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
command: run.sh
separate-locales: false
finish-args:
  - --share=ipc
  - --device=dri
  - --socket=x11
  - --socket=pulseaudio
  - --share=network
  - --env=ELECTRON_TRASH=gio
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --filesystem=home # TODO evaluate
  - --filesystem=xdg-cache/tmp:create
  - --env=TMPDIR=/tmp
  - --env=GRIST_SANDBOX_FLAVOR=pyodide
build-options:
  append-path: /usr/lib/sdk/node24/bin
  env:
    NPM_CONFIG_LOGLEVEL: info
modules:
  - name: grist
    buildsystem: simple
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/grist/flatpak-node/cache
        npm_config_sqlite: /usr
    build-commands:
      # Install Javascript dependencies
      - HOME=$PWD yarn config --offline set yarn-offline-mirror $FLATPAK_BUILDER_BUILDDIR/flatpak-node/yarn-mirror
      - yarn install --offline
      # Use prebuilt sqlite3 binding, as somehow the source-built binary crashes the app
      - rm -Rf "node_modules/@gristlabs/sqlite3/lib/binding"
      - cp -R node-sqlite3-precompiled "node_modules/@gristlabs/sqlite3/lib/binding"
      # Prepare build environment
      - mkdir -p core/python/bin && ln -s `which python3` core/python/bin/ # use system Python
      - | # use supplied yarn.lock to install deno and pyodide offline
        cd core/sandbox/pyodide/_build/worker
        HOME=$PWD yarn config --offline set yarn-offline-mirror $FLATPAK_BUILDER_BUILDDIR/flatpak-node/yarn-mirror
        yarn install --offline
      - PATH=$PATH:$PWD/core/sandbox/pyodide/_build/worker scripts/setup.sh
      # Build the app
      - yarn build
      - |
        . ../flatpak-node/electron-builder-arch-args.sh
        yarn run electron-builder build -- $ELECTRON_BUILDER_ARCH_ARGS --linux --dir
      # Bundle app and dependencies
      - cp -a dist/linux*unpacked /app/main
      # Install app wrapper
      - install -Dm755 -t /app/bin/ ../run.sh
      # Install AppStream metadata
      - install -Dm644 com.getgrist.grist.metainfo.xml /app/share/metainfo/com.getgrist.grist.metainfo.xml
      # Install desktop file and icon
      - install -Dm644 com.getgrist.grist.desktop /app/share/applications/com.getgrist.grist.desktop
      - install -Dm644 core/static/icons/grist.svg /app/share/icons/hicolor/scalable/apps/com.getgrist.grist.svg
    subdir: main
    sources:
      # grist
      - type: archive
        url: https://github.com/gristlabs/grist-desktop/archive/refs/tags/v0.3.10.tar.gz
        sha256: 291f415c1c42b5d2fbc2d63aa42c9219ac0df473bb4aaccb92073147c6c26ca4
        dest: main
      - type: archive
        url: https://github.com/gristlabs/grist-core/archive/refs/tags/v1.7.11.tar.gz
        sha256: d7a657fe78ea5ebbb4d8bfbda18470d52dcd2151f3369f34d795452d0f814768
        dest: main/core
      # use lockfile instead of 'yarn install' for one part in the setting up the build environment
      - type: file
        path: pyodide-worker-package.json
        dest: main/core/sandbox/pyodide/_build/worker/
        dest-filename: package.json
      - type: file
        path: pyodide-worker-yarn.lock
        dest: main/core/sandbox/pyodide/_build/worker/
        dest-filename: yarn.lock
      # metadata
      - type: file
        path: com.getgrist.grist.desktop
        dest: main
      - type: file
        path: com.getgrist.grist.metainfo.xml
        dest: main
      # precompiled node-sqlite3 modules (because compiled version crashes the app, hopefully a temporary solution)
      - type: archive
        url: https://github.com/gristlabs/node-sqlite3/releases/download/v5.1.4-grist.8/napi-v6-linux-glibc-x64.tar.gz
        sha256: 96c8f1d6bf25cc6712a00dbcda8a13f191eceb0f032a18394a5f70caabd32493
        dest: main/node-sqlite3-precompiled
        strip-components: 0
        only-arches:
          - x86_64
      - type: archive
        url: https://github.com/gristlabs/node-sqlite3/releases/download/v5.1.4-grist.8/napi-v6-linux-glibc-arm64.tar.gz
        sha256: 4284b2e5181afa3b9f43daab62f160248c8c401013a16f3924f111348ee2cd49
        dest: main/node-sqlite3-precompiled
        strip-components: 0
        only-arches:
          - aarch64
      # yarn packages
      - generated-sources-worker.json
      - generated-sources-desktop.json
      - generated-sources-core.json
      # Python wheels (WASM) precompiled by pyodide/emscripten
      - pyodide-packages.json
      - type: patch
        path: patches/pyodide-local-packages.patch
      # wrapper to launch the app
      - type: script
        dest-filename: run.sh
        commands:
          - zypak-wrapper.sh /app/main/grist-desktop "$@"
