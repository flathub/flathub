app-id: app.vercel.landonsoft.DisgaeaDSManager
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk
command: DisgaeaDSManager
finish-args:
  - --socket=x11
  - --device=dri
  - --filesystem=home
modules:
  - name: DisgaeaDSManager
    buildsystem: simple
    build-commands:
      - install -Dm755 x64DisgaeaDSManager /app/bin/DisgaeaDSManager
      - install -Dm644 16.png /app/share/icons/hicolor/16x16/apps/app.vercel.landonsoft.DisgaeaDSManager.png
      - install -Dm644 32.png /app/share/icons/hicolor/32x32/apps/app.vercel.landonsoft.DisgaeaDSManager.png
      - install -Dm644 64.png /app/share/icons/hicolor/64x64/apps/app.vercel.landonsoft.DisgaeaDSManager.png
      - install -Dm644 128.png /app/share/icons/hicolor/128x128/apps/app.vercel.landonsoft.DisgaeaDSManager.png
      - install -Dm644 256.png /app/share/icons/hicolor/256x256/apps/app.vercel.landonsoft.DisgaeaDSManager.png
      - install -Dm644 512.png /app/share/icons/hicolor/512x512/apps/app.vercel.landonsoft.DisgaeaDSManager.png
      - install -Dm644 app.vercel.landonsoft.DisgaeaDSManager.desktop /app/share/applications/app.vercel.landonsoft.DisgaeaDSManager.desktop
      - install -Dm644 app.vercel.landonsoft.DisgaeaDSManager.appdata.xml /app/share/metainfo/app.vercel.landonsoft.DisgaeaDSManager.appdata.xml
    sources:
      - type: file
        path: x64DisgaeaDSManager
      - type: file
        path: 16.png
      - type: file
        path: 32.png
      - type: file
        path: 64.png
      - type: file
        path: 128.png
      - type: file
        path: 256.png
      - type: file
        path: 512.png
      - type: file
        path: app.vercel.landonsoft.DisgaeaDSManager.desktop
      - type: file
        path: app.vercel.landonsoft.DisgaeaDSManager.appdata.xml
