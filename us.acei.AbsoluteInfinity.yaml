# Tweaked from https://docs.flatpak.org/en/latest/dotnet.html

id: us.acei.AbsoluteInfinity
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet8
build-options:
  prepend-path: "/usr/lib/sdk/dotnet8/bin"
  append-ld-library-path: "/usr/lib/sdk/dotnet8/lib"
  prepend-pkg-config-path: "/usr/lib/sdk/dotnet8/lib/pkgconfig"

command: Project4.Client

finish-args:
  - --device=dri
  - --socket=x11 # TODO: Replace this with wayland and fallback-x11 once Wayland support becomes available
  - --socket=pulseaudio
  - --share=ipc
  - --env=DOTNET_ROOT=/app/lib/dotnet

modules:
  - name: dotnet
    buildsystem: simple
    build-commands:
    - /usr/lib/sdk/dotnet8/bin/install.sh

  - name: Project4.Client
    buildsystem: simple
    sources:
      - type: git
        url: https://gitlab.com/acei.us/games/project4/game.git
        tag: Valve-2
        commit: a0632245806296cac41f8283b74c7aa68c060e6c
      - ./nuget-sources.json # Generated with https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/dotnet/flatpak-dotnet-generator.py
    build-commands:
      # Build
      - DOTNET_CLI_TELEMETRY_OPTOUT=1 dotnet clean
      - DOTNET_CLI_TELEMETRY_OPTOUT=1 dotnet publish Project4.Client/Project4.Client.csproj -c Release --no-self-contained --source ./nuget-sources
      - mkdir -p ${FLATPAK_DEST}/bin
      - cp -r Project4.Client/bin/Release/net8.0/linux-x64/publish/* ${FLATPAK_DEST}/bin/
      # Cleanup
      - rm ${FLATPAK_DEST}/bin/*.pdb
      - rm ${FLATPAK_DEST}/bin/*.xml
      # Install Other Stuff
      - install -Dm644 Package/us.acei.AbsoluteInfinity.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo/
      - install -Dm644 Package/icon-256.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/us.acei.AbsoluteInfinity.png
      - install -Dm644 Package/icon-128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/us.acei.AbsoluteInfinity.png
      - install -Dm644 Package/flatpak.desktop ${FLATPAK_DEST}/share/applications/us.acei.AbsoluteInfinity.desktop
