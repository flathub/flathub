app-id: io.gitlab.dunkbing.dearsql
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: dear-sql

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-documents

modules:
  # PostgreSQL client library
  - name: libpq
    buildsystem: simple
    build-options:
      # Force C17 - PostgreSQL 16.x is incompatible with C23 (bool keyword)
      cflags: -std=gnu17
    build-commands:
      - ./configure --prefix=/app --without-readline --without-zlib
      - cd src/interfaces/libpq && make -j$FLATPAK_BUILDER_N_JOBS
      - cd src/interfaces/libpq && make install
      - cd src/include && make install
    sources:
      - type: archive
        url: https://ftp.postgresql.org/pub/source/v16.2/postgresql-16.2.tar.bz2
        sha256: 446e88294dbc2c9085ab4b7061a646fa604b4bec03521d5ea671c2e5ad9b2952

  # Main application
  - name: dearsql
    buildsystem: simple
    build-commands:
      - cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/app -DBUILD_VERSION=0.1.0
      - cmake --build build --target dear-sql --parallel
      - install -Dm755 build/dear-sql /app/bin/dear-sql
      - install -Dm644 packaging/flatpak/io.gitlab.dunkbing.dearsql.desktop /app/share/applications/io.gitlab.dunkbing.dearsql.desktop
      - install -Dm644 packaging/flatpak/io.gitlab.dunkbing.dearsql.metainfo.xml /app/share/metainfo/io.gitlab.dunkbing.dearsql.metainfo.xml
      - install -Dm644 assets/appicon.png /app/share/icons/hicolor/256x256/apps/io.gitlab.dunkbing.dearsql.png
    sources:
      - type: git
        url: https://gitlab.com/dunkbing/dearsql.git
        tag: v0.1.2
        commit: 007eb0a46ef10ff16a67b789808d71647575a29a
      # SQLite3 amalgamation (extracted to external/sqlite3/)
      - type: archive
        url: https://www.sqlite.org/2026/sqlite-amalgamation-3510200.zip
        sha256: 6e2a845a493026bdbad0618b2b5a0cf48584faab47384480ed9f592d912f23ec
        dest: external/sqlite3
