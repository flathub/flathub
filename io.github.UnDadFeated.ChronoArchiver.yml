id: io.github.UnDadFeated.ChronoArchiver
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: '6.8'
command: chronoarchiver
finish-args:
- --share=network
- --share=ipc
- --socket=fallback-x11
- --socket=wayland
- --device=dri
- --filesystem=home
- --filesystem=xdg-run/dbus
- --filesystem=/tmp
build-options:
  env:
  - BASEAPP_REMOVE_WEBENGINE=1
cleanup-commands:
- /app/cleanup-BaseApp.sh
modules:
- name: git
  buildsystem: simple
  build-commands:
  - install -Dm755 /usr/bin/git ${FLATPAK_DEST}/bin/git
  - "if [ -d /usr/libexec/git-core ]; then\n  mkdir -p ${FLATPAK_DEST}/libexec\n  cp -a /usr/libexec/git-core ${FLATPAK_DEST}/libexec/\n\
    fi\n"
  sources: []
