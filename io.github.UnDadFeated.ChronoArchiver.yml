  build-commands:
  - install -d ${FLATPAK_DEST}/share/chronoarchiver
  - cp -r LICENSE ${FLATPAK_DEST}/share/chronoarchiver/
  - cp -r src chronoarchiver.pyw requirements.txt ${FLATPAK_DEST}/share/chronoarchiver/
  - cp -r docs ${FLATPAK_DEST}/share/chronoarchiver/ || true
  - install -Dm755 chronoarchiver.sh ${FLATPAK_DEST}/bin/chronoarchiver
  - install -Dm644 io.github.UnDadFeated.ChronoArchiver.desktop -t ${FLATPAK_DEST}/share/applications/
