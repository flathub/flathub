app-id: io.github.lorztechsistemas.bibliaroot
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: bibliaroot

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=ipc
  - --share=network
  - --device=dri

modules:
  - name: espeak-ng
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --without-mbrola
      - --without-sonic
      - --without-async
    sources:
      - type: git
        url: https://github.com/espeak-ng/espeak-ng.git
        commit: 212928b394a96e8fd2096616bfd54e17845c48f6

  - name: python3-piper-runtime
