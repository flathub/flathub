app-id: io.github.lorztechsistemas.bibliaroot
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: bibliaroot

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=ipc
  - --share=network
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=xdg-data/bibliaroot:create
  - --filesystem=xdg-config/bibliaroot:create
  - --filesystem=xdg-documents:create
  - --filesystem=xdg-download:ro

modules:
  - name: pcaudiolib
    buildsystem: autotools
    sources:
      - type: git
        url: https://github.com/espeak-ng/pcaudiolib.git
        tag: "1.3"

  - name: espeak-ng
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --with-pcaudiolib
      - --without-mbrola
      - --without-sonic
      - --without-async
    sources:
      - type: git
        url: https://github.com/espeak-ng/espeak-ng.git
        tag: "1.52.0"

  - name: python3-requests
    buildsystem: simple
    build-commands:
      - python3 -m pip install --no-index --prefix=/app --no-deps *.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/4a/7e/3db2bd1b1f9e95f7cddca6d6e75e2f2bd9f51b1246e546d88addca0106bd/certifi-2025.4.26-py3-none-any.whl
        sha256: 30350364dfe371162649852c63336a15c70c6510c2ad5015b21c2345311805f3
        dest-filename: certifi-2025.4.26-py3-none-any.whl
      - type: file
        url: https://files.pythonhosted.org/packages/20/94/c5790835a017658cbfabd07f3bfb549140c3ac458cfc196323996b10095a/charset_normalizer-3.4.2-py3-none-any.whl
        sha256: 7f56930ab0abd1c45cd15be65cc741c28b1c9a34876ce8c17a2fa107810c0af0
        dest-filename: charset_normalizer-3.4.2-py3-none-any.whl
      - type: file
        url: https://files.pythonhosted.org/packages/76/c6/c88e154df9c4e1a2a66ccf0005a88dfb2650c1dffb6f5ce603dfbd452ce3/idna-3.10-py3-none-any.whl
        sha256: 946d195a0d259cbba61165e88e65941f16e9b36ea6ddb97f00452bae8b1287d3
        dest-filename: idna-3.10-py3-none-any.whl
      - type: file
        url: https://files.pythonhosted.org/packages/1e/db/4254e3eabe8020b458f1a747140d32277ec7a271daf1d235b70dc0b4e6e3/requests-2.32.5-py3-none-any.whl
        sha256: 2462f94637a34fd532264295e186976db0f5d453d1cdd31473c85a6a161affb6
        dest-filename: requests-2.32.5-py3-none-any.whl
      - type: file
        url: https://files.pythonhosted.org/packages/a7/c2/fe1e52489ae3122415c51f387e221dd0773709bad6c6cdaa599e8a2c5185/urllib3-2.5.0-py3-none-any.whl
        sha256: e6b01673c0fa6a13e374b50871808eb3bf7046c4b125b216f6bf1cc604cff0dc
        dest-filename: urllib3-2.5.0-py3-none-any.whl

  - name: bibliaroot
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/lorztechsistemas/bibliaroot.git
        commit: d9490c6932f18233d986a0e614600dcf3838a6d3
    build-commands:
      - mkdir -p /app/share/bibliaroot
      - cp -r app data resources scripts locale main.py README.md pyproject.toml /app/share/bibliaroot/
      - install -Dm755 packaging/flatpak/bibliaroot.sh /app/bin/bibliaroot
      - install -Dm644 packaging/flatpak/io.github.lorztechsistemas.bibliaroot.desktop /app/share/applications/io.github.lorztechsistemas.bibliaroot.desktop
      - install -Dm644 packaging/flatpak/io.github.lorztechsistemas.bibliaroot.metainfo.xml /app/share/metainfo/io.github.lorztechsistemas.bibliaroot.metainfo.xml
      - install -Dm644 resources/icons/io.github.bibliaapp.svg /app/share/icons/hicolor/scalable/apps/io.github.lorztechsistemas.bibliaroot.svg
