app-id: io.github.BlazingHotCode.CircuitSim
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk21
command: circuitsim
finish-args:
  - --share=ipc
  - --socket=x11
modules:
  - name: circuitsim
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk21/bin/jlink --module-path /usr/lib/sdk/openjdk21/jmods --add-modules java.base,java.desktop,java.net.http --output runtime --strip-debug --no-man-pages --no-header-files --compress=2
      - install -Dm755 circuitsim.sh /app/bin/circuitsim
      - mkdir -p /app/jre
      - cp -a runtime/. /app/jre/
      - install -Dm644 CircuitSim.jar /app/lib/CircuitSim.jar
      - install -Dm644 io.github.BlazingHotCode.CircuitSim.desktop /app/share/applications/io.github.BlazingHotCode.CircuitSim.desktop
      - install -Dm644 io.github.BlazingHotCode.CircuitSim.metainfo.xml /app/share/metainfo/io.github.BlazingHotCode.CircuitSim.metainfo.xml
      - install -Dm644 io.github.BlazingHotCode.CircuitSim.png /app/share/icons/hicolor/256x256/apps/io.github.BlazingHotCode.CircuitSim.png
    sources:
      - type: file
        url: https://github.com/BlazingHotCode/CircuitSim/releases/download/v1.1.8/CircuitSim-1.1.8.jar
        sha256: 51dc5f6915e76916d61ddd1c642370cf1d549a3065ae9e75140495bb07f66215
        dest-filename: CircuitSim.jar
      - type: script
        dest-filename: circuitsim.sh
        commands:
          - exec /app/jre/bin/java -Dfile.encoding=UTF-8 -Djava.awt.headless=false -jar /app/lib/CircuitSim.jar "$@"
      - type: file
        url: https://raw.githubusercontent.com/BlazingHotCode/CircuitSim/c33ccf2241980f1dde38935be32785b2bb199caa/packaging/flatpak/io.github.BlazingHotCode.CircuitSim.desktop
        sha256: 7e6d84979e98a5265356f56b94f1845f8365713952cffee8cb3264766da7850e
      - type: file
        url: https://raw.githubusercontent.com/BlazingHotCode/CircuitSim/c33ccf2241980f1dde38935be32785b2bb199caa/packaging/flatpak/io.github.BlazingHotCode.CircuitSim.metainfo.xml
        sha256: ef27d4b6b9e0b16e63fa4f1afdc4c87e2dfdb35aec415d362cff51ea925032c2
      - type: file
        url: https://raw.githubusercontent.com/BlazingHotCode/CircuitSim/c33ccf2241980f1dde38935be32785b2bb199caa/packaging/circuitsim.png
        sha256: cd8494dd535e614994ec215e1fd886169130198349d4c9050267251e7d1f4d12
        dest-filename: io.github.BlazingHotCode.CircuitSim.png
