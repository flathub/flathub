app-id: io.github.k4dy.TelegramTUI
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk21

command: telegramtui

finish-args:
  - --share=network
  - --filesystem=home/.telegramtui:create
  - --env=PATH=/app/jre/bin:/usr/bin:/bin

modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk21/install.sh

  - name: cmake
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/Kitware/CMake/releases/download/v3.28.3/cmake-3.28.3.tar.gz
        sha256: e5e63da9d37a711a6c8dc80e5082960bd8c3a61d23e87f20a5a6a0a35b2df33c

  - name: tdlib
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
    sources:
      - type: git
        url: https://github.com/tdlib/td.git
        tag: v1.8.29
        commit: d3bb3c0d1c7d50c1e8f7f94fc4a1d7cccdf74fdc

  - name: telegramtui
    buildsystem: simple
    build-commands:
      - install -Dm644 telegramtui.jar /app/lib/telegramtui.jar
      - install -Dm755 telegramtui.sh /app/bin/telegramtui
      - install -Dm644 io.github.k4dy.TelegramTUI.desktop /app/share/applications/io.github.k4dy.TelegramTUI.desktop
      - install -Dm644 io.github.k4dy.TelegramTUI.png /app/share/icons/hicolor/1024x1024/apps/io.github.k4dy.TelegramTUI.png
      - install -Dm644 io.github.k4dy.TelegramTUI.metainfo.xml /app/share/metainfo/io.github.k4dy.TelegramTUI.metainfo.xml
    sources:
      - type: file
        url: https://github.com/k4dy/telegramtui/releases/download/v1.0.0/telegramtui-1.0.0.jar
        sha256: 8129a3b9a2948df90a5a87c7cfc43a447d7c0f61e41e3bdfe2754c8f62777820
        dest-filename: telegramtui.jar
      - type: script
        dest-filename: telegramtui.sh
        commands:
          - exec java -Djna.library.path=/app/lib -jar /app/lib/telegramtui.jar "$@"
      - type: file
        path: io.github.k4dy.TelegramTUI.desktop
      - type: file
        path: io.github.k4dy.TelegramTUI.png
      - type: file
        path: io.github.k4dy.TelegramTUI.metainfo.xml
