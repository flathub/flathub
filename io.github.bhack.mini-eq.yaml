app-id: io.github.bhack.mini-eq
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: mini-eq
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  - --filesystem=xdg-run/pipewire-0:ro
  - --env=PIPEWIRE_MODULE_DIR=/app/lib/pipewire-0.3:/usr/lib/x86_64-linux-gnu/pipewire-0.3:/usr/lib/aarch64-linux-gnu/pipewire-0.3:/usr/lib/pipewire-0.3
  - --env=SPA_PLUGIN_DIR=/app/lib/spa-0.2:/usr/lib/x86_64-linux-gnu/spa-0.2:/usr/lib/aarch64-linux-gnu/spa-0.2:/usr/lib/spa-0.2
cleanup:
  - /include
  - /etc/bash_completion.d
  - /lib/pkgconfig
  - /share/doc
  - /share/gtk-doc
  - /share/locale
  - /share/man
  - /share/pkgconfig
  - "*.a"
  - "*.la"
modules:
  - name: pipewire-filter-chain-module
    buildsystem: simple
    build-commands:
      - >-
        meson setup _build --prefix=/app
        -Dauto_features=disabled
        -Ddocs=disabled
        -Dman=disabled
        -Dexamples=disabled
        -Dtests=disabled
        -Dinstalled_tests=disabled
        -Dgstreamer=disabled
        -Dgstreamer-device-provider=disabled
        -Dsession-managers=[]
        -Dsystemd-system-service=disabled
        -Dsystemd-user-service=disabled
        -Dlibsystemd=disabled
        -Dlogind=disabled
        -Dpipewire-alsa=disabled
        -Dpipewire-jack=disabled
        -Dpipewire-v4l2=disabled
        -Dselinux=disabled
        -Dspa-plugins=enabled
        -Daudioconvert=enabled
        -Daudiomixer=disabled
        -Dcontrol=disabled
        -Dsupport=disabled
        -Dalsa=disabled
        -Dbluez5=disabled
        -Djack=disabled
        -Dv4l2=disabled
        -Dlibcamera=disabled
        -Dvulkan=disabled
        -Dffmpeg=disabled
        -Dudev=disabled
        -Ddbus=disabled
        -Dsdl2=disabled
        -Dsndfile=disabled
        -Dlibmysofa=disabled
        -Dlibpulse=disabled
        -Droc=disabled
        -Davahi=disabled
        -Draop=disabled
        -Dreadline=disabled
        -Decho-cancel-webrtc=disabled
        -Dlibusb=disabled
        -Dx11=disabled
        -Dx11-xfixes=disabled
        -Dlibcanberra=disabled
        -Davb=disabled
        -Dgsettings=disabled
        -Dcompress-offload=disabled
        -Dopus=disabled
        -Dlibffado=disabled
        -Dgsettings-pulse-schema=disabled
        -Dsnap=disabled
        -Debur128=disabled
        -Dfftw=disabled
        -Dlv2=disabled
        -Donnxruntime=disabled
        -Daudiotestsrc=disabled
        -Dvideoconvert=disabled
        -Dvideotestsrc=disabled
        -Dpw-cat=disabled
        -Dpw-cat-ffmpeg=disabled
        -Dlegacy-rtkit=false
        -Drlimits-install=false
        -Dflatpak=enabled
      - >-
        ninja -C _build
        src/modules/libpipewire-module-filter-chain.so
        spa/plugins/filter-graph/libspa-filter-graph.so
        spa/plugins/filter-graph/libspa-filter-graph-plugin-builtin.so
      - install -Dm755 _build/src/modules/libpipewire-module-filter-chain.so ${FLATPAK_DEST}/lib/pipewire-0.3/libpipewire-module-filter-chain.so
      - install -Dm755 _build/spa/plugins/filter-graph/libspa-filter-graph.so ${FLATPAK_DEST}/lib/spa-0.2/filter-graph/libspa-filter-graph.so
      - install -Dm755 _build/spa/plugins/filter-graph/libspa-filter-graph-plugin-builtin.so ${FLATPAK_DEST}/lib/spa-0.2/filter-graph/libspa-filter-graph-plugin-builtin.so
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/pipewire/pipewire.git
        tag: 1.6.1
        commit: b7341d068947225fcdf62d39277606e8516d7f52

  - name: wireplumber
    buildsystem: meson
    config-opts:
      - -Dintrospection=enabled
      - -Ddoc=disabled
      - -Dmodules=false
      - -Ddaemon=false
      - -Dtools=false
      - -Dtests=false
      - -Ddbus-tests=false
      - -Dsystemd=disabled
      - -Dsystemd-system-service=false
      - -Dsystemd-user-service=false
      - -Delogind=disabled
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/pipewire/wireplumber.git
        tag: 0.5.14
        commit: 07e730b279ac7a520699ae9f6b0797848a731b30
      - type: patch
        path: flatpak/patches/wireplumber-0.5.14-tools-disabled-po.patch

  - python3-dependencies.yaml

  - name: mini-eq
    buildsystem: simple
    build-commands:
      - python3 -m pip install --no-index --no-deps --no-build-isolation --prefix=${FLATPAK_DEST} .
      - install -Dm644 data/io.github.bhack.mini-eq.desktop -t ${FLATPAK_DEST}/share/applications
      - install -Dm644 data/io.github.bhack.mini-eq.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo
      - >-
        for size in 64 128 256 512; do
        install -Dm644
        src/mini_eq/assets/icons/hicolor/${size}x${size}/apps/io.github.bhack.mini-eq.png
        ${FLATPAK_DEST}/share/icons/hicolor/${size}x${size}/apps/io.github.bhack.mini-eq.png;
        done
    sources:
      - type: archive
        url: https://github.com/bhack/mini-eq/releases/download/v0.1.1/mini_eq-0.1.1.tar.gz
        sha256: 4877825276922915ecd7d64d9933c82855e48c849c4c4e8842f35b75075a84d4
