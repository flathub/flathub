app-id: com.upcreate.webstree
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: webstree

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - name: webstree
    buildsystem: simple
    build-commands:
      - ar x Webstree_1.0.38_amd64.deb
      - tar xf data.tar.* -C /
      - install -Dm755 /usr/bin/webstree /app/bin/webstree
      - install -Dm644 com.upcreate.webstree.desktop /app/share/applications/com.upcreate.webstree.desktop
      - install -Dm644 com.upcreate.webstree.metainfo.xml /app/share/metainfo/com.upcreate.webstree.metainfo.xml
      - for size in 32 128 256 512; do mkdir -p /app/share/icons/hicolor/${size}x${size}/apps; done
      - install -Dm644 icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.upcreate.webstree.png
      - install -Dm644 icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.upcreate.webstree.png
      - install -Dm644 icons/256x256.png /app/share/icons/hicolor/256x256/apps/com.upcreate.webstree.png
      - install -Dm644 icons/512x512.png /app/share/icons/hicolor/512x512/apps/com.upcreate.webstree.png
    sources:
      - type: file
        url: https://github.com/hadsizefendi/upping/releases/download/v1.0.39/Webstree_1.0.38_amd64.deb
        sha256: 61e1d62daad5c9e2ffdaa265b5eb612eaffcb8b5a32810ec256e2d5b185e521c
        dest-filename: Webstree_1.0.38_amd64.deb
      - type: file
        path: com.upcreate.webstree.desktop
      - type: file
        path: com.upcreate.webstree.metainfo.xml
      - type: dir
        path: icons
