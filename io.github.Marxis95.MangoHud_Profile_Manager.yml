id: io.github.Marxis95.MangoHud_Profile_Manager
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: mangomanager-wrapper

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home

cleanup:
  - /include
  - /share/man
  - /share/doc
  - /lib/pkgconfig
  - "*.la"
  - "*.a"

modules:
  - name: python-dependencies
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app --no-cache-dir psutil PySide6-Essentials
      - |
        rm -rf /app/lib/python3.12/site-packages/PySide6/examples
        rm -rf /app/lib/python3.13/site-packages/PySide6/examples
        rm -rf /app/bin/pyside6-*
    sources:
      - type: shell
        commands:
          - echo "Installing GUI dependencies..."

  - name: mangomanager-app
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/Marxis95/MangoHud-Profile-Manager.git
        branch: main
    build-commands:
      # Install the python script from Source folder
      - install -D Source/mangomanager.py /app/bin/mangomanager.py

      # Install the icon from flatpak folder
      - install -D flatpak/io.github.Marxis95.MangoHud_Profile_Manager.png /app/share/icons/hicolor/256x256/apps/io.github.Marxis95.MangoHud_Profile_Manager.png

      # Install the Metainfo file (the store description)
      - install -D Source/io.github.Marxis95.MangoHud_Profile_Manager.metainfo.xml /app/share/metainfo/io.github.Marxis95.MangoHud_Profile_Manager.metainfo.xml

      # Create and install the Desktop Entry
      - |
        echo '[Desktop Entry]
        Name=MangoHud Profile Manager
        Comment=Manage MangoHud performance overlay profiles
        Exec=mangomanager-wrapper
        Type=Application
        Icon=io.github.Marxis95.MangoHud_Profile_Manager
        Categories=Game;Utility;' > io.github.Marxis95.MangoHud_Profile_Manager.desktop
      - install -D io.github.Marxis95.MangoHud_Profile_Manager.desktop /app/share/applications/io.github.Marxis95.MangoHud_Profile_Manager.desktop

      # Create the wrapper script
      - |
        echo '#!/bin/sh
        export PYTHONPATH=$PYTHONPATH:/app/lib/python3.12/site-packages:/app/lib/python3.13/site-packages
        exec python3 /app/bin/mangomanager.py "$@"' > /app/bin/mangomanager-wrapper
      - chmod +x /app/bin/mangomanager-wrapper
