id: fr.quentium.stacer
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: stacer
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=xdg-config/autostart
modules:
  - name: stacer
    buildsystem: cmake
    build-commands:
      - rm -rf build
      - cmake -S . -B build -DCMAKE_INSTALL_PREFIX=/app -DCMAKE_BUILD_TYPE=Release
      - install -Dm644 flatpak/fr.quentium.stacer.desktop /app/share/applications/fr.quentium.stacer.desktop
      - install -Dm644 icons/hicolor/16x16/apps/stacer.png /app/share/icons/hicolor/16x16/apps/stacer.png
      - install -Dm644 icons/hicolor/32x32/apps/stacer.png /app/share/icons/hicolor/32x32/apps/stacer.png
      - install -Dm644 icons/hicolor/64x64/apps/stacer.png /app/share/icons/hicolor/64x64/apps/stacer.png
      - install -Dm644 icons/hicolor/128x128/apps/stacer.png /app/share/icons/hicolor/128x128/apps/stacer.png
      - install -Dm644 icons/hicolor/256x256/apps/stacer.png /app/share/icons/hicolor/256x256/apps/stacer.png
      - install -Dm644 icons/hicolor/512x512/apps/stacer.png /app/share/icons/hicolor/512x512/apps/stacer.png
      - install -Dm644 icons/hicolor/1024x1024/apps/stacer.png /app/share/icons/hicolor/1024x1024/apps/stacer.png
      - install -Dm644 icons/hicolor/scalable/apps/stacer.svg /app/share/icons/hicolor/scalable/apps/stacer.svg
      - mkdir -p /app/share/qt6/translations/
      - install -Dm644 translations/*.qm /app/share/qt6/translations/
    sources:
      - type: dir
        path: ..
    cleanup:
      - /lib/cmake
      - /share/cmake
      - /include
      - /lib/pkgconfig
