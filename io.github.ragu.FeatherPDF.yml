id: io.github.ragu.FeatherPDF
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: featherpdf
finish-args:
  - --share=network
  - --share=ipc
  - --filesystem=home
  - --device=dri
  - --talk-name=org.freedesktop.Flatpak
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --env=PYTHONPATH=/app/featherpdf

modules:
  - name: python3
    buildsystem: simple
    build-commands:
      - flatpak-pip-install
    sources:
      - type: distro
        name: python3

  - name: pip-packages
    buildsystem: simple
    build-commands:
      - pip3 install --no-cache-dir PyMuPDF Pillow
    sources: []

  - name: featherpdf
    buildsystem: simple
    build-commands:
      - install -Dm755 featherpdf/app.py /app/bin/featherpdf
      - install -Dm644 -t /app/featherpdf featherpdf/*.py
      - mkdir -p /app/data/icons
      - install -Dm644 data/icons/icon.png /app/data/icons/icon.png
