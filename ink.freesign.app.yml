id: ink.freesign.app

runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20

command: freesign
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network

build-options:
  append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin

modules:
  - name: freesign
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/jaigner-hub/freesign
        tag: v1.0.2
        commit: 372af4a3608c0c8914db85f7efbb7151f59fe9ee
      - cargo-sources.json
      - node-sources.json

    build-options:
      env:
        CARGO_HOME: /run/build/freesign/cargo
        XDG_CACHE_HOME: /run/build/freesign/flatpak-node/cache
        npm_config_cache: /run/build/freesign/flatpak-node/npm-cache
        npm_config_offline: "true"
        LC_ALL: C.utf8

    build-commands:
      - npm ci --offline
      - cargo --offline fetch --manifest-path src-tauri/Cargo.toml --verbose
      - npm run --offline tauri build -- --no-bundle
      - install -Dm644 -t /app/share/metainfo/ flatpak/ink.freesign.app.metainfo.xml
      - install -Dm644 -t /app/share/applications/ flatpak/ink.freesign.app.desktop
      - install -Dm755 -t /app/bin/ src-tauri/target/release/freesign
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/ink.freesign.app.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/ink.freesign.app.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/ink.freesign.app.png

    post-install:
      - install -Dm644 LICENSE /app/share/licenses/ink.freesign.app/LICENSE
