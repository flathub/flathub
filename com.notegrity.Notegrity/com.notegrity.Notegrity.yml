app-id: com.notegrity.Notegrity
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: notegrity-wrapper

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: notegrity
    buildsystem: simple

    sources:
      - type: archive
        url: https://github.com/Notegrity/notegrity-downloads/releases/download/v0.1.0-linux/notegrity-linux-unpacked.tar.gz
        sha256: e171bb5226994a0763868addaf510671dfdc34a3ab68e01bc54e08f9e52a9e3c

      - type: file
        path: com.notegrity.Notegrity.desktop

      - type: file
        path: com.notegrity.Notegrity.png

    build-commands:
      - mkdir -p /app/bin
      - cp -r * /app/bin/

      # Install desktop file
      - install -Dm644 com.notegrity.Notegrity.desktop /app/share/applications/com.notegrity.Notegrity.desktop

      # Install icon
      - install -Dm644 com.notegrity.Notegrity.png /app/share/icons/hicolor/256x256/apps/com.notegrity.Notegrity.png

      # Wrapper
      - echo '#!/bin/sh' > /app/bin/notegrity-wrapper
      - echo '/app/bin/notegrity --no-sandbox "$@"' >> /app/bin/notegrity-wrapper

      - chmod +x /app/bin/notegrity-wrapper
      - chmod +x /app/bin/notegrity
