app-id: ai.connectiva.mysoftphonepremium
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: FlatpakMySoftphone.sh

# ffmpeg extension (provides libavformat, libavcodec, libswresample, etc.)
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    version: "24.08"
    directory: lib/ffmpeg
    add-ld-path: .
    autodelete: false

# shared-modules/libayatana-appindicator installs ayatana-ido to /app/lib64 on
# freedesktop SDK 24.08; make pkg-config and the linker find it for downstream modules.
build-options:
  append-pkg-config-path: /app/lib64/pkgconfig
  append-ld-library-path: /app/lib64
  env:
    LIBRARY_PATH: /app/lib64

finish-args:
  # UI & display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri

  # Network / VOIP
  - --share=network

  # Audio (pulseaudio; compatible with pipewire-pulse)
  - --socket=pulseaudio
  # Camera access via pipewire portal
  - --filesystem=xdg-run/pipewire-0

  # System tray (DBus services, not portals)
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar

  # Secret service (libsecret)
  - --talk-name=org.freedesktop.secrets

modules:
  # libayatana-appindicator and dependencies (for system_tray plugin runtime support)
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

  # legacy libappindicator (some Flutter tray plugins still link against libappindicator3.so.1)
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json

  # libsecret (runtime dep of flutter_secure_storage_linux)
  - shared-modules/libsecret/libsecret.json

  - name: mysoftphonepremium
    buildsystem: simple
    build-commands:
      # Create the mount point for the ffmpeg extension
      - mkdir -p /app/lib/ffmpeg
      - install -Dm755 apply_extra /app/bin/apply_extra
      - install -Dm755 FlatpakMySoftphone.sh /app/bin/FlatpakMySoftphone.sh
      - install -Dm644 ai.connectiva.mysoftphonepremium.desktop /app/share/applications/ai.connectiva.mysoftphonepremium.desktop
      - install -Dm644 ai.connectiva.mysoftphonepremium.metainfo.xml /app/share/metainfo/ai.connectiva.mysoftphonepremium.metainfo.xml
      - install -Dm644 flatpak/icons/ai.connectiva.mysoftphonepremium.png /app/share/icons/hicolor/512x512/apps/ai.connectiva.mysoftphonepremium.png
    sources:
      - type: extra-data
        filename: mysoftphone_linux.tar.gz
        only-arches: [x86_64]
        url: https://autoprov.connectiva.ai/getFile/mysoftphone_linux-6.4.10.tar.gz
        sha256: 91c3e953f6326b9bbb0444990ced9b57f90f393d6b30c15524a9407ece3fedde
        size: 38181791
        installed-size: 94708023
      - type: script
        dest-filename: apply_extra
        commands:
          - tar -xzf mysoftphone_linux.tar.gz
          - rm mysoftphone_linux.tar.gz
      - type: file
        path: FlatpakMySoftphone.sh
      - type: file
        path: ai.connectiva.mysoftphonepremium.desktop
      - type: file
        path: ai.connectiva.mysoftphonepremium.metainfo.xml
      - type: dir
        path: flatpak/icons
        dest: flatpak/icons