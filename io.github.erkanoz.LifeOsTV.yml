app-id: io.github.erkanoz.LifeOsTV
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.flutter

command: lifeostv

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=xdg-download:rw

build-options:
  append-path: /usr/lib/sdk/flutter/bin:/usr/lib/sdk/flutter/bin/cache/dart-sdk/bin
  env:
    FLUTTER_ROOT: /usr/lib/sdk/flutter
    PUB_CACHE: /run/build/lifeostv/.pub-cache

modules:
  - name: lifeostv
    buildsystem: simple
    build-commands:
      - flutter --version
      - flutter config --enable-linux-desktop
      - flutter --suppress-analytics pub get
      - flutter build linux --release
      - install -Dm755 build/linux/x64/release/bundle/lifeostv /app/bin/lifeostv
      - cp -r build/linux/x64/release/bundle/lib /app/bin/
      - cp -r build/linux/x64/release/bundle/data /app/bin/
      - install -Dm644 packaging/flatpak/io.github.erkanoz.LifeOsTV.desktop /app/share/applications/io.github.erkanoz.LifeOsTV.desktop
      - install -Dm644 packaging/flatpak/io.github.erkanoz.LifeOsTV.metainfo.xml /app/share/metainfo/io.github.erkanoz.LifeOsTV.metainfo.xml
      - install -Dm644 assets/app_icon_256.png /app/share/icons/hicolor/256x256/apps/io.github.erkanoz.LifeOsTV.png
    sources:
      - type: git
        url: https://github.com/07erkanoz/lifeos-iptv-player.git
        commit: 641a91a8f8063a5e0e7cd9b92656cac999d87643
