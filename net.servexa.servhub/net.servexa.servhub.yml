app-id: net.servexa.servhub
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
command: servhub

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Flatpak

build-options:
  append-path: /usr/lib/sdk/node20/bin
  env:
    NPM_CONFIG_LOGLEVEL: info

modules:
  - name: servhub
    buildsystem: simple
    build-commands:
      - npm ci --offline
      - cd frontend && npm ci --offline && npm run build && cd ..
      - mkdir -p /app/servhub
      - cp -r . /app/servhub/
      - mkdir -p /app/bin
      - install -Dm755 start.sh /app/bin/servhub
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/net.servexa.servhub.png
      - install -Dm644 net.servexa.servhub.desktop /app/share/applications/net.servexa.servhub.desktop
      - install -Dm644 net.servexa.servhub.metainfo.xml /app/share/metainfo/net.servexa.servhub.metainfo.xml
    sources:
      - type: git
        url: https://github.com/B5aaR/servhub-store.git
        tag: v1.0.4
      - type: file
        path: net.servexa.servhub.desktop
      - type: file
        path: net.servexa.servhub.metainfo.xml
