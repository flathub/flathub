app-id: io.github.antonio_orionus.Arroxy
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: arroxy.sh
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: arroxy
    buildsystem: simple
    build-commands:
      - for size in 64 128 256 512; do install -Dm644 icons/${size}x${size}.png share/icons/hicolor/${size}x${size}/apps/${FLATPAK_ID}.png; done
      - install -Dm644 ${FLATPAK_ID}.desktop share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm755 arroxy.sh bin/arroxy.sh
      - install -Dm644 LICENSE share/licenses/${FLATPAK_ID}/LICENSE
      - rm -rf icons ${FLATPAK_ID}.desktop ${FLATPAK_ID}.metainfo.xml arroxy.sh LICENSE
      - cp -r * ${FLATPAK_DEST}
    sources:
      - type: archive
        # sha256 filled in by publish-flatpak CI job on each release.
        # For initial Flathub submission, build a release locally and patch this manually.
        url: https://github.com/antonio-orionus/Arroxy/releases/download/v0.2.5/Arroxy-0.2.5.tar.gz
        sha256: a347f87d39a22b17bf2bb5110dd3b887547fddbb0d5eb1a0f84e99496072b5b7
        only-arches:
          - x86_64
        x-checker-data:
          type: json
          url: https://api.github.com/repos/antonio-orionus/Arroxy/releases/latest
          version-query: .tag_name | ltrimstr("v")
          url-query: .assets[] | select(.name == "Arroxy-" + $version + ".tar.gz") | .browser_download_url
          is-main-source: true
      - type: file
        path: io.github.antonio_orionus.Arroxy.desktop
      - type: file
        path: io.github.antonio_orionus.Arroxy.metainfo.xml
      - type: file
        path: arroxy.sh
      - type: dir
        path: icons
        dest: icons
      - type: file
        url: https://raw.githubusercontent.com/antonio-orionus/Arroxy/v0.2.5/LICENSE
        sha256: 1698c847ca016fb30acb7c66340322aafe4772514ed7069a2e42e92724e3e061
