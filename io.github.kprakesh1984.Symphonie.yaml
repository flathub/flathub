app-id: io.github.kprakesh1984.Symphonie

runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk

command: Symphonie

finish-args:
  # Filesystem and audio permissions
  - --filesystem=xdg-music:ro
  - --socket=pulseaudio

  # Correct display server permissions with X11 fallback
  - --socket=wayland
  - --fallback-x11
  
  # Required for X11 fallback compatibility
  - --share=ipc

  # Runtime network access for the app (updates, fetching content)
  - --share=network

modules:
  - name: symphonie
    buildsystem: simple

    build-commands:
      # 1. Setup Environment
      - export PATH="./bin:$PATH"

      # 2. Install Dependencies & Build
      # Note: Since network is disabled, these commands rely on the sources
      # having everything needed or being vendored.
      - npm install -g yarn
      - yarn install --frozen-lockfile
      - yarn dist:linux

      # 3. Install Application Files
      # FIXED: Install to /app/lib/Symphonie/ to comply with Flathub guidelines
      - mkdir -p /app/lib/Symphonie
      - cp -r dist_electron/linux-unpacked/* /app/lib/Symphonie/
      
      # 4. Install the AppStream Metadata
      - install -Dm644 io.github.kprakesh1984.Symphonie.metainfo.xml /app/share/metainfo/io.github.kprakesh1984.Symphonie.metainfo.xml

      # 5. Install the Icon
      - install -Dm644 io.github.kprakesh1984.Symphonie.png /app/share/icons/hicolor/128x128/apps/io.github.kprakesh1984.Symphonie.png

      # 6. Install the Desktop File
      - install -Dm644 io.github.kprakesh1984.Symphonie.desktop /app/share/applications/io.github.kprakesh1984.Symphonie.desktop

      # 7. Wrapper Script Setup
      # FIXED: Points to /app/lib/Symphonie/Symphonie
      - mkdir -p /app/bin
      - cat <<EOF > /app/bin/Symphonie
#!/bin/sh
exec /app/lib/Symphonie/Symphonie --no-sandbox "\$@"
EOF
      - chmod +x /app/bin/Symphonie

    sources:
      # Source 1: Source Code
      - type: archive
        url: https://github.com/kprakesh1984/symphonie/archive/refs/tags/linux-release-v1.0.17.tar.gz
        sha256: 8d67e94f9821446d0be921506f68fdb203d34e4288d7b86306810058aa019198

      # Source 2: Node.js
      - type: archive
        url: https://nodejs.org/dist/v20.10.0/node-v20.10.0-linux-x64.tar.xz
        sha256: 3fe4ec5d70c8b4ffc1461dec83ab23fc70124e137c4cbbe1ccc9d6ae6ec04a7d
        # Ensure node is stripped to root of build directory or handled correctly
        # Usually requires dest: or strip-components depending on how it's used
        
      # Source 3: AppStream Metadata
      - type: file
        path: io.github.kprakesh1984.Symphonie.metainfo.xml

      # Source 4: The Icon
      - type: file
        path: io.github.kprakesh1984.Symphonie.png

      # Source 5: The Desktop File
      - type: file
        path: io.github.kprakesh1984.Symphonie.desktop
