app-id: io.github.kprakesh1984.Symphonie

# Using the latest stable runtime
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

command: Symphonie

only-arches:
  - x86_64

finish-args:
  - --filesystem=xdg-music:ro
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --device=dri

modules:
  - name: symphonie
    buildsystem: simple

    build-commands:
      - mkdir -p /app/lib/Symphonie
      - cp -r * /app/lib/Symphonie/

      # 2. Install Metadata (Downloaded from your repo)
      - install -Dm644 io.github.kprakesh1984.Symphonie.metainfo.xml /app/share/metainfo/io.github.kprakesh1984.Symphonie.metainfo.xml
      - install -Dm644 io.github.kprakesh1984.Symphonie.png /app/share/icons/hicolor/128x128/apps/io.github.kprakesh1984.Symphonie.png
      - install -Dm644 io.github.kprakesh1984.Symphonie.desktop /app/share/applications/io.github.kprakesh1984.Symphonie.desktop

      # 3. Install Wrapper Script
      - install -Dm755 symphonie.sh /app/bin/Symphonie

    sources:
      - type: archive
        url: https://github.com/kpr-dev590/symphonie/releases/download/linux-release-unpacked-v1.0.19/Symphonie-1.0.19-unpacked.zip
        sha256: bf9bbecd81eab2dee5784a5f7339149244bd1d5c7eacbbf5788562aab6c7fb3a
        strip-components: 1

      - type: script
        dest-filename: symphonie.sh
        commands:
          - export LD_LIBRARY_PATH=/app/lib/Symphonie:$LD_LIBRARY_PATH
          - exec /app/lib/Symphonie/Symphonie --no-sandbox "$@"
      
      - type: file
        url: https://raw.githubusercontent.com/kpr-dev590/symphonie/0aeab5c6f87f234f27df4c629820c8a162d234ff/io.github.kprakesh1984.Symphonie.desktop
        sha256: e32aa54dca17867dea2b83d5cbc8b09def60f4c8ffb380e61fd3bc8bfa3be72b

      - type: file
        url: https://raw.githubusercontent.com/kpr-dev590/symphonie/0aeab5c6f87f234f27df4c629820c8a162d234ff/io.github.kprakesh1984.Symphonie.png
        sha256: 4688402874a5691607cc25f8ed36b022c3b1cf28776467bbea7372c8abfb7865

      - type: file
        url: https://raw.githubusercontent.com/kpr-dev590/symphonie/0aeab5c6f87f234f27df4c629820c8a162d234ff/io.github.kprakesh1984.Symphonie.metainfo.xml
        sha256: 2d2cf80fd1273183842ddb63a333b995ad6cef2ea65e9436072093a3de534b1d