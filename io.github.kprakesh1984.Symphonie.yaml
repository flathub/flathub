app-id: io.github.kprakesh1984.Symphonie

runtime: org.freedesktop.Platform
runtime-version: '25.08' 
sdk: org.freedesktop.Sdk

only-arches: [x86_64]
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20

command: symphonie
separate-locales: false

finish-args:
  - --filesystem=xdg-music:ro
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=x11
  - --share=ipc
  - --share=network
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/node20/bin
  env:
    NPM_CONFIG_LOGLEVEL: info

modules:
  - name: symphonie
    buildsystem: simple
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/symphonie/flatpak-node/cache
        npm_config_cache: /run/build/symphonie/flatpak-node/npm-cache
        npm_config_nodedir: /usr/lib/sdk/node20
        npm_config_offline: 'true'
        ELECTRON_BUILDER_CACHE: /run/build/symphonie/flatpak-node/electron-cache

    build-commands:
      - npm install --offline
      - npm run dist:linux -- --linux --x64 --dir
      - cp -a dist_electron/linux-unpacked /app/main

      - install -Dm644 io.github.kprakesh1984.Symphonie.metainfo.xml /app/share/metainfo/io.github.kprakesh1984.Symphonie.metainfo.xml
      - install -Dm644 io.github.kprakesh1984.Symphonie.png /app/share/icons/hicolor/128x128/apps/io.github.kprakesh1984.Symphonie.png
      - install -Dm644 io.github.kprakesh1984.Symphonie.desktop /app/share/applications/io.github.kprakesh1984.Symphonie.desktop

      - install -Dm755 symphonie.sh /app/bin/symphonie

    sources:
      - type: archive
        url: https://github.com/kpr-dev590/symphonie/archive/refs/tags/linux-release-unpacked-v1.0.21.tar.gz
        sha256: 384c6a034ea5d4b02ef69b7d3bd9da17710d812931bd1e0f70851533d406f1f7
        strip-components: 1

      - generated-sources.json

      - type: script
        dest-filename: symphonie.sh
        commands:
          - exec zypak-wrapper /app/main/Symphonie "$@"