app-id: me.rueegger.bootmate
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: bootmate

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Access to user autostart directory
  - --filesystem=xdg-config/autostart:create
  # Read-only access to host /etc (for /etc/xdg/autostart, mounted at /run/host/etc)
  - --filesystem=host-etc:ro
  # Read-only access to host /usr (for applications, icons, gnome autostart, mounted at /run/host/usr)
  - --filesystem=host-os:ro

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/bootmate/cargo
    CARGO_NET_OFFLINE: 'true'

modules:
  - name: bootmate
    buildsystem: meson
    config-opts:
      - -Dprofile=release
    sources:
      - type: archive
        url: https://github.com/srueegger/bootmate/archive/refs/tags/v1.3.1.tar.gz
        sha256: a13246275050188bb3c81bf29ef446bef2f2bedc57f19c75ef637ed821c01477
      - cargo-sources.json
