id: com.tablio.app
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: tablio

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-run/tray-icon:create

modules:
  - name: binary
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/dasunNimantha/tablio/releases/download/v0.1.16/Tablio_0.1.16_amd64.deb
        sha256: 7c3692bd27551d7f2412e160f8d0e22fe8459acbc6ae9d90b7dfd71e3dc16eab
        only-arches: [x86_64]
      - type: file
        path: com.tablio.app.metainfo.xml
    build-commands:
      - mkdir deb-extract
      - ar -x *.deb --output deb-extract
      - tar -C deb-extract -xf deb-extract/data.tar.gz
      - install -Dm755 deb-extract/usr/bin/tablio /app/bin/tablio
      - sed -i 's/^Icon=.*/Icon=com.tablio.app/' deb-extract/usr/share/applications/Tablio.desktop
      - sed -i 's/^Categories=.*/Categories=Development;Database;/' deb-extract/usr/share/applications/Tablio.desktop
      - install -Dm644 deb-extract/usr/share/applications/Tablio.desktop /app/share/applications/com.tablio.app.desktop
      - install -Dm644 deb-extract/usr/share/icons/hicolor/32x32/apps/tablio.png /app/share/icons/hicolor/32x32/apps/com.tablio.app.png
      - install -Dm644 deb-extract/usr/share/icons/hicolor/128x128/apps/tablio.png /app/share/icons/hicolor/128x128/apps/com.tablio.app.png
      - install -Dm644 deb-extract/usr/share/icons/hicolor/256x256@2/apps/tablio.png /app/share/icons/hicolor/256x256@2/apps/com.tablio.app.png
      - install -Dm644 deb-extract/usr/share/icons/hicolor/512x512/apps/tablio.png /app/share/icons/hicolor/512x512/apps/com.tablio.app.png
      - install -Dm644 com.tablio.app.metainfo.xml /app/share/metainfo/com.tablio.app.metainfo.xml
