id: ai.claude.Desktop
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: run.sh
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Notifications
  - --env=XDG_CURRENT_DESKTOP=Unity # Helps with some Electron menu issues

modules:
  - name: claude-deps
    buildsystem: simple
    sources:
      - generated-sources.json
    build-commands:
      # Use the local cache generated by the tool
      - npm install --offline --frozen-lockfile

  - name: claude-desktop
    buildsystem: simple
    sources:
      - type: dir
        path: .
      - type: script
        dest-filename: run.sh
        commands:
          - exec zbus-desktop /app/main/claude-desktop-linux "$@"
    build-commands:
      # We tell electron-builder to just unpack the files, not build a .flatpak file here
      - npx electron-builder --linux --dir
      - mkdir -p /app/main
      - cp -r dist/linux-unpacked/* /app/main/
      - install -Dm755 run.sh /app/bin/run.sh
      # Install icons and metadata
      - install -Dm644 build/icon.png /app/share/icons/hicolor/512x512/apps/ai.claude.Desktop.png
      - install -Dm644 ai.claude.Desktop.metainfo.xml /app/share/metainfo/ai.claude.Desktop.metainfo.xml
