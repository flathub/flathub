id: io.speedofsound.SpeedOfSound
runtime: org.gnome.Platform
runtime-version: '49'

sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk25

command: speedofsound

finish-args:
  - --device=dri             # OpenGL rendering
  - --share=network          # Access the network
  - --socket=wayland         # Show windows with Wayland
  - --socket=fallback-x11    # Show windows using X11 if Wayland is not available
  - --share=ipc              # Share IPC namespace with the host (needed for X11 performance)
  - --socket=pulseaudio      # Access to PulseAudio (includes mic input)
  - --env=JAVA_HOME=/app/jre # See: https://github.com/flathub/org.freedesktop.Sdk.Extension.openjdk25

modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk25/install.sh

  - name: speedofsound
    buildsystem: meson
    build-options:
      append-path: "/usr/lib/sdk/openjdk25/gradle/bin:/usr/lib/sdk/openjdk25/jvm/openjdk-25/bin"
    sources:
      - type: git
        url: https://github.com/zugaldia/speedofsound.git
        tag: v0.8.0-beta.1
        commit: 94a077d9cdebdbd98d1717b0aeeb8c9df037ab34
      - buildSrc/flatpak-sources.json
      - core/flatpak-sources.json
      - app/flatpak-sources.json
      # (Report upstream?) Parent POMs/BOMs not captured by flatpakGradleGenerator.
      # Add entries here manually when the build fails with "No cached version available for offline mode".
      - type: file
        url: "https://repo1.maven.org/maven2/org/junit/junit-bom/5.10.2/junit-bom-5.10.2.pom"
        sha512: "5b36199c9a331c4d05ed78b8fe1f28c5d21e0d7a05bdca1d45f532a89eb7d67fd425da93e9405203a483354abc63718858f80c828e0c090316f70fd833ef904c"
        dest: "offline-repository/org/junit/junit-bom/5.10.2"
        dest-filename: "junit-bom-5.10.2.pom"
