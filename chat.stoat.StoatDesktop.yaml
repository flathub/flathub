app-id: chat.stoat.StoatDesktop
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
command: stoat-desktop
separate-locales: false
finish-args:
  - --share=ipc
    # Required to provide Call functionality
  - --socket=pulseaudio
  - --device=all
    # Network access
  - --share=network
  - --talk-name=org.freedesktop.ScreenSaver
    # Local filesystem
  - --filesystem=xdg-videos:ro
  - --filesystem=xdg-pictures:ro
  - --filesystem=xdg-download
  - --filesystem=xdg-run/pipewire-0
  - --filesystem=xdg-run/speech-dispatcher
    # Required for notifications in various desktop environments
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=com.canonical.indicator.application
  - --talk-name=com.canonical.Unity
  - --system-talk-name=org.freedesktop.UPower
    # Ensure that custom mouse cursors are used
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --env=ELECTRON_TRASH=gio

modules:
  # Build and install stoat
  - name: stoat
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node22/bin
      env:
        npm_config_nodedir: /usr/lib/sdk/node22
    build-commands:
      - cp -a stoat-desktop /app/
      - install -Dm775 stoat-desktop.sh /app/bin/stoat-desktop
      - install -D chat.stoat.StoatDesktop.desktop -t /app/share/applications/
      - install -Dm644 chat.stoat.StoatDesktop.metainfo.xml -t /app/share/metainfo/
      - install -D icon.png /app/share/icons/hicolor/256x256/apps/chat.stoat.StoatDesktop.png

    sources:
      - type: archive
        only-arches: [x86_64]
        url: https://github.com/stoatchat/for-desktop/releases/download/v1.1.12/Stoat-linux-x64-1.1.12.zip
        sha256: eabbdb9a84867669725d84bb1b7884ea752e2f82076c34ca5a249e6c0557ab6f
        dest: stoat-desktop
        x-checker-data:
          type: json
          url: https://api.github.com/repos/stoatchat/for-desktop/releases/latest
          tag-query: .tag_name
          version-query: .tag_name | sub("^v"; "")
          url-query: '"https://github.com/stoatchat/for-desktop/releases/download/" + $tag + "/Stoat-linux-x64-" + $version + ".zip"'
      - type: archive
        only-arches: [aarch64]
        url: https://github.com/stoatchat/for-desktop/releases/download/v1.1.12/Stoat-linux-arm64-1.1.12.zip
        sha256: d5fd93f977abd813e6855756d814ad29b10f6255cd813f34565bf31aa83343c4
        dest: stoat-desktop
        x-checker-data:
          type: json
          url: https://api.github.com/repos/stoatchat/for-desktop/releases/latest
          tag-query: .tag_name
          version-query: .tag_name | sub("^v"; "")
          url-query: '"https://github.com/stoatchat/for-desktop/releases/download/" + $tag + "/Stoat-linux-arm64-" + $version + ".zip"'
      - type: script
        dest-filename: stoat-desktop.sh
        commands:
          # TMPDIR env variable fixes the tray icon issue (#6)
          - env TMPDIR="$XDG_RUNTIME_DIR/app/${FLATPAK_ID:-chat.stoat.StoatDesktop}" zypak-wrapper /app/stoat-desktop/stoat-desktop "$@"
      - type: file
        path: chat.stoat.StoatDesktop.desktop
      - type: file
        path: chat.stoat.StoatDesktop.metainfo.xml
      - type: file
        url: https://raw.githubusercontent.com/stoatchat/assets/master/desktop/icon.png
        sha256: 582426c61a9e708f26b45ac51b5b0a1423c780a7f56267743e51ce546a856548
