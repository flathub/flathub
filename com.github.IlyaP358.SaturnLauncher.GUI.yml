app-id: com.github.IlyaP358.SaturnLauncher.GUI
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: saturn-gui
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --filesystem=home
  - --filesystem=~/.icons:ro
  - --filesystem=~/.local/share/icons:ro
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
modules:


  - name: saturn-launcher-gui
    buildsystem: simple
    build-commands:
      # Install the python source code
      - mkdir -p /app/share/saturn_launcher
      - cp -r ./* /app/share/saturn_launcher/
      # Install the wrapper script
      - install -Dm755 saturn-wrapper /app/bin/saturn-gui
      # Install assets (icon/desktop/metainfo)
      - install -Dm644 com.github.IlyaP358.SaturnLauncher.GUI.desktop /app/share/applications/com.github.IlyaP358.SaturnLauncher.GUI.desktop
      - install -Dm644 logo_512.png /app/share/icons/hicolor/512x512/apps/com.github.IlyaP358.SaturnLauncher.GUI.png
      - install -Dm644 com.github.IlyaP358.SaturnLauncher.GUI.metainfo.xml /app/share/metainfo/com.github.IlyaP358.SaturnLauncher.GUI.metainfo.xml
    sources:
      - type: git
        url: https://github.com/IlyaP358/saturn_launcher.git
        tag: v0.1.0
      - type: script
        dest-filename: saturn-wrapper
        commands:
          - export PYTHONPATH=/app/share/saturn_launcher
          - exec python3 /app/share/saturn_launcher/saturn-gui.py "$@"
      # Local assets (Overrides/Additions)
      - type: file
        path: com.github.IlyaP358.SaturnLauncher.GUI.desktop
      - type: file
        path: logo_512.png
      - type: file
        path: com.github.IlyaP358.SaturnLauncher.GUI.metainfo.xml
