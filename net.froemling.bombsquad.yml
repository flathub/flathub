app-id: net.froemling.bombsquad
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: bombsquad.sh
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --device=dri
  - --persist=.ballisticakit

sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20

modules:

  - name: bombsquad
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/llvm20/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      build-args:
        - --share=network
      env:
        CMAKE_BUILD_TYPE: "Release"
    build-commands:
      - mkdir -p ${FLATPAK_DEST}/bin/bombsquad
      - rm -f .venv/bin/python3.13
      - ln -s /usr/bin/python3.13 .venv/bin/python3.13
      - python3.13 -m venv --upgrade .venv
      - make env-clean
      - make cmake-build
      - mv build/cmake/*/ballisticakit build/cmake/*/staged/
      - cp -r build/cmake/*/staged/* ${FLATPAK_DEST}/bin/bombsquad/
      - install -Dm755 bombsquad.sh ${FLATPAK_DEST}/bin/bombsquad.sh
      - install -Dm644 config/flatpak/net.froemling.bombsquad.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 config/flatpak/net.froemling.bombsquad.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 config/flatpak/net.froemling.bombsquad.releases.xml ${FLATPAK_DEST}/share/metainfo/releases/${FLATPAK_ID}.releases.xml
      - install -Dm644 ${FLATPAK_ID}.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png

    sources:

      - type: archive
        url: https://github.com/efroemling/ballistica/releases/download/v1.7.61/bombsquad_build_env.tar
        sha256: 0cb9b58f73e48fd7d64df2b5dbbab2b6e509f3447c37bd00536a5e02532ce28b
        strip-components: 0

      - type: file
        dest-filename: net.froemling.bombsquad.png
        url: https://files.ballistica.net/bombsquad/promo/BombSquadIcon512.png
        sha256: c950d1b62da2714b1ed1afc42244f7e192be23172c89b6fa3e6eaaca8e45a89a

      - type: script
        dest-filename: bombsquad.sh
        commands:
          - cd /app/bin/bombsquad
          - exec ./ballisticakit
