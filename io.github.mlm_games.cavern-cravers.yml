id: io.github.mlm_games.cavern-cravers
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.godotengine.godot.BaseApp
base-version: "4.6"
command: cavern-cravers
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio

modules:
  - name: cavern-cravers
    buildsystem: simple
    sources:
      - type: archive
        url: https://github.com/mlm-games/cavern-cravers/releases/download/0.9.2/web.zip
        sha256: 8ce9bcce2d01c77c4ee93a57f30006e9ad65c6fdfaf7fda0b2627eb43eb6f8d8
        dest: web
        x-checker-data:
          type: json
          url: https://api.github.com/repos/mlm-games/cavern-cravers/releases/latest
          is-main-source: true
          version-query: .tag_name
          url-query: |
            .assets[]
            | select(.name | endswith("web.zip"))
            | .browser_download_url

      - type: git
        url: https://github.com/mlm-games/cavern-cravers.git
        tag: 0.9.2
        commit: b82a24b7a2d140401cb3a416275802f4301f532f
        x-checker-data:
          type: git
          tag-pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"

    build-commands:
      - install -Dm644 web/index.pck /app/bin/godot-runner.pck

      - ln -s godot-runner ${FLATPAK_DEST}/bin/cavern-cravers
      
      - install -Dm644 icon.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm644 others/flathub/${FLATPAK_ID}.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 others/flathub/${FLATPAK_ID}.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
