app-id: cloud.nettrace.NetTrace
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: nettrace-desktop_app

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1
  - --env=WEBKIT_DISABLE_COMPOSITING_MODE=1
  - --env=GDK_BACKEND=x11

modules:
  - name: nettrace
    buildsystem: simple
    build-commands:
      - install -Dm755 nettrace-desktop_app /app/bin/nettrace-desktop_app
      - install -Dm644 cloud.nettrace.NetTrace.desktop /app/share/applications/cloud.nettrace.NetTrace.desktop
      - install -Dm644 icon.png /app/share/icons/hicolor/128x128/apps/cloud.nettrace.NetTrace.png
      - install -Dm644 cloud.nettrace.NetTrace.metainfo.xml /app/share/metainfo/cloud.nettrace.NetTrace.metainfo.xml
    sources:
      - type: file
        path: src-tauri/target/release/nettrace-desktop_app
        dest-filename: nettrace-desktop_app
      - type: file
        path: src-tauri/icons/128x128.png
        dest-filename: icon.png
      - type: file
        path: cloud.nettrace.NetTrace.desktop
        dest-filename: cloud.nettrace.NetTrace.desktop
      - type: file
        path: cloud.nettrace.NetTrace.metainfo.xml
        dest-filename: cloud.nettrace.NetTrace.metainfo.xml