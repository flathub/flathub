app-id: cloud.nettrace.NetTrace
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: nettrace-desktop_app

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

modules:
  - name: nettrace
    buildsystem: simple
    build-commands:
      - install -Dm755 nettrace-desktop_app /app/bin/nettrace-desktop_app
      - install -Dm644 cloud.nettrace.NetTrace.desktop /app/share/applications/cloud.nettrace.NetTrace.desktop
      - install -Dm644 icon.png /app/share/icons/hicolor/128x128/apps/cloud.nettrace.NetTrace.png
      - install -Dm644 cloud.nettrace.NetTrace.metainfo.xml /app/share/metainfo/cloud.nettrace.NetTrace.metainfo.xml
    sources:
      - type: file
        path: src-tauri/target/release/nettrace-desktop_app
        dest-filename: nettrace-desktop_app
      - type: file
        path: src-tauri/icons/128x128.png
        dest-filename: icon.png
      - type: file
        url: https://raw.githubusercontent.com/CodeForgeX-Studio/nettrace-desktop_app/main/cloud.nettrace.NetTrace.desktop
        sha256: 20f8577862a8b3c552481f321945160948958c82e28410f500867c5c09156f7c
      - type: file
        url: https://raw.githubusercontent.com/CodeForgeX-Studio/nettrace-desktop_app/main/cloud.nettrace.NetTrace.metainfo.xml
        sha256: a3da586dfe02e430d8ff80468aeeabaea77cc489ee40d35451e82a269bd920a1