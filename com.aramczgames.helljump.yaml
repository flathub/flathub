id: com.aramczgames.helljump
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: HellJump.x86_64
finish-args:
  - --device=dri
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  - --socket=pulseaudio
modules:
  - name: helljump
    buildsystem: simple
    build-commands:
      - install -D HellJump.x86_64 /app/bin/HellJump.x86_64
      - install -D HellJump.pck /app/bin/HellJump.pck
      - install -Dm644 com.aramczgames.helljump.desktop /app/share/applications/com.aramczgames.helljump.desktop
      - install -D com.aramczgames.helljump.png /app/share/icons/hicolor/256x256/apps/com.aramczgames.helljump.png
      - install -Dm644 com.aramczgames.helljump.metainfo.xml /app/share/metainfo/com.aramczgames.helljump.metainfo.xml
