id: com.aramczgames.helljump
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk
command: HellJump.x86_64
finish-args:
  - --device=dri
  - --socket=x11
  - --socket=wayland
  - --share=ipc
  - --socket=pulseaudio
modules:
  - name: helljump
    buildsystem: simple
    build-commands:
      - install -D HellJump.x86_64 /app/bin/HellJump.x86_64
      - install -D HellJump.pck /app/bin/HellJump.pck
      - install -Dm644 com.aramczgames.helljump.desktop /app/share/applications/com.aramczgames.helljump.desktop
      - install -D "Hell Jump Icon.png" /app/share/icons/hicolor/256x256/apps/com.aramczgames.helljump.png
      - install -Dm644 com.aramczgames.helljump.metainfo.xml /app/share/metainfo/com.aramczgames.helljump.metainfo.xml
    sources:
      - type: file
        url: https://github.com/AramCZGames/com.aramczgames.helljump/releases/download/0.1/HellJump.x86_64
        sha256: 26e471e14cb8315b7e3546e33ebbc3da80bc203806b3584c381dd5388353c657
      - type: file
        url: https://github.com/AramCZGames/com.aramczgames.helljump/releases/download/0.1/HellJump.pck
