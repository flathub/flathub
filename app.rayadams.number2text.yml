app-id: app.rayadams.number2text
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: number2text

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/number2text/cargo

modules:
  - name: number2text
    buildsystem: simple
    build-commands:
      # Build in release mode
      - cargo build --release --frozen --offline
      # binary
      - install -D -m 0755 target/release/number2text ${FLATPAK_DEST}/bin/number2text
      # desktop entry
      - install -D -m 0644 packaging/flatpak/app.rayadams.number2text.desktop
          ${FLATPAK_DEST}/share/applications/app.rayadams.number2text.desktop
      # icon
      - install -D -m 0644 packaging/gui/app.rayadams.number2text.png
          ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/app.rayadams.number2text.png
      # metainfo
      - install -D -m 0644 packaging/app.rayadams.number2text.metainfo.xml
          ${FLATPAK_DEST}/share/metainfo/app.rayadams.number2text.metainfo.xml
      # license
      - install -D -m 0644 LICENSE
          ${FLATPAK_DEST}/share/licenses/app.rayadams.number2text/LICENSE

    sources:
      # Source
      - type: archive
        url: https://github.com/XRayAdams/number2text-rs/archive/refs/tags/v2.2.2+32/number2text-rs-2.2.2+32.tar.gz
        sha256: fe61e0914c323ed5672620cd270bb8fc0634f90873a5b2776601d051f4c20f7e
        dest-filename: number2text-rs-2.2.2+32.tar.gz
        strip-components: 1

      # Cargo dependencies
      - cargo-sources.json

      # offline vendored sources
      - type: inline
        contents: |
          [source.crates-io]
          replace-with = "vendored-sources"

          [source.vendored-sources]
          directory = "cargo/vendor"
        dest: .cargo
        dest-filename: config.toml
