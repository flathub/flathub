app-id: org.zdoom.UZDoom
runtime: org.freedesktop.Platform
sdk: org.freedesktop.Sdk
runtime-version: '25.08'
command: uzdoom

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # 3D hardware acceleration
  - --device=dri
  # Audio
  - --socket=pulseaudio
  # Controller support - change to device=input once Flatpak 1.14 is EOL.
  # https://discourse.flathub.org/t/support-for-device-input/6645
  - --device=all
  # Allow network for multiplayer gameplay
  - --share=network

cleanup:
  - "*.a"
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/doc
  - /share/man

modules:
  - shared-modules/linux-audio/libinstpatch.json
  - shared-modules/linux-audio/fluidsynth2.json

  - name: libsndfile
    buildsystem: cmake-ninja
    cleanup:
      - /bin/sndfile*
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - -DBUILD_TESTING=OFF
      - -DENABLE_CPACK=OFF
      - -DBUILD_SHARED_LIBS=ON
    sources:
      - type: archive
        url: https://github.com/libsndfile/libsndfile/releases/download/1.2.2/libsndfile-1.2.2.tar.xz
        sha256: 3799ca9924d3125038880367bf1468e53a1b7e3686a934f098b7e1d286cdb80e
        x-checker-data:
          type: anitya
          project-id: 13277
          stable-only: true
          url-template: https://github.com/libsndfile/libsndfile/releases/download/$version/libsndfile-$version.tar.xz

  - name: game-music-emu
    buildsystem: cmake-ninja
    config-opts:
    - -DCMAKE_BUILD_TYPE=Release
    sources:
    - type: archive
      url: https://github.com/libgme/game-music-emu/archive/refs/tags/0.6.4.tar.gz
      sha256: f2360feb5a32ace226c583df4faf6eff74145c81264aaea11e17a1af2f6f101a
      x-checker-data:
        type: anitya
        project-id: 866
        stable-only: true
        url-template: https://github.com/libgme/game-music-emu/archive/refs/tags/$version.tar.gz

  - name: zmusic
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: archive
        url: https://github.com/UZDoom/ZMusic/archive/1.3.0.tar.gz
        sha256: 2eccd41e1cc9b38b3729ab94d65635719b2adc916de4ca9f8399ebceaee89f7f
        x-checker-data:
          type: anitya
          project-id: 153600
          stable-only: true
          url-template: https://github.com/zdoom/ZMusic/archive/$version.tar.gz

  - name: uzdoom
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_CXX_FLAGS=-DSHARE_DIR=\"/app/share\"
    sources:
      - type: git
        url: https://github.com/UZDoom/UZDoom
        tag: 4.14.3
        commit: 1cb7598afadbe7ffe753b2eaf1b887e58e988036
        x-checker-data:
          type: json
          url: https://api.github.com/repos/UZDoom/UZDoom/releases/latest
          tag-query: .tag_name
      # TODO: Use a post-release updated metainfo.xml for now; remove this with next UZDoom release
      - type: file
        url: https://raw.githubusercontent.com/UZDoom/UZDoom/fd94960bda5d53bb4a16d7f445d4d32964fc12e7/src/posix/freedesktop/org.zdoom.UZDoom.metainfo.xml
        dest: src/posix/freedesktop/
        sha256: 691e937217407c0a630f85df6f6537fc3c295cbbbb4b4c52eeb971035df23745
