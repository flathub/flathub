app-id: com.github.phase1geo.annotator
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
base: io.elementary.BaseApp
base-version: 'circe-25.08'
command: com.github.phase1geo.annotator
finish-args:
  - '--share=ipc'
  - '--socket=fallback-x11'
  - '--socket=wayland'
  - '--device=dri'
modules:
  - name: minder
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/phase1geo/Annotator.git
        tag: 2.0.1
        commit: 6f180704244bf637181788fa5b4442508480c2c5
        x-checker-data:
          type: json
          url: https://api.github.com/repos/phase1geo/Annotator/releases/latest
          tag-query: .tag_name
          version-query: .tag_name
          timestamp-query: .published_at

