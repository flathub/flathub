app-id: io.github.hihebark.GnomeQuran
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: gnome-quran

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

modules:
  - name: gnome-quran
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/hihebark/gnome-quran.git
        tag: v0.1.0
