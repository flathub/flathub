app-id: io.github.FlameGet
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: start-flameget
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --share=network
  - --filesystem=xdg-download
  - --socket=session-bus
  - --socket=system-bus
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=com.canonical.AppMenu.Registrar
  - --own-name=io.github.FlameGet
  - --own-name=io.github.FlameGet.Downloader
modules:
  - name: aria2
    buildsystem: autotools
    config-opts:
      - --disable-libaria2
    sources:
      - type: archive
        url: https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0.tar.xz
        sha256: 60a420ad7085eb616cb6e2bdf0a7206d68ff3d37fb5a956dc44242eb2f79b66b
        
  - name: flameget
    buildsystem: simple

    build-options:
      build-args:
        - --share=network

    build-commands:
        - rm -f binaries/tray.bin
        - python3 -m venv build-venv
        - ./build-venv/bin/pip install pyinstaller PyQt5
        - ./build-venv/bin/pyinstaller tray.spec --distpath tray_dist
        - cp tray_dist/tray binaries/tray.bin
        - chmod u+x binaries/tray.bin

        - python3 build.py
        - cd dist && ./build-x86_64.AppImage --appimage-extract
        - mv dist/squashfs-root /app/flameget

        - md5sum /app/flameget/AppRun > /app/flameget/build-version

        - echo '#!/bin/sh' > start-flameget
        - echo 'WRITABLE_DIR="$XDG_DATA_HOME/flameget_runtime"' >> start-flameget

        - echo 'if [ ! -f "$WRITABLE_DIR/build-version" ] || ! cmp -s /app/flameget/build-version "$WRITABLE_DIR/build-version"; then' >> start-flameget
        - echo '  rm -rf "$WRITABLE_DIR"' >> start-flameget
        - echo '  cp -r /app/flameget "$WRITABLE_DIR"' >> start-flameget

        - echo '  chmod -R u+w "$WRITABLE_DIR"' >> start-flameget

        - echo '  find "$WRITABLE_DIR" -name "*.bin" -exec chmod u+x {} +' >> start-flameget
        - echo '  find "$WRITABLE_DIR" -name "*.exe" -exec chmod u+x {} +' >> start-flameget
        - echo '  chmod u+x "$WRITABLE_DIR/AppRun"' >> start-flameget
        - echo 'fi' >> start-flameget

        - echo 'exec "$WRITABLE_DIR/AppRun" "$@"' >> start-flameget
        - install -D -m 755 start-flameget /app/bin/start-flameget

        - sed -i 's/^Exec=.*/Exec=start-flameget/' flameget.desktop
        
        - sed -i '/^Icon=/d' flameget.desktop
        - sed -i '/^\[Desktop Entry\]/a Icon=io.github.FlameGet' flameget.desktop

        - sed -i '/^Categories=/d' flameget.desktop
        - sed -i '/^\[Desktop Entry\]/a Categories=Network;FileTransfer;' flameget.desktop

        - sed -i '/^StartupWMClass=/d' flameget.desktop
        - sed -i '/^\[Desktop Entry\]/a StartupWMClass=io.github.FlameGet' flameget.desktop

        - install -Dm644 flameget.desktop /app/share/applications/io.github.FlameGet.desktop
        - install -Dm644 flameget.svg /app/share/icons/hicolor/scalable/apps/io.github.FlameGet.svg
        - install -Dm644 io.github.FlameGet.metainfo.xml /app/share/metainfo/io.github.FlameGet.metainfo.xml

        - cp flameget.desktop downloader.desktop
        
        - sed -i 's/^Name=.*/Name=FlameGet Downloader/' downloader.desktop
        
        - sed -i '/^Icon=/d' downloader.desktop
        - sed -i '/^\[Desktop Entry\]/a Icon=io.github.FlameGet.Downloader' downloader.desktop

        - install -Dm644 downloader.desktop /app/share/applications/io.github.FlameGet.Downloader.desktop
        - install -Dm644 flameget.svg /app/share/icons/hicolor/scalable/apps/io.github.FlameGet.Downloader.svg

    sources:
      - type: git
        branch: main
        url: https://github.com/C-Yassin/FlameGet.git

      - type: file
        path: io.github.FlameGet.metainfo.xml