app-id: io.github.dp0sk.Crosspipe
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: crosspipe
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=xdg-run/pipewire-0
modules:
  - name: libgee
    buildsystem: autotools
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/libgee.git
        tag: 0.20.6
        commit: 7d332f82c750ba72a6c625f38e4bfd44b786a926

  - name: crosspipe
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/dp0sk/Crosspipe.git
        commit: 5605921762e3c3a9a0d9d55e40375b1490b2b944
