app-id: com.pangoterm.PangoTerm
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: PangoTerm

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --socket=ssh-agent
  - --filesystem=home

modules:
  - name: pangoterm
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra ${FLATPAK_DEST}/bin/apply_extra
      - install -Dm644 com.pangoterm.PangoTerm.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.pangoterm.PangoTerm.metainfo.xml
      - install -Dm644 com.pangoterm.PangoTerm.desktop ${FLATPAK_DEST}/share/applications/com.pangoterm.PangoTerm.desktop
      - install -Dm644 com.pangoterm.PangoTerm.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/com.pangoterm.PangoTerm.png
    sources:
      - type: extra-data
        filename: pangoterm.deb
        only-arches:
          - x86_64
        url: https://github.com/fpaitoo/pangoterm-releases/releases/download/v1.0.4/PangoTerm_1.0.4_amd64.deb
        sha256: 1f31fafb34206291bd76d97b8b3ad43ba0fc266e9772281fbc6d317a12be2139
        size: 11245334
      - type: file
        path: com.pangoterm.PangoTerm.metainfo.xml
      - type: file
        path: com.pangoterm.PangoTerm.desktop
      - type: file
        path: com.pangoterm.PangoTerm.png
      - type: script
        dest-filename: apply_extra
        commands:
          - bsdtar --to-stdout -xf pangoterm.deb 'data.tar*' | bsdtar -xf -
          - mv usr/bin/PangoTerm .
          - mv usr/share/icons . 2>/dev/null || true
          - rm -rf usr pangoterm.deb
          - ln -sf /app/extra/PangoTerm /app/bin/PangoTerm
