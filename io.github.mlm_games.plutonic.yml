id: io.github.mlm_games.plutonic
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.godotengine.godot.BaseApp
base-version: "4.6"
command: plutonic
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --socket=pulseaudio

modules:
  - name: plutonic
    buildsystem: simple
    sources:
      - type: archive
        url: https://github.com/mlm-games/plutonic/releases/download/1.0.2/web.zip
        sha256: a7e0e876a0d0788eb12f4d0c2da1e0aa20cafbc18e2eabfe8eef707a5c67f6c5
        dest: web
        x-checker-data:
          type: json
          url: https://api.github.com/repos/mlm-games/plutonic/releases/latest
          is-main-source: true
          version-query: .tag_name
          url-query: |
            .assets[]
            | select(.name | endswith("web.zip"))
            | .browser_download_url

      - type: git
        url: https://github.com/mlm-games/plutonic.git
        tag: 1.0.2
        commit: 7e54ad783a2740f0b7aadd773c58c066aa5e2163
        x-checker-data:
          type: git
          tag-pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"

    build-commands:
      - install -Dm644 web/index.pck /app/bin/godot-runner.pck

      - ln -s godot-runner ${FLATPAK_DEST}/bin/plutonic
      
      - install -Dm644 icon.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm644 others/flathub/${FLATPAK_ID}.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 others/flathub/${FLATPAK_ID}.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
