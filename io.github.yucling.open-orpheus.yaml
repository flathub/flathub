app-id: io.github.yucling.open-orpheus
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
  - org.freedesktop.Sdk.Extension.rust-stable
command: electron-wrapper
separate-locales: false
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --talk-name=org.kde.StatusNotifierWatcher
modules:
  - name: io.github.yucling.open-orpheus
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node24/bin:/usr/lib/sdk/rust-stable/bin:/run/build/io.github.yucling.open-orpheus/.npm-prefix/bin
      env:
        XDG_CACHE_HOME: /run/build/io.github.yucling.open-orpheus/flatpak-node/cache
        ELECTRON_OFFLINE_BUILD: "1"
    build-commands:
      - mkdir -p .cargo
      - cp cargo/config .cargo/config
      - npm install -g --prefix $FLATPAK_BUILDER_BUILDDIR/.npm-prefix
        ./pnpm-10.33.0.tgz
      - pnpm install --offline --frozen-lockfile --store-dir
        $FLATPAK_BUILDER_BUILDDIR/flatpak-node/pnpm-store
      - pnpm run build:modules
      - node --experimental-strip-types scripts/install-flatpak-scaffolding.mts
      - pnpm run package
      - install -d /app/lib/io.github.yucling.open-orpheus
      - cp -r out/open-orpheus-linux-*/. /app/lib/io.github.yucling.open-orpheus/
      - install -d /app/bin
      - ln -sf /app/lib/io.github.yucling.open-orpheus/open-orpheus
        /app/bin/open-orpheus
      - install -Dm644 packaging/flatpak/metainfo.xml
        /app/share/metainfo/io.github.yucling.open-orpheus.metainfo.xml
    sources:
      - generated-node-sources.json
      - type: file
        url: https://registry.npmjs.org/pnpm/-/pnpm-10.33.0.tgz
        sha512: 10568bb4a6afb58c9eb3630da90cc9516417abebd3fabbe6739f0ae795728da1491e9db5a544c76ad8eb7570f5c4bb3d6c637b2cb41bfdcdb47fa823c8649319
        dest-filename: pnpm-10.33.0.tgz
      - generated-cargo-sources.json
      - type: archive
        url: https://github.com/YUCLing/open-orpheus/archive/refs/tags/v0.5.4.tar.gz
        sha256: c76662d1d90868c6c83f3e0cbda0f7775f2b1305853ee5feb5b55f8c45784f52
        strip-components: 1
