id: app.fluxer.Fluxer
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: app.fluxer.Fluxer
finish-args:
  - '--share=ipc'
  - '--socket=wayland'
  - '--socket=x11'
  - '--socket=pulseaudio'
  - '--share=network'
  - '--device=all'
  - '--filesystem=xdg-run/pipewire-0:ro'
  - '--filesystem=xdg-run/speech-dispatcher'
  - '--env=ELECTRON_OZONE_PLATFORM_HINT=auto'
  - '--env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons'

modules:
  - name: fluxer
    sources:
      - type: archive
        only-arches: [x86_64]
        url: https://api.fluxer.app/dl/desktop/stable/linux/x64/fluxer-stable-0.0.8-x64.tar.gz
        sha256: acf6398fa6810720fed85b06c011b324e7db4fec6bf2fc7ad93c2446c3600f2d
        dest: fluxer
      # arm64 version is broken upstream
      #- type: archive
      #  only-arches: [aarch64]
      #  url: https://api.fluxer.app/dl/desktop/stable/linux/arm64/fluxer-stable-0.0.8-arm64.tar.gz
      #  sha256: acf6398fa6810720fed85b06c011b324e7db4fec6bf2fc7ad93c2446c3600f2d
      #  dest: fluxer
      - type: file
        path: app.fluxer.Fluxer.svg
      - type: file
        path: app.fluxer.Fluxer.desktop
      - type: file
        path: app.fluxer.Fluxer.metainfo.xml
    buildsystem: simple
    build-commands:
      - cp -r fluxer /app/fluxer
      # Inject the correct Flatpak App ID directly into the Electron archive:
      - patch-desktop-filename /app/fluxer/resources/app.asar
      - echo '#!/bin/sh' > /app/bin/${FLATPAK_ID}
      # Point the wrapper back to the original executable name:
      - echo 'exec zypak-wrapper /app/fluxer/fluxer "$@"' >> /app/bin/${FLATPAK_ID}
      - chmod +x /app/bin/${FLATPAK_ID}
      - install -Dm644 ${FLATPAK_ID}.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 ${FLATPAK_ID}.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
