id: app.fluxer.Fluxer
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: fluxer
finish-args:
  - '--share=ipc'
  - '--socket=wayland'
  - '--socket=x11'
  - '--socket=pulseaudio'
  - '--socket=session-bus'
  - '--share=network'
  - '--device=all'
  - '--filesystem=xdg-documents:ro'
  - '--filesystem=xdg-pictures:ro'
  - '--filesystem=xdg-videos:ro'
  - '--filesystem=xdg-run/pipewire-0'
  - '--filesystem=xdg-run/speech-dispatcher'
  - '--env=ELECTRON_OZONE_PLATFORM_HINT=auto'
  - '--env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons'

modules:
  - name: fluxer
    sources:
      - type: archive
        only-arches: [x86_64]
        url: https://api.fluxer.app/dl/desktop/stable/linux/x64/fluxer-stable-0.0.8-x64.tar.gz
        sha256: acf6398fa6810720fed85b06c011b324e7db4fec6bf2fc7ad93c2446c3600f2d
        dest: fluxer
      # arm64 linux doesnt work in general right now
      #- type: archive
      #  only-arches: [aarch64]
      #  url: https://api.fluxer.app/dl/desktop/stable/linux/arm64/fluxer-stable-0.0.8-arm64.tar.gz
      #  sha256: acf6398fa6810720fed85b06c011b324e7db4fec6bf2fc7ad93c2446c3600f2d
      #  dest: fluxer
      - type: file
        path: app.fluxer.Fluxer.svg
      - type: file
        path: app.fluxer.Fluxer.desktop
      - type: file
        path: app.fluxer.Fluxer.metainfo.xml
    buildsystem: simple
    build-commands:
      - cp -r fluxer /app/fluxer
      - ln -s /app/fluxer/fluxer /app/bin/fluxer
      - install -D ${FLATPAK_ID}.desktop -t /app/share/applications/
      - install -Dm644 $FLATPAK_ID.metainfo.xml -t /app/share/metainfo/
      - install -D ${FLATPAK_ID}.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
