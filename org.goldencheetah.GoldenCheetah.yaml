app-id: org.goldencheetah.GoldenCheetah
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: io.qt.qtwebengine.BaseApp
base-version: '6.10'
command: GoldenCheetah

finish-args:
  # Display
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

  # Network for cloud services (Strava, Withings, etc.)
  - --share=network

  # USB devices for ANT+/Bluetooth trainers and power meters
  - --device=all

  # Audio for trainer sounds
  - --socket=pulseaudio

  # User data access for activity files and athlete profiles
  # GoldenCheetah stores athlete data in ~/Documents or custom locations
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --filesystem=/media:ro
  - --filesystem=/run/media:ro

  # App config and data directory
  - --persist=.goldencheetah

  # Qt WebEngine
  - --env=QTWEBENGINEPROCESS_PATH=/app/bin/QtWebEngineProcess

  # DBus for desktop integration
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/man
  - '*.a'
  - '*.la'

cleanup-commands:
  - /app/cleanup-BaseApp.sh

build-options:
  env:
    QMAKEPATH: /app
  arch:
    aarch64:
      prepend-pkg-config-path: /app/lib/aarch64-linux-gnu/pkgconfig
    x86_64:
      prepend-pkg-config-path: /app/lib/x86_64-linux-gnu/pkgconfig

modules:
  # GNU Scientific Library - mandatory dependency
  - name: gsl
    buildsystem: autotools
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/gsl/gsl-2.8.tar.gz
        sha256: 6a99eeed15632c6354895b1dd542ed5a855c0f15d9ad1326c6fe2b2c9e423190
        x-checker-data:
          type: anitya
          project-id: 1267
          stable-only: true
          url-template: https://ftp.gnu.org/gnu/gsl/gsl-$version.tar.gz

  # Python 3.7 - matches AppImage, compatible with SIP 4.x
  - name: python3.7
    buildsystem: autotools
    build-options:
      no-debuginfo: true
    config-opts:
      - --enable-shared
      - --with-ensurepip=yes
      - --with-system-expat
      - --with-system-ffi
      - --enable-loadable-sqlite-extensions
    post-install:
      - chmod 644 /app/lib/libpython3.7m.so.1.0
    cleanup:
      - /bin/2to3*
      - /bin/idle*
      - /bin/pydoc*
      - /bin/python3-config
      - /bin/python3.7-config
      - /bin/python3.7m-config
      - /lib/python3.7/test
      - /lib/python3.7/*/test
      - /lib/python3.7/*/tests
      - /lib/python3.7/idlelib
      - /lib/python3.7/tkinter
      - /lib/python3.7/lib2to3
    sources:
      - type: archive
        url: https://www.python.org/ftp/python/3.7.17/Python-3.7.17.tar.xz
        sha256: 7911051ed0422fd54b8f59ffc030f7cf2ae30e0f61bda191800bb040dce4f9d2

  # SIP 4.19.8 - Python bindings generator (matches AppImage)
  - name: sip
    buildsystem: simple
    build-commands:
      - /app/bin/python3.7 configure.py --sip-module=sip --incdir=/app/include/python3.7m
      - make -j$FLATPAK_BUILDER_N_JOBS
      - make install
    sources:
      - type: archive
        url: https://sourceforge.net/projects/pyqt/files/sip/sip-4.19.8/sip-4.19.8.tar.gz
        sha256: 7eaf7a2ea7d4d38a56dd6d2506574464bddf7cf284c960801679942377c297bc

  # Python packages for GoldenCheetah scripting
  # Packages verified from src/Python/requirements.txt with all dependencies
  - name: python-packages
    buildsystem: simple
    build-commands:
      # Install future from source first (required by uncertainties, no wheel available)
      - /app/bin/pip3.7 install --no-build-isolation --no-index --prefix=/app future-0.18.3.tar.gz
      # Install all wheels
      - /app/bin/pip3.7 install --no-index --find-links="file://${PWD}" --prefix=/app
        numpy pandas scipy lmfit plotly importlib_metadata
    sources:
      # future 0.18.3 (source - required by uncertainties)
      - type: file
        url: https://files.pythonhosted.org/packages/8f/2e/cf6accf7415237d6faeeebdc7832023c90e0282aa16fd3263db0eb4715ec/future-0.18.3.tar.gz
        sha256: 34a17436ed1e96697a86f9de3d15a3b0be01d8bc8de9c1dffd59fb8234ed5307
