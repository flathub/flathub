app-id: org.goldencheetah.GoldenCheetah
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: io.qt.qtwebengine.BaseApp
base-version: '6.10'
command: GoldenCheetah

finish-args:
  # Display
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11

  # Network for cloud services (Strava, Withings, etc.)
  - --share=network

  # USB/DRI devices for ANT+/Bluetooth trainers, power meters, and GPU rendering
  - --device=all

  # Audio for trainer sounds
  - --socket=pulseaudio

  # User data access for activity files and athlete profiles
  # GoldenCheetah stores athlete data in ~/Documents or custom locations
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --filesystem=/media:ro
  - --filesystem=/run/media:ro

  # App config and data directory
  - --persist=.goldencheetah

  # Qt WebEngine
  - --env=QTWEBENGINEPROCESS_PATH=/app/bin/QtWebEngineProcess

  # R home directory for R integration
  - --env=R_HOME=/app/lib64/R
  - --env=LD_LIBRARY_PATH=/app/lib64/R/lib

  # Python packages location
  - --env=PYTHONPATH=/app/lib/python3.13/site-packages

  # DBus for desktop integration
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/man
  - '*.a'
  - '*.la'

cleanup-commands:
  - /app/cleanup-BaseApp.sh

build-options:
  env:
    QMAKEPATH: /app
  arch:
    aarch64:
      prepend-pkg-config-path: /app/lib/aarch64-linux-gnu/pkgconfig
    x86_64:
      prepend-pkg-config-path: /app/lib/x86_64-linux-gnu/pkgconfig

modules:
  # SRMIO - SRM power meter file support
  - name: srmio
    buildsystem: autotools
    config-opts:
      - --disable-shared
      - --enable-static
    sources:
      - type: git
        url: https://github.com/rclasen/srmio.git
        commit: b444b8747317c41607d468ae71a0ecd36a94332e
      - type: script
        dest-filename: autogen.sh
        commands:
          - sh genautomake.sh

  # GNU Scientific Library - mandatory dependency
  - name: gsl
    buildsystem: autotools
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/gsl/gsl-2.8.tar.gz
        sha256: 6a99eeed15632c6354895b1dd542ed5a855c0f15d9ad1326c6fe2b2c9e423190
        x-checker-data:
          type: anitya
          project-id: 1267
          stable-only: true
          url-template: https://ftp.gnu.org/gnu/gsl/gsl-$version.tar.gz

  # R - statistical computing language
  - name: r
    buildsystem: autotools
    config-opts:
      - --enable-R-shlib
      - --with-x=no
      - --with-tcltk=no
      - --with-aqua=no
      - --disable-java
    cleanup:
      - /lib/R/library/*/help
      - /lib/R/library/*/doc
      - /lib/R/library/*/html
      - /lib/R/doc
      - /lib/R/tests
      - /share/man
    sources:
      - type: archive
        url: https://cran.r-project.org/src/base/R-4/R-4.5.2.tar.gz
        sha256: 0d71ff7106ec69cd7c67e1e95ed1a3cee355880931f2eb78c530014a9e379f20

  # R packages for C++ embedding (required for GoldenCheetah R integration)
  - name: r-packages
    buildsystem: simple
    build-commands:
      - R CMD INSTALL Rcpp_1.1.1.tar.gz
      - R CMD INSTALL RInside_0.2.19.tar.gz
    sources:
      - type: file
        url: https://cran.r-project.org/src/contrib/Rcpp_1.1.1.tar.gz
        sha256: da0c616a71c82150397259516b2ea7558dbd31a5b4a217423ec9666b3a0fcfb7
      - type: file
        url: https://cran.r-project.org/src/contrib/RInside_0.2.19.tar.gz
        sha256: 0703843a3f1460c571650138e5846d96552d6541766c7df72c609cd3aaca1f24

  # OpenBLAS - required for scipy source build
  - name: openblas
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBUILD_TESTING:BOOL=OFF
      - -DDYNAMIC_ARCH:BOOL=ON
    sources:
      - type: archive
        url: https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.30/OpenBLAS-0.3.30.tar.gz
        sha256: 27342cff518646afb4c2b976d809102e368957974c250a25ccc965e53063c95d
        x-checker-data:
          type: anitya
          project-id: 2540
          stable-only: true
          url-template: https://github.com/OpenMathLib/OpenBLAS/releases/download/v$version/OpenBLAS-$version.tar.gz

  # Python packages - generated by flatpak-pip-generator from requirements-flatpak.txt
  - python3-packages.yaml

  # GoldenCheetah
  # TODO: Switch to master branch once PR #4747 is merged
  # PR #4747: https://github.com/GoldenCheetah/GoldenCheetah/pull/4747
  - name: goldencheetah
    buildsystem: simple
    build-options:
      env:
        QMAKEPATH: /app
        QTWEBENGINE_DISABLE_SANDBOX: '1'
    build-commands:
      # Copy gcconfig.pri
      - cp gcconfig.pri src/gcconfig.pri
      # Use default qwt config
      - cp qwt/qwtconfig.pri.in qwt/qwtconfig.pri
      # Build qwt first
      - cd qwt && qmake qwt.pro && make -j$FLATPAK_BUILDER_N_JOBS
      # Build main application
      - cd src && qmake src.pro && make -j$FLATPAK_BUILDER_N_JOBS
      # Install
      - install -Dm755 src/GoldenCheetah /app/bin/GoldenCheetah
      - install -Dm644 org.goldencheetah.GoldenCheetah.desktop /app/share/applications/org.goldencheetah.GoldenCheetah.desktop
      - install -Dm644 org.goldencheetah.GoldenCheetah.metainfo.xml /app/share/metainfo/org.goldencheetah.GoldenCheetah.metainfo.xml
      - install -Dm644 src/Resources/images-src/gc.svg /app/share/icons/hicolor/scalable/apps/org.goldencheetah.GoldenCheetah.svg
    sources:
      - type: git
        url: https://github.com/GoldenCheetah/GoldenCheetah.git
        # PR #4747: Python/SIP upgrade - switch to tag/master after merge
        commit: e4a419dc5334a7f56e97f8c9efad8e61344e84d3
      # Fix for Python version not showing in About dialog (PR #4747 bug)
      # TODO: Remove this patch once fix is merged upstream
      - type: patch
        path: fix-python-about-dialog.patch
      - type: file
        path: org.goldencheetah.GoldenCheetah.desktop
      - type: file
        path: org.goldencheetah.GoldenCheetah.metainfo.xml
      - type: file
        path: gcconfig.pri
