id: com.fanuriotimetracking.fanurio
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk11
command: fanurio
finish-args:
  - --env=PATH=/usr/lib/sdk/openjdk11/jvm/openjdk-11/bin:/app/bin:/usr/bin
  - --socket=x11
  - --share=ipc
  - --share=network
  - --persist=.fanurio
  - --filesystem=xdg-desktop
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --device=dri
modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk11/install.sh
  - name: fanurio
    buildsystem: simple
    build-commands:
      - |
        mkdir -p /app/fanurio
        cp -a . /app/fanurio
        install -Dm755 fanurio.sh /app/bin/fanurio
        install -Dm644 share/com.fanuriotimetracking.fanurio.svg /app/share/icons/hicolor/scalable/apps/com.fanuriotimetracking.fanurio.svg
        install -Dm644 share/com.fanuriotimetracking.fanurio.metainfo.xml /app/share/metainfo/com.fanuriotimetracking.fanurio.metainfo.xml
        install -Dm644 share/com.fanuriotimetracking.fanurio.desktop /app/share/applications/com.fanuriotimetracking.fanurio.desktop
    sources:
      - type: archive
        url: https://www.fanuriotimetracking.com/files/releases/3.4/fanurio-3.4-flathub.tar.gz
        sha256: c63165805c4ef34939744947927f844abe3a6ae41f16c8fec2b5b9d511c2e1c3
      - type: script
        dest-filename: fanurio.sh
        commands:
          - 'cd /app/fanurio || exit 1'
          - 'exec /app/jre/bin/java -cp /app/fanurio/lib/fanurio.jar com.fanurio.Launcher "$@"'