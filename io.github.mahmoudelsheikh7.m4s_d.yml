app-id: io.github.mahmoudelsheikh7.m4s_d
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: m4s_d
finish-args:
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-music
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: m4s_d
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/mahmoudelsheikh7/M4S_D.git
        branch: main

    post-install:
      - mv /app/share/applications/m4s_d.desktop /app/share/applications/io.github.mahmoudelsheikh7.m4s_d.desktop
