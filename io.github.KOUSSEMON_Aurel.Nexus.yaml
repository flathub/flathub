app-id: io.github.KOUSSEMON_Aurel.Nexus
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: nexus

sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
  - org.freedesktop.Sdk.Extension.node20
  - org.freedesktop.Sdk.Extension.rust-stable

build-options:
  append-path: /usr/lib/sdk/golang/bin:/usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
  env:
    - GOROOT: /usr/lib/sdk/golang
    - NPM_CONFIG_OFFLINE: 'true'

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=dri
  - --share=ipc
  - --filesystem=xdg-documents:rw
  - --filesystem=xdg-download:rw

modules:
  - name: sdk-extensions
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/golang/install.sh
      - /usr/lib/sdk/node20/install.sh
      - /usr/lib/sdk/rust-stable/install.sh

  - name: nexus-daemon
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/KOUSSEMON-Aurel/Nexus-Storage.git
        tag: app-v7.2.0
        commit: f2e1fd7790b05b820a40d51025ceae201777265a
    build-commands:
      - cd nexus-daemon && go build -o /app/bin/nexus-daemon .

  - name: nexus-frontend
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/KOUSSEMON-Aurel/Nexus-Storage.git
        tag: app-v7.2.0
        commit: f2e1fd7790b05b820a40d51025ceae201777265a
    build-commands:
      - cd nexus-gui && npm run build
      - mkdir -p /app/share/nexus-frontend
      - cp -r nexus-gui/dist/* /app/share/nexus-frontend/

  - name: nexus-app
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/KOUSSEMON-Aurel/Nexus-Storage.git
        tag: app-v7.2.0
        commit: f2e1fd7790b05b820a40d51025ceae201777265a
    build-commands:
      - cd nexus-gui/src-tauri && cargo build --release
      - install -Dm755 nexus-gui/src-tauri/target/release/nexus /app/bin/nexus
      - install -Dm644 packaging/linux/io.github.KOUSSEMON_Aurel.Nexus.desktop /app/share/applications/io.github.KOUSSEMON_Aurel.Nexus.desktop
      - install -Dm644 packaging/linux/io.github.KOUSSEMON_Aurel.Nexus.metainfo.xml /app/share/metainfo/io.github.KOUSSEMON_Aurel.Nexus.metainfo.xml
      - install -Dm644 packaging/linux/io.github.KOUSSEMON_Aurel.Nexus.png /app/share/icons/hicolor/512x512/apps/io.github.KOUSSEMON_Aurel.Nexus.png
