app-id: io.scottlabs.reManager
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
  - org.freedesktop.Sdk.Extension.node20
command: reManager

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=~/.ssh:ro
  - --talk-name=org.freedesktop.secrets
  - --env=GTK_USE_PORTAL=1

build-options:
  append-path: /usr/lib/sdk/golang/bin:/usr/lib/sdk/node20/bin:/tmp/go/bin
  env:
    GOPATH: /tmp/go
    GOBIN: /tmp/go/bin
    GOCACHE: /tmp/go-cache
    XDG_CACHE_HOME: /run/build/reManager/flatpak-node/cache
    npm_config_cache: /run/build/reManager/flatpak-node/npm-cache

modules:
  - name: reManager
    buildsystem: simple
    build-commands:
      - |
        mkdir -p vendor && \
        cp flatpak/vendor-modules.txt vendor/modules.txt && \
        npm install --offline --prefix=frontend && \
        go build -o $GOBIN/wails ./vendor/github.com/wailsapp/wails/v2/cmd/wails && \
        $GOBIN/wails build -tags webkit2_41 -m -nosyncgomod -ldflags "-X main.version=$(git describe --tags --always)"
      - install -Dm755 build/bin/reManager /app/bin/reManager
      - install -Dm644 flatpak/io.scottlabs.reManager.desktop /app/share/applications/io.scottlabs.reManager.desktop
      - install -Dm644 flatpak/io.scottlabs.reManager.metainfo.xml /app/share/metainfo/io.scottlabs.reManager.metainfo.xml
      - install -Dm644 assets/icon.svg /app/share/icons/hicolor/scalable/apps/io.scottlabs.reManager.svg
      - install -Dm644 LICENSE /app/share/licenses/io.scottlabs.reManager/LICENSE
    sources:
      - type: git
        url: https://github.com/rmitchellscott/reManager.git
        tag: v1.0.1
        commit: ad73567a4be45fc3f216516d81498289274b3ef8
      - node-sources.json
      - go-sources.yml
