app-id: com.luigi311.fitness-tracker
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk

command: fitness-tracker
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network

  - --allow=bluetooth
  - --system-talk-name=org.bluez

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/python*/site-packages/*/tests
  - /lib/python*/site-packages/*/test
  - /share/man
  - "*.a"
  - "*.la"

modules:
  - builders.json
  - pip-sources.json

  - name: python3-pyftms
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --no-deps --no-build-isolation
        --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/luigi311/python-pyftms
        commit: b72174016b6fc8dc70f2af82da2a8f0014e745f6

  - name: python3-bleaksport
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --no-deps --no-build-isolation
        --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/luigi311/bleaksport
        commit: 7d0aedacb8f116e96ba1748b8afa9f9dc4d5ee5f

  - name: python3-libpebble2
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --no-deps --no-build-isolation
        --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/luigi311/libpebble2
        commit: be74eea06da089b79cd59ceb1ffeb62dbe515de6

  - name: python3-workout-parser
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --no-index --no-deps --no-build-isolation
        --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/luigi311/workout_parser
        commit: 631d57b79e34633d71e2cbfb3b07337a77fa90a8

  - name: fitness-tracker
    buildsystem: simple
    build-commands:
      - install -Dm644 data/fitness-tracker.svg
        /app/share/icons/hicolor/scalable/apps/com.luigi311.fitness-tracker.svg

      - desktop-file-edit data/fitness-tracker.desktop --set-key=Exec
        --set-value=fitness-tracker --set-icon=com.luigi311.fitness-tracker

      - install -Dm644 data/fitness-tracker.desktop
        /app/share/applications/com.luigi311.fitness-tracker.desktop

      - install -Dm644 data/com.luigi311.fitness-tracker.metainfo.xml
        /app/share/appdata/com.luigi311.fitness-tracker.metainfo.xml

      - pip3 install --verbose --no-index --no-deps --no-build-isolation
        --prefix=${FLATPAK_DEST} .
    sources:
      - type: git
        url: https://github.com/luigi311/fitness-tracker.git
        tag: v3.0.1
        commit: 93d95788e121806fa36c33cd56b36dc878157a96
