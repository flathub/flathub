app-id: org.tiwut.NeofetchGui
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: neofetch-gui
modules:
  - name: gperf
    buildsystem: autotools
    sources:
      - type: archive
        url: https://ftp.gnu.org/pub/gnu/gperf/gperf-3.1.tar.gz
        sha256: 588546b945bba4b70b6a3a616e80b4ab466e3f33024a352fc2198112cdbb3ae2

  - name: vte
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -Dgir=false
      - -Dvapi=false
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/vte.git
        tag: 0.78.0

  - name: neofetch
    buildsystem: simple
    build-commands:
      - make install PREFIX=/app
    sources:
      - type: git
        url: https://github.com/dylanaraps/neofetch
        tag: 7.1.0

  - name: neofetch-gui
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/tiwut/Neofetch-Gui.git
        branch: main
finish-args:
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --filesystem=host
