app-id: com.blazinghotcode.CircuitSim
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk21
command: circuitsim
finish-args:
  - --share=ipc
  - --socket=x11
modules:
  - name: circuitsim
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk21/bin/jlink --module-path /usr/lib/sdk/openjdk21/jmods --add-modules java.base,java.desktop,java.net.http --output runtime --strip-debug --no-man-pages --no-header-files --compress=2
      - install -Dm755 circuitsim.sh /app/bin/circuitsim
      - mkdir -p /app/jre
      - cp -a runtime/. /app/jre/
      - install -Dm644 CircuitSim.jar /app/lib/CircuitSim.jar
      - install -Dm644 com.blazinghotcode.CircuitSim.desktop /app/share/applications/com.blazinghotcode.CircuitSim.desktop
      - install -Dm644 com.blazinghotcode.CircuitSim.metainfo.xml /app/share/metainfo/com.blazinghotcode.CircuitSim.metainfo.xml
      - install -Dm644 com.blazinghotcode.CircuitSim.png /app/share/icons/hicolor/256x256/apps/com.blazinghotcode.CircuitSim.png
    sources:
      - type: file
        url: https://github.com/BlazingHotCode/CircuitSim/releases/download/v1.1.8/CircuitSim-1.1.8.jar
        sha256: 51dc5f6915e76916d61ddd1c642370cf1d549a3065ae9e75140495bb07f66215
        dest-filename: CircuitSim.jar
      - type: script
        dest-filename: circuitsim.sh
        commands:
          - exec /app/jre/bin/java -Dfile.encoding=UTF-8 -Djava.awt.headless=false -jar /app/lib/CircuitSim.jar "$@"
      - type: file
        url: https://raw.githubusercontent.com/BlazingHotCode/CircuitSim/v1.1.8/packaging/flatpak/com.blazinghotcode.CircuitSim.desktop
        sha256: 1df4cc8a94047e468b3fc276e8d164c17ff77eaa3c9f3dc3234c2c1da745d1a0
      - type: file
        url: https://raw.githubusercontent.com/BlazingHotCode/CircuitSim/v1.1.8/packaging/flatpak/com.blazinghotcode.CircuitSim.metainfo.xml
        sha256: 5b3c4ab9b934a8e7d98fdce3218807f1247d9ac05ec7611a21607906b8fc8972
      - type: file
        url: https://raw.githubusercontent.com/BlazingHotCode/CircuitSim/v1.1.8/packaging/circuitsim.png
        sha256: cd8494dd535e614994ec215e1fd886169130198349d4c9050267251e7d1f4d12
        dest-filename: com.blazinghotcode.CircuitSim.png
