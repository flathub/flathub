id: xyz.nokarin.FrameExtractor
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: FrameExtractor
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --talk-name=org.freedesktop.portal.Desktop
modules:
  - name: ffmpeg
    buildsystem: autotools
    config-opts:
      - --prefix=/app
      - --bindir=/app/bin/bin
      - --libdir=/app/lib
      - --incdir=/app/include
      - --disable-debug
      - --disable-doc
      - --disable-static
      - --enable-shared
      - --enable-gpl
      - --disable-avdevice
      - --disable-ffprobe
      - --extra-ldflags=-Wl,-rpath=/app/lib
      - --enable-decoder=h264,hevc,vp8,vp9,av1,mpeg4,mpeg2video,mjpeg
      - --enable-demuxer=mp4,matroska,avi,mov,flv,webm
      - --enable-encoder=mjpeg,png
      - --enable-muxer=image2
      - --enable-filter=scale,fps
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-8.1.tar.xz
        sha256: b072aed6871998cce9b36e7774033105ca29e33632be5b6347f3206898e0756a
  - name: yt-dlp
    buildsystem: simple
    build-commands:
      - pip3 install --no-deps --target=/app/bin/yt-dlp-pkg *.whl
      - install -Dm755 yt-dlp-wrapper.py /app/bin/bin/yt-dlp
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/cd/13/5093bcb954878e50f7217fd2ab94282b53934022e4e4a03265582da83bf5/yt_dlp-2026.3.17-py3-none-any.whl
        sha256: 32992db94303a8a5d211a183f2174834fe7f8c29d83ed2e7a324eae97a8f26d8
      - type: file
        path: yt-dlp-wrapper.py
  - name: FrameExtractor
    buildsystem: simple
    build-options:
      arch:
        x86_64:
          env:
            BUNDLE_PATH: build/linux/x64/release/bundle
        aarch64:
          env:
            BUNDLE_PATH: build/linux/arm64/release/bundle
      append-path: /usr/lib/sdk/llvm20/bin:/run/build/FrameExtractor/flutter/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      env:
        PUB_CACHE: /run/build/FrameExtractor/.pub-cache
    build-commands:
      - flutter build linux --release --no-pub

      - install -Dm755 $BUNDLE_PATH/FrameExtractor /app/bin/FrameExtractor

      - cp -r $BUNDLE_PATH/lib/. /app/bin/lib/
      - cp -r $BUNDLE_PATH/data/. /app/bin/data/
      - cp -r /app/lib/libav*.so* /app/bin/lib/
      - cp -r /app/lib/libsw*.so* /app/bin/lib/

      - install -Dm644 linux/xyz.nokarin.FrameExtractor.desktop /app/share/applications/xyz.nokarin.FrameExtractor.desktop
      - install -Dm644 linux/xyz.nokarin.FrameExtractor.metainfo.xml /app/share/metainfo/xyz.nokarin.FrameExtractor.metainfo.xml

      - install -Dm644 assets/icons/icon_64.png /app/share/icons/hicolor/64x64/apps/xyz.nokarin.FrameExtractor.png
      - install -Dm644 assets/icons/icon_128.png /app/share/icons/hicolor/128x128/apps/xyz.nokarin.FrameExtractor.png
      - install -Dm644 assets/icons/icon_256.png /app/share/icons/hicolor/256x256/apps/xyz.nokarin.FrameExtractor.png
      - install -Dm644 assets/icons/icon_512.png /app/share/icons/hicolor/512x512/apps/xyz.nokarin.FrameExtractor.png
    sources:
      - type: git
        url: https://github.com/nokarin-dev/FrameExtractor.git
      - type: git
        url: https://github.com/flutter/flutter.git
        tag: 3.41.4
        dest: flutter
