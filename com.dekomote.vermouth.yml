app-id: com.dekomote.vermouth
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: vermouth

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio

modules:
  - name: vermouth
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/dekomote/vermouth.git
        tag: v1.0.1
