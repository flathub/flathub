app-id: io.github.alinur1.LocalPDF_Studio
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

base: org.electronjs.Electron2.BaseApp
base-version: '25.08'

command: run.sh

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=xdg-documents:rw
  - --filesystem=xdg-download:rw
  - --filesystem=xdg-desktop:rw
  - --filesystem=xdg-pictures:rw
  - --device=dri
  - --share=network

modules:
  - name: ghostscript
    buildsystem: autotools
    config-opts:
      - --disable-cups
      - --disable-gtk
      - --without-x
      - --with-system-libtiff=no
      - --without-libidn
    sources:
      - type: archive
        url: https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10060/ghostscript-10.06.0.tar.gz
        sha256: 5bd6da34794928cc7e616f288e32bd0be7f9a5ca2d3c206a0af2c19a4e3a318f
    build-options:
      no-debuginfo: true
    cleanup:
      - /share/man
      - /share/doc
      - /share/ghostscript/*/doc
      - /share/ghostscript/*/examples

  - name: localpdf-studio
    buildsystem: simple
    build-commands:
      - install -d /app/localpdf-studio
      - cp -rv unpacked/. /app/localpdf-studio/
      - install -d /app/localpdf-studio/resources/assets/backend_linux/compiled-ghostscript/bin
      - install -d /app/localpdf-studio/resources/assets/backend_linux/compiled-ghostscript/share
      - install -m 755 /app/bin/gs
          /app/localpdf-studio/resources/assets/backend_linux/compiled-ghostscript/bin/gs
      - cp -rv /app/share/ghostscript
          /app/localpdf-studio/resources/assets/backend_linux/compiled-ghostscript/share/
      - install -Dm644 io.github.alinur1.LocalPDF_Studio.desktop
            /app/share/applications/io.github.alinur1.LocalPDF_Studio.desktop
      - install -Dm644 io.github.alinur1.LocalPDF_Studio.png
            /app/share/icons/hicolor/512x512/apps/io.github.alinur1.LocalPDF_Studio.png
      - install -Dm644 io.github.alinur1.LocalPDF_Studio.metainfo.xml
            /app/share/metainfo/io.github.alinur1.LocalPDF_Studio.metainfo.xml
      - install -Dm755 run.sh /app/bin/run.sh

    sources:
      - type: archive
        url: https://github.com/Alinur1/LocalPDF_Studio/releases/download/v3.0.0/localpdf-studio-unpacked.tar.gz
        sha256: 4b35457e8ac0e9b90d25a2d6bfc3c5289f5cb7bcea7a18bf9906e3c1836e0d4e
        dest: unpacked

      - type: file
        path: io.github.alinur1.LocalPDF_Studio.desktop

      - type: file
        path: io.github.alinur1.LocalPDF_Studio.metainfo.xml

      - type: file
        path: io.github.alinur1.LocalPDF_Studio.png
        dest-filename: io.github.alinur1.LocalPDF_Studio.png

      - type: script
        dest-filename: run.sh
        commands:
          - export PATH="/app/localpdf-studio/resources/assets/backend_linux/compiled-ghostscript/bin:$PATH"
          - exec /app/localpdf-studio/localpdf-studio --no-sandbox "$@"