app-id: io.github.alinur1.LocalPDF_Studio
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

base: org.electronjs.Electron2.BaseApp
base-version: '25.08'

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24

command: run.sh
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=xdg-documents:rw
  - --filesystem=xdg-download:rw
  - --filesystem=xdg-desktop:rw
  - --filesystem=xdg-pictures:rw
  - --device=dri
  - --share=network

build-options:
  append-path: /usr/lib/sdk/node24/bin
  env:
    NPM_CONFIG_LOGLEVEL: info

modules:
  - name: ghostscript
    buildsystem: autotools
    config-opts:
      - --disable-cups
      - --disable-gtk
      - --without-x
      - --with-system-libtiff=no
      - --without-libidn
    sources:
      - type: archive
        url: https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10060/ghostscript-10.06.0.tar.gz
        sha256: 5bd6da34794928cc7e616f288e32bd0be7f9a5ca2d3c206a0af2c19a4e3a318f
    build-options:
      no-debuginfo: true
    cleanup:
      - /share/man
      - /share/doc
      - /share/ghostscript/*/doc
      - /share/ghostscript/*/examples

  - name: localpdf-studio
    buildsystem: simple
    subdir: main
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/localpdf-studio/flatpak-node/cache
        npm_config_cache: /run/build/localpdf-studio/flatpak-node/npm-cache
        npm_config_offline: 'true'
        ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    build-commands:
      - npm install --offline
      - npm run dist -- --x64 --linux --dir
      - cp -rv build/linux-unpacked/. /app/localpdf-studio/
      - install -Dm644 io.github.alinur1.LocalPDF_Studio.desktop /app/share/applications/io.github.alinur1.LocalPDF_Studio.desktop
      - install -Dm644 io.github.alinur1.LocalPDF_Studio.png /app/share/icons/hicolor/512x512/apps/io.github.alinur1.LocalPDF_Studio.png
      - install -Dm644 io.github.alinur1.LocalPDF_Studio.metainfo.xml /app/share/metainfo/io.github.alinur1.LocalPDF_Studio.metainfo.xml
      - install -Dm755 ../run.sh /app/bin/run.sh

    sources:
      - type: archive
        url: https://github.com/Alinur1/LocalPDF_Studio/archive/refs/tags/v3.0.0.tar.gz
        sha256: 8aade4178d2d9429521f3cf4dcbe3cba3cf3e3bff92dd4983613e7dde4c05c81
        dest: main
        strip-components: 1

      - type: file
        url: https://raw.githubusercontent.com/Alinur1/LocalPDF_Studio_Flatpak/refs/tags/1.0.0/io.github.alinur1.LocalPDF_Studio.desktop
        sha256: 42b8524dd28f3f5cdd9d3417e858b5c9082e4aed08557c4efa3060326e2626a1
        dest: main

      - type: file
        url: https://raw.githubusercontent.com/Alinur1/LocalPDF_Studio_Flatpak/refs/tags/1.0.0/io.github.alinur1.LocalPDF_Studio.metainfo.xml
        sha256: 194573fdee04c025d0db67a66dd7cea3677322f31d24ab6a18a70f845db608df
        dest: main

      - type: file
        url: https://raw.githubusercontent.com/Alinur1/LocalPDF_Studio_Flatpak/refs/tags/1.0.0/io.github.alinur1.LocalPDF_Studio.png
        sha256: 5dfc16ef968d34e407f84cf1333cf372ef86f551a59afa3ff6924d59d36cf2ed
        dest: main
        dest-filename: io.github.alinur1.LocalPDF_Studio.png

      - generated-sources.json

      - type: script
        dest-filename: run.sh
        commands:
          - export PATH="/app/localpdf-studio/resources/assets/backend_linux/compiled-ghostscript/bin:$PATH"
          - exec /app/localpdf-studio/localpdf-studio --no-sandbox "$@"