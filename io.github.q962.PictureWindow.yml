id: io.github.q962.PictureWindow
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: PictureWindow

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc

modules:
  - name: xmake
    buildsystem: autotools
    sources:
      - type: git
        url: https://github.com/xmake-io/xmake.git
        tag: v3.0.5
        commit: f20295f255d967af9d91de6f1ed5eeadf17d30a7
    cleanup:
      - "*"

  - name: sass
    buildsystem: simple
    build-commands:
      - mv * /app/bin
    sources:
      - type: archive
        only-arches: ["x86_64"]
        url: https://github.com/sass/dart-sass/releases/download/1.97.3/dart-sass-1.97.3-linux-x64.tar.gz
        sha256: 049bb0a0171a776b82cbd1b0a644e43fbeafe8a67e851c077e2f0d1da6f28a86
        dest-filename: dart-sass.tar.gz
      - type: archive
        only-arches: ["aarch64"]
        url: https://github.com/sass/dart-sass/releases/download/1.97.3/dart-sass-1.97.3-linux-arm64.tar.gz
        sha256: bcf342ebf1fcaa7e2132b9494724074217bc34eda83cd541d6bdab973c36285d
        dest-filename: dart-sass.tar.gz
    cleanup:
      - "*"

  - name: PictureWindow
    buildsystem: simple
    build-commands:
      - |
        set -e

        export XMAKE_GLOBALDIR=/run/temp/xmake
        export XMAKE_ROOT=y
        xmake g --network=private

        xmake f --mode=releasedbg
        xmake b
        xmake install -o /app

        eu-unstrip /app/bin/PictureWindow /app/bin/PictureWindow.sym -o PictureWindow
        mv PictureWindow /app/bin
        rm /app/bin/*.sym
    sources:
      - type: git
        url: https://github.com/q962/PictureWindow
        tag: v1.0.1
        commit: 8d49346394956aaebd653e0ad49de7badf44e632
