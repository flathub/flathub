id: io.github.q962.PictureWindow
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: PictureWindow
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc

build-options:
  append-path: "/usr/lib/sdk/rust-stable/bin"

modules:
  - name: xmake
    buildsystem: autotools
    sources:
      - type: git
        url: https://github.com/xmake-io/xmake.git
        tag: v3.0.5
        commit: f20295f255d967af9d91de6f1ed5eeadf17d30a7
    cleanup:
      - "*"

  - name: grass
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/grass/cargo
    build-commands:
      - cargo build --release --locked
      - install -Dm 755 ./target/release/grass /app/bin/grass
    cleanup:
      - '*'
    sources:
      - type: git
        url: https://github.com/connorskees/grass
        tag: 0.13.4
        commit: e0bb9e2eabfc3a58e42b03089cd7b22c68d09d0b
      - grass-cargo-sources.json

  - name: sass-wrapper
    buildsystem: simple
    build-commands:
      - cp sass /app/bin/sass
    sources:
      - type: script
        commands:
          - grass $2 $3 # skip --no-source-map
        dest-filename: sass
    cleanup:
      - '*'

  - name: PictureWindow
    buildsystem: simple
    build-options:
      env:
        XMAKE_GLOBALDIR: /run/temp/xmake
        XMAKE_ROOT: y
    build-commands:
      - xmake g --network=private
      - xmake f --mode=releasedbg
      - xmake b
      - xmake install -o /app
      - eu-unstrip /app/bin/PictureWindow /app/bin/PictureWindow.sym -o PictureWindow
      - mv PictureWindow /app/bin
      - rm /app/bin/*.sym
    sources:
      - type: git
        url: https://github.com/q962/PictureWindow
        tag: v1.0.1
        commit: 8d49346394956aaebd653e0ad49de7badf44e632
