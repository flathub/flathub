<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Purple gradient for the notepad -->
    <linearGradient id="notepadGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold gradient for monocle rim -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main notepad body -->
  <g>
    <!-- Simple shadow effect using a solid rect (MAUI-compatible) -->
    <rect x="38" y="32" width="124" height="156" rx="8" ry="8" fill="#5b1a8a" opacity="0.4"/>
    
    <!-- Main notepad shape -->
    <rect x="35" y="28" width="124" height="156" rx="8" ry="8" fill="url(#notepadGradient)"/>
    
    <!-- Notepad spiral binding holes -->
    <g fill="#1e1b4b">
      <circle cx="50" cy="45" r="4"/>
      <circle cx="50" cy="65" r="4"/>
      <circle cx="50" cy="85" r="4"/>
      <circle cx="50" cy="105" r="4"/>
      <circle cx="50" cy="125" r="4"/>
      <circle cx="50" cy="145" r="4"/>
      <circle cx="50" cy="165" r="4"/>
    </g>
    
    <!-- Lines on notepad (representing markdown text) -->
    <g stroke="#c4b5fd" stroke-width="2" stroke-linecap="round">
      <!-- Header line (thicker, like H1) -->
      <line x1="65" y1="50" x2="140" y2="50" stroke-width="3"/>
      
      <!-- Paragraph lines -->
      <line x1="65" y1="70" x2="145" y2="70"/>
      <line x1="65" y1="82" x2="130" y2="82"/>
      <line x1="65" y1="94" x2="142" y2="94"/>
      
      <!-- List items (with bullet dots) -->
      <circle cx="68" cy="114" r="2" fill="#c4b5fd"/>
      <line x1="75" y1="114" x2="135" y2="114"/>
      <circle cx="68" cy="130" r="2" fill="#c4b5fd"/>
      <line x1="75" y1="130" x2="140" y2="130"/>
      <circle cx="68" cy="146" r="2" fill="#c4b5fd"/>
      <line x1="75" y1="146" x2="125" y2="146"/>
      
      <!-- Code block representation -->
      <rect x="65" y="158" width="80" height="18" rx="3" fill="#1e1b4b" opacity="0.4"/>
      <line x1="70" y1="167" x2="100" y2="167" stroke="#a78bfa" stroke-width="1.5"/>
    </g>
  </g>
  
  <!-- Monocle -->
  <g>
    <!-- Simple shadow for monocle (MAUI-compatible) -->
    <circle cx="157" cy="57" r="28" fill="#d4a417" opacity="0.3"/>
    
    <!-- Monocle chain -->
    <path d="M155 75 Q175 90 170 120 Q168 140 155 160" 
          fill="none" 
          stroke="url(#goldGradient)" 
          stroke-width="2"
          stroke-linecap="round"/>
    
    <!-- Monocle outer rim -->
    <circle cx="155" cy="55" r="28" fill="none" stroke="url(#goldGradient)" stroke-width="4"/>
    
    <!-- Monocle inner rim detail -->
    <circle cx="155" cy="55" r="24" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
    
    <!-- Monocle glass -->
    <circle cx="155" cy="55" r="22" fill="#e0e7ff" opacity="0.3"/>
    
    <!-- Glass reflection/shine -->
    <ellipse cx="148" cy="48" rx="8" ry="5" fill="white" opacity="0.4"/>
    
    <!-- Monocle screw detail -->
    <circle cx="175" cy="38" r="3" fill="url(#goldGradient)"/>
  </g>
</svg>