<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <filter id="iconShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="ribbonShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="stripe1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfb0fa"/>
      <stop offset="1" stop-color="#b68bf1"/>
    </linearGradient>
    <linearGradient id="stripe2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a46cf0"/>
      <stop offset="1" stop-color="#8a4be6"/>
    </linearGradient>
    <linearGradient id="stripe3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6e24d6"/>
      <stop offset="1" stop-color="#550cc5"/>
    </linearGradient>
    <linearGradient id="stripe4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3c00a6"/>
      <stop offset="1" stop-color="#230071"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6117d6"/>
      <stop offset="1" stop-color="#38008f"/>
    </linearGradient>
    <linearGradient id="topHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="0.15" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="40" y="40" width="720" height="720" rx="150"/>
    </clipPath>
    <radialGradient gradientUnits="userSpaceOnUse" cx="400" cy="130" r="360" id="gradient-1">
      <stop offset="0" style="stop-color: #bada55"/>
      <stop offset="1" style="stop-color: #758d29"/>
    </radialGradient>
  </defs>
  <rect x="40" y="40" width="720" height="720" rx="150" fill="#230071" filter="url(#iconShadow)"/>
  <g clip-path="url(#iconClip)">
    <rect x="40" y="40" width="720" height="180" fill="url(#stripe1)" style="paint-order: fill markers; stroke: url(&quot;#gradient-1&quot;);"/>
    <rect x="40" y="220" width="720" height="180" fill="url(#stripe2)"/>
    <rect x="40" y="400" width="720" height="180" fill="url(#stripe3)"/>
    <rect x="40" y="580" width="720" height="180" fill="url(#stripe4)"/>
  </g>
  <rect x="41" y="41" width="718" height="718" rx="149" fill="none" stroke="url(#topHighlight)" stroke-width="4"/>
  <polygon points="37.467 600.033 763.355 479.967 763.355 629.967 37.467 750.033" fill="url(#ribbonGrad)" filter="url(#ribbonShadow)" style=""/>
  <polygon points="39.931 600 763.355 480 763.355 483 39.931 603" fill="#8f4df2" opacity="0.9" style=""/>
  <g transform="matrix(0.988228, -0.152986, 0.152986, 0.988228, -89.377649, 58.433885)">
    <text style="dominant-baseline: central; fill: rgb(255, 255, 255); font-family: -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto, Helvetica, Arial, sans-serif; font-size: 155px; font-style: italic; font-weight: 900; letter-spacing: -3px; text-anchor: middle; white-space: pre; filter: url(&quot;#textShadow&quot;);" x="400" y="618">NMD</text>
  </g>
</svg>