app-id: app.pikr.Pikr
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: pikr
build-options:
  no-debuginfo: true
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-pictures:ro
modules:
  - shared-modules/intltool/intltool-0.51.json
  - shared-modules/dbus-glib/dbus-glib.json
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json
  - name: ayatana-compat-symlinks
    buildsystem: simple
    build-commands:
      - ln -sf libappindicator3.so.1 /app/lib/libayatana-appindicator3.so.1
      - ln -sf libappindicator3.so.1 /app/lib/libayatana-appindicator3.so
    sources: []
  - name: pikr
    buildsystem: simple
    build-commands:
      - ar x Pikr_*.deb
      - tar xf data.tar.*
      - install -Dm755 usr/bin/pikr /app/bin/pikr.bin
      - |
        cat > /app/bin/pikr << 'WRAPPER'
        #!/bin/sh
        export LD_LIBRARY_PATH="/app/lib:${LD_LIBRARY_PATH}"
        exec /app/bin/pikr.bin "$@"
        WRAPPER
      - chmod +x /app/bin/pikr
      - install -Dm644 app.pikr.Pikr.desktop /app/share/applications/app.pikr.Pikr.desktop
      - install -Dm644 app.pikr.Pikr.png /app/share/icons/hicolor/256x256/apps/app.pikr.Pikr.png
      - install -Dm644 app.pikr.Pikr.metainfo.xml /app/share/metainfo/app.pikr.Pikr.metainfo.xml
    sources:
      - type: file
        url: https://github.com/ricardodantas/pikr/releases/download/v1.0.2/Pikr_1.0.2_amd64.deb
        sha256: 1c0052854cb2e04e9bcdf59a7d19ca4478fed98a6ad2b99175497dbcbc9f5585
      - type: file
        path: app.pikr.Pikr.desktop
      - type: file
        path: app.pikr.Pikr.png
      - type: file
        path: app.pikr.Pikr.metainfo.xml
