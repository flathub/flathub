# FFmpeg stack for waywallen's video-wallpaper renderer.
# Builds x264, x265, and FFmpeg with a minimal codec set suitable for
# video playback only. Drops upstream io.mpv.Mpv.yml dependencies that
# aren't relevant to a wallpaper player (libass / subs, libbs2b /
# libmysofa audio niches, libtheora / libjxl / libwebp / libaom minor
# codecs, libsmbclient / libv4l2 I/O niches, libxml2).
#
# Include from the top-level flathub manifest:
#   modules:
#     - ffmpeg.yml
#     - mpv.yml

name: ffmpeg
buildsystem: autotools
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/ffmpeg/examples
config-opts:
  - --disable-debug
  - --disable-doc
  - --disable-static
  - --enable-shared
  - --enable-gpl
  - --enable-version3
  - --enable-gnutls
  - --enable-libdav1d
  - --enable-libfreetype
  - --enable-libmp3lame
  - --enable-libopus
  - --enable-libass
  - --enable-libvorbis
  - --enable-libvpx
  - --enable-libx264
  - --enable-libx265
  - --enable-libdrm
  - --enable-vaapi
  - --enable-vulkan
sources:
  - type: git
    url: https://github.com/FFmpeg/FFmpeg.git
    commit: 9047fa1b084f76b1b4d065af2d743df1b40dfb56
    tag: n8.1
    x-checker-data:
      type: git
      tag-pattern: ^n([\d.]{3,7})$

modules:
  - name: x264
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/man
    config-opts:
      - --disable-cli
      - --enable-shared
    sources:
      - type: git
        url: https://code.videolan.org/videolan/x264.git
        commit: b35605ace3ddf7c1a5d67a2eb553f034aef41d55
        # Every commit to the stable branch is considered a release
        # https://code.videolan.org/videolan/x264/-/issues/35
        x-checker-data:
          type: json
          url: https://code.videolan.org/api/v4/projects/536/repository/branches/stable
          commit-query: .commit.id
          version-query: .commit.short_id
          timestamp-query: .commit.created_at

  - name: x265
    buildsystem: cmake
    subdir: source
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_STATIC=0
      # TODO: can be removed once x265 > 4.1 ships.
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/man
      - '*.a'
    sources:
      - type: git
        url: https://bitbucket.org/multicoreware/x265_git.git
        tag: '4.1'
        commit: 1d117bed4747758b51bd2c124d738527e30392cb
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$

      - type: patch
        path: patches/x265-cmake_policy.patch

  - name: libass
    cleanup:
      - /include
      - /lib/pkgconfig
    config-opts:
      - --disable-static
      - --enable-asm
      - --enable-harfbuzz
      - --enable-fontconfig
    sources:
      - type: git
        url: https://github.com/libass/libass.git
        tag: 0.17.4
        commit: bbb3c7f1570a4a021e52683f3fbdf74fe492ae84
        x-checker-data:
          type: git
          tag-pattern: ^(\d\.\d{1,3}\.\d{1,2})$