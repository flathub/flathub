id: com.obsproject.Studio.Plugin.HtmlSource
branch: stable
runtime: com.obsproject.Studio
runtime-version: stable
sdk: org.freedesktop.Sdk//25.08
build-extension: true
separate-locales: false
build-options:
  prefix: /app/plugins/HtmlSource
modules:
  - name: html-source
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_OUT_OF_TREE=On
    post-install:
      - install -Dm644 --target-directory=${FLATPAK_DEST}/share/metainfo ${FLATPAK_ID}.metainfo.xml
    sources:
      - type: git
        url: https://github.com/exeldro/obs-html-source.git
        tag: 0.1.0
        commit: a9c704337e82e634bc886fd5581ae84ff138f9f7
        x-checker-data:
          type: git
          is-main-source: true
          tag-pattern: ^([\d.]+)$
      - type: file
        path: com.obsproject.Studio.Plugin.HtmlSource.metainfo.xml
