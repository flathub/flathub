app-id: io.github.alamahant.Ermis
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: Ermis
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=xdg-documents/Ermis:create
modules:
  - name: Ermis
    buildsystem: cmake-ninja
    config-opts:
      - -DFLATPAK_BUILD=ON
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/alamahant/Ermis.git
        tag: v1.0.0
        commit: 320533856834ad2c6470a79c85857c10de7b1967
      
