app-id: vn.suika3.engine
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: suika3-run

build-options:
  append-path: /usr/lib/sdk/GStreamer/bin
  append-ld-library-path: /usr/lib/sdk/GStreamer/lib
  append-pkg-config-path: /usr/lib/sdk/GStreamer/lib/pkgconfig

finish-args:
  - --socket=x11
  - --device=dri
  - --socket=pulseaudio
  - --share=ipc

modules:
  - name: suika3
    buildsystem: cmake-ninja
    config-opts:
      - "-DCMAKE_BUILD_TYPE=Release"
      - "-DSUIKA_TARGET_LINUX=ON"
      - "-DSUIKA_ENABLE_INSTALL=ON"
      - "-DSUIKA_ENABLE_FREEDESKTOP=ON"
      - "-DSUIKA_ENABLE_FLATPAK=ON"
      - "-DSUIKA_ENABLE_DIST=ON"
      - "-DSUIKA_ENABLE_GST=ON"
      - "-DSUIKA_ENABLE_JIT=ON"
      - "-DSUIKA_ENABLE_I18N=ON"
      - "-DSUIKA_ENABLE_PACK=ON"
      - "-DSUIKA_ENABLE_BYTECOMP=ON"
      - "-DSUIKA_ENABLE_AOTCOMP=ON"
    sources:
      - type: git
        url: https://github.com/awemorris/suika3.git
        commit: bbeb0b6623beb0cfe47fbee2e69b86623e46d9be
