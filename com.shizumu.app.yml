app-id: com.shizumu.app
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: shizumu
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # data directory (sqlite database, key file)
  - --filesystem=xdg-data/com.shizumu.app:create
  # secret service for encryption key storage
  - --talk-name=org.freedesktop.secrets
  # system tray (gnome appindicator, kde statusnotifier)
  - --talk-name=org.kde.StatusNotifierItem
  - --talk-name=com.canonical.AppMenu.Registrar
  # notifications
  - --talk-name=org.freedesktop.Notifications
  # global shortcuts
  - --talk-name=org.freedesktop.portal.GlobalShortcuts
modules:
  # gnome runtime 47 does not include libayatana-appindicator — tauri's tray-icon
  # feature dlopens it at startup. bundle it from flathub's shared-modules
  # (libdbusmenu-gtk3 is pulled in as a dependency by the json manifest).
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

  - name: shizumu
    buildsystem: simple
    build-commands:
      - install -Dm755 shizumu /app/bin/shizumu
      - install -Dm755 shizumu-cli /app/bin/shizumu-cli
      - install -Dm644 com.shizumu.app.desktop /app/share/applications/com.shizumu.app.desktop
      - install -Dm644 icon-32.png /app/share/icons/hicolor/32x32/apps/com.shizumu.app.png
      - install -Dm644 icon-128.png /app/share/icons/hicolor/128x128/apps/com.shizumu.app.png
      - install -Dm644 icon-256.png /app/share/icons/hicolor/256x256/apps/com.shizumu.app.png
      - install -Dm644 icon-512.png /app/share/icons/hicolor/512x512/apps/com.shizumu.app.png
      - install -Dm644 com.shizumu.app.metainfo.xml /app/share/metainfo/com.shizumu.app.metainfo.xml
    sources:
      - type: archive
        url: https://gitlab.com/api/v4/projects/81041793/packages/generic/shizumu/0.1.22/shizumu-0.1.22-linux-x86_64.tar.gz
        sha256: 375d4278b5c2ad0ef99081b410aef9f2c158a992827e50c1537ebb395243f7ba
        x-checker-data:
          type: json
          url: https://gitlab.com/api/v4/projects/81041793/releases/permalink/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets.links[] | select(.name == "linux-tarball") | .url
