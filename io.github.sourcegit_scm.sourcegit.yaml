id: io.github.sourcegit_scm.sourcegit
runtime: org.freedesktop.Sdk
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: SourceGit

add-build-extensions:
  org.freedesktop.Sdk.Extension.dotnet10:
    directory: /usr/lib/sdk/dotnet10

build-options:
  prepend-path: /usr/lib/sdk/dotnet10/bin
  append-ld-library-path: /usr/lib/sdk/dotnet10/lib
  prepend-pkg-config-path: /usr/lib/sdk/dotnet10/lib/pkgconfig

finish-args:
  - --device=dri
  - --socket=x11
  - --share=ipc
  - --share=network
  - --socket=ssh-auth
  - --socket=gpg-agent
  - --filesystem=xdg-config/git:create
  - --filesystem=home

modules:
  - name: sourcegit
    buildsystem: simple
    build-options:
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: '1'
        DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
        DOTNET_NOLOGO: 'true'
      arch:
        x86_64:
          env:
            RUNTIME: linux-x64
        aarch64:
          env:
            RUNTIME: linux-arm64

    build-commands:
      - dotnet publish src/SourceGit.csproj --runtime ${RUNTIME} --source ./nuget-sources -o ${FLATPAK_DEST}/bin -c Release -p:DisableUpdateDetection=true
      - install -D -m644 build/resources/flatpak/sourcegit.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -D -m644 build/resources/flatpak/sourcegit.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -D -m644 build/resources/_common/icons/sourcegit.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
    sources:
      - nuget-sources.json
      - type: git
        url: https://github.com/sourcegit-scm/sourcegit.git
        commit: 080c446ce0b24edb437dbdddd515402a0a364b0d
        # Will be enabled when the repo is allowed to run python to generate nuget-sources
        # x-checker-data:
        #   type: json
        #   url: https://api.github.com/repos/sourcegit-scm/sourcegit/releases/latest
        #   version-query: .tag_name
        #   tag-query: .tag_name
        #   timestamp-query: .published_at
        #   is-main-source: true
