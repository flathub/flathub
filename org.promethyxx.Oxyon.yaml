app-id: org.promethyxx.Oxyon
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: oxyon
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home
modules:
  - name: oxyon
    buildsystem: simple
    build-commands:
      - install -Dm755 oxyon /app/bin/oxyon
      - install -Dm644 org.promethyxx.Oxyon.desktop /app/share/applications/org.promethyxx.Oxyon.desktop
      - install -Dm644 org.promethyxx.Oxyon.metainfo.xml /app/share/metainfo/org.promethyxx.Oxyon.metainfo.xml
      - install -Dm644 org.promethyxx.Oxyon.png /app/share/icons/hicolor/512x512/apps/org.promethyxx.Oxyon.png
    sources:
      - type: file
        url: https://github.com/Promethyxx/oxyon/releases/download/1.3.5/oxyon-linux-x64
        dest-filename: oxyon
        sha256: 1c800ad206c4a5d6bb96eab2fb4a62949dbdafcae7c9c69bb37dc2debe521aac
      - type: file
        path: org.promethyxx.Oxyon.desktop
      - type: file
        path: org.promethyxx.Oxyon.metainfo.xml
      - type: file
        path: org.promethyxx.Oxyon.png
