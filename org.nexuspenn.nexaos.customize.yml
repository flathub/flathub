app-id: org.nexuspenn.nexaos.customize
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: nexacustomize
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri
  - --socket=wayland
cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - "*.la"
  - "*.a"
modules:
  - name: nexacustomize
    builddir: true
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/Nexuspenn/NexaCustomize.git
        commit: 6dec59f1236abc613d86c49ddac0360f63d52df0
