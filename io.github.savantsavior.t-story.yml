id: io.github.savantsavior.t-story
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.godotengine.godot.BaseApp
base-version: '4.5'
command: godot-runner

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all

modules:
  - name: t-story
    buildsystem: simple

    sources:
      - type: file
        url: https://raw.githubusercontent.com/savantsavior/t-story/1a996ad434900a34734c69fd20bdb25ef8a89a19/io.github.savantsavior.t-story.desktop
        sha256: 6863cfadbc5c1e97520b968b5120278c2c7b0b99c2729acfe743e7e80645e98c

      - type: file
        url: https://raw.githubusercontent.com/savantsavior/t-story/1a996ad434900a34734c69fd20bdb25ef8a89a19/io.github.savantsavior.t-story.metainfo.xml
        sha256: d5558cd419c8d46bdc958064cb97f963d1ea793866414c025906ec15033512ed

      - type: file
        url: https://raw.githubusercontent.com/savantsavior/t-story/1a996ad434900a34734c69fd20bdb25ef8a89a19/io.github.savantsavior.t-story.png
        sha256: f30f0fe26859ebf5f8e8cde60522fce25fac1856db05b0b48ca76fab7e76728f

      - type: file
        url: https://github.com/savantsavior/t-story/releases/download/v4.0.0/T-Story_RC3F.pck
        sha256: 5d274f3ea8d9cfd3c8101aedc27f9bf1c649d6070d9e3a57a43a0eb47f12a743

    build-commands:
      - install -Dm644 T-Story_RC3F.pck ${FLATPAK_DEST}/bin/godot-runner.pck

      - install -Dm644 ${FLATPAK_ID}.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop

      - install -Dm644 ${FLATPAK_ID}.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml

      - install -Dm644 ${FLATPAK_ID}.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
