id: io.github.savantsavior.t-story
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.godotengine.godot.BaseApp
base-version: '4.5'
command: godot-runner

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
modules:
  - name: t-story
    buildsystem: simple

    sources:
      # Desktop Entry file from GitHub
      - type: file
        url: https://raw.githubusercontent.com/savantsavior/t-story/ca4474a/io.github.savantsavior.t-story.desktop
        sha256: 6863cfadbc5c1e97520b968b5120278c2c7b0b99c2729acfe743e7e80645e98c

      # MetaInfo file from GitHub
      - type: file
        url: https://raw.githubusercontent.com/savantsavior/t-story/ca4474a/io.github.savantsavior.t-story.metainfo.xml
        sha256: 7d6fe5822753fb4a6b9a65ba400f8d163a303b8656f54381226647eba8c3f228

      # Icon file from GitHub
      - type: file
        url: https://raw.githubusercontent.com/savantsavior/t-story/ca4474a/io.github.savantsavior.t-story.png
        sha256: f30f0fe26859ebf5f8e8cde60522fce25fac1856db05b0b48ca76fab7e76728f

      # Game PCK file from GitHub (shared across all architectures)
      - type: file
        url: https://raw.githubusercontent.com/savantsavior/t-story/ca4474a/T-Story-R3B2-Linux.pck
        sha256: 4b27855a6a58e92fea3c2859ae06d8abeb10f18d0991ddb7737d95299a1c725f

      # x86_64 binary from GitHub
      - type: file
        url: https://raw.githubusercontent.com/savantsavior/t-story/ca4474a/Executable/T-Story-R3B2-Linux.x86_64
        sha256: 54cc228405e5be61934192e3bc5461c91dcb4a3275578b29a869557a4322e79c
        only-arches:
          - x86_64

      # aarch64 (ARM64) binary from GitHub
      - type: file
        url: https://raw.githubusercontent.com/savantsavior/t-story/ca4474a/Executable/T-Story-R3B2-Linux.arm64
        sha256: 4e52d453694bf782ee84d4b23ac6ba3893d2fc22d51aeacd3b672f074f3064dd
        only-arches:
          - aarch64

    build-commands:
      # Install the PCK file with the godot-runner name
      - install -Dm644 T-Story-R3B2-Linux.pck ${FLATPAK_DEST}/bin/godot-runner.pck

      # Install the architecture-specific binary as godot-runner
      - |
        if [ -f T-Story-R3B2-Linux.x86_64 ]; then
          install -Dm755 T-Story-R3B2-Linux.x86_64 ${FLATPAK_DEST}/bin/godot-runner
        elif [ -f T-Story-R3B2-Linux.arm64 ]; then
          install -Dm755 T-Story-R3B2-Linux.arm64 ${FLATPAK_DEST}/bin/godot-runner
        fi

      # Install Desktop Entry
      - install -Dm644 ${FLATPAK_ID}.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop

      # Install MetaInfo
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml

      # Install icon
      - install -Dm644 ${FLATPAK_ID}.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png

