id: com.gryt.Chat
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: gryt-chat
separate-locales: false

finish-args:
  # X11 performance
  - --share=ipc
  # X11 fallback
  - --socket=fallback-x11
  # Wayland
  - --socket=wayland
  # Audio (voice chat)
  - --socket=pulseaudio
  # Camera + mic + input devices (global push-to-talk via uiohook)
  - --device=all
  # Network (connecting to servers)
  - --share=network
  # Tray icon (AppIndicator / StatusNotifier)
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=com.canonical.Unity
  - --talk-name=com.canonical.indicator.application
  - --talk-name=org.ayatana.indicator.application
  - --talk-name=org.kde.StatusNotifierWatcher
  # Notifications
  - --talk-name=org.freedesktop.Notifications
  # mDNS / LAN server discovery
  - --system-talk-name=org.freedesktop.Avahi
  # Secrets storage (auth tokens)
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd6
  # Screen lock inhibit (during calls)
  - --system-talk-name=org.freedesktop.login1
  - --talk-name=org.freedesktop.PowerManagement
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.gnome.SessionManager
  # Cursor theme
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons

modules:
  - name: gryt-chat
    buildsystem: simple
    build-commands:
      - |
        bsdtar -Oxf gryt-chat.deb 'data.tar.xz' |
        bsdtar -xf - \
          --exclude='./usr/share/doc'
      - mv "opt/Gryt Chat" "${FLATPAK_DEST}/gryt-chat"
      - install -Dm0755 gryt-chat.sh "${FLATPAK_DEST}/bin/gryt-chat"
      - install -Dm0644 com.gryt.Chat.desktop "${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop"
      - install -Dm0644 com.gryt.Chat.metainfo.xml "${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml"
      - install -Dm0644 icon.png "${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png"
      - install -Dm0644 LICENSE "${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/LICENSE"
    sources:
      - type: file
        dest-filename: gryt-chat.deb
        url: https://github.com/Gryt-chat/gryt/releases/download/v1.0.131/Gryt-Chat-1.0.131-linux-amd64.deb
        sha256: 494149d6e884c4037396f1b4f771300724bff473a0a0819e0bd33d405c7a60a0
        only-arches:
          - x86_64
        x-checker-data:
          type: json
          url: https://api.github.com/repos/Gryt-chat/gryt/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name | test("linux-amd64\\.deb$")) | .browser_download_url
      - type: file
        path: gryt-chat.sh
      - type: file
        path: com.gryt.Chat.desktop
      - type: file
        path: com.gryt.Chat.metainfo.xml
      - type: file
        path: icon.png
      - type: file
        url: https://raw.githubusercontent.com/Gryt-chat/gryt/main/packages/client/LICENSE
        sha256: 8e052b053a4a4d74daa1aed093a8bb47a8d1565cce3aa7444ade74a332a43c94
        dest-filename: LICENSE
