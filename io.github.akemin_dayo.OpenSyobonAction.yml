app-id: io.github.akemin_dayo.OpenSyobonAction
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: opensyobon-wrapper
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --device=dri
  - --allow=bluetooth

modules:
  - name: sdl12
    buildsystem: autotools
    sources:
      - type: archive
        url: https://www.libsdl.org/release/SDL-1.2.15.tar.gz
        sha256: d6d316a793e5e348155f0dd93b979798933fb98aa1edebcc108829d6474aad00
      - type: patch
        path: sdl12-xdata32.patch
    config-opts:
      - --disable-static
      - --enable-shared
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/man
      - /bin/sdl-config

  - name: sdl_image
    buildsystem: autotools
    sources:
      - type: archive
        url: https://www.libsdl.org/projects/SDL_image/release/SDL_image-1.2.12.tar.gz
        sha256: 0b90722984561004de84847744d566809dbb9daf732a9e503b91a1b5a84e5699
    config-opts:
      - --disable-static
      - --enable-shared
    build-options:
      env:
        PKG_CONFIG_PATH: /app/lib/pkgconfig
    cleanup:
      - /include
      - /lib/pkgconfig

  - name: sdl_mixer
    buildsystem: autotools
    sources:
      - type: archive
        url: https://www.libsdl.org/projects/SDL_mixer/release/SDL_mixer-1.2.12.tar.gz
        sha256: 1644308279a975799049e4826af2cfc787cad2abb11aa14562e402521f86992a
    config-opts:
      - --disable-static
      - --enable-shared
    build-options:
      env:
        PKG_CONFIG_PATH: /app/lib/pkgconfig
    cleanup:
      - /include
      - /lib/pkgconfig

  - name: freetype
    buildsystem: autotools
    sources:
      - type: archive
        url: https://download.savannah.gnu.org/releases/freetype/freetype-2.13.2.tar.gz
        sha256: 1ac27e16c134a7f2ccea177faba19801131116fd682efc1f5737037c5db224b5
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/man

  - name: sdl_ttf
    buildsystem: autotools
    sources:
      - type: archive
        url: https://www.libsdl.org/projects/SDL_ttf/release/SDL_ttf-2.0.11.tar.gz
        sha256: 724cd895ecf4da319a3ef164892b72078bd92632a5d812111261cde248ebcdb7
    config-opts:
      - --disable-static
      - --enable-shared
    build-options:
      env:
        PKG_CONFIG_PATH: /app/lib/pkgconfig
        FREETYPE_CONFIG: /app/bin/freetype-config
        CPPFLAGS: -I/app/include/freetype2
        LDFLAGS: -L/app/lib -lfreetype
    cleanup:
      - /include
      - /lib/pkgconfig

  - name: sdl_gfx
    buildsystem: autotools
    sources:
      - type: archive
        url: https://sourceforge.net/projects/sdlgfx/files/SDL_gfx-2.0.27.tar.gz
        sha256: dfb15ac5f8ce7a4952dc12d2aed9747518c5e6b335c0e31636d23f93c630f419
    config-opts:
      - --disable-static
      - --enable-shared
    build-options:
      env:
        PKG_CONFIG_PATH: /app/lib/pkgconfig
    cleanup:
      - /include
      - /lib/pkgconfig

  - name: opensyobon
    buildsystem: simple
    build-commands:
      - make -j4
      - install -Dm755 SyobonAction /app/bin/SyobonAction
      - mkdir -p /app/share/opensyobon
      - cp -r res BGM SE /app/share/opensyobon/
      - install -Dm755 opensyobon-wrapper /app/bin/opensyobon-wrapper
      - mkdir -p /app/share/doc/org.opensyobonaction.OpenSyobonAction
      - cp README.md README_ja.md /app/share/doc/org.opensyobonaction.OpenSyobonAction/
      - mkdir -p /app/share/icons/hicolor/256x256/apps/
      - cp icon-256x256.png /app/share/icons/hicolor/256x256/apps/io.github.akemin_dayo.OpenSyobonAction.png
    sources:
      - type: git
        url: https://github.com/akemin-dayo/OpenSyobonAction
        commit: 77ca2c128784512eca10e24a453ca19c270a8af4
      - type: file
        path: Makefile
      - type: file
        path: opensyobon-wrapper
      - type: file
        path: icon-256x256.png
    build-options:
      env:
        PKG_CONFIG_PATH: /app/lib/pkgconfig
