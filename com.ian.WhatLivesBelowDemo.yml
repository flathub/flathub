app-id: com.ian.WhatLivesBelowDemo
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk
command: What Lives Below Demo.x86_64

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - name: what-lives-below-demo
    buildsystem: simple
    build-commands:
      - install -D "What Lives Below Demo.x86_64" /app/bin/"What Lives Below Demo.x86_64"
      - cp -r "What Lives Below Demo_Data" /app/bin/
      - install -D UnityPlayer.so /app/bin/UnityPlayer.so
      - install -D libdecor-0.so.0 /app/bin/libdecor-0.so.0
      - install -D libdecor-cairo.so /app/bin/libdecor-cairo.so

      # Install the desktop file
      - install -D com.ian.WhatLivesBelowDemo.desktop /app/share/applications/com.ian.WhatLivesBelowDemo.desktop

      # Install the icon
      - install -D metadata/icons/hicolor/512x512/apps/com.ian.WhatLivesBelowDemo.png /app/share/icons/hicolor/512x512/apps/com.ian.WhatLivesBelowDemo.png

      # Install the AppData file
      - install -D metadata/com.ian.WhatLivesBelowDemo.appdata.xml /app/share/metainfo/com.ian.WhatLivesBelowDemo.appdata.xml

    sources:
      - type: dir
        path: .