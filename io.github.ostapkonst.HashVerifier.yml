        url: https://github.com/ostapkonst/hash-verifier.git
        tag: v2026.3.9
        commit: 188ec53849531e16144fe9e529f623abfa80e08e
      - type: file
        path: modules.txt
        dest: vendor
      # Workaround for Go modules generated by github.com/dennwc/flatpak-go-mod
