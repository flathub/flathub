app-id: cz.coolcode.handyrec
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: handyrec
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --socket=session-bus
  - --device=all
  - --share=network
  - --filesystem=home
  - --filesystem=host
  - --filesystem=xdg-run/pipewire-0
  - --talk-name=org.freedesktop.Flatpak
modules:
  - name: alsa-utils
    buildsystem: simple
    sources:
      - type: archive
        url: https://www.alsa-project.org/files/pub/utils/alsa-utils-1.2.9.tar.bz2
        sha256: e7623d4525595f92e11ce25ee9a97f2040a14c6e4dcd027aa96e06cbce7817bd
    build-commands:
      - ./configure --prefix=/app --disable-alsatest --disable-xmlto --with-curses=ncursesw --disable-bat --disable-alsaconf --disable-alsamixer --disable-alsaloop --disable-nls --disable-topology --disable-aplaymidi --disable-arecordmidi --disable-seq --disable-amidi --with-udev-rules-dir=/app/lib/udev/rules.d
      - sed -i 's/ topology//g' Makefile
      - make
      - make install

  - name: handyrec
    buildsystem: simple
    build-commands:
      # Install binary files
      - install -d /app/lib/handyrec
      - cp -r * /app/lib/handyrec/
      - install -d /app/bin
      - install -D -m755 handyrec.sh /app/bin/handyrec
      # Desktop file
      - install -d /app/share/applications
      - install -D -m644 cz.coolcode.handyrec.desktop /app/share/applications/cz.coolcode.handyrec.desktop
      # AppData (AppStream)
      - install -d /app/share/metainfo
      - install -D -m644 cz.coolcode.handyrec.appdata.xml /app/share/metainfo/cz.coolcode.handyrec.appdata.xml
      # Icon
      - install -d /app/share/icons/hicolor/512x512/apps
      - install -D -m644 icon_512.png /app/share/icons/hicolor/512x512/apps/cz.coolcode.handyrec.png
    sources:
      - type: archive
        url: https://github.com/jank2/HandyRec/releases/download/music/handyrec-1.3.1-linux.tar.gz
        sha256: 4ccb8ffab7b062334cb3357b05465908a985237124fa09bc2e3a9f2db3b0980e
      - type: file
        path: handyrec.sh
      - type: file
        path: cz.coolcode.handyrec.desktop
      - type: file
        path: cz.coolcode.handyrec.appdata.xml
      - type: file
        path: icon_512.png
