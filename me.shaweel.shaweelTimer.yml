app-id: me.shaweel.shaweelTimer
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: shaweeltimer
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
modules:
  - name: shaweeltimer
    buildsystem: simple
    build-commands:
      - install -Dm755 main.py /app/bin/shaweeltimer
      - install -Dm755 config.py /app/bin/config.py
      - install -Dm755 status.py /app/bin/status.py
      - install -Dm644 assets/shaweelTimer.png /app/share/icons/hicolor/256x256/apps/me.shaweel.shaweelTimer.png
      - install -Dm644 me.shaweel.shaweelTimer.desktop /app/share/applications/me.shaweel.shaweelTimer.desktop
      - install -Dm644 me.shaweel.shaweelTimer.metainfo.xml /app/share/metainfo/me.shaweel.shaweelTimer.metainfo.xml
      - sed -i "1s|^|#!/usr/bin/env python3\n|" /app/bin/shaweeltimer
    sources:
      - type: archive
        url: https://github.com/shaweel/shaweelTimer/archive/refs/tags/v1.0.0.tar.gz
        sha256: c47203bc698cb6762f12326eac56e27253ea6fa7f59690f6e1c29e95b58239aa