id: org.projecttick.MeshMC
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk17

command: meshmc
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
    # MeshMC needs network access because download Minecraft from Mojang
  - --share=network
    # Need for voice
  - --socket=pulseaudio
    # for Discord RPC mods
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
    # Mod drag&drop
  - --filesystem=xdg-download:ro
    # FTBApp import
  - --filesystem=~/.ftba:ro
    # Userspace visibility for manual hugepages configuration
    # Required for -XX:+UseLargePages
  - --filesystem=/sys/kernel/mm/hugepages:ro
    # Userspace visibility for transparent hugepages configuration
    # Required for -XX:+UseTransparentHugePages
  - --filesystem=/sys/kernel/mm/transparent_hugepage:ro

modules:
  # Text to Speech in the game
  # /w patch for pipewire
  - name: flite
    config-opts:
      - --enable-shared
      - --with-audio=pulseaudio
    no-parallel-make: true
    sources:
      - type: git
        url: https://github.com/festvox/flite.git
        tag: v2.2
        commit: e9e2e37c329dbe98bfeb27a1828ef9a71fa84f88
        x-checker-data:
          type: git
          tag-pattern: ^v([\\d.]+)$
      - type: patch
        path: patches/0001-Ez-peazy.flite.patch

  # This one is helper of Launching Minecraft.
  - name: glfw
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DBUILD_SHARED_LIBS:BOOL=ON
      - -DGLFW_BUILD_WAYLAND:BOOL=ON
      - -DGLFW_BUILD_DOCS:BOOL=OFF
    sources:
      - type: git
        url: https://github.com/glfw/glfw.git
        commit: 7b6aead9fb88b3623e3b3725ebb42670cbe4c579 # 3.4
      - type: patch
        path: patches/0001-Wayland-Partially-implement-glfwSetCursorPos.patch
      - type: patch
        path: patches/0002-Wayland-Implement-glfwSetWindowIcon.patch
      - type: patch
        path: patches/0003-proceed-even-though-no-window-icon-support-on-waylan.patch
    cleanup:
      - /include
      - /lib/cmake
      - /lib/pkgconfig

  # This one is need for scanning resolutions from Minecraft.
  - name: xrandr
    buildsystem: autotools
    sources:
      - type: archive
        url: https://xorg.freedesktop.org/archive/individual/app/xrandr-1.5.3.tar.xz
        sha256: f8dd7566adb74147fab9964680b6bbadee87cf406a7fcff51718a5e6949b841c
        x-checker-data:
          type: anitya
          project-id: 14957
          stable-only: true
          url-template: https://xorg.freedesktop.org/archive/individual/app/xrandr-$version.tar.xz
    cleanup:
      - /share/man
      - /bin/xkeystone
      - /include
      - /lib/pkgconfig
      - /lib/libgamemodeauto.a

  # This one needs for scanning OpenGL information from Minecraft.
  - name: glxinfo
    buildsystem: meson
    config-opts:
      - --bindir=/app/mesa-demos
      - -Degl=disabled
      - -Dglut=disabled
      - -Dosmesa=disabled
      - -Dvulkan=disabled
      - -Dwayland=disabled
    post-install:
      - mv -v /app/mesa-demos/glxinfo /app/bin
    sources:
      - type: archive
        url: https://archive.mesa3d.org/demos/mesa-demos-9.0.0.tar.xz
        sha256: 3046a3d26a7b051af7ebdd257a5f23bfeb160cad6ed952329cdff1e9f1ed496b
        x-checker-data:
          type: anitya
          project-id: 16781
          stable-only: true
          url-template: https://archive.mesa3d.org/demos/mesa-demos-$version.tar.xz
    cleanup:
      - /include
      - /mesa-demos
      - /share
    modules:
      - shared-modules/glu/glu-9.json

  # Main program
  - name: meshmc
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DMeshMC_BUILD_PLATFORM=flatpak
      # This allows us to manage and update Java independently of this Flatpak
      - -DMeshMC_DISABLE_JAVA_DOWNLOADER=OFF
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      # Diff for MeshMC: Removed _FORTIFY_SOURCE Macro and this suppress warnings
      - -DCMAKE_CXX_FLAGS=-pedantic -fstack-protector-strong --param=ssp-buffer-size=4 -O3
    build-options:
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk17/jvm/openjdk-17
        JAVA_COMPILER: /usr/lib/sdk/openjdk17/jvm/openjdk-17/bin/javac
    post-install:
      - install -Dm755 ../prime-run /app/bin/prime-run
      - mv /app/bin/meshmc /app/bin/meshmcrun
      - install -Dm755 ../meshmc /app/bin/meshmc
    sources:
      - type: archive
        url: https://github.com/Project-Tick/Project-Tick/releases/download/v202604141638/meshmc-v202604141638.tar.gz
        sha256: 2e2a510b240f855b8823f0179a4d1d15f4c65f359145c1298d07f6c69056db10
        x-checker-data:
          type: json
          url: https://api.github.com/repos/Project-Tick/Project-Tick/releases/latest
          version-query: .tag_name
          url-query: .assets[] | select(.name == "meshmc-" + $version + ".tar.gz")
            | .browser_download_url
      - type: file
        path: prime-run
      - type: file
        path: meshmc
