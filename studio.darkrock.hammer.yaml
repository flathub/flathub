app-id: studio.darkrock.hammer
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk21

command: hammer

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=xdg-documents
  - --share=network
  - --env=PATH=/app/jre/bin:/usr/lib/sdk/openjdk21/jvm/openjdk-21/bin:/app/bin:/usr/bin
  - --env=JAVA_HOME=/usr/lib/sdk/openjdk21/jvm/openjdk-21

modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk21/install.sh

  - name: hammer
    buildsystem: simple
    build-options:
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk21/jvm/openjdk-21
        PATH: /usr/lib/sdk/openjdk21/jvm/openjdk-21/bin:/usr/bin
    build-commands:
      # Build the desktop release distributable
      - ./gradlew :desktop:createReleaseDistributable --no-daemon --stacktrace

      # Install the application
      - mkdir -p /app/lib/hammer
      - cp -r desktop/build/installers/main-release/app/hammer/* /app/lib/hammer/

      # Create symlink to launcher
      - mkdir -p /app/bin
      - ln -s /app/lib/hammer/bin/hammer /app/bin/hammer

      # Install metadata
      - install -Dm644 flatpak/studio.darkrock.hammer.desktop
        /app/share/applications/studio.darkrock.hammer.desktop
      - install -Dm644 desktop/icons/linux.png
        /app/share/icons/hicolor/256x256/apps/studio.darkrock.hammer.png
      - install -Dm644 flatpak/studio.darkrock.hammer.metainfo.xml
        /app/share/metainfo/studio.darkrock.hammer.metainfo.xml

    sources:
      - type: git
        url: https://github.com/Wavesonics/hammer-editor.git
        tag: v2.1.2
        commit: ab799d06117095df20866d4890145099cb030928

      - flatpak/flatpak-sources.json
