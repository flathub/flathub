app-id: io.github.jgomezbau.iawrapper
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: iawrapper
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.gnome.SessionManager
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
  - --filesystem=xdg-download
  - --env=ELECTRON_TRASH=gio
  - --env=TMPDIR=/var/tmp
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto

modules:
  - name: iawrapper
    buildsystem: simple
    build-commands:
      - mkdir -p node_modules/electron/dist
      - cp -r electron-dist/. node_modules/electron/dist/
      - chmod +x node_modules/electron/dist/electron
      - cp -r --no-preserve=mode . /app/share/iawrapper/
      - chmod +x /app/share/iawrapper/node_modules/electron/dist/electron
      - install -d /app/bin
      - install -Dm755 iawrapper.sh /app/bin/iawrapper
      - install -Dm644 flatpak/io.github.jgomezbau.iawrapper.desktop /app/share/applications/io.github.jgomezbau.iawrapper.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.iawrapper.chatgpt.desktop /app/share/applications/io.github.jgomezbau.iawrapper.chatgpt.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.iawrapper.claude.desktop /app/share/applications/io.github.jgomezbau.iawrapper.claude.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.iawrapper.grok.desktop /app/share/applications/io.github.jgomezbau.iawrapper.grok.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.iawrapper.deepseek.desktop /app/share/applications/io.github.jgomezbau.iawrapper.deepseek.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.iawrapper.qwen.desktop /app/share/applications/io.github.jgomezbau.iawrapper.qwen.desktop
      - install -Dm644 flatpak/io.github.jgomezbau.iawrapper.metainfo.xml /app/share/metainfo/io.github.jgomezbau.iawrapper.metainfo.xml
      - install -Dm644 flatpak/io.github.jgomezbau.iawrapper.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.iawrapper.png
      - install -Dm644 icons/chatgpt.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.iawrapper.chatgpt.png
      - install -Dm644 icons/claude.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.iawrapper.claude.png
      - install -Dm644 icons/grok.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.iawrapper.grok.png
      - install -Dm644 icons/deepseek.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.iawrapper.deepseek.png
      - install -Dm644 icons/qwen.png /app/share/icons/hicolor/512x512/apps/io.github.jgomezbau.iawrapper.qwen.png

    sources:
      - type: git
        url: https://github.com/jgomezbau/IAWrapper.git
        commit: 6b8dd0bc31efb2a7638bf288f5443ceccb4ec44c

      - type: archive
        url: https://github.com/electron/electron/releases/download/v41.1.0/electron-v41.1.0-linux-x64.zip
        sha256: 4733cfd12e9812e2f780406eac40fcaf98c5d736f40018b3698041e5c58bfefe
        dest: electron-dist
        strip-components: 0
        only-arches:
          - x86_64

      - type: archive
        url: https://github.com/electron/electron/releases/download/v41.1.0/electron-v41.1.0-linux-arm64.zip
        sha256: 3f6190238dd48eda29e6549b202ef308b65cb4429d0a36346258a64e07baad22
        dest: electron-dist
        strip-components: 0
        only-arches:
          - aarch64

      - type: script
        dest-filename: iawrapper.sh
        commands:
          - cd /app/share/iawrapper
          - exec zypak-wrapper /app/share/iawrapper/node_modules/electron/dist/electron --ozone-platform-hint=auto /app/share/iawrapper "$@"