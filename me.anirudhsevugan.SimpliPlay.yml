app-id: me.anirudhsevugan.SimpliPlay # thanks to Nuclear audio player repo for the basis of this YAML
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: run.sh
separate-locales: false
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --filesystem=xdg-download
  - --persist=simpliplay-snapshots
  - --device=dri

modules:
  - name: simpliplay
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node22/bin
      env:
        - NODE_PATH: /usr/lib/sdk/node22/lib/node_modules
        - NPM_CONFIG_OFFLINE: "true"
    build-commands:
    # chmod all files in node_modules, force to list cache dir cd into subdir, export cache env with forced dir, and build using vendored node_modules
    - chmod -R +x simpliplay/node_modules/
    - ls -R simpliplay/cache
    - ls -R simpliplay/
    
    - chmod -R +x simpliplay/node_modules/.bin/

    # use electron packager instead of electron builder - builder keeps failing in sandbox - with no internet usage
    - |
        cd simpliplay && \
        export ELECTRON_SKIP_BINARY_DOWNLOAD=1 && \
        export ELECTRON_GET_USE_PROXY=1 && \ 
        ./node_modules/.bin/electron-packager . SimpliPlay \
          --platform=linux \
          --arch=x64 \
          --electron-zip=cache/electron-v40.0.0-linux-x64.zip \
          --out=dist/ \
          --overwrite
  
    # setup app dir
    - mkdir -p /app/lib/SimpliPlay
    
    # copy the results to /app/lib
    - cp -r simpliplay/dist/SimpliPlay-linux-x64/* /app/lib/SimpliPlay/
    - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/me.anirudhsevugan.SimpliPlay.png # move icon to global share so system can access it properly
    - install -Dm644 me.anirudhsevugan.SimpliPlay.desktop /app/share/applications/me.anirudhsevugan.SimpliPlay.desktop # move desktop to global share so system can access it properly
    - install -Dm644 me.anirudhsevugan.SimpliPlay.metainfo.xml /app/share/metainfo/me.anirudhsevugan.SimpliPlay.metainfo.xml # move metadata to global share so system can access it properly
    - install -Dm755 run.sh /app/bin/run.sh
    sources:
      - type: archive
        url: https://github.com/A-Star100/simpliplay-desktop/releases/download/release-2.2.0.0/simpliplay-vendor.tar.gz
        sha256: fe04d8a957f5ba46ff5c0ff2a4e56bcbd9bc4aefa4230683e9eb78d5e3e8542d
      - type: script
        dest-filename: run.sh
        commands:
          - 'zypak-wrapper /app/lib/SimpliPlay "$@"'
      - type: file
        path: me.anirudhsevugan.SimpliPlay.desktop
      - type: file
        path: me.anirudhsevugan.SimpliPlay.metainfo.xml
      - type: file
        path: icon.png
