app-id: me.anirudhsevugan.SimpliPlay
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: run.sh
separate-locales: false
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --persist=simpliplay-snapshots
  - --device=dri

modules:
  - name: simpliplay
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node22/bin
      env:
        - NODE_PATH: /usr/lib/sdk/node22/lib/node_modules
        - NPM_CONFIG_OFFLINE: "true"
        - TAR_OPTIONS: "--no-same-owner --no-same-permissions --warning=no-unknown-keyword"
    build-commands:
      - export ELECTRON="40.0.0"
      - mkdir -p .electron-mirror
      - |
        if [ "$FLATPAK_ARCH" = "x86_64" ]; then
            mv simpliplay/cache/electron/electron-v${ELECTRON}-linux-x64.zip .electron-mirror/
            DIST_SUBDIR="SimpliPlay-linux-x64"
        elif [ "$FLATPAK_ARCH" = "aarch64" ]; then
            mv simpliplay/cache/electron/electron-v${ELECTRON}-linux-arm64.zip .electron-mirror/
            DIST_SUBDIR="SimpliPlay-linux-arm64"
        fi
  
        chmod -R +x simpliplay/node_modules/
        sed -i 's/"electron": "\^$ELECTRON"/"electron": "$ELECTRON"/g' simpliplay/package.json
        ROOT_DIR="$(pwd)"
        export ELECTRON_SKIP_BINARY_DOWNLOAD=1
          
        cd simpliplay
        ./node_modules/.bin/electron-packager . SimpliPlay \
          --platform=linux \
          --out=dist/ \
          --overwrite \
          --no-prune \
          --electron-zip-dir="$ROOT_DIR/.electron-mirror"
  
        mkdir -p /app/lib/SimpliPlay
        cp -r dist/$DIST_SUBDIR/* /app/lib/SimpliPlay/
      - install -Dm644 simpliplay/icon.png /app/share/icons/hicolor/512x512/apps/me.anirudhsevugan.SimpliPlay.png
      - install -Dm644 simpliplay/me.anirudhsevugan.SimpliPlay.desktop /app/share/applications/me.anirudhsevugan.SimpliPlay.desktop
      - install -Dm644 simpliplay/me.anirudhsevugan.SimpliPlay.metainfo.xml /app/share/metainfo/me.anirudhsevugan.SimpliPlay.metainfo.xml
      - install -Dm755 run.sh /app/bin/run.sh

    sources:
      - type: archive
        url: https://github.com/A-Star100/simpliplay-desktop/releases/download/flatpak-2.2.0.0-r1/simpliplay-vendor-v5.tar.gz
        sha256: f8a24da768dae637ef4112d10f1959682ec1ff893d1b4d73eae3304ee1d3f2f0
      - type: script
        dest-filename: run.sh
        commands:
          - 'export WAYLAND_DISPLAY=""'
          - 'export XDG_SESSION_TYPE="x11"'
          - 'exec zypak-wrapper /app/lib/SimpliPlay/SimpliPlay --ozone-platform=x11 "$@"'
      - type: patch
        path: resolve-persistent-snapshot-path.patch
