app-id: me.anirudhsevugan.SimpliPlay
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: run.sh
separate-locales: false
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --filesystem=xdg-download
  - --persist=simpliplay-snapshots
  - --device=dri

modules:
  - name: simpliplay
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node22/bin
      env:
        - NODE_PATH: /usr/lib/sdk/node22/lib/node_modules
        - NPM_CONFIG_OFFLINE: "true"
    build-commands:
      - mkdir -p .electron-bin
      - find . -name "electron-v40.0.0-linux-x64.zip" -exec cp {} .electron-bin/ \;
      
      - ls -R .electron-bin
      
      - chmod -R +x simpliplay/node_modules/
      - chmod -R +x simpliplay/node_modules/.bin/
      
      - |
        sed -i 's/"electron": "\^40.0.0"/"electron": "40.0.0"/g' simpliplay/package.json

      - |
        ROOT_DIR="$(pwd)"
        ZIP_PATH="$ROOT_DIR/.electron-bin/electron-v40.0.0-linux-x64.zip"
        ZIP_DIR="$ROOT_DIR/.electron-bin"
        
        export ELECTRON_SKIP_BINARY_DOWNLOAD=1
        export XDG_CACHE_HOME="$ROOT_DIR/.cache"
        
        cd simpliplay
        
        ./node_modules/.bin/electron-packager . SimpliPlay \
          --platform=linux \
          --arch=x64 \
          --out=dist/ \
          --overwrite \
          --offline \
          --no-prune \
          --download.mode=off \
          --electron-zip="$ZIP_PATH"
          --electron-zip-dir="$ZIP_DIR"
          
      - mkdir -p /app/lib/SimpliPlay
      - cp -r simpliplay/dist/SimpliPlay-linux-x64/* /app/lib/SimpliPlay/
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/me.anirudhsevugan.SimpliPlay.png
      - install -Dm644 me.anirudhsevugan.SimpliPlay.desktop /app/share/applications/me.anirudhsevugan.SimpliPlay.desktop 
      - install -Dm644 me.anirudhsevugan.SimpliPlay.metainfo.xml /app/share/metainfo/me.anirudhsevugan.SimpliPlay.metainfo.xml 
      - install -Dm755 run.sh /app/bin/run.sh
    sources:
      - type: archive
        url: https://github.com/A-Star100/simpliplay-desktop/releases/download/release-2.2.0.0/simpliplay-vendor.tar.gz
        sha256: fe04d8a957f5ba46ff5c0ff2a4e56bcbd9bc4aefa4230683e9eb78d5e3e8542d
      - type: script
        dest-filename: run.sh
        commands:
          - 'exec zypak-wrapper /app/lib/SimpliPlay/SimpliPlay --ozone-platform=x11 "$@"'
      - type: file
        path: me.anirudhsevugan.SimpliPlay.desktop
      - type: file
        path: me.anirudhsevugan.SimpliPlay.metainfo.xml
      - type: file
        path: icon.png
