app-id: me.anirudhsevugan.SimpliPlay # thanks to Nuclear audio player repo for the basis of this YAML
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: run.sh
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --filesystem=xdg-download
  - --persist=simpliplay-snapshots
  - --device=dri

modules:
  - name: simpliplay
    buildsystem: simple
    build-commands:
    - mkdir -p /app/main/
    - cp -r linux-unpacked/* /app/main/
    - chmod +x /app/main/SimpliPlay
    - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/me.anirudhsevugan.SimpliPlay.png # move icon to global share so system can access it properly
    - install -Dm644 me.anirudhsevugan.SimpliPlay.desktop /app/share/applications/me.anirudhsevugan.SimpliPlay.desktop # move desktop to global share so system can access it properly
    - install -Dm644 me.anirudhsevugan.SimpliPlay.metainfo.xml /app/share/metainfo/me.anirudhsevugan.SimpliPlay.metainfo.xml # move metadata to global share so system can access it properly
    - install -Dm755 run.sh /app/bin/run.sh
    cleanup:
      - /main/icon.png
      - /main/me.anirudhsevugan.SimpliPlay.desktop
      - /main/me.anirudhsevugan.SimpliPlay.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/A-Star100/simpliplay-desktop/releases/download/release-2.2.0.0/simpliplay-linux-x64-unpacked.tar.gz
        sha256: 8fdb4f3c502527645d4c8631c0330130f89400287c626d6e527e9f6184227db8
      - type: script
        dest-filename: run.sh
        commands:
          - 'zypak-wrapper /app/main/SimpliPlay "$@"'
      - type: file
        path: me.anirudhsevugan.SimpliPlay.desktop
      - type: file
        path: me.anirudhsevugan.SimpliPlay.metainfo.xml
      - type: file
        path: icon.png
