app-id: tr.org.pardus.pen
runtime: org.kde.Platform
runtime-version: 6.7
sdk: org.kde.Sdk
command: pardus-pen
finish-args:
  - --socket=x11
  - --device=dri
  - --share=ipc

modules:
  - name: pardus-pen
    buildsystem: meson
    build-options:
      append-path: /usr/libexec
    config-opts:
      - -Dqt=6
      - -Dscreenshot=false
    sources:
      - type: archive
        url: https://github.com/pardus/pardus-pen/archive/a2995315ca9f2a370d002d8bdfac7768fef14730.zip
        sha256: 3f2dd275fbee80c0dcd02f13a06b604360f7b91daf1a00368b64d58d2a243807
    post-install:
      - glib-compile-schemas /app/share/glib-2.0/schemas
      - install -Dm644 ../data/tr.org.pardus.pen.appdata.xml  /app/share/metainfo/tr.org.pardus.pen.metainfo.xml

