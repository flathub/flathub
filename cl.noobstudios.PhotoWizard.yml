app-id: cl.noobstudios.PhotoWizard
runtime: org.kde.Platform
runtime-version: "6.9"
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: "6.9"
command: photowizard

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=cups
  - --filesystem=xdg-pictures
  - --filesystem=xdg-documents

modules:
  - ../python3-pybind11.json
  - ../python3-Pillow.json

  - name: photowizard
    buildsystem: simple
    build-commands:
      - install -Dm755 photowizard_qt.py /app/bin/photowizard
      - install -Dm644 cl.noobstudios.PhotoWizard.desktop /app/share/applications/cl.noobstudios.PhotoWizard.desktop
      - install -Dm644 cl.noobstudios.PhotoWizard.metainfo.xml /app/share/metainfo/cl.noobstudios.PhotoWizard.metainfo.xml
      - install -Dm644 cl.noobstudios.PhotoWizard.png /app/share/icons/hicolor/256x256/apps/cl.noobstudios.PhotoWizard.png
    sources:
      - type: file
        path: ../photowizard_qt.py
        dest-filename: photowizard_qt.py
      - type: file
        path: cl.noobstudios.PhotoWizard.desktop
      - type: file
        path: cl.noobstudios.PhotoWizard.metainfo.xml
      - type: file
        path: ../assets/cl.noobstudios.PhotoWizard.png
        dest-filename: cl.noobstudios.PhotoWizard.png
