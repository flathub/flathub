id: com.flow_browser.flow
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
sdk-extentions:
  - org.freedesktop.Sdk.Extension.node22
build-option:
  append-path: /usr/lib/sdk/node22/bin
  cflags: -O2 -g
  cxxflags: -O2 -g
  env:
    NPM_CONFIG_LOG_LEVEL: info

command: run.sh

separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=org.mpris.MediaPlayer2.com.flow_browser.flow

modules:
  - name: flow-browser
    buildsystem: simple
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/flow-broswer/flatpak-node/cache
        npm_config_cache: /run/build/flatpak/flatpak-node/npm-cache
        npm-config_nodedir: /usr/lib/sdk/node22
        npm_config_ofline: 'true'
      subdir: main
      sources:
        - type: archive
          url: https://github.com/MultiboxLabs/flow-browser/archive/refs/tags/v0.10.1.tar.gz
          sha256: a2feb3f1cf002a2e4e8900f718cc5c54db4ad174e48bfcfbddcd588c7b716d5b
          dest: main
        - type: script
          dest-filename: run.sh
          commands:
            - zypak-wrapper /app/main/flow-broswer "$@"
    build-commands:
      - npm install --offline
      - |
        . ../flatpak-node/electron-builder-arch-args.sh
        npm run dist -- $ELECTRON_BUILDER_ARCH_ARGS  --linux --dir
      - cp -a dist/linux*unpacked /app/main
      - install -Dm755 -t /app/bin/ ../run.sh