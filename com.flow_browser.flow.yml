id: com.flow_browser.flow
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
build-options:
  append-path: /usr/lib/sdk/node22/bin
  cflags: -O2 -g
  cxxflags: -O2 -g
  env:
    NPM_CONFIG_LOG_LEVEL: info

command: run.sh

separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=org.mpris.MediaPlayer2.com.flow_browser.flow

modules:
  - name: flow-browser
    buildsystem: simple
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/flow-browser/flatpak-node/cache
        npm_config_cache: /run/build/flow-browser/flatpak-node/npm-cache
        npm_config_nodedir: /usr/lib/sdk/node22
        npm_config_offline: 'true'
    subdir: main
    sources:
      - type: archive
        url: https://github.com/MultiboxLabs/flow-browser/archive/refs/tags/v0.10.1.tar.gz
        sha256: a2909e98d11bdf0a9501a01a29fb7275de0c1a66d4c1c98803f1540a78362510
        dest: main
      - generated-sources.json
      - type: script
        dest-filename: run.sh
        commands:
          - zypak-wrapper /app/main/flow-browser "$@"
    build-commands:
      - npm install --offline
      - |
        . ../flatpak-node/electron-builder-arch-args.sh
        npm run dist -- $ELECTRON_BUILDER_ARCH_ARGS  --linux --dir
      - cp -a dist/linux*unpacked /app/main
      - install -Dm755 -t /app/bin/ ../run.sh
