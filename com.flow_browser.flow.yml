id: com.flow_browser.flow
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
build-options:
  append-path: /usr/lib/sdk/node22/bin:/run/build/flow-browser/bun-bin

command: run.sh

separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --env=ZYPAK_ZYGOTE_STRATEGY_SPAWN=0
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - name: flow-browser
    buildsystem: simple
    build-options:
      env:
        BUN_INSTALL_CACHE_DIR: /run/build/flow-browser/bun_cache
        npm_config_nodedir: /run/build/flow-browser/electron-headers
        electron_config_cache: /run/build/flow-browser/electron-cache
    subdir: main
    sources:
      - type: archive
        url: https://github.com/MultiboxLabs/flow-browser/archive/refs/tags/v0.10.3.tar.gz
        sha256: 55c7266f803de73c40276c35a0de4371751176fc0af89ddd3b552aec967f5b7f
        dest: main
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
          url: https://github.com/MultiboxLabs/flow-browser.git
          is-main-source: true
      - generated-sources.json
      - type: archive
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.10/bun-linux-x64.zip
        sha256: f57bc0187e39623de716ba3a389fda5486b2d7be7131a980ba54dc7b733d2e08
        dest: bun-bin
        only-arches:
          - x86_64
      - type: archive
        url: https://github.com/oven-sh/bun/releases/download/bun-v1.3.10/bun-linux-aarch64.zip
        sha256: fa5ecb25cafa8e8f5c87a0f833719d46dd0af0a86c7837d806531212d55636d3
        dest: bun-bin
        only-arches:
          - aarch64
      - type: script
        dest-filename: run.sh
        commands:
          - |
            EXTRA_ARGS=()
            WL_DISPLAY="${WAYLAND_DISPLAY:-wayland-0}"
            if [ -e "${XDG_RUNTIME_DIR}/${WL_DISPLAY}" ] || [ -e "/${WL_DISPLAY}" ]; then
              if [ -c /dev/nvidia0 ]; then
                EXTRA_ARGS+=(--disable-gpu-sandbox)
              fi
            fi
            exec zypak-wrapper /app/main/flow-browser "${EXTRA_ARGS[@]}" "$@"
    build-commands:
      - find ../bun_cache -name package.tgz -execdir tar --strip-components=1 --delay-directory-restore -xf {} \; -delete
      - chmod -R u+rwX ../bun_cache
      - |
        if [ "$FLATPAK_ARCH" = "aarch64" ]; then
          ELECTRON_SKIP_BINARY_DOWNLOAD=1 bun install
          bun run script:use-stock-electron
          rm -rf node_modules/electron
          bun install
        else
          bun install
        fi
      - bun run postinstall
      - bun run build
      - |
        case "$FLATPAK_ARCH" in
          "x86_64")   ARCH_ARGS="--x64" ;;
          "aarch64")  ARCH_ARGS="--arm64" ;;
        esac
        ./node_modules/.bin/electron-builder $ARCH_ARGS --linux --dir
      - cp -a dist/linux*unpacked /app/main
      - install -Dm755 -t /app/bin/ ../run.sh
      - install -Dm644 com.flow_browser.flow.metainfo.xml /app/share/metainfo/com.flow_browser.flow.metainfo.xml
      - install -Dm644 com.flow_browser.flow.desktop /app/share/applications/com.flow_browser.flow.desktop
      - install -Dm644 com.flow_browser.flow.png /app/share/icons/hicolor/512x512/apps/com.flow_browser.flow.png
