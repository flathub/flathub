app-id: cat.radiotrama.radio_trama
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.flutter
command: radio-trama

build-options:
  env:
    PUB_CACHE: /run/build/radio_trama/.pub-cache

finish-args:
  # Permisos per mostrar interfície gràfica
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Permisos per so (mpv/media_kit ho requereix)
  - --socket=pulseaudio
  # Permisos de xarxa (per streaming i descarregar podcasts)
  - --share=network
  # GPU acceleration per Flutter
  - --device=dri

modules:
  - name: radio_trama
    buildsystem: simple
    build-commands:
      # Compilació via SDK descarregat localment (usant cache offline)
      - ./flutter-sdk/flutter/bin/flutter config --no-analytics
      - ./flutter-sdk/flutter/bin/flutter pub get --offline
      - ./flutter-sdk/flutter/bin/flutter build linux --release
      
      # Instal·lació de binaris
      - mkdir -p /app/bin
      - cp -r build/linux/x64/release/bundle/* /app/bin/
      - ln -s /app/bin/radio_trama /app/bin/radio-trama
      
      # Instal·lació de metadades
      - install -Dm644 flatpak/cat.radiotrama.radio_trama.desktop -t /app/share/applications/
      - install -Dm644 flatpak/cat.radiotrama.radio_trama.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 flatpak/cat.radiotrama.radio_trama.png -t /app/share/icons/hicolor/256x256/apps/
      
    sources:
      - type: git
        url: https://gitlab.com/RikRuk/radio_trama.git
        commit: 317a0eae56027ec88fc9d2df51f718ee0cf90691
      - pub-dependencies.json
      - type: archive
        url: https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.41.2-stable.tar.xz
        sha256: 4a04f8a6152986d14fc137ffaf98106ca743c0f9ab66f1bc2f20ee84eb573e5c
        dest: flutter-sdk
