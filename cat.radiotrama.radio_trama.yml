app-id: cat.radiotrama.radio_trama
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: radio-trama

finish-args:
  # Permisos per mostrar interfície gràfica
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Permisos per so (mpv/media_kit ho requereix)
  - --socket=pulseaudio
  # Permisos de xarxa (per streaming i descarregar podcasts)
  - --share=network
  # GPU acceleration per Flutter
  - --device=dri

modules:
  - name: radio_trama
    buildsystem: simple
    build-commands:
      # Compilació via SDK Extension
      - flutter config --no-analytics
      - flutter pub get
      - flutter build linux --release
      
      # Instal·lació de binaris
      - mkdir -p /app/bin
      - cp -r build/linux/x64/release/bundle/* /app/bin/
      - ln -s /app/bin/radio_trama /app/bin/radio-trama
      
      # Instal·lació de metadades
      - install -Dm644 flatpak/cat.radiotrama.radio_trama.desktop -t /app/share/applications/
      - install -Dm644 flatpak/cat.radiotrama.radio_trama.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 flatpak/cat.radiotrama.radio_trama.png -t /app/share/icons/hicolor/256x256/apps/
      
    sources:
      - type: git
        url: https://gitlab.com/RikRuk/radio_trama.git
        branch: main
