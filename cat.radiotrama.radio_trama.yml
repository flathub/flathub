app-id: cat.radiotrama.radio_trama
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: radio-trama
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm21
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/gtk-doc
  - /lib/cmake
  - '*.la'
  - '*.a'
  - '*.h'
build-options:
  append-path: /usr/lib/sdk/llvm21/bin:/var/lib/flutter/bin
  prepend-ld-library-path: /usr/lib/sdk/llvm21/lib
  env:
    PUB_CACHE: /run/build/radio_trama/.pub-cache
    x86_64:
      env:
        BUNDLE_PATH: build/linux/x64/release/bundle
    aarch64:
      env:
        BUNDLE_PATH: build/linux/arm64/release/bundle
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --own-name=org.mpris.MediaPlayer2.cat.radiotrama.radio_trama
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.a11y.Bus
modules:
  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Dvulkan=enabled
      - -Dshaderc=enabled
      - -Dd3d11=disabled
      - -Ddemos=False
      - -Dlibdir=lib
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.349.0
        commit: 1fd3c7bde7b943fe8985c893310b5269a09b46c5
      - type: patch
        path: libplacebo-vulkan-python-xml.patch
  - name: libass
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.3/libass-0.17.3.tar.gz
        sha256: da7c348deb6fa6c24507afab2dee7545ba5dd5bbf90a137bfe9e738f7df68537
  - name: libmpv
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dlua=disabled
      - -Ddebug=false
      - -Dbuild-date=false
      - -Dalsa=disabled
      - -Dlibdir=lib
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        tag: v0.40.0
        commit: e48ac7ce08462f5e33af6ef9deeac6fa87eef01e
  - name: radio_trama
    buildsystem: simple
    build-commands:
      - mkdir -p build/linux/x64/release build/linux/arm64/release
      - cp flatpak_mimalloc_cache/mimalloc-2.1.2.tar.gz build/linux/x64/release/
      - cp flatpak_mimalloc_cache/mimalloc-2.1.2.tar.gz build/linux/arm64/release/
      - setup-flutter.sh
      - flutter config --no-analytics
      - flutter build linux --release
      
      # Clean installation: binary to /app/bin, the rest to a private folder in /app/lib
      - mkdir -p /app/lib/cat.radiotrama.radio_trama
      - cp -r $BUNDLE_PATH/* /app/lib/cat.radiotrama.radio_trama/
      - mkdir -p /app/bin
      - ln -s /app/lib/cat.radiotrama.radio_trama/radio_trama /app/bin/radio-trama
      
      # Metainfo and desktop files
      - install -Dm644 flatpak/cat.radiotrama.radio_trama.desktop -t /app/share/applications/
      - install -Dm644 flatpak/cat.radiotrama.radio_trama.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 flatpak/cat.radiotrama.radio_trama.png -t /app/share/icons/hicolor/256x256/apps/
    
    cleanup:
      - /include
    sources:
      - type: git
        url: https://gitlab.com/RikRuk/radio_trama.git
        commit: e15fe9689503a2364230d4a3a54e19c663714bff
      - generated/sources/pubspec.json
    modules:
      - generated/modules/flutter-sdk-3.38.9.json
