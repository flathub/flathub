id: io.github.switch_bros.SteamLibraryManager
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
cleanup-commands:
  - /app/cleanup-BaseApp.sh
build-options:
  env:
    - BASEAPP_REMOVE_WEBENGINE=1
command: steam-library-manager
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-data/Steam
  - --filesystem=~/.steam
  - --filesystem=~/.var/app/com.valvesoftware.Steam/data/Steam
  - --filesystem=xdg-data/fonts:ro
  - --talk-name=org.freedesktop.secrets

modules:
  - python3-dependencies.json

  - name: steam-library-manager
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app . --no-build-isolation --no-deps
      - cp -r resources $(python3 -c "import site; print(site.getsitepackages()[0])")/resources
      - install -Dm644 flatpak/io.github.switch_bros.SteamLibraryManager.desktop /app/share/applications/io.github.switch_bros.SteamLibraryManager.desktop
      - install -Dm644 flatpak/io.github.switch_bros.SteamLibraryManager.metainfo.xml /app/share/metainfo/io.github.switch_bros.SteamLibraryManager.metainfo.xml
      - install -Dm644 flatpak/io.github.switch_bros.SteamLibraryManager.svg /app/share/icons/hicolor/scalable/apps/io.github.switch_bros.SteamLibraryManager.svg
      - install -Dm644 LICENSE /app/share/licenses/io.github.switch_bros.SteamLibraryManager/LICENSE
    sources:
      - type: git
        url: https://github.com/Switch-Bros/SteamLibraryManager.git
        tag: v1.1.1
        commit: 28ad8d23048fa602343bb7d5f6bb57b646d3953a
