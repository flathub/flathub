app-id: io.github.gaorfg_bit.Mural
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: mural

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:rw
  - --talk-name=ca.desrt.dconf
  - --talk-name=org.freedesktop.portal.Desktop
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf

modules:
  - python3-modules.json
  - name: mural
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin
      - mkdir -p /app/share/mural
      - cp -r mural/* /app/share/mural/
      - |
        echo '#!/bin/sh' > /app/bin/mural
        echo 'exec python3 /app/share/mural/app.py "$@"' >> /app/bin/mural
      - chmod +x /app/bin/mural
      - mkdir -p /app/share/icons/hicolor/128x128/apps/
      - cp mural/data/icons/io.github.gaorfg-bit.Mural.png /app/share/icons/hicolor/128x128/apps/io.github.gaorfg_bit.Mural.png
      - mkdir -p /app/share/applications/
      - cp io.github.gaorfg_bit.Mural.desktop /app/share/applications/
      - mkdir -p /app/share/metainfo/
      - cp io.github.gaorfg_bit.Mural.metainfo.xml /app/share/metainfo/
    sources:
      - type: dir
        path: .
