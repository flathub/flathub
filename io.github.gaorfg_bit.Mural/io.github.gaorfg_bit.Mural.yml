app-id: io.github.gaorfg_bit.Mural
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: mural

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-pictures
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Flatpak

modules:
  - python3-modules.json
  - name: mural
    buildsystem: simple
    build-commands:
      - install -Dm755 mural.sh /app/bin/mural
      - install -Dm644 mural/data/icons/io.github.gaorfg-bit.Mural.png
          /app/share/icons/hicolor/512x512/apps/io.github.gaorfg_bit.Mural.png
      - install -Dm644 io.github.gaorfg_bit.Mural.desktop
          /app/share/applications/io.github.gaorfg_bit.Mural.desktop
      - install -Dm644 io.github.gaorfg_bit.Mural.metainfo.xml
          /app/share/metainfo/io.github.gaorfg_bit.Mural.metainfo.xml
      - cp -r mural /app/share/mural
    sources:
      - type: git
        url: https://github.com/gaorfg-bit/Mural.git
        commit: 47d2b363dfb99f8afea18d0744244ab37f4ee0d7
