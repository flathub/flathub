app-id: net.huitsi.PhantomOverload
base: org.godotengine.godot.BaseApp
base-version: '4.6'
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: godot-runner
finish-args:
- --socket=wayland
- --socket=fallback-x11
- --share=ipc
- --device=dri
- --socket=pulseaudio
- --share=network
modules:
- name: phantom-overload
  buildsystem: simple
  build-commands:
  - install -D -m644 PhantomOverload.pck /app/bin/godot-runner.pck
  - install -D -m644 icon.svg /app/share/icons/hicolor/scalable/apps/net.huitsi.PhantomOverload.svg
  - install -D -m644 net.huitsi.PhantomOverload.metainfo.xml -t /app/share/metainfo/
  - install -D -m644 net.huitsi.PhantomOverload.desktop -t /app/share/applications/
  - install -D -m644 LICENSES/GPL-3.0-or-later.txt -t /app/share/licenses/net.huitsi.PhantomOverload/phantom-overload
  - install -D -m644 LICENSES/CC0-1.0.txt -t /app/share/licenses/net.huitsi.PhantomOverload/phantom-overload
  sources:
