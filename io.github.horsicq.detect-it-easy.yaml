app-id: io.github.horsicq.detect-it-easy
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: die

finish-args:
  - --device=dri
  - --share=ipc
  - --share=network # For uploading files to VirusTotal.
  - --socket=wayland
  - --socket=fallback-x11

modules:
  - name: detect-it-easy
    buildsystem: qmake
    sources:
      - type: archive
        url: https://github.com/horsicq/DIE-engine/releases/download/3.21/die_sourcecode_3.21.tar.gz
        sha256: 01bc8b06f21e25523b9bb871509e10bbbd00dcb5da25c6d713d5078311585a22
        x-checker-data:
          type: anitya
          project-id: 382809
          url-template: https://github.com/horsicq/DIE-engine/releases/download/$version/die_sourcecode_$version.tar.gz
      - type: patch
        path: patches/0001-linux-metadata-add-changelog-for-the-last-3-versions.patch
