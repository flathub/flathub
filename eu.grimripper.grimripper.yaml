id: eu.grimripper.grimripper
runtime: org.gnome.Platform
sdk: org.gnome.Sdk
runtime-version: "50"
command: grimripper
finish-args:
  - --socket=wayland
  - --socket=fallback-x11

  # From Flatpak docs:
  # This is not necessarily required, but without it the X11 shared memory
  # extension will not work, which is very bad for X11 performance.
  - --share=ipc

  # Required for CD drive access
  # https://github.com/flatpak/flatpak/issues/12
  - --device=all

  # Required to load music metadata
  - --share=network

  # The default output directory is the user's music directory. Avoid having to
  # open a portal for that.
  - --filesystem=xdg-music

cleanup:
  - /man
  - /include
  - /share/man
  - /share/doc
  - /lib/*.a
  - /lib/*.la

modules:
  # The config.guess patches are required because the latest version of the
  # libcddb is from 2008, long before aarch64 existed.
  - name: libcddb
    buildsystem: autotools
    sources:
      - type: archive
        url: http://downloads.sourceforge.net/project/libcddb/libcddb/1.3.2/libcddb-1.3.2.tar.bz2
        sha256: 35ce0ee1741ea38def304ddfe84a958901413aa829698357f0bee5bb8f0a223b
      - type: shell
        commands:
          - cp -p /usr/share/automake-*/config.{sub,guess} .
      - type: patch
        path: patches/libcddb-pointer-types.patch
        strip-components: 0

  - name: cdparanoia
    buildsystem: meson
    builddir: true
    sources:
      - type: archive
        url: http://downloads.xiph.org/releases/cdparanoia/cdparanoia-III-10.2.src.tgz
        sha256: 005db45ef4ee017f5c32ec124f913a0546e77014266c6a1c50df902a55fe64df
      - type: file
        path: patches/cdparanoia.meson
        dest-filename: meson.build

  - name: vorbis-tools
    buildsystem: autotools
    no-autogen: true
    config-opts:
      - --disable-ogg123
      - --disable-oggdec
      - --disable-ogginfo
      - --disable-vcut
      - --disable-vorbiscomment
      - --disable-oggtest
      - --disable-vorbistest
      - --disable-curltest
    sources:
      - type: archive
        url: https://downloads.xiph.org/releases/vorbis/vorbis-tools-1.4.3.tar.gz
        sha256: a1fe3ddc6777bdcebf6b797e7edfe0437954b24756ffcc8c6b816b63e0460dde

  - name: lame
    buildsystem: autotools
    no-autogen: true
    config-opts:
      - --disable-shared
      - --disable-dependency-tracking
      - --disable-gtktest
      - --disable-decoder
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz
        sha256: ddfe36cab873794038ae2c1210557ad34857a4b6bdc515785d1da9e175b1da1e
      - type: patch
        path: patches/lame-3.99.5-tinfo.patch
        strip-components: 0
      - type: shell
        commands:
          - autoconf

  - name: grimripper
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://gitlab.gnome.org/tanuva/grimripper.git
        commit: f48970c8151c37ada021983a39c4f0fa31033787
