id: eu.grimripper.grimripper
runtime: org.gnome.Platform
sdk: org.gnome.Sdk
runtime-version: "50"
command: grimripper
finish-args:
  - --socket=wayland
  - --socket=fallback-x11

  # From Flatpak docs:
  # This is not necessarily required, but without it the X11 shared memory
  # extension will not work, which is very bad for X11 performance.
  - --share=ipc

  # Required for CD drive access
  # https://github.com/flatpak/flatpak/issues/12
  - --device=all

  # Required to load music metadata
  - --share=network

cleanup:
  - /man
  - /include
  - /share/man
  - /share/doc
  - /lib/*.a
  - /lib/*.la

modules:
  # The config.guess patches are required because the latest version of the
  # libcddb is from 2008, long before aarch64 existed.
  - name: libcddb
    buildsystem: autotools
    sources:
      - type: archive
        url: http://downloads.sourceforge.net/project/libcddb/libcddb/1.3.2/libcddb-1.3.2.tar.bz2
        sha256: 35ce0ee1741ea38def304ddfe84a958901413aa829698357f0bee5bb8f0a223b
      - type: shell
        commands:
          - cp -p /usr/share/automake-*/config.{sub,guess} .
      - type: patch
        path: ../../patches/libcddb-pointer-types.patch
        strip-components: 0

  - name: cdparanoia
    buildsystem: meson
    builddir: true
    sources:
      - type: archive
        url: http://downloads.xiph.org/releases/cdparanoia/cdparanoia-III-10.2.src.tgz
        sha256: 005db45ef4ee017f5c32ec124f913a0546e77014266c6a1c50df902a55fe64df
      - type: file
        path: cdparanoia.meson
        dest-filename: meson.build

  - name: grimripper
    buildsystem: meson
    builddir: true
    sources:
      - type: git
        url: https://gitlab.gnome.org/tanuva/grimripper.git
        commit: e448db9bc5d14bccf4af9c769f319d7da23e6b5f
