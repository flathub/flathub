app-id: io.github.laserlicht.TowerOops
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
command: toweroops
rename-appdata-file: toweroops.appdata
rename-desktop-file: toweroops.desktop
rename-icon: toweroops
copy-icon: true
modules:
  - name: toweroops
    buildsystem: simple
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml
      - cargo --offline build
      - install -Dm755 ./target/debug/toweroops -t /app/bin
      - mkdir -p /app/bin/resources
      - cp -r ./resources/* /app/bin/resources/
      - install -Dm644 toweroops.desktop /app/share/applications/toweroops.desktop
      - install -Dm644 toweroops.appdata /app/share/metainfo/toweroops.appdata
      - install -Dm644 resources/icon.svg /app/share/icons/hicolor/scalable/apps/toweroops.svg
      - rsvg-convert -w 64 -h 64 resources/icon.svg -o 64.png
      - rsvg-convert -w 128 -h 128 resources/icon.svg -o 128.png
      - rsvg-convert -w 256 -h 256 resources/icon.svg -o 256.png
      - install -Dm644 64.png /app/share/icons/hicolor/64x64/apps/toweroops.png
      - install -Dm644 128.png /app/share/icons/hicolor/128x128/apps/toweroops.png
      - install -Dm644 256.png /app/share/icons/hicolor/256x256/apps/toweroops.png

    sources:
      - type: git
        url: https://github.com/Laserlicht/toweroops
        commit: fc1748ec708085b17b87de9d2f13748c463d0119
        tag: 0.1.0
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$
      # sources for cargo dependencies generated by https://github.com/flatpak/flatpak-builder-tools/tree/master/cargo
      - cargo-sources.json
      - type: file
        path: toweroops.desktop
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/toweroops/cargo
