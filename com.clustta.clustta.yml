app-id: com.clustta.clustta
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: clustta

finish-args:
  # Display
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  # GPU acceleration for WebKitGTK
  - --device=dri
  # Network access for sync and collaboration
  - --share=network
  # Keyring access for authentication tokens
  - --talk-name=org.freedesktop.secrets
  # System tray icon
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - name: clustta
    buildsystem: simple
    build-commands:
      - install -Dm755 clustta -t /app/bin/
      - install -Dm644 com.clustta.clustta.desktop -t /app/share/applications/
      - install -Dm644 com.clustta.clustta.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 appicon-256.png /app/share/icons/hicolor/256x256/apps/com.clustta.clustta.png
      - install -Dm644 clustta-clst.xml /app/share/mime/packages/com.clustta.clustta-clst.xml
    sources:
      - type: file
        url: https://github.com/eaxum/clustta-client/releases/download/v0.4.33/clustta-0.4.33-linux-amd64
        sha256: d418d2fbc9a9f6351ca81c24819492a46f84b81b88ec9810bb07d555b39e39db
        dest-filename: clustta
      - type: file
        path: com.clustta.clustta.desktop
      - type: file
        path: com.clustta.clustta.metainfo.xml
      - type: file
        path: appicon-256.png
      - type: file
        path: clustta-clst.xml
