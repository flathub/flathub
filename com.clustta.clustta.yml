app-id: com.clustta.clustta
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
  - org.freedesktop.Sdk.Extension.node20

command: clustta

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --talk-name=org.kde.StatusNotifierWatcher

build-options:
  append-path: /usr/lib/sdk/golang/bin:/usr/lib/sdk/node20/bin
  env:
    GOPATH: /run/build/clustta/go
    GOBIN: /run/build/clustta/go/bin
    npm_config_nodedir: /usr/lib/sdk/node20

modules:
  - name: clustta
    buildsystem: simple
    build-commands:
      # Configure yarn to use offline mirror
      - yarn config set yarn-offline-mirror "$PWD/flatpak-node/yarn-mirror"
      # Build frontend
      - cd frontend && yarn install --offline --frozen-lockfile
      - cd frontend && yarn build
      # Build Go binary with vendored dependencies
      - |
        . /usr/lib/sdk/golang/enable.sh
        CGO_ENABLED=1 go build -mod=vendor -tags production -trimpath -buildvcs=false \
          -ldflags="-w -s" -o /app/bin/clustta
      # Install desktop integration files
      - install -Dm644 build/linux/com.clustta.clustta.desktop /app/share/applications/com.clustta.clustta.desktop
      - install -Dm644 build/linux/com.clustta.clustta.metainfo.xml /app/share/metainfo/com.clustta.clustta.metainfo.xml
      - install -Dm644 build/linux/com.clustta.clustta-clst.xml /app/share/mime/packages/com.clustta.clustta-clst.xml
      - |
        if command -v ffmpeg >/dev/null 2>&1; then
          ffmpeg -y -i build/appicon.png -vf scale=256:256 /tmp/appicon-256.png
          install -Dm644 /tmp/appicon-256.png /app/share/icons/hicolor/256x256/apps/com.clustta.clustta.png
        else
          install -Dm644 build/appicon.png /app/share/icons/hicolor/256x256/apps/com.clustta.clustta.png
        fi
    sources:
      - type: git
        url: https://github.com/eaxum/clustta-client.git
        tag: v0.4.34
        commit: 563ec09726289d324862e6e0dadf637074c9f650
      - generated-sources.json
