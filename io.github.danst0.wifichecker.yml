app-id: io.github.danst0.wifichecker
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: wifichecker

finish-args:
  # Display
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Network access (for iperf tests and wifi scanning)
  - --share=network
  # D-Bus access to NetworkManager for wifi scanning
  - --system-talk-name=org.freedesktop.NetworkManager

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/wifichecker/cargo
    RUST_BACKTRACE: '1'

modules:
  - name: iperf3
    buildsystem: autotools
    build-options:
      cflags: -Wno-incompatible-pointer-types
    # To update: download the tarball and run `sha256sum iperf-<version>.tar.gz`
    # Latest releases: https://downloads.es.net/pub/iperf/
    sources:
      - type: archive
        url: https://downloads.es.net/pub/iperf/iperf-3.18.tar.gz
        sha256: c0618175514331e766522500e20c94bfb293b4424eb27d7207fb427b88d20bab

  - name: poppler-data
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://poppler.freedesktop.org/poppler-data-0.4.12.tar.gz
        sha256: c835b640a40ce357e1b83666aabd95edffa24ddddd49b8daff63adb851cdab74

  - name: poppler
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_BOOST=OFF
      - -DENABLE_CPP=OFF
      - -DENABLE_GLIB=ON
      - -DENABLE_GTK_DOC=OFF
      - -DENABLE_LIBOPENJPEG=none
      - -DENABLE_QT5=OFF
      - -DENABLE_QT6=OFF
      - -DENABLE_UTILS=OFF
      - -DBUILD_GTK_TESTS=OFF
      - -DBUILD_QT5_TESTS=OFF
      - -DBUILD_QT6_TESTS=OFF
      - -DBUILD_CPP_TESTS=OFF
      - -DBUILD_MANUAL_TESTS=OFF
    sources:
      - type: archive
        url: https://poppler.freedesktop.org/poppler-25.04.0.tar.xz
        sha256: b010c596dce127fba88532fd2f1043e55ea30601767952d0f2c0a80e7dc0da3d

  - name: wifichecker
    buildsystem: simple
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose
      - install -Dm755 target/release/wifichecker /app/bin/wifichecker
      - install -Dm644 data/io.github.danst0.wifichecker.desktop
          /app/share/applications/io.github.danst0.wifichecker.desktop
      - install -Dm644 data/io.github.danst0.wifichecker.metainfo.xml
          /app/share/metainfo/io.github.danst0.wifichecker.metainfo.xml
      - install -Dm644 data/icons/scalable/apps/io.github.danst0.wifichecker.png
          /app/share/icons/hicolor/512x512/apps/io.github.danst0.wifichecker.png
    sources:
      - type: git
        url: https://github.com/danst0/wifichecker.git
        tag: v0.1.7
        commit: 54a1f60de76300b8622d9d4e570bfba6f4fd39f9
      - cargo-sources.json
