app-id: io.github.UnDadFeated.ChronoArchiver
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: chronoarchiver
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=ssh-auth
  - --device=dri
  - --filesystem=xdg-download
  - --filesystem=xdg-pictures
  - --filesystem=xdg-videos
  - --filesystem=xdg-documents
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: chronoarchiver
    buildsystem: simple
    build-commands:
      - install -d /app/share/chronoarchiver
      - cp -a src /app/share/chronoarchiver/
      - install -Dm644 pyproject.toml /app/share/chronoarchiver/pyproject.toml
      - install -Dm644 requirements.txt /app/share/chronoarchiver/requirements.txt
      - install -d /app/bin
      - install -Dm755 flatpak/chronoarchiver-launcher /app/bin/chronoarchiver
      - install -Dm644 flatpak/io.github.UnDadFeated.ChronoArchiver.desktop /app/share/applications/io.github.UnDadFeated.ChronoArchiver.desktop
      - install -Dm644 flatpak/io.github.UnDadFeated.ChronoArchiver.metainfo.xml /app/share/metainfo/io.github.UnDadFeated.ChronoArchiver.metainfo.xml
      - install -Dm644 src/ui/assets/icon.png /app/share/icons/hicolor/256x256/apps/io.github.UnDadFeated.ChronoArchiver.png
      - install -Dm644 src/ui/assets/icon.png /app/share/icons/hicolor/128x128/apps/io.github.UnDadFeated.ChronoArchiver.png
    sources:
      - type: archive
        url: https://github.com/UnDadFeated/ChronoArchiver/archive/refs/tags/v6.0.1.tar.gz
        sha256: 7e142d6183fbee72a28a904c7a98ea8ab2d1789d156958780034bd938eb188aa
        x-checker-data:
          type: anitya
          project-id: 429940
          stable-only: true
          url-template: https://github.com/UnDadFeated/ChronoArchiver/archive/refs/tags/v$version.tar.gz
