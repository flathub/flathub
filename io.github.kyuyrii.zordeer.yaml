app-id: io.github.kyuyrii.zordeer
sdk: org.kde.Sdk
runtime: org.kde.Platform
runtime-version: &runtime-version '6.10'
x-gl-version: &gl-version '1.4'
x-gl-versions: &gl-versions 25.08;25.08extra;1.4
x-gl-merge-dirs: &gl-merge-dirs vulkan/icd.d;glvnd/egl_vendor.d;egl/egl_external_platform.d;OpenCL/vendors;lib/dri;lib/d3d;lib/gbm;vulkan/explicit_layer.d;vulkan/implicit_layer.d
command: zordeer
base: org.winehq.Wine
base-version: stable-25.08

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio # notification sound
  - --allow=devel # ubisoft connect and other launchers
  - --allow=multiarch
  - --allow=per-app-dev-shm  # pressure-vessel
  - --device=all
  - --talk-name=org.kde.StatusNotifierWatcher # system tray
  - --env=PATH=/app/bin:/app/utils/bin:/usr/bin:/usr/lib/extensions/vulkan/MangoHud/bin # mangohud
  - --env=QT_PLUGIN_PATH=/usr/share/runtime/lib/plugins:/usr/lib/plugins
  - --env=ZORDEER_DIR_APP_ID=0 # 0 = $HOME/App/Zordeer. 1 = $HOME/.var/app/io.github.kyuyrii.zordeer/App/Zordeer
  - --filesystem=xdg-desktop
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --filesystem=xdg-music
  - --filesystem=xdg-pictures
  - --filesystem=xdg-public-share
  - --filesystem=xdg-videos
  - --filesystem=~/.config
  - --filesystem=~/.local/share/applications
  - --filesystem=~/.local/share/desktop-directories
  - --filesystem=~/.icons
  - --filesystem=~/.themes
  - --filesystem=~/.wine
  - --filesystem=~/App
  - --filesystem=~/Games
  - --filesystem=~/snap/zordeer
  - --filesystem=/media
  - --filesystem=/mnt
  - --filesystem=/run/media

inherit-extensions:
  - org.freedesktop.Platform.GL32
  - org.freedesktop.Platform.Compat.i386

add-extensions:
  org.freedesktop.Platform.VAAPI.Intel.i386:
    directory: lib/i386-linux-gnu/dri/intel-vaapi-driver
    version: *runtime-version
    versions: *runtime-version
    autodelete: false
    no-autodownload: true
    add-ld-path: lib
    download-if: have-intel-gpu
    autoprune-unless: have-intel-gpu

modules:
  - name: bundle-setup
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/i386-linux-gnu
      - mkdir -p /app/lib/debug/lib/i386-linux-gnu
      - mkdir -p /app/lib/i386-linux-gnu/GL
      - mkdir -p /app/lib/i386-linux-gnu/dri/intel-vaapi-driver
      - install -Dm644 ld.so.conf /app/etc/ld.so.conf
    sources:
      - type: inline
        dest-filename: ld.so.conf
        contents: |
          /app/lib32
          /app/lib/i386-linux-gnu

  - name: python3-dbus
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/dbus/dbus-python.git
        tag: dbus-python-1.4.0
        commit: d4c4e537d5afccd7e88b232e09393806955f238a

  - name: zordeer-app
    builddir: true
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/Kyuyrii/Zordeer.git
        tag: 1.7.11
        commit: efe255e4fa98a16e4326cf360a125db7e9226341
#        branch: main
      - type: file
        path: io.github.kyuyrii.zordeer.metainfo.xml
    build-commands:
      - cp -r translation /app/bin
      - install -Dm755 zordeer /app/bin/zordeer
      - install -Dm644 io.github.kyuyrii.zordeer.svg /app/bin/io.github.kyuyrii.zordeer.svg
      - install -Dm644 io.github.kyuyrii.zordeer.desktop /app/share/applications/io.github.kyuyrii.zordeer.desktop
      - install -Dm644 io.github.kyuyrii.zordeer.svg /app/share/icons/hicolor/scalable/apps/io.github.kyuyrii.zordeer.svg
      - install -Dm644 io.github.kyuyrii.zordeer.metainfo.xml /app/share/metainfo/io.github.kyuyrii.zordeer.metainfo.xml
      - desktop-file-edit --set-name="Zordeer [Flatpak]" /app/share/applications/io.github.kyuyrii.zordeer.desktop

    modules:
      - modules/python3-psutil.json
      - modules/python3-pyqt6.json
      - modules/python3-requests.json
      - modules/python3-toml.json