app-id: io.github.kyuyrii.zordeer
sdk: org.kde.Sdk
runtime: org.kde.Platform
runtime-version: '6.10'
x-runtime-version: &runtime-version '25.08'
x-runtime-version-extra: &runtime-version-extra '25.08-extra'
x-gl-version: &gl-version '1.4'
x-gl-versions: &gl-versions '25.08;25.08-extra;1.4'
x-gl-merge-dirs: &gl-merge-dirs vulkan/icd.d;glvnd/egl_vendor.d;egl/egl_external_platform.d;OpenCL/vendors;lib/dri;lib/d3d;lib/gbm;vulkan/explicit_layer.d;vulkan/implicit_layer.d;vdpau
command: zordeer
separate-locales: false # translations
base: org.winehq.Wine
base-version: stable-25.08

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio # notification sound
  - --allow=devel # ubisoft connect and other launchers
  - --allow=multiarch
  - --allow=per-app-dev-shm  # pressure-vessel
  - --device=all
  - --system-talk-name=org.freedesktop.UDisks2
  - --talk-name=org.kde.StatusNotifierWatcher # system tray
  - --env=QT_PLUGIN_PATH=/usr/share/runtime/lib/plugins:/usr/lib/plugins
  - --env=GST_PLUGIN_SYSTEM_PATH=/app/lib/gstreamer-1.0:/app/lib32/gstreamer-1.0:/usr/lib/extensions/gstreamer-1.0:/usr/lib/x86_64-linux-gnu/codecs-extra/lib/gstreamer-1.0:/usr/lib/i386-linux-gnu/codecs-extra/lib/gstreamer-1.0:/usr/lib/x86_64-linux-gnu/gstreamer-1.0:/usr/lib/i386-linux-gnu/gstreamer-1.0
  - --filesystem=xdg-download
  - --filesystem=~/App
  - --filesystem=~/Games
  - --filesystem=~/GOG Games
  - --filesystem=/media
  - --filesystem=/mnt
  - --filesystem=/run/media

inherit-extensions:
  - org.winehq.Wine.gecko
  - org.winehq.Wine.mono

add-extensions:
# The x86_64 extensions are listed because UMU was unable to find the .so files correctly.

  org.freedesktop.Platform.Compat.i386:
    directory: lib/i386-linux-gnu
    version: *runtime-version

  org.freedesktop.Platform.GL32:
    directory: lib/i386-linux-gnu/GL
    version: *gl-version
    versions: *gl-versions
    subdirectories: true
    no-autodownload: true
    autodelete: false
    add-ld-path: lib
    merge-dirs: *gl-merge-dirs
    download-if: active-gl-driver
    enable-if: active-gl-driver
    autoprune-unless: active-gl-driver

  org.freedesktop.Platform.GL:
    directory: lib/x86_64-linux-gnu/GL
    version: *gl-version
    versions: *gl-versions
    subdirectories: true
    no-autodownload: true
    autodelete: false
    add-ld-path: lib
    merge-dirs: *gl-merge-dirs
    download-if: active-gl-driver
    enable-if: active-gl-driver
    autoprune-unless: active-gl-driver

  org.freedesktop.Platform.VAAPI.Intel.i386:
    directory: lib/i386-linux-gnu/dri/intel-vaapi-driver
    version: *runtime-version
    versions: *runtime-version
    autodelete: false
    no-autodownload: true
    add-ld-path: lib
    download-if: have-intel-gpu
    autoprune-unless: have-intel-gpu

  org.freedesktop.Platform.VAAPI.Intel:
    directory: lib/x86_64-linux-gnu/dri/intel-vaapi-driver
    version: *runtime-version
    versions: *runtime-version
    autodelete: false
    no-autodownload: true
    add-ld-path: lib
    download-if: have-intel-gpu
    autoprune-unless: have-intel-gpu

  org.freedesktop.Platform.VAAPI.nvidia.i386:
    directory: i386/nvidia-vaapi-driver
    version: *runtime-version
    versions: *runtime-version
    autodelete: false
    no-autodownload: true
    add-ld-path: lib
    download-if: have-kernel-module-nvidia
    autoprune-unless: have-kernel-module-nvidia

  org.freedesktop.Platform.VAAPI.nvidia:
    directory: x86_64/nvidia-vaapi-driver
    version: *runtime-version
    versions: *runtime-version
    autodelete: false
    no-autodownload: true
    add-ld-path: lib
    download-if: have-kernel-module-nvidia
    autoprune-unless: have-kernel-module-nvidia

  org.freedesktop.Platform.codecs_extra.i386:
    directory: lib/i386-linux-gnu/codecs-extra
    version: *runtime-version-extra
    autodelete: false
    add-ld-path: lib

  org.freedesktop.Platform.codecs_extra:
    directory: lib/x86_64-linux-gnu/codecs-extra
    version: *runtime-version-extra
    autodelete: false
    add-ld-path: lib

modules:
  - name: bundle-setup
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/i386-linux-gnu
      - mkdir -p /app/lib/debug/lib/i386-linux-gnu
      - mkdir -p /app/lib/i386-linux-gnu/GL
      - mkdir -p /app/lib/x86_64-linux-gnu/GL
      - mkdir -p /app/lib/i386-linux-gnu/dri/intel-vaapi-driver
      - mkdir -p /app/lib/x86_64-linux-gnu/dri/intel-vaapi-driver
      - mkdir -p /app/i386/nvidia-vaapi-driver
      - mkdir -p /app/x86_64/nvidia-vaapi-driver
      - install -Dm644 ld.so.conf /app/etc/ld.so.conf
    sources:
      - type: inline
        dest-filename: ld.so.conf
        contents: |
          /app/lib
          /app/lib32
          /app/lib/i386-linux-gnu
          /app/lib/x86_64-linux-gnu
          /app/i386
          /app/x86_64

  - name: python3-dbus
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/dbus/dbus-python.git
        tag: dbus-python-1.4.0
        commit: d4c4e537d5afccd7e88b232e09393806955f238a

  - name: zordeer-app
    builddir: true
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/Kyuyrii/Zordeer.git
        tag: '3.10'
        commit: c981d12d6cf67f01978ea5626ae5f629a9204fe3
    build-commands:
      - install -Dm755 zordeer /app/bin/zordeer
      - install -Dm644 io.github.kyuyrii.zordeer.desktop /app/share/applications/io.github.kyuyrii.zordeer.desktop
      - install -Dm644 io.github.kyuyrii.zordeer.svg /app/share/icons/hicolor/scalable/apps/io.github.kyuyrii.zordeer.svg
      - install -Dm644 metainfo/io.github.kyuyrii.zordeer.metainfo.xml /app/share/metainfo/io.github.kyuyrii.zordeer.metainfo.xml
      - install -Dm644 translation/*.toml -t /app/share/Zordeer/translation
      - desktop-file-edit --set-name="Zordeer [Flatpak]" /app/share/applications/io.github.kyuyrii.zordeer.desktop

    modules:
      - modules/python3-psutil.yaml
      - modules/python3-requests.yaml
      - modules/python3-tomlkit.yaml
      - modules/python3-pyqt6.yaml
