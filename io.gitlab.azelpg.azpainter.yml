app-id: io.gitlab.azelpg.azpainter
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: azpainter

rename-desktop-file: azpainter.desktop
rename-icon: azpainter
rename-mime-file: azpainter.xml
rename-mime-icons:
  - application-x-azpainter-apd

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --filesystem=host
  - --device=dri

modules:
  - name: azpainter
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app
      - cd build && ninja
      - cd build && ninja install

      - install -Dm644 io.gitlab.azelpg.azpainter.appdata.xml /app/share/metainfo/io.gitlab.azelpg.azpainter.appdata.xml
    sources:
      - type: git
        url: https://gitlab.com/azelpg/azpainter.git
        tag: v3.0.11
        commit: 9f39eb08caa68efef7a717627f2e5abd6f5dd5b0
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
          is-main-source: true
      - type: file
        path: io.gitlab.azelpg.azpainter.appdata.xml
