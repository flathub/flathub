app-id: fr.rubet.rpnx
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: rpnx
finish-args:
  - --filesystem=xdg-data/rpnx:create
modules:
  - name: rpnx
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/rpnx/cargo
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose
      - install -Dm755 target/release/rpnx -t /app/bin/
    sources:
      - type: git
        url: https://github.com/louisrubet/rpnx.git
        tag: v1.0.0
        commit: 5d46b73c664452b66148580f448bf801a7d3622f
      - cargo-sources.json
      - type: file
        path: fr.rubet.rpnx.metainfo.xml
      - type: file
        path: calculator512.png
      - type: file
        path: calculator256.png
      - type: file
        path: calculator128.png
      - type: file
        path: calculator64.png
      - type: file
        path: calculator32.png
      - type: file
        path: calculator16.png
      - type: file
        path: fr.rubet.rpnx.desktop
    post-install:
      - install -p -D -m 0644 "LICENSE" -t "${FLATPAK_DEST}/share/licenses/fr.rubet.rpnx/";
      - install -D -m644 fr.rubet.rpnx.metainfo.xml /app/share/metainfo/fr.rubet.rpnx.metainfo.xml
      - install -D -m644 calculator16.png /app/share/icons/hicolor/16x16/apps/fr.rubet.rpnx.png
      - install -D -m644 calculator32.png /app/share/icons/hicolor/32x32/apps/fr.rubet.rpnx.png
      - install -D -m644 calculator64.png /app/share/icons/hicolor/64x64/apps/fr.rubet.rpnx.png
      - install -D -m644 calculator256.png /app/share/icons/hicolor/256x256/apps/fr.rubet.rpnx.png
      - install -D -m644 calculator512.png /app/share/icons/hicolor/512x512/apps/fr.rubet.rpnx.png
      - install -D -m644 fr.rubet.rpnx.desktop /app/share/applications/fr.rubet.rpnx.desktop
      - desktop-file-edit --set-icon='fr.rubet.rpnx' /app/share/applications/fr.rubet.rpnx.desktop
