app-id: com.github._0_don.clippy
runtime: org.gnome.Platform
runtime-version: "46"
sdk: org.gnome.Sdk
command: clippy
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=home

modules:
  - name: clippy
    buildsystem: simple
    build-commands:
      - ar x clippy.deb
      - tar xf data.tar.*
      - install -Dm755 usr/bin/clippy /app/bin/clippy
      - install -Dm644 usr/share/applications/clippy.desktop /app/share/applications/com.github._0_don.clippy.desktop
      - |
        for size in 32x32 128x128 256x256; do
          if [ -f "usr/share/icons/hicolor/${size}/apps/clippy.png" ]; then
            install -Dm644 "usr/share/icons/hicolor/${size}/apps/clippy.png" \
              "/app/share/icons/hicolor/${size}/apps/com.github._0_don.clippy.png"
          fi
        done
      - install -Dm644 com.github._0_don.clippy.metainfo.xml /app/share/metainfo/com.github._0_don.clippy.metainfo.xml
      - sed -i 's|Exec=clippy|Exec=/app/bin/clippy|' /app/share/applications/com.github._0_don.clippy.desktop
      - sed -i 's|Icon=clippy|Icon=com.github._0_don.clippy|' /app/share/applications/com.github._0_don.clippy.desktop
    sources:
      - type: file
        url: https://github.com/0-don/clippy/releases/download/v1.5.8/clippy_1.5.8_amd64.deb
        sha256: c34136302a48d5968cbd82a490f888480cc78c3ac82d49145cbe7c0a57acbf82
        dest-filename: clippy.deb
      - type: file
        path: com.github._0_don.clippy.metainfo.xml
