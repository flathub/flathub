app-id: io.github.steeb_k.Synchronicity
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: synchronicity
build-options:
  no-debuginfo: true
  append-path: /usr/lib/sdk/rust-stable/bin
finish-args:
  - --share=network
  - --filesystem=home
  - --socket=ssh-auth
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --own-name=io.github.steeb_k.Synchronicity
  - --own-name=io.github.steeb_k.SynchronicityAskpass
  - --talk-name=org.a11y.Bus

modules:
  # Build rsync from source so the sandbox has a fixed version.
  - name: rsync
    buildsystem: autotools
    config-opts:
      - --prefix=/app
      - --disable-md2man
    post-install:
      - install -Dm644 COPYING -t $FLATPAK_DEST/share/licenses/$FLATPAK_ID/rsync/
    sources:
      - type: git
        url: https://github.com/WayneD/rsync.git
        tag: v3.2.7
        commit: b13e7a8ef4fa430223f66403506fb821caae5cfd

  # Rust app — fully offline build using vendored crates and SDK Rust extension.
  - name: synchronicity
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/synchronicity/cargo-home
    build-commands:
      - mkdir -p .cargo
      - printf '[source.crates-io]\nreplace-with = "vendored-sources"\n\n[source.vendored-sources]\ndirectory = "cargo/vendor"\n' > .cargo/config.toml
      - cargo --offline build --release
      - install -Dm755 target/release/synchronicity /app/bin/synchronicity
      - install -Dm755 target/release/synchronicity-askpass /app/bin/synchronicity-askpass
      # License
      - install -Dm644 LICENSE -t $FLATPAK_DEST/share/licenses/$FLATPAK_ID/
      # Desktop integration — installed from upstream source, not from Flathub submission copies
      - install -Dm644 flatpak/export/io.github.steeb_k.Synchronicity.desktop -t /app/share/applications
      - install -Dm644 flatpak/export/io.github.steeb_k.Synchronicity.metainfo.xml -t /app/share/metainfo
      - install -Dm644 flatpak/export/io.github.steeb_k.Synchronicity.256x256.png /app/share/icons/hicolor/256x256/apps/io.github.steeb_k.Synchronicity.png
      - install -Dm644 flatpak/export/io.github.steeb_k.Synchronicity.128x128.png /app/share/icons/hicolor/128x128/apps/io.github.steeb_k.Synchronicity.png
      - install -Dm644 flatpak/export/io.github.steeb_k.Synchronicity.64x64.png /app/share/icons/hicolor/64x64/apps/io.github.steeb_k.Synchronicity.png
      - install -Dm644 flatpak/export/io.github.steeb_k.Synchronicity.48x48.png /app/share/icons/hicolor/48x48/apps/io.github.steeb_k.Synchronicity.png
      - install -Dm644 flatpak/export/io.github.steeb_k.Synchronicity.32x32.png /app/share/icons/hicolor/32x32/apps/io.github.steeb_k.Synchronicity.png
      - install -Dm644 flatpak/export/io.github.steeb_k.Synchronicity.16x16.png /app/share/icons/hicolor/16x16/apps/io.github.steeb_k.Synchronicity.png
    sources:
      - type: git
        url: https://github.com/steeb-k/synchronicity.git
        tag: v0.1.0
        commit: 9076fbe16b5e8b666880e4f25e5b823964ff9d6d
      - cargo-sources.json
