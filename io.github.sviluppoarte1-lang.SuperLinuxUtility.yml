# Flatpak manifest for Super Linux Utility (Flathub)
# App ID: io.github.sviluppoarte1-lang.SuperLinuxUtility (verification at sviluppoarte1-lang.github.io)

app-id: io.github.sviluppoarte1-lang.SuperLinuxUtility
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: super-linux-utility
finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=host
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --system-talk-name=org.freedesktop.PolicyKit1
rename-desktop-file: super-linux-utility.desktop
rename-appdata-file: io.github.sviluppoarte1-lang.SuperLinuxUtility.metainfo.xml

modules:
  - name: super-linux-utility
    buildsystem: simple
    build-commands:
      - install -d $FLATPAK_DEST/share/io.github.sviluppoarte1-lang.SuperLinuxUtility
      - cp -r lib data $FLATPAK_DEST/share/io.github.sviluppoarte1-lang.SuperLinuxUtility/
      - install -m 755 super_linux_utility $FLATPAK_DEST/share/io.github.sviluppoarte1-lang.SuperLinuxUtility/
      - install -d $FLATPAK_DEST/bin
      - |
        cat > $FLATPAK_DEST/bin/super-linux-utility << 'WRAPPER'
        #!/bin/sh
        exec /app/share/io.github.sviluppoarte1-lang.SuperLinuxUtility/super_linux_utility "$@"
        WRAPPER
      - chmod 755 $FLATPAK_DEST/bin/super-linux-utility
      - install -D -m 644 io.github.sviluppoarte1-lang.SuperLinuxUtility.metainfo.xml $FLATPAK_DEST/share/metainfo/io.github.sviluppoarte1-lang.SuperLinuxUtility.metainfo.xml
      - install -D -m 644 super-linux-utility.desktop $FLATPAK_DEST/share/applications/super-linux-utility.desktop
      - desktop-file-edit --set-key=Exec --set-value="super-linux-utility %U" $FLATPAK_DEST/share/applications/super-linux-utility.desktop
      - desktop-file-edit --set-key=Icon --set-value=io.github.sviluppoarte1-lang.SuperLinuxUtility $FLATPAK_DEST/share/applications/super-linux-utility.desktop
      - install -d $FLATPAK_DEST/share/icons/hicolor/256x256/apps
      - |
        if [ -f assets/icons/icon.png ]; then
          install -m 644 assets/icons/icon.png $FLATPAK_DEST/share/icons/hicolor/256x256/apps/io.github.sviluppoarte1-lang.SuperLinuxUtility.png
        fi
    sources:
      - type: archive
        url: https://github.com/sviluppoarte1-lang/superlinuxutility/releases/download/1.8.6/super-linux-utility-1.8.6-linux-bundle.tar.gz
        sha256: be1e7f62e9e32dd40de5db8d2b78d93f15dcaf53d39a4dd59537fcaa52be85a2
      - type: file
        path: io.github.sviluppoarte1-lang.SuperLinuxUtility.metainfo.xml
      - type: file
        path: super-linux-utility.desktop
      - type: file
        path: assets/icons/icon.png
