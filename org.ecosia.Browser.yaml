app-id: org.ecosia.Browser
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.chromium.Chromium.BaseApp
base-version: '25.08'
command: ecosiabrowser
separate-locales: false

finish-args:
  - --device=all
  - --share=ipc
  - --share=network
  - --socket=cups
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pcsc # FIDO2
  - --socket=pulseaudio
  - --allow=bluetooth # FIDO2 CTAP hybrid transport
  - --system-talk-name=org.bluez
  - --system-talk-name=org.freedesktop.Avahi
  - --system-talk-name=org.freedesktop.UPower
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.gnome.SessionManager
  - --persist=.pki
  - --filesystem=host-etc
  - --filesystem=xdg-download
  - --filesystem=xdg-run/pipewire-0
  - --env=CHROME_VERSION_EXTRA=stable
  - --env=CHROME_FLAGS=--ozone-platform-hint=auto
  # For GNOME proxy resolution
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --talk-name=ca.desrt.dconf
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf
  - --env=GIO_EXTRA_MODULES=/app/lib/gio/modules
  - --env=GSETTINGS_BACKEND=dconf
  - --env=CHROME_DESKTOP=org.ecosia.Browser.desktop
  # For KDE proxy resolution (KDE5 only)
  - --filesystem=~/.config/kioslaverc

modules:
  - name: dconf
    buildsystem: meson
    config-opts:
      - -Dbash_completion=false
      - -Dman=false
      - -Dvapi=false
    cleanup:
      - /etc
      - /include
      - ca.desrt.dconf.service
      - dconf.service
      - dconf-service
      - '*.pc'
    sources:
      - type: archive
        url: https://download.gnome.org/sources/dconf/0.49/dconf-0.49.0.tar.xz
        sha256: 16a47e49a58156dbb96578e1708325299e4c19eea9be128d5bd12fd0963d6c36
        x-checker-data:
          type: gnome
          name: dconf
          stable-only: true
      # from: https://src.fedoraproject.org/rpms/dconf
      - type: patch
        path: dconf-override.patch

  - name: zypak
    sources:
      - type: git
        url: https://github.com/refi64/zypak
        tag: v2025.09
        commit: 693a71c5ffa80ec9c9ce2ae03b1ccc493c698e53
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: ecosiabrowser-prebuilt
    buildsystem: simple
    build-commands:
      - install -Dm755 ecosiabrowser.sh /app/bin/ecosiabrowser
      - install -d /app/ecosia
      - cp -a ecosia/. /app/ecosia
      - |
        SRC="/app/ecosia/desktop"
        install -Dm644 -t /app/share/applications "$SRC/org.ecosia.Browser.desktop"
        install -Dm644 -t /app/share/metainfo "$SRC/org.ecosia.Browser.metainfo.xml"
        install -Dm644 "$SRC/ecosia.svg" /app/share/icons/hicolor/scalable/apps/org.ecosia.Browser.svg
        rm -rf $SRC

    sources:
      - type: archive
        url: https://app-cms-repo.ecosia-browser.net/f4d3472f-762e-4aea-a1ae-5fb94d0b561d/build/146.1.7680.0/ecosiabrowser-146.1.7680.0-linux-amd64.tar.xz
        sha256: 0fbcd228bd5a4dc2179861a55d6192da19bfbc9f79a2dd761ce04f4703109294
        dest: ecosia
      - type: script
        dest-filename: ecosiabrowser.sh
        commands:
          - |
            export ZYPAK_EXPOSE_WIDEVINE_PATH=$HOME/.var/app/org.ecosia.Browser/config/EcosiaBrowser/WidevineCdm
            export CHROME_WRAPPER="/app/bin/ecosiabrowser"
            exec /app/bin/zypak-wrapper.sh /app/ecosia/chrome --class=org.ecosia.Browser ${CHROME_FLAGS:-} "$@"
