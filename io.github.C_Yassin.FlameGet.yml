app-id: io.github.C_Yassin.FlameGet
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: start-flameget
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --share=network
  - --filesystem=xdg-download
modules:
  - name: aria2
    buildsystem: autotools
    config-opts:
      - --disable-libaria2
    sources:
      - type: archive
        url: https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0.tar.xz
        sha256: 60a420ad7085eb616cb6e2bdf0a7206d68ff3d37fb5a956dc44242eb2f79b66b
  
  - python3-requirements.json
    
  - name: flameget
    buildsystem: simple

    build-commands:
        - mkdir -p /app/share/flameget
        - cp -r * /app/share/flameget/

        - install -D -m 755 flatpak-flameget.sh /app/bin/start-flameget
        
        - install -Dm644 io.github.C_Yassin.FlameGet.metainfo.xml /app/share/metainfo/io.github.C_Yassin.FlameGet.metainfo.xml
        - install -Dm644 flameget.svg /app/share/icons/hicolor/scalable/apps/io.github.C_Yassin.FlameGet.svg
        - install -Dm644 io.github.C_Yassin.FlameGet.desktop /app/share/applications/io.github.C_Yassin.FlameGet.desktop

    sources:
      - type: git
        url: https://github.com/C-Yassin/FlameGet
        commit: 42a53cbbdd124c02b9c2d8cb8792261bbb9f01ff