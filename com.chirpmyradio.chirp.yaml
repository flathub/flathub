app-id: com.chirpmyradio.chirp
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: chirp-wrapper.sh

cleanup:
  - /bin/pygobject*
  - /bin/pygtk*
  - /include
  - /lib/*.la
  - /lib/pkgconfig
  - /lib/pygtk
  - /share/doc
  - /share/gtk-doc
  - /bin/wxdocs

finish-args:
  - --share=network
  - --filesystem=home
  - --device=all
  - --socket=x11
  - --share=ipc

modules:
  - name: chirp
    buildsystem: simple
    build-commands:
      - python3 setup.py install --prefix=${FLATPAK_DEST}
    sources:
      - type: git
        url: https://github.com/kk7ds/chirp.git
        branch: build-queue
        commit: 6025bd4d75cbdf54cea51688e5645c63568701ed

    modules:
      - chirp-deps.json

      - name: setup-wrapper
        buildsystem: simple
        build-commands:
          - install -Dm755 chirp-wrapper.sh /app/bin/chirp-wrapper.sh
        sources:
          - type: file
            path: chirp-wrapper.sh

      - name: desktop-integration
        buildsystem: simple
        build-commands:
          - install -Dm644 flathub/com.chirpmyradio.chirp.metainfo.xml -t /app/share/metainfo/com.chirpmyradio.chirp.metainfo.xml
          - install -Dm644 flathub/com.chirpmyradio.chirp.png /app/share/icons/hicolor/512x512/apps/com.chirpmyradio.chirp.png
          - install -Dm644 flathub/com.chirpmyradio.chirp.desktop /app/share/applications/com.chirpmyradio.chirp.desktop

        sources:
          - type: git
            url: https://github.com/kk7ds/chirp.git
            branch: master
            commit: d5b926e5a1e49b477cc6a658779c927c876faf07
