app-id: com.chirpmyradio.chirp
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: chirp-wrapper.sh

cleanup:
  - /bin/pygobject*
  - /bin/pygtk*
  - /include
  - /lib/*.la
  - /lib/pkgconfig
  - /lib/pygtk
  - /share/doc
  - /share/gtk-doc
  - /bin/wxdocs

finish-args:
  - --share=network
  - --filesystem=home
  - --device=all
  - --socket=x11
  - --share=ipc

modules:
  - name: chirp
    buildsystem: simple
    build-commands:
      - python3 setup.py install --prefix=${FLATPAK_DEST}
    sources:
      - type: git
        url: https://github.com/kk7ds/chirp.git
        branch: master

    modules:
      - chirp-deps.json

      - name: setup-wrapper
        buildsystem: simple
        build-commands:
          - install -Dm755 chirp-wrapper.sh /app/bin/chirp-wrapper.sh
        sources:
          - type: file
            path: chirp-wrapper.sh

  - name: desktop-integration
    buildsystem: simple
    build-commands:
      - install -Dm644 com.chirpmyradio.chirp.metainfo.xml -t /app/share/metainfo/com.chirpmyradio.chirp.metainfo.xml
      - install -Dm644 com.chirpmyradio.chirp.png /app/share/icons/hicolor/512x512/apps/com.chirpmyradio.chirp.png
      - install -Dm644 com.chirpmyradio.chirp.desktop /app/share/applications/com.chirpmyradio.chirp.desktop

    sources:
      - type: file
        url: https://raw.githubusercontent.com/kk7ds/chirp/refs/heads/master/flathub/com.chirpmyradio.chirp.metainfo.xml
        sha256: 14373c1d45f2fdb82a5d58fafbedce0a2ed401d8994c94c3bdbfc3961920c750
        dest-filename: com.chirpmyradio.chirp.metainfo.xml

      - type: file
        url: https://raw.githubusercontent.com/kk7ds/chirp/refs/heads/master/flathub/com.chirpmyradio.chirp.png
        sha256: b77f250a62a7e48b1fb1b493ad9ce62dd07c387bd8d5e7881ae34e170ee81cf4
        dest-filename: com.chirpmyradio.chirp.png

      - type: file
        url: https://raw.githubusercontent.com/kk7ds/chirp/refs/heads/master/flathub/com.chirpmyradio.chirp.desktop
        sha256: e5dd7a8efe53e2f1df8ca509554da836b99b13356b946a0509ddb6405231445a
        dest-filename: com.chirpmyradio.chirp.desktop
