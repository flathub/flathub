app-id: io.github.rajnisht7.ClipVault
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: clipvault

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri


modules:

  - python-dep.json
  - name: clipvault
    buildsystem: simple
    build-commands:
      - cd src && pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation .
      - install -Dm644 flatpak/io.github.rajnisht7.ClipVault.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 flatpak/io.github.rajnisht7.ClipVault.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/${FLATPAK_ID}.png
      - install -Dm644 flatpak/io.github.rajnisht7.ClipVault.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml

    sources:
      - type: git
        url: https://github.com/rajnisht7/ClipVault.git
        tag: v1.3.5
        commit: 908beb7dbb6716ce62b7b1c5524a1cf851ed0537
