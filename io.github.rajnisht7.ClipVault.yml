app-id: io.github.rajnisht7.ClipVault
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
command: clipvault

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --device=dri
  - --socket=session-bus


modules:

  - name: wl-clipboard
    buildsystem: meson
    config-opts:
      - -Dfishcompletiondir=/app/share/fish/vendor_completions.d
    sources:
      - type: archive
        url: https://github.com/bugaevc/wl-clipboard/archive/v2.2.1.tar.gz
        sha256: 6eb8081207fb5581d1d82c4bcd9587205a31a3d47bea3ebeb7f41aa1143783eb
        
  - name: libXmu
    buildsystem: autotools
    sources:
      - type: archive
        url: https://www.x.org/releases/individual/lib/libXmu-1.2.1.tar.xz
        sha256: fcb27793248a39e5fcc5b9c4aec40cc0734b3ca76aac3d7d1c264e7f7e14e8b2
      
  - name: xclip
    buildsystem: autotools
    sources:
      - type: git
        url: https://github.com/astrand/xclip.git
        tag: "0.13"

  - name: python-websockets
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/w/websockets/websockets-12.0.tar.gz
        sha256: 81df9cbcbb6c260de1e007e58c011bfebe2dafc8435107b0537f393dd38c8b1b

  - name: python-flit-core
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/f/flit_core/flit_core-3.9.0.tar.gz
        sha256: 72ad266176c4a3fcfab5f2930d76896059851240570ce9a98733b658cb786eba

  - name: python-typing-extensions
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/t/typing_extensions/typing_extensions-4.12.2.tar.gz
        sha256: 1a7ead55c7e559dd4dee8856e3a88b41225abfe1ce8df57b7c13915fe121ffb8

  - name: python-pypng
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/p/pypng/pypng-0.20220715.0.tar.gz
        sha256: 739c433ba96f078315de54c0db975aee537cbc3e1d0ae4ed9aab0ca1e427e2c1

  - name: python-qrcode
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/q/qrcode/qrcode-7.4.2.tar.gz
        sha256: 9dd969454827e127dbd93696b20747239e6d540e082937c90f14ac95b30f5845

  - name: python-pillow
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/p/pillow/pillow-11.0.0.tar.gz
        sha256: 72bacbaf24ac003fea9bff9837d1eedb6088758d41e100c1552930151f677739

  - name: clipvault
    buildsystem: simple
    build-commands:
      - cd src && pip3 install --prefix=${FLATPAK_DEST} --no-build-isolation .
      - install -Dm644 flatpak/io.github.rajnisht7.ClipVault.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 flatpak/io.github.rajnisht7.ClipVault.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/${FLATPAK_ID}.png
      - install -Dm644 flatpak/io.github.rajnisht7.ClipVault.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml

    sources:
      - type: git
        url: https://github.com/rajnisht7/ClipVault.git
        tag: v1.3.2
        commit: 135b5d4ac54c7f30749b6f7ed860bf4d1b856c9b
