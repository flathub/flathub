app-id: io.github.gessendarien.petra
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: petra

finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=fallback-x11
  # Wayland access
  - --socket=wayland
  # GPU for rendering
  - --device=dri
  # XDG Desktop Portal access (for global shortcuts)
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.GlobalShortcuts
  # KDE global shortcuts
  - --talk-name=org.kde.kglobalaccel
  # StatusNotifier implementation for system tray (KDE/AppIndicator)
  - --talk-name=org.kde.StatusNotifierWatcher
  # Config directory for settings
  - --filesystem=xdg-config/petra:create
  # Autostart directory
  - --filesystem=xdg-config/autostart:create
  # Host command execution for paste simulation (xdotool/ydotool)
  - --talk-name=org.freedesktop.Flatpak
  # Make PyQt6 pip wheels see the system flatpak KDE qt plugins
  - --env=QT_PLUGIN_PATH=/usr/plugins

modules:
  - name: python3-pyqt6-sip
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} pyqt6_sip
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/d5/0d/6ee861c53f3f7e6c5dd34a441d17aad1dfb3d50ce1f1a024cc9194ac3db3/pyqt6_sip-13.11.1-cp311-cp311-manylinux1_x86_64.manylinux_2_5_x86_64.whl
        sha256: 6aa6c15ad3a9bb86e69119baff77b4ac17c47e55ee567abff616a4652051a6cc
        only-arches: [x86_64]
      - type: file
        url: https://files.pythonhosted.org/packages/ca/39/c975733d7204a594e6ae51d3a810aad539d09718aa3ceeb0dd28cb3276bd/pyqt6_sip-13.11.1-cp311-cp311-manylinux_2_17_aarch64.manylinux2014_aarch64.whl
        sha256: 0ee652b272373c4f9287625ef32ad4ec1f0755c24928dc958a870b7a928b288c
        only-arches: [aarch64]

  - name: python3-pyqt6
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} --no-deps pyqt6
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/d8/58/5082dd3654da2b17de19057f181526df566f38af90f517cb8a541bea0890/PyQt6-6.7.1-cp38-abi3-manylinux_2_28_x86_64.whl
        sha256: 2d771fa0981514cb1ee937633dfa64f14caa902707d9afffab66677f3a73e3da
        only-arches: [x86_64]
      - type: file
        url: https://files.pythonhosted.org/packages/59/8c/3b528f5fa8dfc3d0ba07d8da37ea72dfc59352d80804a12507d7080efb30/PyQt6-6.7.1-cp38-abi3-manylinux_2_28_aarch64.whl
        sha256: 0adb7914c732ad1dee46d9cec838a98cb2b11bc38cc3b7b36fbd8701ae64bf47
        only-arches: [aarch64]

  - name: petra
    buildsystem: simple
    build-commands:
      - install -Dm755 petra.sh ${FLATPAK_DEST}/bin/petra
      - mkdir -p ${FLATPAK_DEST}/share/petra
      - cp -r *.py icons ${FLATPAK_DEST}/share/petra/
      - install -Dm644 io.github.gessendarien.petra.desktop ${FLATPAK_DEST}/share/applications/io.github.gessendarien.petra.desktop
      - install -Dm644 io.github.gessendarien.petra.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.gessendarien.petra.metainfo.xml
      - install -Dm644 LICENSE.txt ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/LICENSE.txt
      # Install PNG icons in standard hicolor sizes
      - install -Dm644 icons/petra-512.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/io.github.gessendarien.petra.png
      - install -Dm644 icons/petra-256.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/io.github.gessendarien.petra.png
      - install -Dm644 icons/petra-128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/io.github.gessendarien.petra.png
      - install -Dm644 icons/petra-64.png ${FLATPAK_DEST}/share/icons/hicolor/64x64/apps/io.github.gessendarien.petra.png
      - install -Dm644 icons/petra-48.png ${FLATPAK_DEST}/share/icons/hicolor/48x48/apps/io.github.gessendarien.petra.png
      - install -Dm644 icons/petra-32.png ${FLATPAK_DEST}/share/icons/hicolor/32x32/apps/io.github.gessendarien.petra.png
      - install -Dm644 icons/petra-16.png ${FLATPAK_DEST}/share/icons/hicolor/16x16/apps/io.github.gessendarien.petra.png
    sources:
      - type: git
        url: https://github.com/gessendarien/petra-clipboard.git
        tag: "0.0.1"
        commit: 9650ec69b038f1f8cbada0b9594a4a2083f1ef74
