app-id: io.github.gessendarien.petra
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.9'
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: petra
cleanup-commands:
  - /app/cleanup-BaseApp.sh
build-options:
  env:
    - BASEAPP_REMOVE_WEBENGINE=1
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.kde.kglobalaccel
  - --talk-name=org.gnome.Shell
  - --filesystem=xdg-desktop:ro
  - --filesystem=xdg-documents:ro
  - --filesystem=xdg-download:ro
  - --filesystem=xdg-music:ro
  - --filesystem=xdg-pictures:ro
  - --filesystem=xdg-videos:ro
modules:
  - name: libxtst
    sources:
      - type: archive
        url: https://www.x.org/archive/individual/lib/libXtst-1.2.4.tar.gz
        sha256: 01366506aeb033f6dffca5326af85f670746b0cabbfd092aabefb046cf48c445
  - name: xdotool
    buildsystem: simple
    build-commands:
      - make PREFIX=/app
      - make install PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/jordansissel/xdotool/archive/refs/tags/v3.20211022.1.tar.gz
        sha256: 82b15a944a5e82fee15e0f6116bd9f642bc3d0bb6989fc0ca5ad9dfe35de0847
  - name: petra
    buildsystem: simple
    build-commands:
      - install -Dm755 petra.sh ${FLATPAK_DEST}/bin/petra
      - mkdir -p ${FLATPAK_DEST}/share/petra
      - cp -r src icons ${FLATPAK_DEST}/share/petra/
      - install -Dm644 io.github.gessendarien.petra.desktop ${FLATPAK_DEST}/share/applications/io.github.gessendarien.petra.desktop
      - install -Dm644 io.github.gessendarien.petra.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.gessendarien.petra.metainfo.xml
      - install -Dm644 LICENSE.txt ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/LICENSE.txt
      - install -Dm644 icons/petra-512.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/io.github.gessendarien.petra.png
      - install -Dm644 icons/petra-256.png ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/io.github.gessendarien.petra.png
      - install -Dm644 icons/petra-128.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/io.github.gessendarien.petra.png
      - install -Dm644 icons/petra-64.png ${FLATPAK_DEST}/share/icons/hicolor/64x64/apps/io.github.gessendarien.petra.png
      - install -Dm644 icons/petra-48.png ${FLATPAK_DEST}/share/icons/hicolor/48x48/apps/io.github.gessendarien.petra.png
      - install -Dm644 icons/petra-32.png ${FLATPAK_DEST}/share/icons/hicolor/32x32/apps/io.github.gessendarien.petra.png
      - install -Dm644 icons/petra-16.png ${FLATPAK_DEST}/share/icons/hicolor/16x16/apps/io.github.gessendarien.petra.png
    sources:
      - type: dir
        path: .