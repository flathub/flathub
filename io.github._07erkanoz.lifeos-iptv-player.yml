app-id: io.github._07erkanoz.lifeos-iptv-player
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk

command: lifeostv

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=xdg-download:rw

build-options:
  append-path: /run/build/lifeostv/flutter-sdk/flutter/bin:/run/build/lifeostv/flutter-sdk/flutter/bin/cache/dart-sdk/bin
  env:
    FLUTTER_ROOT: /run/build/lifeostv/flutter-sdk/flutter
    PUB_CACHE: /run/build/lifeostv/.pub-cache

modules:
  - name: lifeostv
    buildsystem: simple
    build-commands:
      - flutter --version
      - flutter config --enable-linux-desktop
      - flutter --suppress-analytics pub get
      - flutter build linux --release
      - install -Dm755 build/linux/x64/release/bundle/lifeostv /app/bin/lifeostv
      - cp -r build/linux/x64/release/bundle/lib /app/bin/
      - cp -r build/linux/x64/release/bundle/data /app/bin/
      - install -Dm644 packaging/flatpak/io.github._07erkanoz.lifeos-iptv-player.desktop /app/share/applications/io.github._07erkanoz.lifeos-iptv-player.desktop
      - install -Dm644 packaging/flatpak/io.github._07erkanoz.lifeos-iptv-player.metainfo.xml /app/share/metainfo/io.github._07erkanoz.lifeos-iptv-player.metainfo.xml
      - install -Dm644 assets/app_icon_256.png /app/share/icons/hicolor/256x256/apps/io.github._07erkanoz.lifeos-iptv-player.png
    sources:
      - type: git
        url: https://github.com/07erkanoz/lifeos-iptv-player.git
        commit: d778a79e1c47a11e4cb27bc953556277bf324af0
      - type: archive
        url: https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.41.4-stable.tar.xz
        sha256: c9c4e741ebcf83ee88303404176f7e22c3b6abfc8e9d60781098b6d4104327a9
        dest: flutter-sdk
