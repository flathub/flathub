app-id: com.github.adribriffaca-creator.cubo-rubik
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: main.py
finish-args:
  - --device=dri
  - --wayland
  - --x11
  - --socket=fallback-x11
  - --share=ipc
modules:
  - name: cubo-rubik
    buildsystem: simple
    build-commands:
      - install -D main.py /app/bin/main.py
      - cp -r ui/ /app/bin/
      - cp -r logic/ /app/bin/
      - cp -r assets/ /app/bin/
      - install -D com.github.adribriffaca-creator.cubo-rubik.metainfo.xml /app/share/metainfo/com.github.adribriffaca-creator.cubo-rubik.metainfo.xml
    sources:
      - type: git
        url: https://github.com/adribriffaca-creator/cubo-rubik.git
        branch: main
