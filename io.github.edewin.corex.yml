app-id: io.github.edewin.corex
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.8'
command: corex-run

finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --device=dri

modules:
  - name: lm-sensors
    no-autogen: true
    make-install-args:
      - PREFIX=/app
      - ETCDIR=/app/etc
    sources:
      - type: git
        url: https://github.com/lm-sensors/lm-sensors.git
        tag: V3-6-0
        commit: 1667b85
      - type: shell
        commands:
          - sed -i 's/\ land\ / \&\& /g' Makefile

  - generated-sources.json

  - name: corex
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/Edewin/corex.git
        commit: b821dfbd5fd42971731954c342e34553f5da003b
      - type: file
        path: corex-run.sh
    build-commands:
      - cp -r corex /app/
      - install -Dm755 corex-run.sh /app/bin/corex-run
      - install -Dm644 io.github.edewin.corex.desktop /app/share/applications/io.github.edewin.corex.desktop
      - install -Dm644 corex/assets/corex_icon.svg /app/share/icons/hicolor/scalable/apps/io.github.edewin.corex.svg
      - install -Dm644 io.github.edewin.corex.metainfo.xml /app/share/metainfo/io.github.edewin.corex.metainfo.xml