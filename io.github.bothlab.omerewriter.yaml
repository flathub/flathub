id: io.github.bothlab.omerewriter
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: OMERewriter
rename-icon: omerewriter

finish-args:
  - --device=dri
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=home
  - --filesystem=/run/media
  - --filesystem=/mnt
  - --filesystem=/srv

cleanup:
  - /include
  - /lib/pkgconfig
  - "*.a"
  - "*.la"

modules:
  - name: spdlog
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DSPDLOG_BUILD_EXAMPLE=OFF
      - -DSPDLOG_BUILD_TESTS=OFF
      - -DSPDLOG_BUILD_BENCH=OFF
      - -DSPDLOG_INSTALL=ON
      - -DSPDLOG_FMT_EXTERNAL=ON
    sources:
      - type: archive
        url: https://github.com/gabime/spdlog/archive/refs/tags/v1.17.0.tar.gz
        sha512: 8df117055d19ff21c9c9951881c7bdf27cc0866ea3a4aa0614b2c3939cedceab94ac9abaa63dc4312b51562b27d708cb2f014c68c603fd1c1051d3ed5c1c3087

  - name: gtest
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/google/googletest/archive/refs/tags/v1.17.0.tar.gz
        sha256: 65fab701d9829d38cb77c14acdc431d2108bfdbf8979e40eb8ae567edf10b27c
        x-checker-data:
          type: anitya
          project-id: 18290
          url-template: https://github.com/google/googletest/archive/refs/tags/v$version.tar.gz
    cleanup:
      - '*'

  - name: python3-six
    buildsystem: simple
    build-commands:
    - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
      --prefix=${FLATPAK_DEST} "six" --no-build-isolation
    sources:
    - type: file
      url: https://files.pythonhosted.org/packages/b7/ce/149a00dd41f10bc29e5921b496af8b574d8413afcd5e30dfa0ed46c2cc5e/six-1.17.0-py2.py3-none-any.whl
      sha256: 4721f391ed90541fddacab5acf947aa0d3dc7d27b2e1e8eda2be8970586c3274

  - name: python3-Genshi
    buildsystem: simple
    build-commands:
    - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
      --prefix=${FLATPAK_DEST} "Genshi" --no-build-isolation
    sources:
    - type: file
      url: https://files.pythonhosted.org/packages/27/69/259f8a1edc358a72c511b145c33b85a7667804a5c8ba04991aa5737d38a4/genshi-0.7.10-py3-none-any.whl
      sha256: 1c45aa70c06f2fcab68137f040890e4fb105cc539f0121cb86d750656dafc37c

  - name: boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app
      - ./b2 headers -j $FLATPAK_BUILDER_N_JOBS
      - ./b2 --build-type=minimal -j $FLATPAK_BUILDER_N_JOBS install
    sources:
      - type: archive
        url: https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.bz2
        sha256: 49551aff3b22cbc5c5a9ed3dbc92f0e23ea50a0f7325b0d198b705e8ee3fc305

  - name: ome-common
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: git
        url: https://gitlab.com/codelibre/ome/ome-common-cpp.git
        commit: fa4cf3dacc72bd14037f2a48d42fd31bf182da2e

  - name: ome-model
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBUILD_TESTS=OFF
      - -Dxmldom=qt6
    sources:
      - type: git
        url: https://gitlab.com/codelibre/ome/ome-model.git
        commit: 99ab3fd25c27b3b625047bb0bc535201a611cd01

  - name: ome-files
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DBUILD_TESTS=OFF
      - -Dxmldom=qt6
    sources:
      - type: git
        url: https://gitlab.com/codelibre/ome/ome-files-cpp.git
        commit: d1abffaa9c1d2143735ce254754410e591882bf2
      - type: patch
        path: patches/omefiles_gcc15-build-fix.patch

  - name: omerewriter
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: git
        url: https://github.com/bothlab/omerewriter.git
        tag: v0.1.0
        commit: 8dd66bbb00abe282ee21fe18250d0d0aa16c264f
      - type: patch
        path: patches/omerewriter_no-deploy-script.patch
