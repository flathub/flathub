app-id: io.github.olaproeis.Ferrite
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: ferrite

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --filesystem=/tmp
  - --filesystem=xdg-config/git:ro
  # Portal access for native file dialogs
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.FileChooser

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/ferrite/cargo

modules:
  - name: ferrite
    buildsystem: simple
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose
      - install -Dm755 target/release/ferrite /app/bin/ferrite
      - install -Dm644 io.github.olaproeis.Ferrite.desktop /app/share/applications/io.github.olaproeis.Ferrite.desktop
      - install -Dm644 io.github.olaproeis.Ferrite.metainfo.xml /app/share/metainfo/io.github.olaproeis.Ferrite.metainfo.xml
      - install -Dm644 assets/icons/icon_512.png /app/share/icons/hicolor/512x512/apps/io.github.olaproeis.Ferrite.png
      - install -Dm644 assets/icons/icon_256.png /app/share/icons/hicolor/256x256/apps/io.github.olaproeis.Ferrite.png
      - install -Dm644 assets/icons/icon_128.png /app/share/icons/hicolor/128x128/apps/io.github.olaproeis.Ferrite.png
      - install -Dm644 assets/icons/icon_64.png /app/share/icons/hicolor/64x64/apps/io.github.olaproeis.Ferrite.png
      - install -Dm644 assets/icons/icon_48.png /app/share/icons/hicolor/48x48/apps/io.github.olaproeis.Ferrite.png
      - install -Dm644 assets/icons/icon_32.png /app/share/icons/hicolor/32x32/apps/io.github.olaproeis.Ferrite.png
      - install -Dm644 assets/icons/icon_16.png /app/share/icons/hicolor/16x16/apps/io.github.olaproeis.Ferrite.png
    sources:
      - type: git
        url: https://github.com/OlaProeis/Ferrite.git
        tag: v0.2.5-hotfix.2
      - type: file
        path: io.github.olaproeis.Ferrite.desktop
      - type: file
        path: io.github.olaproeis.Ferrite.metainfo.xml
      - cargo-sources.json
