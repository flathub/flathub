app-id: io.github.iionel.Visu
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: visu

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

modules:
  - name: visu
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation .
      - install -Dm644 data/io.github.iionel.Visu.desktop
          ${FLATPAK_DEST}/share/applications/io.github.iionel.Visu.desktop
      - install -Dm644 data/io.github.iionel.Visu.metainfo.xml
          ${FLATPAK_DEST}/share/metainfo/io.github.iionel.Visu.metainfo.xml
      - install -Dm644 data/io.github.iionel.Visu.svg
          ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/io.github.iionel.Visu.svg
    sources:
      - type: git
        url: https://github.com/iIonel/Visu.git
        tag: v0.1.2
        commit: 0a95e3b3693b009d12caf4ca8e7962c07147d2e4
