app-id: io.github.EcoPasteHub.EcoPaste
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
add-extensions:
  org.webkit.WebKitGTK:
    versions: ['25.08']
    directory: lib/webkit2gtk-6.0
    version: '6.0'
    add-ld-path: lib
  org.webkit.WebKitGTK.Locale:
    versions: ['25.08']
    directory: share/runtime/locale
command: EcoPaste
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --system-talk-name=org.freedesktop.NetworkManager
  - --own-name=io.github.EcoPasteHub.EcoPaste
  - --talk-name=org.freedesktop.DBus
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.gnome.SessionManager
  - --talk-name=org.gnome.Shell

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/aclocal
  - '*.a'
  - '*.la'

modules:
  - name: eco-paste
    buildsystem: simple
    build-commands:
      - ar -o -x EcoPaste_0.5.0_amd64.deb
      - tar --extract --file data.tar.gz
      - mkdir -p /app/bin /app/lib /app/share/applications /app/share/icons/hicolor/32x32/apps /app/share/icons/hicolor/128x128/apps /app/share/icons/hicolor/256x256@2/apps
      - cp --preserve --recursive usr/* /app
      - sed -i 's|Exec=EcoPaste|Exec=EcoPaste %U|' /app/share/applications/EcoPaste.desktop
      - sed -i 's|Icon=EcoPaste|Icon=io.github.EcoPasteHub.EcoPaste|' /app/share/applications/EcoPaste.desktop
      - mv /app/share/applications/EcoPaste.desktop /app/share/applications/io.github.EcoPasteHub.EcoPaste.desktop
      - mv /app/share/icons/hicolor/32x32/apps/EcoPaste.png /app/share/icons/hicolor/32x32/apps/io.github.EcoPasteHub.EcoPaste.png
      - mv /app/share/icons/hicolor/128x128/apps/EcoPaste.png /app/share/icons/hicolor/128x128/apps/io.github.EcoPasteHub.EcoPaste.png
      - mv /app/share/icons/hicolor/256x256@2/apps/EcoPaste.png /app/share/icons/hicolor/256x256@2/apps/io.github.EcoPasteHub.EcoPaste.png
    sources:
      - type: file
        path: ./EcoPaste_0.5.0_amd64.deb
        sha256: fba410c5be10f0a00fa1a7ea0e1ff88b2174ebc1b626901884aec0c1fc0f70c6
