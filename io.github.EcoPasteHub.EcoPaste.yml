app-id: io.github.EcoPasteHub.EcoPaste
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: EcoPaste

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --system-talk-name=org.freedesktop.NetworkManager
  - --own-name=io.github.EcoPasteHub.EcoPaste
  - --talk-name=org.freedesktop.DBus
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.gnome.SessionManager
  - --talk-name=org.gnome.Shell
  - --filesystem=xdg-run/appindicator-status-icons:ro

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/aclocal
  - '*.a'
  - '*.la'
  - /bin/intltool-*
  - /bin/intltoolize

modules:
  - name: libayatana-appindicator
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_BINDINGS_MONO=OFF
      - -DENABLE_BINDINGS_VALA=OFF
      - -DENABLE_GTKDOC=OFF
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-appindicator/archive/refs/tags/0.5.93.tar.gz
        sha256: cbefed7a918a227bf71286246e237fcd3a9c8499b3eaac4897811a869409edf0
    modules:
      - name: ayatana-ido
        buildsystem: cmake-ninja
        sources:
          - type: archive
            url: https://github.com/AyatanaIndicators/ayatana-ido/archive/refs/tags/0.10.2.tar.gz
            sha256: 0daf8a2e5bba51225bc3724c0e53c3b569269f28ac3a14f6bed9920b44ecc856
      - name: libayatana-indicator
        buildsystem: cmake-ninja
        sources:
          - type: archive
            url: https://github.com/AyatanaIndicators/libayatana-indicator/archive/refs/tags/0.9.4.tar.gz
            sha256: a18d3c682e29afd77db24366f8475b26bda22b0e16ff569a2ec71cd6eb4eac95
      - name: intltool
        buildsystem: autotools
        sources:
          - type: archive
            url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
            sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd
      - name: libdbusmenu
        buildsystem: autotools
        build-options:
          cflags: -Wno-error
        config-opts:
          - --with-gtk=3
          - --disable-dumper
          - --enable-tests
          - --disable-vala
          - --disable-introspection
          - --disable-static
        sources:
          - type: archive
            url: https://launchpad.net/libdbusmenu/16.04/16.04.0/+download/libdbusmenu-16.04.0.tar.gz
            sha256: b9cc4a2acd74509435892823607d966d424bd9ad5d0b00938f27240a1bfa878a

  - name: eco-paste
    buildsystem: simple
    build-commands:
      - ar -o -x EcoPaste_0.5.0_amd64.deb
      - tar --extract --file data.tar.gz
      - mkdir -p /app/bin /app/lib /app/share/applications /app/share/icons/hicolor/32x32/apps /app/share/icons/hicolor/128x128/apps /app/share/icons/hicolor/256x256@2/apps
      - cp --preserve --recursive usr/* /app
      - sed -i 's|Exec=EcoPaste|Exec=EcoPaste %U|' /app/share/applications/EcoPaste.desktop
      - sed -i 's|Icon=EcoPaste|Icon=io.github.EcoPasteHub.EcoPaste|' /app/share/applications/EcoPaste.desktop
      - mv /app/share/applications/EcoPaste.desktop /app/share/applications/io.github.EcoPasteHub.EcoPaste.desktop
      - mv /app/share/icons/hicolor/32x32/apps/EcoPaste.png /app/share/icons/hicolor/32x32/apps/io.github.EcoPasteHub.EcoPaste.png
      - mv /app/share/icons/hicolor/128x128/apps/EcoPaste.png /app/share/icons/hicolor/128x128/apps/io.github.EcoPasteHub.EcoPaste.png
      - mv /app/share/icons/hicolor/256x256@2/apps/EcoPaste.png /app/share/icons/hicolor/256x256@2/apps/io.github.EcoPasteHub.EcoPaste.png
    sources:
      - type: file
        url: https://github.com/EcoPasteHub/EcoPaste/releases/download/v0.5.0/EcoPaste_0.5.0_amd64.deb
        sha256: fba410c5be10f0a00fa1a7ea0e1ff88b2174ebc1b626901884aec0c1fc0f70c6
