id: dev.j7126.combat_tracker
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: combat_tracker
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: combat_tracker
    buildsystem: simple
    build-options:
      arch:
        x86_64:
          env:
            BUNDLE_PATH: build/linux/x64/release/bundle
        aarch64:
          env:
            BUNDLE_PATH: build/linux/arm64/release/bundle
      append-path: /usr/lib/sdk/llvm20/bin:/run/build/combat_tracker/flutter/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      env:
        PUB_CACHE: /run/build/combat_tracker/.pub-cache
    build-commands:
      - flutter build linux --release --no-pub
      - install -D $BUNDLE_PATH/share/dev.j7126.combat_tracker/combat_tracker /app/share/dev.j7126.combat_tracker/combat_tracker
      - cp -r $BUNDLE_PATH/share/dev.j7126.combat_tracker/data /app/share/dev.j7126.combat_tracker/data
      - mkdir /app/lib
      - cp -r $BUNDLE_PATH/lib/dev.j7126.combat_tracker /app/lib/dev.j7126.combat_tracker
      - install -D $BUNDLE_PATH/bin/combat_tracker /app/bin/combat_tracker
      - install -Dm644 flatpak/dev.j7126.combat_tracker.desktop -t /app/share/applications/
      - install -Dm644 flatpak/dev.j7126.combat_tracker.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 assets/icon/icon.svg /app/share/icons/hicolor/scalable/apps/dev.j7126.combat_tracker.svg
    sources:
      - type: git
        url: https://github.com/j7126/combat-tracker.git
        tag: v0.8.8
        commit: bbad68a9ad46b30bff56adf236c8beca412ecafe
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+(?:\+.*)?)$
      - type: git
        url: https://github.com/flutter/flutter.git
        tag: 3.41.5
        dest: flutter
