---
app-id: io.github.tuner_labs.tuner

command: io.github.tuner_labs.tuner

runtime: org.freedesktop.Platform
runtime-version: '25.08'

sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.vala

build-options:
  prepend-path: /usr/lib/sdk/vala/bin/
  prepend-ld-library-path: /usr/lib/sdk/vala/lib

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --socket=pulseaudio
  - --filesystem=xdg-desktop    # For playlist import export

cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/vala
  - "*.la"
  - "*.a"  
  - granite.mo
  - granite-demo
  - granite.appdata.xml
  - io.elementary.granite.demo.desktop
  
# Build flatpak with --no-separate-locales to avoid having to deal with translations in a separate module  
separate-locales: false

modules:

- name: libgee
  buildsystem: autotools
  build-options:
    cflags: -Wno-error=incompatible-pointer-types
  sources:
    - type: archive
      url: https://download.gnome.org/sources/libgee/0.20/libgee-0.20.8.tar.xz
      sha256: 189815ac143d89867193b0c52b7dc31f3aa108a15f04d6b5dca2b6adfad0b0ee

- name: granite
  buildsystem: meson
  cleanup:
    - /bin
    - /share/applications
    - /share/metainfo
  config-opts:
    - --buildtype=release
  sources:
    - type: archive
      url: https://github.com/elementary/granite/archive/refs/tags/6.2.0.tar.gz
      sha256: 067d31445da9808a802fca523630c3e4b84d2d7c78ae547ced017cb7f3b9c6b5

- name: tuner
  buildsystem: meson
  config-opts:
  - --buildtype=release
  sources:
    - type: git
      url: https://github.com/tuner-labs/tuner.git
      tag: v2.0.2
      commit: c8d3069707de7a65b78eecd903155d20daf99a1d
      
