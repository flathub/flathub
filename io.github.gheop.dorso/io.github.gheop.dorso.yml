app-id: io.github.gheop.dorso
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: dorso

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --device=all               # V4L2 camera access (webcam)
  - --share=network            # MediaPipe model download on first launch
  - --talk-name=org.kde.StatusNotifierWatcher  # System tray icon (SNI)

modules:
  - python-deps.json

  - name: dorso
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links . --prefix=${FLATPAK_DEST} .
      - install -Dm644 data/io.github.gheop.dorso.desktop ${FLATPAK_DEST}/share/applications/io.github.gheop.dorso.desktop
      - install -Dm644 data/io.github.gheop.dorso.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.gheop.dorso.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/io.github.gheop.dorso.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/io.github.gheop.dorso.svg
    sources:
      - type: archive
        url: https://github.com/Gheop/dorso-linux/archive/refs/tags/v0.1.1.tar.gz
        sha256: e0f7fa727fd762b1060483e560139476656b4ea5450f15f7baf7186e925a07b9
