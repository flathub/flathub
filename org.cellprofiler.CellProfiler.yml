id: org.cellprofiler.CellProfiler
# wxPython doesn't generally need gtk libs from GNOME, but webkit2gtk is not available in freedesktop runtime
runtime: org.gnome.Platform
sdk: org.gnome.Sdk
runtime-version: '49'
command: cellprofiler
default-branch: 4.2.x
modules:
  - name: pixi-install
    buildsystem: simple
    build-commands:
      # unpack the bundled environment
      - ${FLATPAK_BUILDER_BUILDDIR}/environment.sh --output-directory ${FLATPAK_DEST} --verbose
      # remove these so the flatpak bundled libs in /usr/lib/x86-64-linux-gnu are linked to instead
      - rm -f ${FLATPAK_DEST}/env/lib/libfontconfig*
      - rm -f ${FLATPAK_DEST}/env/lib/libGL*
      - rm -f ${FLATPAK_DEST}/env/lib/libEGL*
      - rm -f ${FLATPAK_DEST}/env/lib/libgbm*
      - rm -f ${FLATPAK_DEST}/env/lib/libglapi*
      # command passthrough in activation script
      - echo 'exec "$@"' >> ${FLATPAK_DEST}/activate.sh
      - chmod +x ${FLATPAK_DEST}/activate.sh
      # script to provide the command to passthrough
      - echo "${FLATPAK_DEST}/activate.sh python -m cellprofiler -L 10" > cellprofiler
      - install -Dm0755 cellprofiler ${FLATPAK_DEST}/bin/cellprofiler
      # pip install the sources only, the deps are already installed in the unpacked enviornment above
      #   cannot make wheel of python-javabride since it links against its own jvm, so build it
      - JAVA_HOME="${FLATPAK_DEST}/env/lib/jvm" PATH="${FLATPAK_DEST}/env/bin:$PATH" pip3 --python ${FLATPAK_DEST}/env/bin/python install --no-index --no-build-isolation --no-deps --prefix=${FLATPAK_DEST}/env ${FLATPAK_BUILDER_BUILDDIR}/javabridge
      #   install core and frontend
      - pip3 --python ${FLATPAK_DEST}/env/bin/python install --no-index --no-build-isolation --no-deps --prefix=${FLATPAK_DEST}/env ${FLATPAK_BUILDER_BUILDDIR}/core
      - pip3 --python ${FLATPAK_DEST}/env/bin/python install --no-index --no-build-isolation --no-deps --prefix=${FLATPAK_DEST}/env ${FLATPAK_BUILDER_BUILDDIR}/frontend
      # compile all the python code for faster startup
      # - ${FLATPAK_DEST}/activate.sh python -m compileall ${FLATPAK_DEST}/env/lib/python3.9/site-packages/
      # install app metadata, desktop entry, and icon
      - mkdir -p /app/share/{icons/hicolor/scalable/apps,metainfo,applications}
      # - cp frontend/cellprofiler/data/icons/CellProfiler-favicon-128.png /app/share/icons/hicolor/128x128/apps/org.cellprofiler.CellProfiler.png
      - cp frontend/cellprofiler/data/icons/CellProfiler_square.svg /app/share/icons/hicolor/scalable/apps/org.cellprofiler.CellProfiler.svg
      - cp distribution/linux/org.cellprofiler.CellProfiler.metainfo.xml /app/share/metainfo/org.cellprofiler.CellProfiler.metainfo.xml
      - cp distribution/linux/org.cellprofiler.CellProfiler.desktop /app/share/applications/org.cellprofiler.CellProfiler.desktop
    sources:
      #- type: file
      #  path: ./environment.sh
      - type: archive
        archive-type: "tar-xz"
        url: https://github.com/gnodar01/cp-42x-dev/releases/download/v4.2.8.1/environment.txz
        sha256: 554fd2f8a689254ff67490f4b9278236c5f6e899c6b2e15b03e51082aaeb8180
        strip-components: 0
      - type: git
        url: https://github.com/CellProfiler/python-javabridge.git
        commit: dbe350b721f407636d8c29c571670f279f868ee4
        dest: javabridge
      - type: git
        url: https://github.com/CellProfiler/core.git
        commit: 855ed244ea43bfd32a6739edf9e2e510584bdbf9
        dest: core
      - type: git
        url: https://github.com/CellProfiler/CellProfiler.git
        commit: f4e51a537a1d9578daeacbbb46916bbb91f6df66
        dest: frontend
      - type: git
        url: https://github.com/CellProfiler/distribution.git
        commit: fe064b8663acbc1f49a1f8fb9dc35352d1851bb1
        dest: distribution
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --share=network
  # only allow access to host's XDG_DOCUMENTS_DIR or $HOME/documents
  - --filesystem=xdg-documents:rw
  # by default set to gail:atk-bridge, which causes a load of canberra-gtk-module, which is not shipped in the flatpak
  - --unset-env=GTK_MODULES
  # find pixi provided libs, like libjpeg.so.8
  - --env=LD_LIBRARY_PATH=/app/env/lib
  # prevent direct memory access buffer protocol, to stop webkit from sharing graphics buffer with main UI process
  # especially for Ubuntu with X11 and NVIDIA drivers, or older version of Meson on the host, the "handshake" required fails
  # don't use shared-memory buffer protocol and fallback to traditional texture-sharing or software-fallback path
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1
