app-id: io.github.marang.boosteroid
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: boosteroid-flatpak
separate-locales: false

finish-args:
  - --share=network
  - --socket=x11
  - --socket=pulseaudio
  - --share=ipc
  - --device=dri
  - --filesystem=xdg-run/pipewire-0
  - --env=BOOSTEROID_HOME=/app/extra/opt/BoosteroidGamesS.R.L.

modules:
  - name: numactl
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/numactl/numactl/releases/download/v2.0.18/numactl-2.0.18.tar.gz
        sha256: b4fc0956317680579992d7815bc43d0538960dc73aa1dd8ca7e3806e30bc1274

  - name: boosteroid
    buildsystem: simple
    build-commands:
      - install -D -m 0755 boosteroid-wrapper.sh /app/bin/boosteroid-flatpak
      - install -D -m 0644 io.github.marang.boosteroid.desktop /app/share/applications/io.github.marang.boosteroid.desktop
      - install -D -m 0644 io.github.marang.boosteroid.metainfo.xml /app/share/metainfo/io.github.marang.boosteroid.metainfo.xml
      - install -D -m 0644 io.github.marang.boosteroid.svg /app/share/icons/hicolor/scalable/apps/io.github.marang.boosteroid.svg

      # Download proprietary .deb at install time, then extract it into /app/extra.
      - install -d /app/extra
      - install -D -m 0755 apply_extra /app/bin/apply_extra
    sources:
      - type: file
        path: boosteroid-wrapper.sh
      - type: file
        path: io.github.marang.boosteroid.desktop
      - type: file
        path: io.github.marang.boosteroid.metainfo.xml
      - type: file
        path: io.github.marang.boosteroid.svg
      - type: script
        dest-filename: apply_extra
        commands:
          - |-
            #!/bin/sh
            set -eu
            cd /app/extra
            # File is placed by Flatpak's extra-data mechanism.
            test -f boosteroid-install-x64.deb
            bsdtar -xOf boosteroid-install-x64.deb data.tar.bz2 | tar -xjf -
            rm -f boosteroid-install-x64.deb
      - type: extra-data
        filename: boosteroid-install-x64.deb
        url: https://boosteroid.com/linux/installer/boosteroid-install-x64.deb
        size: 78920770
        sha256: 9194e83bd6292c6536be84fa67db05c22c0e47534f2de1226ecf9b740adb3a7c
