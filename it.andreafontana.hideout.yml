app-id: it.andreafontana.hideout
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: hideout
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=host
  - --filesystem=/tmp
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.gnupg.gpg-agent

modules:
  - name: ldc
    buildsystem: simple
    sources:
      - type: archive
        url: https://github.com/ldc-developers/ldc/releases/download/v1.42.0/ldc2-1.42.0-linux-x86_64.tar.xz
        sha256: a7bc9c956138f558cadf9c962352f59d41c80df6eb3ae3f8039f25be14a69303
        only-arches: [x86_64]
        strip-components: 1
      - type: archive
        url: https://github.com/ldc-developers/ldc/releases/download/v1.42.0/ldc2-1.42.0-linux-aarch64.tar.xz
        sha256: 687707c3e20ff910528eb2d92f27a98cb0960284de3b026e6bf20284ac1c8511
        only-arches: [aarch64]
        strip-components: 1
    build-commands:
      - cp -r * /app/

  - name: hideout
    buildsystem: simple
    build-commands:
      - rm -f dub.selections.json
      - find deps/gid -name "dub.sdl" -o -name "dub.json" | while read f; do /app/bin/dub add-local --system "$(dirname "$f")" "0.9.9"; done
      - /app/bin/dub build --compiler=/app/bin/ldc2 --build=release --d-version=Flatpak --skip-registry=all
      - install -D hideout /app/bin/hideout
      - install -D hideout_icon.svg /app/share/icons/hicolor/scalable/apps/it.andreafontana.hideout.svg
      - install -D it.andreafontana.hideout.desktop /app/share/applications/it.andreafontana.hideout.desktop
      - install -D data/it.andreafontana.hideout.metainfo.xml /app/share/metainfo/it.andreafontana.hideout.metainfo.xml
      - install -D LICENSE /app/share/licenses/it.andreafontana.hideout/LICENSE
    sources:
      - type: archive
        url: https://github.com/trikko/hideout/archive/refs/tags/v0.9.9.tar.gz
        sha256: a21e6eba8d73942f4d3722fcdbff4f4e22f5b62b11e064d4d798b5f7a2030e55
      - type: archive
        url: https://github.com/Kymorphia/gid/archive/refs/tags/v0.9.9.tar.gz
        sha256: 5b177d8e02bba4096d5c24fc38bb3b39b99f23c8ce04736a3b93e2927eeb835e
        dest: deps/gid
        strip-components: 1
