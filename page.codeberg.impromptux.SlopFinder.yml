id: page.codeberg.impromptux.SlopFinder
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
cleanup-commands:
    - /app/cleanup-BaseApp.sh
build-options:
  env:
    - BASEAPP_REMOVE_WEBENGINE=1
command: SlopFinder
finish-args:
    - --socket=fallback-x11
    - --socket=wayland
    - --share=network
    - --share=ipc #needed by x11
modules:
    - name: python3-requests
      buildsystem: simple
      build-commands:
          - pip3 install --no-dependencies --prefix=/app *.whl
      sources:
          - type: file
            url: https://files.pythonhosted.org/packages/9a/3c/c17fb3ca2d9c3acff52e30b309f538586f9f5b9c9cf454f3845fc9af4881/certifi-2026.2.25-py3-none-any.whl
            sha256: 027692e4402ad994f1c42e52a4997a9763c646b73e4096e4d5d6db8af1d6f0fa
          - type: file
            url: https://files.pythonhosted.org/packages/e7/a1/67fe25fac3c7642725500a3f6cfe5821ad557c3abb11c9d20d12c7008d3e/charset_normalizer-3.4.7.tar.gz
            sha256: ae89db9e5f98a11a4bf50407d4363e7b09b31e55bc117b4f7d80aab97ba009e5
          - type: file
            url: https://files.pythonhosted.org/packages/0e/61/66938bbb5fc52dbdf84594873d5b51fb1f7c7794e9c0f5bd885f30bc507b/idna-3.11-py3-none-any.whl
            sha256: 771a87f49d9defaf64091e6e6fe9c18d4833f140bd19464795bc32d966ca37ea
          - type: file
            url: https://files.pythonhosted.org/packages/d7/8e/7540e8a2036f79a125c1d2ebadf69ed7901608859186c856fa0388ef4197/requests-2.33.1-py3-none-any.whl
            sha256: 4e6d1ef462f3626a1f0a0a9c42dd93c63bad33f9f1c1937509b8c5c8718ab56a
            x-checker-data:
                type: pypi
                name: requests
                packagetype: bdist_wheel
          - type: file
            url: https://files.pythonhosted.org/packages/39/08/aaaad47bc4e9dc8c725e68f9d04865dbcb2052843ff09c97b08904852d84/urllib3-2.6.3-py3-none-any.whl
            sha256: bf272323e553dfb2e87d9bfd225ca7b0f467b919d7bbd355436d3fd37cb0acd4
    - name: SlopFinder_
      buildsystem: simple
      build-commands:
          - bash ./resources/install.sh /app
          - install -D resources/page.codeberg.impromptux.SlopFinder.metainfo.xml -t /app/share/metainfo/
      sources:
      - type: git
        url: https://codeberg.org/impromptux/SlopFinder.git
        commit: 300ee720f987b47b003234018181322e7bf3bc69
        x-checker-data:
            type: git
            tag-pattern: (\d+\.\d+)
            disable-submodules: true
