id: io.github.thomasboom.Nete
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: nete

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/nete/cargo

modules:
  - name: nete
    buildsystem: simple
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --verbose
      - install -Dm755 target/release/nete /app/bin/nete
      - install -Dm644 data/io.github.thomasboom.Nete.desktop /app/share/applications/io.github.thomasboom.Nete.desktop
      - install -Dm644 data/io.github.thomasboom.Nete.metainfo.xml /app/share/metainfo/io.github.thomasboom.Nete.metainfo.xml
      - install -Dm644 data/icons/io.github.thomasboom.Nete.svg /app/share/icons/hicolor/scalable/apps/io.github.thomasboom.Nete.svg
    sources:
      - type: git
        url: https://github.com/thomasboom/nete.git
        tag: v1.0.0
        commit: c4f797beb7b0c12f4622ed9f9f333ab2f831815a
        x-checker-data:
          type: json
          url: https://api.github.com/repos/thomasboom/nete/releases/latest
          tag-query: .tag_name
          version-query: .tag_name | ltrimstr("v")
          timestamp-query: .published_at
      - generated-sources.json
