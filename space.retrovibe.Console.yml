id: space.retrovibe.Console
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: console
modules:
    - name: duckdb
      buildsystem: simple
      build-commands:
        - cp -r . /app/lib
      sources:
        - type: archive
          dest-filename: duckdb.zip
          url: https://github.com/duckdb/duckdb/releases/download/v1.4.1/libduckdb-linux-amd64.zip
          sha256: ce859962fe96ca952d53571964dafa0168644283a76a2c669b3f73120d710edb
          only-arches:
            - x86_64
        - type: archive
          dest-filename: duckdb.zip
          url: https://github.com/duckdb/duckdb/releases/download/v1.4.1/libduckdb-linux-arm64.zip
          sha256: 4aa05a74956b1d57f05a139623943231caeee36286c9f42ff10dc278b6df0b6e
          only-arches:
            - aarch64
    - name: libass
      buildsystem: autotools
      config-opts:
        - --disable-static
        - --enable-asm
        - --enable-harfbuzz
        - --enable-fontconfig
      sources:
        - type: git
          url: https://github.com/libass/libass.git
          tag: 0.17.4
          commit: bbb3c7f1570a4a021e52683f3fbdf74fe492ae84
    - name: libbs2b
      buildsystem: autotools
      config-opts:
        - --disable-static
      cleanup:
        - /include
        - /lib/pkgconfig
      sources:
        - type: archive
          dest-filename: libbs2b-3.1.0.tar.gz
          url: https://downloads.sourceforge.net/sourceforge/bs2b/libbs2b-3.1.0.tar.gz
          sha256: 6aaafd81aae3898ee40148dd1349aab348db9bfae9767d0e66e0b07ddd4b2528
        - type: shell
          commands:
            - sed -i -e 's/lzma/xz/g' configure.ac
            - autoreconf -vif
    - name: libplacebo
      buildsystem: meson
      config-opts:
        - -Dvulkan=enabled
        - -Dshaderc=enabled
        - --libdir=/app/lib
      sources:
        - type: git
          url: https://github.com/haasn/libplacebo.git
          tag: v7.351.0
          commit: 3188549fba13bbdf3a5a98de2a38c2e71f04e21e
        - type: file
          dest-filename: libplacebo-vulkan-utils_gen-python.patch
          url: https://raw.githubusercontent.com/retrovibed/retrovibed/9c126143b6b98586810169f6322a49cd39d9ef03/.patches/libplacebo-vulkan-utils_gen-python.patch
          sha256: f183bf98c3bd1591cd93a12d4d0372f77e3009bdc0a19a3e0f9edb2dfee0b657
        - type: shell
          commands:
            - patch -p1 < libplacebo-vulkan-utils_gen-python.patch
    - name: libx264
      buildsystem: autotools
      config-opts:
        - --disable-cli
        - --enable-shared
      cleanup:
        - /include
        - /lib/pkgconfig
        - /share/man
      sources:
        - type: git
          url: https://github.com/mirror/x264.git
          commit: 31e19f92f00c7003fa115047ce50978bc98c3a0d
    - name: libx265
      buildsystem: cmake
      subdir: source
      config-opts:
        - -DCMAKE_BUILD_TYPE=Release
        - -DBUILD_STATIC=0
        - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      cleanup:
        - /share/man
      sources:
        - type: git
          url: https://bitbucket.org/multicoreware/x265_git.git
          tag: "4.1"
          commit: 1d117bed4747758b51bd2c124d738527e30392cb
        - type: file
          dest-filename: libx265-cmake.patch
          url: https://raw.githubusercontent.com/retrovibed/retrovibed/9c126143b6b98586810169f6322a49cd39d9ef03/.patches/libx265-cmake.patch
          sha256: 7d8a3e1d4862588f95d9fcd26f3bb78ea9ce01346044326d9b9949b28d6f04e9
        - type: shell
          commands:
            - patch -p1 < libx265-cmake.patch
    - name: libffmpeg
      buildsystem: autotools
      config-opts:
        - --env=CFLAGS="-Wno-incompatible-pointer-types"
        - --disable-debug
        - --disable-doc
        - --disable-static
        - --enable-encoder=png
        - --enable-gnutls
        - --enable-gpl
        - --enable-shared
        - --enable-version3
        - --enable-libaom
        - --enable-libass
        - --enable-libbs2b
        - --enable-libdav1d
        - --enable-libdrm
        - --enable-libfreetype
        - --enable-libmp3lame
        - --enable-libopus
        - --enable-libjxl
        - --enable-libtheora
        - --enable-libv4l2
        - --enable-libvorbis
        - --enable-libvpx
        - --enable-libx264
        - --enable-libx265
        - --enable-libwebp
        - --enable-libxml2
        - --enable-vulkan
      cleanup:
        - /share/ffmpeg/examples
        - /include
        - /lib/pkgconfig
      sources:
        - type: git
          url: https://github.com/FFmpeg/FFmpeg.git
          tag: n7.1.2
          commit: f893221c8d89cb798b829bebe71d55e1a3f242fd
    - name: mpv
      buildsystem: meson
      config-opts:
        - -Dlibmpv=true
        - -Dvulkan=enabled
        - -Dmanpage-build=disabled
        - -Dbuild-date=false
        - --libdir=/app/lib
      sources:
        - type: archive
          dest-filename: v0.39.0.tar.gz
          url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.39.0.tar.gz
          sha256: 2ca92437affb62c2b559b4419ea4785c70d023590500e8a52e95ea3ab4554683
    - name: tarball
      buildsystem: simple
      build-commands:
        - mv usr/share/applications/retrovibed.desktop /app/share/applications/space.retrovibe.Console.desktop
        - mv usr/share/icons/hicolor/scalable/apps/retrovibed.svg /app/share/icons/hicolor/scalable/apps/space.retrovibe.Console.svg
        - mv usr/share/metainfo/space.retrovibe.Console.metainfo.xml /app/share/metainfo/space.retrovibe.Console.metainfo.xml
        - mv usr/share/licenses/space.retrovibe.Console /app/share/licenses/space.retrovibe.Console
        - rm -rf usr
        - rm -rf etc
        - cp -r . /app/bin
        - mv /app/bin/lib/libretrovibed.so /app/lib
      sources:
        - type: archive
          dest-filename: retrovibed.linux.amd64.tar.xz
          url: https://github.com/retrovibed/retrovibed/releases/download/r2026.4.26aec48bd/retrovibed.linux.amd64.tar.xz
          sha256: a6d775b1acd2a05cf6d7e1728213c379fd2dc8c8d973fb994814ce12149285bc
finish-args:
    - --socket=wayland
    - --device=dri
    - --share=network
    - --filesystem=xdg-download
    - --filesystem=xdg-music
    - --filesystem=xdg-videos
    - --socket=pulseaudio
    - --filesystem=xdg-run/pipewire-0:ro
    - --filesystem=~/.duckdb:create
    - --socket=fallback-x11
    - --share=ipc
    - --filesystem=xdg-run/gvfsd
    - --env=LC_NUMERIC=C
    - --env=TMPDIR=/var/tmp/
    - --env=RETROVIBED_MDNS_DISABLED=true
    - --env=RETROVIBED_AUTO_IDENTIFY_MEDIA=false
    - --env=RETROVIBED_MEDIA_AUTO_ARCHIVE=true
    - --env=RETROVIBED_MEDIA_AUTO_RECLAIM=false
    - --env=RETROVIBED_TORRENT_AUTO_DISCOVERY=false
    - --env=RETROVIBED_TORRENT_AUTO_BOOTSTRAP=true
    - --env=RETROVIBED_TORRENT_ALLOW_SEEDING=true
    - --env=RETROVIBED_TORRENT_PUBLIC_IP4=""
    - --env=RETROVIBED_TORRENT_PUBLIC_IP6=""
    - --env=RETROVIBED_JWT_SECRET=
    - --env=RETROVIBED_SELF_SIGNED_HOSTS=127.0.0.1
