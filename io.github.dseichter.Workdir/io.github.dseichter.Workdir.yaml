app-id: io.github.dseichter.Workdir
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: workdir

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: python-dependencies
    buildsystem: simple
    build-commands:
      - python3 -m pip install --ignore-installed --no-index --find-links="file://${PWD}" --prefix=/app PySide6==6.10.2 urllib3==2.6.3 packaging==26.0
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/52/88/292e0576489c46624ab419ee284ac5a59ae10e2eb34a58b6abca51dfd290/shiboken6-6.10.2-cp39-abi3-manylinux_2_34_x86_64.whl
        sha256: ace0790032d9cb0adda644b94ee28d59410180d9773643bb6cf8438c361987ad
      - type: file
        url: https://files.pythonhosted.org/packages/99/20/3a6ca95052e1744b5a3eba164e2dd451d358a3dcaf78179de4b45c8e3f47/pyside6_essentials-6.10.2-cp39-abi3-manylinux_2_34_x86_64.whl
        sha256: 660aea45bfa36f1e06f799b934c2a7df963bd31abc5083e8bb8a5bfaef45686b
      - type: file
        url: https://files.pythonhosted.org/packages/a5/69/e1ab8c756fd3984b1fd7b186446227f524f6b561160bfbfdba8874b4709a/pyside6_addons-6.10.2-cp39-abi3-manylinux_2_34_x86_64.whl
        sha256: 030a851163b51dbf0063be59e9ddb6a9e760bde89a28e461ccc81a224d286eaf
      - type: file
        url: https://files.pythonhosted.org/packages/35/d3/ab5cd2fac3d34469c7376e0cd18eec92905dbe44748c70bda7699a2a7206/pyside6-6.10.2-cp39-abi3-manylinux_2_34_x86_64.whl
        sha256: 1b89ce8558d4b4f35b85bff1db90d680912e4d3ce9e79ff804d6fef1d1a151ef
      - type: file
        url: https://files.pythonhosted.org/packages/39/08/aaaad47bc4e9dc8c725e68f9d04865dbcb2052843ff09c97b08904852d84/urllib3-2.6.3-py3-none-any.whl
        sha256: bf272323e553dfb2e87d9bfd225ca7b0f467b919d7bbd355436d3fd37cb0acd4
      - type: file
        url: https://files.pythonhosted.org/packages/b7/b9/c538f279a4e237a006a2c98387d081e9eb060d203d8ed34467cc0f0b9b53/packaging-26.0-py3-none-any.whl
        sha256: b36f1fef9334a5588b4166f8bcd26a14e521f2b55e6b9de3aaa80d3ff7a37529

  - name: workdir
    buildsystem: simple
    build-commands:
      - python3 -m pip install --no-deps --no-build-isolation --no-index --prefix=/app .
      - printf '%s\n' '#!/usr/bin/env sh' 'exec python3 -m workdir "$@"' > /app/bin/workdir
      - chmod 0755 /app/bin/workdir
    sources:
      - type: git
        url: https://github.com/dseichter/Workdir.git
        tag: v2026-03-10
        commit: feb1b783b76775d1d23a68c6310ea2dba4fbf7bc