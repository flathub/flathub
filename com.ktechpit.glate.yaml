app-id: com.ktechpit.glate
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: glate
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --env=INSTALL_TYPE=flatpak
  - --socket=pulseaudio
  - --talk-name=org.kde.StatusNotifierWatcher

  # required for export of translated text and synthesized audio
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --filesystem=xdg-music

modules:
  - shared-modules/squashfs-tools/squashfs-tools.json

  - name: glate
    buildsystem: simple
    build-commands:
        - unsquashfs -no-progress *.snap
        - install -Dm755 squashfs-root/usr/bin/glate ${FLATPAK_DEST}/bin/glate
        - cp -r squashfs-root/usr/share/icons ${FLATPAK_DEST}/share/
        - install -Dm644 squashfs-root/usr/share/applications/com.ktechpit.glate.desktop ${FLATPAK_DEST}/share/applications/com.ktechpit.glate.desktop
        - desktop-file-edit --set-icon=${FLATPAK_ID} ${FLATPAK_DEST}/share/applications/com.ktechpit.glate.desktop
        - install -Dm644 squashfs-root/usr/share/metainfo/com.ktechpit.glate.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.ktechpit.glate.metainfo.xml
    sources:
        # =========================
        # x86_64 (amd64) – stable
        # =========================
        - type: file
          url: https://api.snapcraft.io/api/v1/snaps/download/SXq98IHX3HIOe3I6CuvHbw9jaGOELiLF_50.snap
          sha256: 3d42b738172a2be906de31706584fe363b63172c30d11b96d6be350c44be278b
          only-arches:
            - x86_64

        # =========================
        # arm64 (aarch64) – stable
        # =========================
        - type: file
          url: https://api.snapcraft.io/api/v1/snaps/download/SXq98IHX3HIOe3I6CuvHbw9jaGOELiLF_51.snap
          sha256: 3c08b9cb39f108801685ab0f77d3100051a726d5dfd3d4315f707093583a62aa
          only-arches:
            - aarch64
