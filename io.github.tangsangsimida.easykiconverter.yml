app-id: io.github.tangsangsimida.easykiconverter
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: easykiconverter
build-options:
  append-ld-library-path: /usr/lib/qt6/lib
  env:
    QT_PLUGIN_PATH: /app/lib/qt6/plugins:/usr/lib/qt6/plugins

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --filesystem=xdg-config/kdeglobals:ro
  - --talk-name=org.freedesktop.Notifications
  - --env=QT_QPA_PLATFORM=wayland;xcb

modules:
  - name: qxlsx
    buildsystem: cmake-ninja
    builddir: true
    subdir: QXlsx
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DBUILD_SHARED_LIBS=OFF
      - -DBUILD_EXAMPLES=OFF
    post-install:
      - |
        cp -r ../header/* /app/include/QXlsxQt6/
        cp -r ../source/*.h /app/include/QXlsxQt6/ 2>/dev/null || true
    sources:
      - type: archive
        url: https://github.com/QtExcel/QXlsx/archive/refs/tags/v1.5.0.zip
        sha256: 3b9112ffa6b87d7b16935fe6a232f657a73a7f7e70689df7254635efe66622fb
        strip-components: 1

  - name: easykiconverter
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_SYMBOL_FOOTPRINT_DEBUG_EXPORT=OFF
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DCMAKE_PREFIX_PATH=/app
      - -DQt6_DIR=/app/lib/cmake/QXlsxQt6
    sources:
      - type: archive
        url: https://github.com/tangsangsimida/EasyKiConverter/archive/refs/tags/v3.0.8.zip
        sha256: 36d286931da9b7fc23f0bc33069ff745e395dc9c3ba84b4159515d04fd9e809d
    build-commands:
      - cmake --build . --parallel
      - cmake --install .
    post-install:
      - |
        install -Dm0644 /run/build/easykiconverter/LICENSE -t ${FLATPAK_DEST}/share/licenses/io.github.tangsangsimida.easykiconverter
      - |
        install -Dm0644 /run/build/easykiconverter/deploy/metainfo/io.github.tangsangsimida.easykiconverter.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo/