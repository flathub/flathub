app-id: io.github.tangsangsimida.easykiconverter
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: easykiconverter
build-options:
  append-ld-library-path: /usr/lib/qt6/lib
  env:
    QT_PLUGIN_PATH: /app/lib/qt6/plugins:/usr/lib/qt6/plugins

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-config/kdeglobals:ro
  - --socket=session-bus
  - --env=QT_QPA_PLATFORM=wayland;xcb

modules:
  - name: easykiconverter
    buildsystem: cmake-ninja
    builddir: false
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_SYMBOL_FOOTPRINT_DEBUG_EXPORT=OFF
    build-options:
      env:
        QXLSX_ROOT: qlsx-root/QXlsx
    sources:
      - type: git
        url: https://github.com/tangsangsimida/EasyKiConverter.git
        tag: pre
        commit: 642877e6f0d9b887fde644a3b078242409453c74
      - type: archive
        url: https://github.com/QtExcel/QXlsx/archive/refs/heads/master.zip
        sha256: 464005b533aefc2c96423dc0a4b238231b3d310a69881102d6430cb279b1701b
        dest: qlsx-root
    cleanup:
      - /include
      - /lib/cmake
      - /lib/libQXlsxQt6.a
