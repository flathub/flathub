app-id: io.github.tangsangsimida.easykiconverter
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: easykiconverter
build-options:
  append-ld-library-path: /usr/lib/qt6/lib
  env:
    QT_PLUGIN_PATH: /app/lib/qt6/plugins:/usr/lib/qt6/plugins

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network

modules:
  - name: easykiconverter
    buildsystem: cmake-ninja
    builddir: false
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_SYMBOL_FOOTPRINT_DEBUG_EXPORT=OFF
    build-options:
      env:
        QXLSX_ROOT: qlsx-root/QXlsx
    sources:
      - type: git
        url: https://github.com/tangsangsimida/EasyKiConverter.git
        tag: pre
        commit: 642877e6f0d9b887fde644a3b078242409453c74
      - type: archive
        url: https://github.com/QtExcel/QXlsx/archive/9f545935a1effa0144ba76598e95a7597210553a.tar.gz
        sha256: 4629430e80a4a9f9917526b2b02ad0f3d347551560e1f94a8a58434f457e27a6
        dest: qlsx-root
    cleanup:
      - /include
      - /lib/cmake
      - /lib/libQXlsxQt6.a
