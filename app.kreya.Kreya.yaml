app-id: app.kreya.Kreya
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: kreya
copy-icon: true
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - name: kreya
    buildsystem: simple
    build-commands:
      - cp -a kreya/* /app/
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://stable-downloads.kreya.app/1.19.1/Kreya-app-linux-x64.tar.gz
        sha256: bbbec075f9a0c260e9996968cc017d2f39ba746d7457af276d121e318c1e6ea4
        dest: kreya
        x-checker-data:
          type: html
          url: https://kreya.app/downloads
          version-pattern: ([\d]+\.[\d]+\.[\d]+)
          url-template: https://stable-downloads.kreya.app/$version/Kreya-app-linux-x64.tar.gz
          is-main-source: true
      - type: archive
        only-arches:
          - aarch64
        url: https://stable-downloads.kreya.app/1.19.1/Kreya-app-linux-arm64.tar.gz
        sha256: 9f2212492d0229269a0f54845c23baeb95fa09118270888e96182623ee3fe3be
        dest: kreya
        x-checker-data:
          type: html
          url: https://kreya.app/downloads
          version-pattern: ([\d]+\.[\d]+\.[\d]+)
          url-template: https://stable-downloads.kreya.app/$version/Kreya-app-linux-arm64.tar.gz
