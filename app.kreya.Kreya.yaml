app-id: app.kreya.Kreya
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: kreya
copy-icon: true
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - name: kreya
    buildsystem: simple
    build-commands:
      - cp -a kreya/* /app/
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://stable-downloads.kreya.app/1.19.1/Kreya-app-linux-x64.tar.gz
        sha256: 682f48bf87d05c00c0c2b6da43cd0b4aee6d281653536c3c23907444dd338a54
        dest: kreya
        x-checker-data:
          type: html
          url: https://kreya.app/downloads
          version-pattern: stable-downloads\.kreya\.app/([\d.]+)/Kreya-app-linux-x64\.tar\.gz
          url-template: https://stable-downloads.kreya.app/$version/Kreya-app-linux-x64.tar.gz
          is-main-source: true
      - type: archive
        only-arches:
          - aarch64
        url: https://stable-downloads.kreya.app/1.19.1/Kreya-app-linux-arm64.tar.gz
        sha256: 48ea81ff82087ebc677e455b12d2d91748c009749c024baea75863b1a1c9cce3
        dest: kreya
        x-checker-data:
          type: html
          url: https://kreya.app/downloads
          version-pattern: stable-downloads\.kreya\.app/([\d.]+)/Kreya-app-linux-arm64\.tar\.gz
          url-template: https://stable-downloads.kreya.app/$version/Kreya-app-linux-arm64.tar.gz
