app-id: app.kreya.Kreya
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: kreya
copy-icon: true
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - name: kreya
    buildsystem: simple
    build-commands:
      - install -Dm755 kreya /app/bin/kreya
      - bsdtar --to-stdout -xf kreya.deb data.* | bsdtar -xf - ./usr/share/applications/app.kreya.Kreya.desktop ./usr/share/icons/hicolor/scalable/apps/app.kreya.Kreya.svg ./usr/share/metainfo/app.kreya.Kreya.metainfo.xml ./usr/share/mime/packages/app.kreya.Kreya.xml ./opt/kreya
      - install -Dm644 usr/share/applications/app.kreya.Kreya.desktop /app/share/applications/app.kreya.Kreya.desktop
      - install -Dm644 usr/share/icons/hicolor/scalable/apps/app.kreya.Kreya.svg /app/share/icons/hicolor/scalable/apps/app.kreya.Kreya.svg
      - install -Dm644 usr/share/metainfo/app.kreya.Kreya.metainfo.xml /app/share/metainfo/app.kreya.Kreya.metainfo.xml
      - install -Dm644 usr/share/mime/packages/app.kreya.Kreya.xml /app/share/mime/packages/app.kreya.Kreya.xml
      - cp -r opt/kreya /app/kreya
      - rm -rf usr opt kreya.deb
    sources:
      - type: script
        dest-filename: kreya
        commands:
          - exec /app/kreya/kreya "$@"
      - type: file
        only-arches:
          - x86_64
        dest-filename: kreya.deb
        url: https://stable-downloads.kreya.app/1.19.1/kreya-linux-x64.deb
        sha256: 151f19e2450344c231dec5c227d055a76e30d453b18feb596d2a1ee43c981b42
        x-checker-data:
          type: html
          url: https://kreya.app/downloads
          version-pattern: stable-downloads\.kreya\.app/([\d.]+)/kreya-linux-x64\.deb
          url-template: https://stable-downloads.kreya.app/$version/kreya-linux-x64.deb
          is-main-source: true
      - type: file
        only-arches:
          - aarch64
        dest-filename: kreya.deb
        url: https://stable-downloads.kreya.app/1.19.1/kreya-linux-arm64.deb
        sha256: 5aa0085c8a3758efde93b2776a48af6e2d267db75f8426f3be288048fc5247ab
        x-checker-data:
          type: html
          url: https://kreya.app/downloads
          version-pattern: stable-downloads\.kreya\.app/([\d.]+)/kreya-linux-arm64\.deb
          url-template: https://stable-downloads.kreya.app/$version/kreya-linux-arm64.deb
