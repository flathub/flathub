app-id: app.kreya.Kreya
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: kreya
copy-icon: true
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: kreya
    buildsystem: simple
    build-commands:
      - install -d /app/lib/kreya
      - cp -a linux-*/. /app/lib/kreya
      - printf '#!/bin/sh\nexec /app/lib/kreya/kreya "$@"\n' > kreya-wrapper
      - install -Dm755 kreya-wrapper /app/bin/kreya
      - install -Dm644 app.kreya.Kreya.desktop /app/share/applications/app.kreya.Kreya.desktop
      - install -Dm644 app.kreya.Kreya.svg /app/share/icons/hicolor/scalable/apps/app.kreya.Kreya.svg
      - install -Dm644 app.kreya.Kreya.metainfo.xml /app/share/metainfo/app.kreya.Kreya.metainfo.xml
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://stable-downloads.kreya.app/1.19.1/Kreya-linux-x64.tar.gz
        sha256: 9752de42fd90288e7b6d7c2a8bd28c083b6e0e2b9ac0b2ead72b31e926e61ca2
      - type: archive
        only-arches:
          - aarch64
        url: https://stable-downloads.kreya.app/1.19.1/Kreya-linux-arm64.tar.gz
        sha256: ad795adb82c8c2ab8f8cc26b24af7fc1b567d3dc39a1d6e34db3766ea04219cb
      - type: file
        path: app.kreya.Kreya.desktop
      - type: file
        path: app.kreya.Kreya.svg
      - type: file
        path: app.kreya.Kreya.metainfo.xml
