id: org.freedesktop.Platform.VulkanLayer.HdrWsi
default-branch: '24.08'
sdk: org.freedesktop.Sdk
runtime: org.freedesktop.Platform
runtime-version: '24.08'
build-extension: true
appstream-compose: false
build-options:
  prefix: /usr/lib/extensions/vulkan/HdrWsi
  strip: true
cleanup:
  - /include
  - /lib/*/pkgconfig
modules:
  - name: vk-hdr-layer
    build-options:
      libdir: lib/x86_64-linux-gnu
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/Zamundaaa/VK_hdr_layer.git
        commit: 303e0c69e1d33acd95158d92b1fc652fb5b85399

  - name: metadata
    buildsystem: simple
    build-commands:
      - install -Dm644 -t ${FLATPAK_DEST}/share/metainfo ${FLATPAK_ID}.metainfo.xml
    sources:
      - type: file
        path: org.freedesktop.Platform.VulkanLayer.HdrWsi.metainfo.xml
