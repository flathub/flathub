id: org.freedesktop.Platform.VulkanLayer.HdrWsi
sdk: org.freedesktop.Sdk
runtime: org.freedesktop.Platform
runtime-version: '25.08'
build-extension: true
build-options:
  prefix: /usr/lib/extensions/vulkan/HdrWsi
  strip: true
cleanup:
  - /include
  - /lib/pkgconfig
modules:
  - name: vk-hdr-layer
    buildsystem: meson
    post-install:
      - install -Dm644 -t ${FLATPAK_DEST}/share/metainfo /run/build/vk-hdr-layer/${FLATPAK_ID}.metainfo.xml
    sources:
      - type: git
        url: https://github.com/Zamundaaa/VK_hdr_layer.git
        commit: 303e0c69e1d33acd95158d92b1fc652fb5b85399
      - type: file
        path: org.freedesktop.Platform.VulkanLayer.HdrWsi.metainfo.xml
