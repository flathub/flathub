id: io.github.idemia.Multigit
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: io.qt.PySide.BaseApp
base-version: '6.10'
command: multigit.sh

finish-args:
  # Qt
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

  # Needed for running program on the host with `flatpak spawn`.
  # We run the following programs:
  # - git
  # - Git frontends, with direct executable: Sublime Merge, Git-gui, Gitk
  # - Git frontentds through `flatpak info` and `flatpak run`
  # - Git frontentds through /snap/bin/program
  - --talk-name=org.freedesktop.Flatpak

  # Multigit interacts with host filesystem (see https://github.com/idemia/multigit/blob/main/doc/use%20of%20filesystem%20by%20Multigit.md)
  # - scan a directory content to find git repositories (check the existence of .git and other git repository markers)
  # - check the existence of directories to inform the user that a git clone will fail
  # - delete directories (on user request) when they prevent a clone to succeed
  # - open a Multigit file on the host filesystem
  # - export a multigit file, CSV file on the host filesystem

  # - home is the standard location for users to store their git repositories
  #   if any other location is needed, the user still has the option to enable it when launching multigit on the command-line
  - --filesystem=home

build-options:
  env:
    - BASEAPP_REMOVE_WEBENGINE=1
    - BASEAPP_DISABLE_NUMPY=1

modules:
  - multigit-requirements.json

  - name: multigit
    buildsystem: simple
    build-commands:
      - install -Dm 755 -t /app/bin/ multigit.sh
      - mkdir -p /app/multigit
      - cp -a multigit.py mgitcmd.py src/ images/ packaging /app/multigit
      - install -Dm644 /app/multigit/packaging/flatpak/io.github.idemia.Multigit.metainfo.xml -t /app/share/metainfo
      - install -Dm644 /app/multigit/packaging/flatpak/io.github.idemia.Multigit.desktop -t /app/share/applications
      - install -Dm644 /app/multigit/images/multigit-logo-256.png /app/share/icons/hicolor/256x256/apps/io.github.idemia.Multigit.png
      - install -Dm644 /app/multigit/images/multigit-logo-64.png /app/share/icons/hicolor/64x64/apps/io.github.idemia.Multigit.png
      - install -Dm644 /app/multigit/images/multigit-logo-48.png /app/share/icons/hicolor/48x48/apps/io.github.idemia.Multigit.png
      - install -Dm644 /app/multigit/images/multigit-logo-32.png /app/share/icons/hicolor/32x32/apps/io.github.idemia.Multigit.png
      - install -Dm644 /app/multigit/images/multigit-logo-16.png /app/share/icons/hicolor/16x16/apps/io.github.idemia.Multigit.png

    sources:
      # build from git
      - type: git
        url: https://github.com/idemia/multigit
        tag: flathub/Multigit-v1.8-submission3
        commit: e45364ceaee8506be224f84d2fb0245853955da5

      - type: script
        dest-filename: multigit.sh
        commands:
          - exec python3 /app/multigit/multigit.py "$@"

cleanup-commands:
  - /app/cleanup-BaseApp.sh





