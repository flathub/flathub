id: io.github.idemia.Multigit
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: multigit.sh


cleanup:
  # let's reduce a bit the size of the flatpak
  - /lib/python3.13/site-packages/PySide6/include
  - /lib/python3.13/site-packages/PySide6/scripts
  - /lib/python3.13/site-packages/PySide6/typesystems
  - /lib/python3.13/site-packages/PySide6/assistant
  - /lib/python3.13/site-packages/PySide6/linguist
  - /lib/python3.13/site-packages/PySide6/lupdate
  - /lib/python3.13/site-packages/PySide6/qmlls
  - /lib/python3.13/site-packages/PySide6/qmlformat
  - /lib/python3.13/site-packages/PySide6/Qt/qml



modules:
  - python3-requirements.json

  - name: multigit
    buildsystem: simple
    build-commands:
      - install -Dm 755 -t /app/bin/ multigit.sh
      - mkdir -p /app/multigit
      - cp -a multigit.py mgitcmd.py src/ images/ packaging /app/multigit
      - mkdir -p /app/share/metainfo
      - mkdir -p /app/share/applications
      - mkdir -p /app/share/icons/hicolor/256x256/apps
      - mkdir -p /app/share/icons/hicolor/64x64/apps
      - mkdir -p /app/share/icons/hicolor/48x48/apps
      - mkdir -p /app/share/icons/hicolor/32x32/apps
      - mkdir -p /app/share/icons/hicolor/16x16/apps
      - cp -a /app/multigit/packaging/flatpak/io.github.idemia.Multigit.metainfo.xml /app/share/metainfo
      - cp -a /app/multigit/packaging/flatpak/io.github.idemia.Multigit.desktop /app/share/applications
      - cp -a /app/multigit/images/multigit-logo-256.png /app/share/icons/hicolor/256x256/apps/io.github.idemia.Multigit.png
      - cp -a /app/multigit/images/multigit-logo-64.png /app/share/icons/hicolor/64x64/apps/io.github.idemia.Multigit.png
      - cp -a /app/multigit/images/multigit-logo-48.png /app/share/icons/hicolor/48x48/apps/io.github.idemia.Multigit.png
      - cp -a /app/multigit/images/multigit-logo-32.png /app/share/icons/hicolor/32x32/apps/io.github.idemia.Multigit.png
      - cp -a /app/multigit/images/multigit-logo-16.png /app/share/icons/hicolor/16x16/apps/io.github.idemia.Multigit.png

    sources:
      # build from git
      - type: git
        url: https://github.com/idemia/multigit
        tag: flathub/Multigit-v1.8-submission2

      # local build
#      - type: dir
#        path: .

      - type: script
        dest-filename: multigit.sh
        commands:
          - exec python3 /app/multigit/multigit.py "$@"


finish-args:
  # Qt
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

  # Needed for running program on the host with `flatpak spawn`.
  # We run the following programs:
  # - git
  # - Git frontends, with direct executable: Sublime Merge, Git-gui, Gitk
  # - Git frontentds through `flatpak info` and `flatpak run`
  # - Git frontentds through /snap/bin/program
  - --talk-name=org.freedesktop.Flatpak

  # Multigit interacts with host filesystem (see https://github.com/idemia/multigit/blob/main/doc/use%20of%20filesystem%20by%20Multigit.md)
  # - scan a directory content to find git repositories (check the existence of .git and other git repository markers)
  # - check the existence of directories to inform the user that a git clone will fail
  # - delete directories (on user request) when they prevent a clone to succeed
  # - open a Multigit file on the host filesystem
  # - export a multigit file, CSV file on the host filesystem

  # - home is the standard location for users to store their git repositories
  # - /media is used by some users to store their projects on removable media
  # - /tmp is used by some users to check how multigit works on an example
  # Note that if a user stores its development work outside of its home directory, let's say in /work
  # Multigit won't be able to access it
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/tmp  




