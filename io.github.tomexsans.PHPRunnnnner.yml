app-id: io.github.tomexsans.PHPRunnnnner
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
separate-locales: false
command: phprunnnnner

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Flatpak

build-options:
  append-path: /usr/lib/sdk/node20/bin

modules:
  - name: PHPRunnnnner
    buildsystem: simple
    subdir: main
    build-options:
      append-path: /usr/lib/sdk/node20/bin
      env:
        XDG_CACHE_HOME: /run/build/PHPRunnnnner/flatpak-node/cache
        npm_config_cache: /run/build/PHPRunnnnner/flatpak-node/npm-cache
        npm_config_nodedir: /usr/lib/sdk/node20
        npm_config_offline: 'true'
    build-commands:
      # Install dependencies from pre-populated cache
      - npm install --offline

      # Build with electron-vite
      - npm run build

      # Package as unpacked dir (arch-aware)
      - . ../flatpak-node/electron-builder-arch-args.sh
      - ./node_modules/.bin/electron-builder $ELECTRON_BUILDER_ARCH_ARGS --linux --dir --publish never

      # Install app — cp -a without pre-creating dest so contents land at /app/lib/phprunnnnner
      - cp -a out/linux-unpacked /app/lib/phprunnnnner

      # Wrapper
      - install -Dm755 ../phprunnnnner.sh /app/bin/phprunnnnner

      # Desktop entry
      - install -Dm644 ../io.github.tomexsans.PHPRunnnnner.desktop
          /app/share/applications/io.github.tomexsans.PHPRunnnnner.desktop

      # Icons
      - install -Dm644 build/icons/16x16.png   /app/share/icons/hicolor/16x16/apps/io.github.tomexsans.PHPRunnnnner.png
      - install -Dm644 build/icons/32x32.png   /app/share/icons/hicolor/32x32/apps/io.github.tomexsans.PHPRunnnnner.png
      - install -Dm644 build/icons/48x48.png   /app/share/icons/hicolor/48x48/apps/io.github.tomexsans.PHPRunnnnner.png
      - install -Dm644 build/icons/64x64.png   /app/share/icons/hicolor/64x64/apps/io.github.tomexsans.PHPRunnnnner.png
      - install -Dm644 build/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.tomexsans.PHPRunnnnner.png
      - install -Dm644 build/icons/256x256.png /app/share/icons/hicolor/256x256/apps/io.github.tomexsans.PHPRunnnnner.png
      - install -Dm644 build/icons/512x512.png /app/share/icons/hicolor/512x512/apps/io.github.tomexsans.PHPRunnnnner.png

      # AppStream metainfo
      - install -Dm644 ../io.github.tomexsans.PHPRunnnnner.metainfo.xml
          /app/share/metainfo/io.github.tomexsans.PHPRunnnnner.metainfo.xml

    sources:
      - type: git
        url: https://github.com/tomexsans/phprunnnnner.git
        tag: v0.1.0
        commit: 8ccb52fd58eef473155c913b318c2bcb4e97b3cf
        dest: main

      - type: script
        dest-filename: phprunnnnner.sh
        commands:
          - set -o errexit
          - TMPDIR="${XDG_RUNTIME_DIR}/app/${FLATPAK_ID}"
          - export TMPDIR
          - exec zypak-wrapper.sh /app/lib/phprunnnnner/phprunnnnner --enable-features=UseOzonePlatform,WaylandWindowDecorations --ozone-platform-hint=auto "$@"

      - type: file
        path: io.github.tomexsans.PHPRunnnnner.desktop

      - type: file
        path: io.github.tomexsans.PHPRunnnnner.metainfo.xml

      # Generated by: flatpak-node-generator npm package-lock.json
      - generated-sources.json
