# Manifiesto para Flathub: usa origen Git (tag) en lugar de dir local.
# Copiar como com.freemidichords.MIDIChords.yml en el repo flathub/com.freemidichords.MIDIChords
# y actualizar el tag/commit en midichords-launcher al release que quieras publicar.
id: com.freemidichords.MIDIChords
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: midichords
appstream-compose: false
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  - --filesystem=xdg-config/MIDIChords:create
  - --filesystem=xdg-data/applications:ro
  - --share=network
modules:
  - name: portaudio
    buildsystem: autotools
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://files.portaudio.com/archives/pa_stable_v190700_20210406.tgz
        sha256: 47efbf42c77c19a05d22e627d42873e991ec0c1357219c0d74ce6a2948cb2def
  - python-deps.json
  - name: python3-sounddevice
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --ignore-installed --no-deps --exists-action=i --no-build-isolation --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} "sounddevice==0.5.1"
    build-options:
      env:
        CFLAGS: "-I/app/include"
        LDFLAGS: "-L/app/lib"
        PKG_CONFIG_PATH: "/app/lib/pkgconfig"
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/80/2d/b04ae180312b81dbb694504bee170eada5372242e186f6298139fd3a0513/sounddevice-0.5.1.tar.gz
        sha256: 09ca991daeda8ce4be9ac91e15a9a81c8f81efa6b695a348c9171ea0c16cb041
  - name: midichords-launcher
    buildsystem: simple
    build-commands:
      - install -d /app/share/midichords
      - cp -r midichords apps app.py launch.py assets /app/share/midichords/
      - install -Dm644 packaging/flatpak/com.freemidichords.MIDIChords.desktop /app/share/applications/com.freemidichords.MIDIChords.desktop
      - install -Dm644 packaging/flatpak/com.freemidichords.MIDIChords.metainfo.xml /app/share/metainfo/com.freemidichords.MIDIChords.metainfo.xml
      - install -Dm644 assets/app_logo.png /app/share/icons/hicolor/1024x1024/apps/com.freemidichords.MIDIChords.png
      - install -Dm644 LICENSE -t ${FLATPAK_DEST}/share/licenses/com.freemidichords.MIDIChords/midichords-launcher
      - |
        printf '%s\n' '#!/bin/sh' \
          'export PYTHONPATH="/app/lib/python3.12/site-packages"' \
          'cd /app/share/midichords && exec python3 app.py "$@"' > /app/bin/midichords
      - chmod 755 /app/bin/midichords
    sources:
      - type: git
        url: https://github.com/aortegaCampanillas/MIDIChords
        tag: v1.0.1
