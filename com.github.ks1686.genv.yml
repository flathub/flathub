app-id: com.github.ks1686.genv
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: genv

finish-args:
  # genv executes system package managers (apt, pacman, dnf, flatpak, snap, etc.)
  # and manages dotfiles — broad host access is required.
  - --filesystem=host
  - --share=network

modules:
  - name: genv
    buildsystem: simple
    build-commands:
      - install -Dm755 genv /app/bin/genv
      - install -Dm644 com.github.ks1686.genv.metainfo.xml /app/share/metainfo/com.github.ks1686.genv.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/ks1686/genv/releases/download/v2.0.1/genv_2.0.1_linux_amd64.tar.gz
        sha256: 23eba219410f3d4408dff922f5af54d22c740eb749b228a134c6404a22b0f867
        only-arches: [x86_64]
        x-checker-data:
          type: json
          url: https://api.github.com/repos/ks1686/genv/releases/latest
          version-query: .tag_name | ltrimstr("v")
          url-query: .assets[] | select(.name | test("linux_amd64\\.tar\\.gz$")) | .browser_download_url
      - type: archive
        url: https://github.com/ks1686/genv/releases/download/v2.0.1/genv_2.0.1_linux_arm64.tar.gz
        sha256: d4b0d016d84d5a0d7bc52c5c27d49109ccd00682f0b7f7d15b556bba305d4510
        only-arches: [aarch64]
        x-checker-data:
          type: json
          url: https://api.github.com/repos/ks1686/genv/releases/latest
          version-query: .tag_name | ltrimstr("v")
          url-query: .assets[] | select(.name | test("linux_arm64\\.tar\\.gz$")) | .browser_download_url
      - type: file
        path: com.github.ks1686.genv.metainfo.xml
