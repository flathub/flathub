app-id: id.my.ttl.TruckersToolLinux
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'

command: run.sh
separate-locales: false

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20

finish-args:
  # Network access for connecting to api.ttl.my.id and checking updates
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Filesystem permissions for ETS2 and ATS profiles (Read/Write required for editing profiles)
  # Standard Native Linux locations
  - --filesystem=~/.local/share/Euro Truck Simulator 2:rw
  - --filesystem=~/.local/share/American Truck Simulator:rw
  # Proton prefixes (Steam Play) for Native Steam
  # (Note: Specific paths are used to minimize access)
  - --filesystem=~/.steam/steam/steamapps/compatdata/227300/pfx/drive_c/users/steamuser/Documents/Euro Truck Simulator 2:rw
  - --filesystem=~/.steam/steam/steamapps/compatdata/270880/pfx/drive_c/users/steamuser/Documents/American Truck Simulator:rw
  - --env=ELECTRON_TRASH=gio

build-options:
  append-path: /usr/lib/sdk/node20/bin
  env:
    NPM_CONFIG_LOGLEVEL: info
    ELECTRON_CACHE: /run/build/truckers-tool-linux/electron-cache
    ELECTRON_BUILDER_CACHE: /run/build/truckers-tool-linux/electron-builder-cache

modules:
  - name: truckers-tool-linux
    buildsystem: simple
    build-options:
      env:
        npm_config_offline: 'true'
        npm_config_cache: /run/build/truckers-tool-linux/flatpak-node/npm-cache
        XDG_CACHE_HOME: /run/build/truckers-tool-linux/flatpak-node/cache
    build-commands:
      - npm ci --offline
      - npm run build:all
      
      - npx electron-builder --linux dir
      
      - cp -a release/linux-unpacked /app/main
      
      - install -Dm755 run.sh -t /app/bin/
      
      - install -Dm644 id.my.ttl.TruckersToolLinux.desktop -t /app/share/applications/
      - install -Dm644 id.my.ttl.TruckersToolLinux.metainfo.xml -t /app/share/metainfo/
      
      - install -Dm644 build/icon.png /app/share/icons/hicolor/512x512/apps/id.my.ttl.TruckersToolLinux.png
      
    sources:
      - type: git
        url: https://github.com/efzynx/truckers-tool-linux.git
        commit: f51e241f3051900ca8c49d133e8507ed5e90b4ed
        
      - type: file
        url: https://github.com/electron/electron/releases/download/v40.8.5/electron-v40.8.5-linux-x64.zip
        sha256: 3bce6ee4e4e481f7ce6d0be384f6c539ce16e0b9b7f46115aec6516770f6c26d
        dest: electron-cache
        dest-filename: electron-v40.8.5-linux-x64.zip

      - type: file
        path: run.sh
      - type: file
        path: id.my.ttl.TruckersToolLinux.desktop
      - type: file
        path: id.my.ttl.TruckersToolLinux.metainfo.xml
      - flatpak-node-sources.json
