app-id: io.github.sglbl.UrlOpener
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: url-opener
finish-args: []
modules:
  - name: url-opener
    buildsystem: simple
    build-commands:
      - install -D url-opener /app/bin/url-opener
      - install -Dm644 io.github.sglbl.UrlOpener.desktop /app/share/applications/io.github.sglbl.UrlOpener.desktop
      - install -Dm644 url.png /app/share/icons/hicolor/256x256/apps/io.github.sglbl.UrlOpener.png
      - install -Dm644 io.github.sglbl.UrlOpener.metainfo.xml /app/share/metainfo/io.github.sglbl.UrlOpener.metainfo.xml
    sources:
      - type: file
        path: url-opener
      - type: file
        path: io.github.sglbl.UrlOpener.desktop
      - type: file
        path: url.png
      - type: file
        path: io.github.sglbl.UrlOpener.metainfo.xml
