app-id: com.besoeasy.gupt
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: gupt
separate-locales: false

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher

build-options:
  append-path: /usr/lib/sdk/node22/bin
  env:
    npm_config_nodedir: /usr/lib/sdk/node22

modules:
  - name: gupt
    buildsystem: simple
    build-options:
      env:
        npm_config_offline: 'true'
        npm_config_cache: /run/build/gupt/flatpak-node/npm-cache
        electron_config_cache: /run/build/gupt/flatpak-node/cache/electron
    build-commands:
      # Install deps offline — sources come from generated-sources.json
      - npm ci --offline --prefer-offline

      # Build the Vite bundle for Electron
      - BUILD_TARGET=electron npm run electron:build:web

      # Install runtime files
      - mkdir -p /app/lib/gupt
      - cp -r dist electron package.json /app/lib/gupt/
      # Preserve electron binary before pruning devDeps (electron is a devDependency)
      - cp -rp node_modules/electron/dist /app/lib/gupt/electron-runtime
      - npm prune --omit=dev
      - cp -r node_modules /app/lib/gupt/

      # Launcher — uses BaseApp electron, not node_modules electron
      - install -Dm755 gupt.sh /app/bin/gupt

      # Desktop integration
      - install -Dm644 flatpak/com.besoeasy.gupt.desktop
          /app/share/applications/com.besoeasy.gupt.desktop
      - install -Dm644 flatpak/com.besoeasy.gupt.metainfo.xml
          /app/share/metainfo/com.besoeasy.gupt.metainfo.xml

      # Icons — regenerate with `npm run electron:icons` before building
      - for size in 16 24 32 48 64 128 256 512; do
          install -Dm644 build/icons/${size}x${size}.png
            /app/share/icons/hicolor/${size}x${size}/apps/com.besoeasy.gupt.png;
        done

    sources:
      - type: git
        url: https://github.com/besoeasy/gupt.git
        tag: v0.2.0
        commit: aaf5a1f4ca043c0a09dc38e483bd580e106bfd11

      - type: file
        path: gupt.sh

      # Generated by flatpak-node-generator — see docs/FLATPAK.md §4
      # (path is relative to this manifest's directory)
      - generated-sources.json
