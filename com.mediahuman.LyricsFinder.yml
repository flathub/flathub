id: com.mediahuman.LyricsFinder
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: LyricsFinder

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-music
  - --filesystem=xdg-download

modules:
  - name: LyricsFinder
    buildsystem: simple
    build-commands:
      - install -Dm755 LyricsFinder /app/bin/LyricsFinder
      - install -Dm644 com.mediahuman.LyricsFinder.desktop /app/share/applications/com.mediahuman.LyricsFinder.desktop
      - install -Dm644 com.mediahuman.LyricsFinder.metainfo.xml /app/share/metainfo/com.mediahuman.LyricsFinder.metainfo.xml
      - |
        for size in 16 32 64 128 256 512; do
          if [ -f icons/${size}/LyricsFinder.png ]; then
            install -Dm644 icons/${size}/LyricsFinder.png /app/share/icons/hicolor/${size}x${size}/apps/com.mediahuman.LyricsFinder.png
          fi
        done
      - mkdir -p /app/share/locale && install -m644 locale/*.qm /app/share/locale/
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://www.mediahuman.net/files/flatpak/lyrics-finder/LyricsFinder-1.7-linux-amd64.tar.gz
        sha256: 3a9507774c4d8b66a1df9beb923f4a13dd18e4ab3b5d8fd571c233748a0d9ff4
      - type: archive
        only-arches:
          - aarch64
        url: https://www.mediahuman.net/files/flatpak/lyrics-finder/LyricsFinder-1.7-linux-arm64.tar.gz
        sha256: 6aaef48e39b0b2facb5ddaeb954f6376664db12386d7009116368bdabe9c22c4
