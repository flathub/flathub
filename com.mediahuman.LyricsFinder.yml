id: com.mediahuman.LyricsFinder
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: LyricsFinder

tags:
  - proprietary

finish-args:
  - --share=ipc
  # Required for fetching song lyrics
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-music
  - --filesystem=xdg-download

modules:
  - name: LyricsFinder
    buildsystem: simple
    build-commands:
      - install -Dm755 LyricsFinder /app/bin/LyricsFinder
      - install -Dm644 com.mediahuman.LyricsFinder.desktop /app/share/applications/com.mediahuman.LyricsFinder.desktop
      - install -Dm644 com.mediahuman.LyricsFinder.metainfo.xml /app/share/metainfo/com.mediahuman.LyricsFinder.metainfo.xml
      - |
        for size in 16 32 64 128 256 512; do
          if [ -f icons/${size}/LyricsFinder.png ]; then
            install -Dm644 icons/${size}/LyricsFinder.png /app/share/icons/hicolor/${size}x${size}/apps/com.mediahuman.LyricsFinder.png
          fi
        done
      - install -Dm644 locale/*.qm -t /app/share/locale
    sources:
      - type: archive
        only-arches:
          - x86_64
        url: https://www.mediahuman.com/files/flatpak/lyrics-finder/LyricsFinder-1.7.1-linux-amd64.tar.gz
        sha256: 847e34f5c567d15839c155943432f457c4560ca8f0d0b8e08bfac08567bbf043
      - type: archive
        only-arches:
          - aarch64
        url: https://www.mediahuman.com/files/flatpak/lyrics-finder/LyricsFinder-1.7.1-linux-arm64.tar.gz
        sha256: 8d91940f7bad5f992aab0a14f5e8fb4750330a8b84cb3f823230b771efdc184b
