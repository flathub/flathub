app-id: eu.capybaracode.FilenameNinja
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: filename-ninja

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home

modules:
  - python3-modules.json

  - name: filename-ninja
    buildsystem: simple
    build-commands:
      - python3 -m pip install --no-build-isolation --no-deps --prefix=/app .
      - install -Dm755 filename-ninja /app/bin/filename-ninja
      - install -Dm644 eu.capybaracode.FilenameNinja.desktop /app/share/applications/eu.capybaracode.FilenameNinja.desktop
      - desktop-file-edit --set-key=Exec --set-value=filename-ninja /app/share/applications/eu.capybaracode.FilenameNinja.desktop
      - desktop-file-edit --set-key=Icon --set-value=eu.capybaracode.FilenameNinja /app/share/applications/eu.capybaracode.FilenameNinja.desktop
      - desktop-file-edit --set-key=StartupWMClass --set-value=eu.capybaracode.FilenameNinja /app/share/applications/eu.capybaracode.FilenameNinja.desktop
      - install -Dm644 filename_ninja_512x512.png /app/share/icons/hicolor/512x512/apps/eu.capybaracode.FilenameNinja.png
      - install -Dm644 eu.capybaracode.FilenameNinja.metainfo.xml /app/share/metainfo/eu.capybaracode.FilenameNinja.metainfo.xml
    cleanup:
      - /share/man
      - /share/doc
      - /include
      - /lib/pkgconfig
      - /lib/cmake
    sources:
      - type: dir
        path: .
      - type: file
        path: filename-ninja
      - type: file
        path: eu.capybaracode.FilenameNinja.desktop
      - type: file
        path: ./src/filename_ninja/resources/icons/filename_ninja_512x512.png
      - type: file
        path: eu.capybaracode.FilenameNinja.metainfo.xml
