app-id: com.darkrockstudios.hammer
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk

command: hammer

finish-args:
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --filesystem=xdg-documents
  - --share=network

modules:
  - name: hammer
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib
      - cp -r hammer /app/lib/hammer
      - ln -s /app/lib/hammer/bin/hammer /app/bin/hammer

      - install -Dm644 com.darkrockstudios.hammer.desktop
        /app/share/applications/com.darkrockstudios.hammer.desktop
      - install -Dm644 icon.png
        /app/share/icons/hicolor/256x256/apps/com.darkrockstudios.hammer.png
      - install -Dm644 com.darkrockstudios.hammer.metainfo.xml
        /app/share/metainfo/com.darkrockstudios.hammer.metainfo.xml

    sources:
      - type: archive
        url: https://github.com/Wavesonics/hammer-editor/releases/download/v2.1.1/hammer-2.1.1-linux-x64.tar.gz
        sha256: ac71611062d94a32470077bfeaa1f3fff3124c6f3aafdbe90c28708ca42eca99
        x-checker-data:
          type: json
          url: https://api.github.com/repos/Wavesonics/ha08d7814083bb134fc236da4a13b9155812d4bfee55c539d6eda2831f2919c742mmer-editor/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name | test("linux-x64.tar.gz$")) | .browser_download_url

      - type: file
        path: com.darkrockstudios.hammer.desktop

      - type: file
        path: com.darkrockstudios.hammer.metainfo.xml

      - type: file
        url: https://raw.githubusercontent.com/Wavesonics/hammer-editor/main/desktop/icons/linux.png
        sha256: 08d7814083bb134fc236da4a13b9155812d4bfee55c539d6eda2831f2919c742
        dest-filename: icon.png
