app-id: io.github.sniper1720.khushu
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
separate-locales: false
command: khushu
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --talk-name=org.kde.StatusNotifierWatcher
modules:
  - name: khushu
    buildsystem: simple
    build-commands:
      - mkdir -p .cargo
      - cp cargo/config .cargo/config.toml
      - cargo --offline build --release
      - install -Dm755 target/release/khushu /app/bin/khushu
      - install -Dm644 assets/khushu.desktop /app/share/applications/io.github.sniper1720.khushu.desktop
      - install -Dm644 assets/icons/hicolor/scalable/apps/io.github.sniper1720.khushu.svg /app/share/icons/hicolor/scalable/apps/io.github.sniper1720.khushu.svg
      - install -Dm644 assets/icons/hicolor/symbolic/apps/io.github.sniper1720.khushu-symbolic.svg /app/share/icons/hicolor/symbolic/apps/io.github.sniper1720.khushu-symbolic.svg
      - install -Dm644 assets/io.github.sniper1720.khushu.metainfo.xml /app/share/metainfo/io.github.sniper1720.khushu.metainfo.xml
      - install -Dm644 assets/Amiri-Regular.ttf /app/share/fonts/Amiri-Regular.ttf
      - install -Dm644 target/locale/ar/LC_MESSAGES/khushu.mo /app/share/locale/ar/LC_MESSAGES/khushu.mo
      - install -Dm644 target/locale/ar/LC_MESSAGES/gtk40.mo /app/share/locale/ar/LC_MESSAGES/gtk40.mo
      - install -Dm644 target/locale/ar/LC_MESSAGES/libadwaita.mo /app/share/locale/ar/LC_MESSAGES/libadwaita.mo
      - install -Dm644 target/locale/es/LC_MESSAGES/khushu.mo /app/share/locale/es/LC_MESSAGES/khushu.mo
      - install -Dm644 target/locale/es/LC_MESSAGES/gtk40.mo /app/share/locale/es/LC_MESSAGES/gtk40.mo
      - install -Dm644 target/locale/es/LC_MESSAGES/libadwaita.mo /app/share/locale/es/LC_MESSAGES/libadwaita.mo
      - install -Dm644 target/locale/fr/LC_MESSAGES/khushu.mo /app/share/locale/fr/LC_MESSAGES/khushu.mo
      - install -Dm644 target/locale/fr/LC_MESSAGES/gtk40.mo /app/share/locale/fr/LC_MESSAGES/gtk40.mo
      - install -Dm644 target/locale/fr/LC_MESSAGES/libadwaita.mo /app/share/locale/fr/LC_MESSAGES/libadwaita.mo
      - install -Dm644 target/locale/tr/LC_MESSAGES/khushu.mo /app/share/locale/tr/LC_MESSAGES/khushu.mo
      - install -Dm644 target/locale/tr/LC_MESSAGES/gtk40.mo /app/share/locale/tr/LC_MESSAGES/gtk40.mo
      - install -Dm644 target/locale/tr/LC_MESSAGES/libadwaita.mo /app/share/locale/tr/LC_MESSAGES/libadwaita.mo
    sources:
      - type: archive
        url: https://github.com/sniper1720/khushu/archive/refs/tags/v1.0.0.tar.gz
        sha256: 5d66a237d0768dd4d79f46032798ba49f1683781198c342f8f1fa6f294d5abe7
      - cargo-sources.json
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/khushu/cargo-home
        GETTEXT_SYSTEM: '1'
