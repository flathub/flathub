app-id: io.github.sniper1720.khushu
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
separate-locales: false
command: khushu
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --talk-name=org.kde.StatusNotifierWatcher
modules:
  - name: khushu
    buildsystem: meson
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/khushu/cargo
        CARGO_NET_OFFLINE: 'true'
        CARGO_BUILD_OFFLINE: 'true'
        GETTEXT_SYSTEM: '1'
    sources:
      - type: archive
        url: https://github.com/sniper1720/khushu/archive/refs/tags/v1.0.0.tar.gz
        sha256: 9f5004aab5c55527a9fd75919a0c44e75c795f38f0814f1de16bd33fb4a0e933
      - cargo-sources.json
