app-id: com.fourwindstechnology.SI
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: si

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --talk-name=org.freedesktop.Notifications
  - --device=dri
  - --filesystem=home
modules:
  - name: si
    buildsystem: simple
    build-commands:
      - install -D -m 0644 com.fourwindstechnology.SI.desktop /app/share/applications/com.fourwindstechnology.SI.desktop
      - install -D -m 0644 com.fourwindstechnology.SI.metainfo.xml /app/share/metainfo/com.fourwindstechnology.SI.metainfo.xml
      - install -D -m 0644 com.fourwindstechnology.SI.png /app/share/icons/hicolor/128x128/apps/com.fourwindstechnology.SI.png
      
      # 2. Install the Wrapper Script
      - install -D -m 0755 apply_extra /app/bin/apply_extra

    sources:
      - type: file
        path: com.fourwindstechnology.SI.desktop
      - type: file
        path: com.fourwindstechnology.SI.metainfo.xml
      - type: file
        path: com.fourwindstechnology.SI.png
      - type: file
        path: apply_extra

      - type: extra-data
        filename: si.tar.gz
        url: https://spatialintegration.com/download/si.tar.gz
        sha256: "4c8616873c1018641f91b73567a0ce1d3e5e7bf7b1422b1a1671423ea27752d0"
        size: 35636370
        