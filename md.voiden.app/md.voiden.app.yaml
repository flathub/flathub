app-id: md.voiden.app
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: voiden-start
branch: stable
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto

modules:
  - name: voiden
    buildsystem: simple
    build-commands:
      - ar x voiden.deb
      - tar -xf data.tar.* -C /app
      - mv /app/usr/lib/voiden /app/lib/voiden || true
      - mkdir -p /app/share/applications /app/share/icons
      - mv /app/usr/share/applications/voiden.desktop /app/share/applications/md.voiden.app.desktop || true
      - cp -r /app/usr/share/icons/* /app/share/icons/ || true
      - sed -i 's|^Exec=.*|Exec=voiden-start|g' /app/share/applications/md.voiden.app.desktop
      - sed -i 's|^Icon=.*|Icon=md.voiden.app|g' /app/share/applications/md.voiden.app.desktop
      - install -Dm755 voiden-start.sh /app/bin/voiden-start
    sources:
      - type: file
        url: https://voiden.md/api/download/stable/linux/x64/voiden_1.4.3_amd64.deb
        sha256: 25bb4cd2c2b30999e7eea2e1cd77f4aa00b342758de467c73e5c3efdc9d20eca
        dest-filename: voiden.deb
      - type: script
        dest-filename: voiden-start.sh
        commands:
          - export TMPDIR="${XDG_RUNTIME_DIR}/app/${FLATPAK_ID}"
          - exec /app/lib/voiden/Voiden "$@"
