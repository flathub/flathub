app-id: io.github.kmwallio.ultimateslice
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: ultimate-slice
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/run/media
  - --filesystem=/mnt
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/ultimate-slice/cargo
modules:
  - name: ultimate-slice
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/ultimate-slice/cargo
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --locked
      - install -Dm755 target/release/ultimate-slice /app/bin/ultimate-slice
      - install -Dm644 data/io.github.kmwallio.ultimateslice.desktop /app/share/applications/io.github.kmwallio.ultimateslice.desktop
      - install -Dm644 data/io.github.kmwallio.ultimateslice.mime.xml /app/share/mime/packages/io.github.kmwallio.ultimateslice.mime.xml
      - install -Dm644 data/io.github.kmwallio.ultimateslice.metainfo.xml /app/share/metainfo/io.github.kmwallio.ultimateslice.metainfo.xml
      - install -Dm644 data/io.github.kmwallio.ultimateslice.svg /app/share/icons/hicolor/scalable/apps/io.github.kmwallio.ultimateslice.svg
    sources:
      - type: git
        url: https://github.com/kmwallio/UltimateSlice.git
        tag: v0.1.3
        commit: 95fee98f390427a4e78a817ea34be451ceba7b4d
      - cargo-sources.json
