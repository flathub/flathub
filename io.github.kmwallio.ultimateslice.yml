app-id: io.github.kmwallio.ultimateslice
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: ultimate-slice
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/run/media
  - --filesystem=/mnt
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/ultimate-slice/cargo
modules:
  - name: x264
    buildsystem: autotools
    cleanup:
      - /include
      - /lib/pkgconfig
    config-opts:
      - --enable-shared
      - --disable-static
      - --disable-cli
      - --enable-pic
    sources:
      - type: git
        url: https://code.videolan.org/videolan/x264.git
        branch: stable

  - name: ffmpeg
    buildsystem: autotools
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/ffmpeg
    config-opts:
      - --enable-gpl
      - --enable-libx264
      - --enable-shared
      - --disable-static
      - --disable-doc
      - --disable-ffplay
      - --disable-debug
      - --extra-cflags=-I/app/include
      - --extra-ldflags=-L/app/lib
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-7.1.tar.xz
        sha256: 40973d44970dbc83ef302b0609f2e74982be2d85916dd2ee7472d30678a7abe6

  - name: ultimate-slice
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/ultimate-slice/cargo
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --locked
      - install -Dm755 target/release/ultimate-slice /app/bin/ultimate-slice
      - install -Dm644 data/io.github.kmwallio.ultimateslice.desktop /app/share/applications/io.github.kmwallio.ultimateslice.desktop
      - install -Dm644 data/io.github.kmwallio.ultimateslice.metainfo.xml /app/share/metainfo/io.github.kmwallio.ultimateslice.metainfo.xml
      - install -Dm644 data/io.github.kmwallio.ultimateslice.svg /app/share/icons/hicolor/scalable/apps/io.github.kmwallio.ultimateslice.svg
    sources:
      - type: git
        url: https://github.com/kmwallio/UltimateSlice.git
        tag: v0.1.0
        commit: ad5e599b466d026d1c30a2277cfa740c8bd50dd9
      - cargo-sources.json
