<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <style>
      .bg { fill: #03a66a; }
      .browser { fill: #ffffff; }
      .bar { fill: #024d31; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="128" height="128" rx="12"/>
  
  <!-- Browser window -->
  <rect class="browser" x="12" y="18" width="104" height="92" rx="4"/>
  
  <!-- Browser frame -->
  <rect class="bar" x="12" y="18" width="104" height="12" rx="4" ry="0"/>
  
  <!-- Address bar -->
  <rect class="bar" opacity="0.2" x="18" y="24" width="92" height="6" rx="2"/>
  
  <!-- Content -->
  <circle class="bar" opacity="0.3" cx="24" cy="46" r="3"/>
  <rect class="bar" opacity="0.3" x="30" y="44" width="70" height="2" rx="1"/>
  <rect class="bar" opacity="0.3" x="30" y="48" width="60" height="2" rx="1"/>
  
  <circle class="bar" opacity="0.3" cx="24" cy="58" r="3"/>
  <rect class="bar" opacity="0.3" x="30" y="56" width="70" height="2" rx="1"/>
  <rect class="bar" opacity="0.3" x="30" y="60" width="55" height="2" rx="1"/>
  
  <circle class="bar" opacity="0.3" cx="24" cy="70" r="3"/>
  <rect class="bar" opacity="0.3" x="30" y="68" width="70" height="2" rx="1"/>
  <rect class="bar" opacity="0.3" x="30" y="72" width="65" height="2" rx="1"/>
</svg>
