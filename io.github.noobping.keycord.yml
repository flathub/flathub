id: io.github.noobping.keycord
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20

command: keycord

finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

modules:
  - name: capnproto
    buildsystem: autotools
    subdir: c++
    config-opts:
      - --disable-static

    sources:
      - type: git
        url: https://github.com/capnproto/capnproto.git
        tag: v1.3.0
        commit: 7dbb95989721016f8b590245ec7528c6ff03d1fe
      - type: script
        commands:
          - autoreconf -fi
          - exec ./configure "$@"
        dest: c++
        dest-filename: autogen.sh

  - name: git
    buildsystem: simple

    build-commands:
      - make prefix=/app NO_GETTEXT=YesPlease NO_INSTALL_HARDLINKS=YesPlease NO_PERL=YesPlease NO_PYTHON=YesPlease NO_TCLTK=YesPlease -j${FLATPAK_BUILDER_N_JOBS} all
      - make prefix=/app NO_GETTEXT=YesPlease NO_INSTALL_HARDLINKS=YesPlease NO_PERL=YesPlease NO_PYTHON=YesPlease NO_TCLTK=YesPlease install

    sources:
      - type: git
        url: https://github.com/git/git.git
        tag: v2.49.1
        commit: aadf8ae518afd80b73d49eff8aff475161aa5157

  - name: keycord
    buildsystem: simple

    build-options:
      prepend-path: /app/bin:/usr/lib/sdk/llvm20/bin
      prepend-ld-library-path: /app/lib:/usr/lib/sdk/llvm20/lib
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CLANG_PATH: /usr/lib/sdk/llvm20/bin/clang
        CARGO_HOME: /run/build/keycord/cargo
        LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib
        BINDGEN_EXTRA_CLANG_ARGS: -resource-dir=/usr/lib/sdk/llvm20/lib/clang/20

    build-commands:
      - cargo build --release --features flatpak
      - install -Dm0755 target/release/keycord /app/bin/keycord
      - install -Dm0644 data/scalable/apps/${FLATPAK_ID}.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm0644 keycord.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm0644 data/gschema.xml /app/share/glib-2.0/schemas/${FLATPAK_ID}.gschema.xml
      - glib-compile-schemas /app/share/glib-2.0/schemas
      - install -Dm0644 data/metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml

    sources:
      - type: git
        url: https://github.com/noobping/keycord.git
        commit: 78d5f40c5d8fc7e587597d6d61c7910ed408aac3
      - type: file
        path: cargo-sources.yml
      - cargo-sources.yml
