app-id: org.anirudhsevugan.SimpliPlay
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node18
command: run.sh
separate-locales: false
finish-args:
  - --socket=x11
  - --socket=pulseaudio
  - --share=network
build-options:
  append-path: /usr/lib/sdk/node18/bin
  env:
    NPM_CONFIG_LOGLEVEL: info
modules:
  - name: simpliplay
    buildsystem: simple
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/simpliplay/flatpak-node/cache
        npm_config_cache: /run/build/simpliplay/flatpak-node/npm-cache
        npm_config_offline: 'true'
    build-commands:
      # Install npm dependencies
      - npm install --offline
      # Build the app; `dist` script in your package.json runs electron-builder
      - |
        . ../flatpak-node/electron-builder-arch-args.sh
        npm run dist -- $ELECTRON_BUILDER_ARCH_ARGS --linux --dir
      # Copy built app to /app/main
      - cp -a dist/linux*unpacked /app/main
      # Install wrapper script
      - install -Dm755 -t /app/bin/ ../run.sh
    subdir: .
    sources:
      # Source your repo (replace with your tag/commit)
      - type: archive
        url: https://github.com/A-Star100/SimpliPlay/archive/refs/tags/v1.0.0.tar.gz
        sha256: <replace-with-correct-sha256>
        dest: .
      - flatpak/generated-sources.json
      # Wrapper to launch the app
      - type: script
        dest-filename: run.sh
        commands:
          - /app/main/SimpliPlay "$@"

