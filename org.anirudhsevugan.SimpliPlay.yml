app-id: org.anirudhsevugan.SimpliPlay
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
command: run.sh
separate-locales: false
arch:
  - x86_64
  - aarch64

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --share=network

build-options:
  append-path: /usr/lib/sdk/node20/bin
  env:
    NPM_CONFIG_LOGLEVEL: info

modules:
  - name: simpliplay
    buildsystem: simple
    subdir: simpliplay
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/simpliplay/flatpak-node/cache
        npm_config_cache: /run/build/simpliplay/flatpak-node/npm-cache
        npm_config_offline: 'true'
    build-commands:
      - cd simpliplay
      # install dependencies
      - npm install
      # build unpacked dir
      - npx electron-builder --linux --dir
      # copy build output into /app/main
      - cp -a dist/linux-unpacked /app/main
      # install wrapper script
      - install -Dm755 -t /app/bin ../run.sh
    sources:
      - type: archive
        url: https://github.com/A-Star100/simpliplay-desktop/archive/refs/tags/release-2.2.0.0.tar.gz
        sha256: 5091d4087954682a300d8d2d557b9777152ff414cffc236b6b8822e82fe27e90
        dest: .
      - type: script
        dest-filename: run.sh
        commands:
          - '#!/bin/sh'
          - 'exec /app/main/SimpliPlay "$@"'
