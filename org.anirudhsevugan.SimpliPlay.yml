app-id: org.anirudhsevugan.SimpliPlay # huge thanks to Nuclear audio player repo for the basis of this YAML!
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: run.sh
separate-locales: false
arch:
  - x86_64

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --filesystem=xdg-download
  - --filesystem=~/simpliplay-snapshots

modules:
  - name: simpliplay
    buildsystem: simple
    build-commands:
      - mkdir -p /app/main/
      - cp -r * /app/main/
      - install -Dm644 icon.png /app/share/icons/hicolor/512x512/apps/org.anirudhsevugan.SimpliPlay.png
      - install -Dm644 org.anirudhsevugan.SimpliPlay.desktop /app/share/applications/org.anirudhsevugan.SimpliPlay.desktop
      - install -Dm644 org.anirudhsevugan.metainfo.xml /app/share/metainfo/org.anirudhsevugan.SimpliPlay.metainfo.xml
      - install -Dm755 run.sh /app/bin/run.sh
    cleanup:
      - rm -rf /app/main/icon.png /app/main/org.anirudhsevugan.SimpliPlay.desktop /app/main/org.anirudhsevugan.SimpliPlay.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/A-Star100/simpliplay-desktop/releases/download/release-2.2.0.0/simpliplay-linux-x64-unpacked.tar.gz
        sha256: 8fdb4f3c502527645d4c8631c0330130f89400287c626d6e527e9f6184227db8
      - type: script
        path: run.sh
        dest-filename: run.sh
        commands:
          - '#!/bin/bash'
          - 'zypak-wrapper /app/main/SimpliPlay "$@"'
      - type: file
        path: org.anirudhsevugan.SimpliPlay.desktop
      - type: file
        path: org.anirudhsevugan.SimpliPlay.metainfo.xml
      - type: file
        path: icon.png
