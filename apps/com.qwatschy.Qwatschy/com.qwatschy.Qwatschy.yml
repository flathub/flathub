id: com.qwatschy.Qwatschy
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet9

build-options:
  prepend-path: /usr/lib/sdk/dotnet9/bin
  append-ld-library-path: /usr/lib/sdk/dotnet9/lib
  env:
    DOTNET_CLI_TELEMETRY_OPTOUT: '1'

command: Qwatschy

finish-args:
  - --device=dri
  - --socket=wayland
  - --socket=x11
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: dotnet
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/dotnet9/bin/install.sh

  - name: qwatschy
    buildsystem: simple
    build-options:
      env:
        DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    sources:
      - type: git
        url: https://github.com/KeanuDale-No1/Qwatschy
        branch: master
    build-commands:
      - export PATH=/usr/lib/sdk/dotnet9/bin:$PATH
      - export DOTNET_ROOT=/usr/lib/sdk/dotnet9
      - dotnet restore VoiceChat.Client/VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj
      - dotnet publish VoiceChat.Client/VoiceChat.Client.Desktop/VoiceChat.Client.Desktop.csproj -c Release --no-self-contained -p:PublishDir=/app/output
      - install -Dm755 /app/output/Qwatschy /app/bin/Qwatschy
      - install -d /app/lib/qwatschy
      - cp -r /app/output/* /app/lib/qwatschy/
      - install -Dm644 VoiceChat.Client/VoiceChat.Client/Assets/qwatschy_logo.png /app/share/icons/hicolor/256x256/apps/com.qwatschy.Qwatschy.png
    finish-args:
      - --filesystem=home
      - --share=network
      - --socket=wayland
      - --socket=x11
      - --socket=pulseaudio