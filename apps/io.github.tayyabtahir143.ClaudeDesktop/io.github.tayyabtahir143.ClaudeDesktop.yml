app-id: io.github.tayyabtahir143.ClaudeDesktop
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
# Node.js SDK extension — provides npm/node inside the Flatpak build sandbox
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
command: claude-desktop
separate-locales: false

finish-args:
  # Networking — loads https://claude.ai
  - --share=network
  # IPC for Electron shared memory
  - --share=ipc
  # Display (Wayland + X11 fallback — important for Fedora/GNOME)
  - --socket=wayland
  - --socket=fallback-x11
  # Audio (PipeWire used by Fedora; PulseAudio fallback)
  - --socket=pulseaudio
  - --filesystem=xdg-run/pipewire-0
  # GPU / hardware acceleration
  - --device=dri
  # Desktop notifications
  - --talk-name=org.freedesktop.Notifications
  # System tray (KDE/other DEs)
  - --talk-name=org.kde.StatusNotifierWatcher
  # Auto-detect Wayland vs X11 for Electron
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto

modules:

  # ── Module 1: Electron v28 binary ──────────────────────────────────────────
  - name: electron
    buildsystem: simple
    build-commands:
      - unzip -q electron.zip -d /app/electron/
      - chmod +x /app/electron/electron
    sources:
      - type: file
        url: https://github.com/electron/electron/releases/download/v28.3.3/electron-v28.3.3-linux-x64.zip
        sha256: 20f6be493cbd6c9924206e744b1c490af1f97f4735451b9dc19f0d305366d546
        dest-filename: electron.zip

  # ── Module 2: Claude Desktop app ───────────────────────────────────────────
  - name: claude-desktop
    buildsystem: simple
    build-options:
      # Make node/npm available from the SDK extension
      append-path: /usr/lib/sdk/node20/bin
      env:
        # npm offline cache directories (populated by generated-sources.json)
        XDG_CACHE_HOME: /run/build/claude-desktop/flatpak-node/cache
        npm_config_cache: /run/build/claude-desktop/flatpak-node/npm-cache
        npm_config_offline: 'true'
        npm_config_no_audit: 'true'
        npm_config_ignore_scripts: 'true'
    build-commands:
      # Install only production runtime deps (skip devDeps: electron, electron-builder)
      - npm install --offline --omit=dev

      # Copy app source to /app/claude-desktop/
      - mkdir -p /app/claude-desktop
      - cp -r src preload.js package.json /app/claude-desktop/
      - cp -r node_modules /app/claude-desktop/node_modules

      # Launcher wrapper script
      - install -Dm755 claude-desktop.sh /app/bin/claude-desktop

      # Icon — 256x256 PNG from assets/
      - install -Dm644 assets/icon.png
          /app/share/icons/hicolor/256x256/apps/io.github.tayyabtahir143.ClaudeDesktop.png

      # Desktop entry
      - install -Dm644 io.github.tayyabtahir143.ClaudeDesktop.desktop
          /app/share/applications/io.github.tayyabtahir143.ClaudeDesktop.desktop

      # AppStream metadata (required by Flathub)
      - install -Dm644 io.github.tayyabtahir143.ClaudeDesktop.metainfo.xml
          /app/share/metainfo/io.github.tayyabtahir143.ClaudeDesktop.metainfo.xml

    sources:
      # ── App source code ──
      - type: git
        url: https://github.com/tayyabtahir143/ClaudeDesktop
        commit: 7ffcb0bbcc19c0cb6e6216d843c6330e34b8ccb5

      # ── Pre-fetched npm packages (generated by setup.sh) ──
      # Run './setup.sh' first to generate this file.
      - generated-sources.json

      # ── Launcher script ──
      - type: script
        dest-filename: claude-desktop.sh
        commands:
          # Auto-select Wayland or X11 at runtime
          - export ELECTRON_OZONE_PLATFORM_HINT="${ELECTRON_OZONE_PLATFORM_HINT:-auto}"
          # --no-sandbox: required inside Flatpak (Chrome sandbox conflicts with bwrap)
          - exec /app/electron/electron --no-sandbox /app/claude-desktop "$@"

      # ── Flathub metadata files ──
      - type: file
        path: io.github.tayyabtahir143.ClaudeDesktop.desktop

      - type: file
        path: io.github.tayyabtahir143.ClaudeDesktop.metainfo.xml
