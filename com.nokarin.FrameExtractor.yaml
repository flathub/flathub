app-id: com.nokarin.FrameExtractor

runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk

command: frameextractor

finish-args:
  # Wayland + X11 fallback
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc

  # GPU access
  - --device=dri

  # Network access
  - --share=network

  # Write access to Downloads for output frames
  - --filesystem=xdg-download

  # File picker
  - --filesystem=xdg-videos:ro

modules:
  - name: frameextractor
    buildsystem: simple

    sources:
      - type: archive
        url: https://github.com/nokarin-dev/frameextractor/releases/download/v1.2.0/FrameExtractor-linux-portable.tar.gz
        sha256: 3ff408d0e1bd1b00bde3d2c33ff4916b1aafa33b54dbebbd46a39ea96af0e489
        dest: app
        strip-components: 0

      # Desktop integration files
      - type: inline
        dest-filename: com.nokarin.FrameExtractor.desktop
        contents: |
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=FrameExtractor
          GenericName=Video Frame Extractor
          Comment=Extract frames from video files and YouTube URLs
          Exec=FrameExtractor
          Icon=com.nokarin.FrameExtractor
          Categories=Video;AudioVideo;
          Terminal=false
          StartupWMClass=FrameExtractor
          Keywords=video;frames;ffmpeg;extract;youtube;

      - type: inline
        dest-filename: com.nokarin.FrameExtractor.metainfo.xml
        contents: |
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>com.nokarin.FrameExtractor</id>
            <name>FrameExtractor</name>
            <summary>Extract frames from video files and YouTube URLs</summary>
            <description>
              <p>
                FrameExtractor is a modern cross-platform video frame extractor
                with a clean dark UI. It supports local video files and can
                download and extract frames directly from YouTube URLs.
              </p>
              <p>Features:</p>
              <ul>
                <li>Extract frames from local video files (MP4, MKV, AVI, MOV, and more)</li>
                <li>Extract frames directly from YouTube URLs via yt-dlp</li>
                <li>Adjustable FPS, output format (PNG, JPG, WebP, BMP), quality, and scale</li>
                <li>Live frame count and size estimates before extraction</li>
                <li>Frame preview with scrubber before committing to a full extraction</li>
                <li>Batch extraction across multiple time ranges</li>
                <li>Preset system to save and reuse extraction settings</li>
                <li>Extraction history with one-click re-extraction</li>
              </ul>
            </description>

            <launchable type="desktop-id">com.nokarin.FrameExtractor.desktop</launchable>

            <url type="homepage">https://github.com/nokarin-dev/frameextractor</url>
            <url type="bugtracker">https://github.com/nokarin-dev/frameextractor/issues</url>
            <url type="vcs-browser">https://github.com/nokarin-dev/frameextractor</url>

            <developer id="com.nokarin">
              <name>nokarin</name>
            </developer>

            <metadata_license>CC0-1.0</metadata_license>
            <project_license>GPL-3.0-or-later</project_license>

            <supports>
              <control>pointing</control>
              <control>keyboard</control>
            </supports>

            <categories>
              <category>Video</category>
              <category>AudioVideo</category>
            </categories>

            <screenshots>
              <!-- Add screenshots after first Flathub submission -->
            </screenshots>

            <releases>
              <!-- FLATHUB_UPDATE_RELEASES — updated by CI bot -->
              <release version="1.2.0" date="2026-04-13">
                <description>
                  <p>Frame preview with video-bounded scrubber, batch extraction UI,
                  save-log button, and various bug fixes.</p>
                </description>
              </release>
            </releases>

            <content_rating type="oars-1.1" />
          </component>

    build-commands:
      # Install pre-built app bundle
      - find app/ -maxdepth 3 -type f
      - install -dm755 /app/lib/frameextractor
      - cp -r app/. /app/lib/frameextractor/
      - chmod +x /app/lib/frameextractor/FrameExtractor
      - chmod +x /app/lib/frameextractor/bin/ffmpeg  2>/dev/null || true
      - chmod +x /app/lib/frameextractor/bin/yt-dlp  2>/dev/null || true
      - chmod +x /app/lib/frameextractor/bin/ffprobe 2>/dev/null || true

      # Launcher wrapper
      - |
        install -dm755 /app/bin
        cat > /app/bin/frameextractor << 'WRAPPER'
        #!/bin/sh
        export LD_LIBRARY_PATH="/app/lib/frameextractor/lib:$LD_LIBRARY_PATH"
        export PATH="/app/lib/frameextractor/bin:$PATH"
        exec /app/lib/frameextractor/FrameExtractor "$@"
        WRAPPER
        chmod +x /app/bin/frameextractor

      # Desktop file
      - install -Dm644 com.nokarin.FrameExtractor.desktop
        /app/share/applications/com.nokarin.FrameExtractor.desktop

      # AppStream metadata
      - install -Dm644 com.nokarin.FrameExtractor.metainfo.xml
        /app/share/metainfo/com.nokarin.FrameExtractor.metainfo.xml

      # Icons
      - |
        for size in 16 32 64 128 256; do
          src="app/data/flutter_assets/assets/icons/icon_${size}.png"
          if [ -f "$src" ]; then
            install -Dm644 "$src" \
              "/app/share/icons/hicolor/${size}x${size}/apps/com.nokarin.FrameExtractor.png"
          fi
        done
