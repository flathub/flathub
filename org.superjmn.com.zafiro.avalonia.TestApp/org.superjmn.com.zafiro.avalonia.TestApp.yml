app_id: org.superjmn.com.zafiro.avalonia.TestApp
runtime: org.freedesktop.Platform
runtime_version: 23.08
sdk: org.freedesktop.Sdk
command: TestApp.Desktop
finish_args:
- --share=ipc
- --share=network
- --socket=x11
- --socket=wayland
- --device=dri
modules:
- name: dotnet-sdk
  buildsystem: simple
  build_commands:
  - exit 0
  sdk_extensions:
  - org.freedesktop.Sdk.Extension.dotnet90
  build_options:
    append_path: /usr/lib/sdk/dotnet90/bin
    append_ld_library_path: /usr/lib/sdk/dotnet90/lib
- name: testapp.desktop
  buildsystem: simple
  build_commands:
  - dotnet publish samples/TestApp/TestApp.Desktop/TestApp.Desktop.csproj -c Release -o /app/lib/TestApp.Desktop --no-restore /p:Version=1.0.7
  - mkdir -p /app/bin
  - ln -s /app/lib/TestApp.Desktop/TestApp.Desktop /app/bin/TestApp.Desktop
  - install -Dm644 org.superjmn.com.zafiro.avalonia.TestApp.desktop /app/share/applications/org.superjmn.com.zafiro.avalonia.TestApp.desktop
  - install -Dm644 org.superjmn.com.zafiro.avalonia.TestApp.metainfo.xml /app/share/metainfo/org.superjmn.com.zafiro.avalonia.TestApp.metainfo.xml
  sources:
  - type: git
    url: https://github.com/SuperJMN/Zafiro.Avalonia.git
    branch: master
  - type: file
    path: nuget-sources.json
