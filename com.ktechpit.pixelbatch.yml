app-id: com.ktechpit.pixelbatch
runtime: org.kde.Platform
runtime-version: '5.15-23.08'
sdk: org.kde.Sdk
command: pixelbatch

finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=fallback-x11
  # Wayland access
  - --socket=wayland
  # OpenGL access
  - --device=dri
  # Allow access to user's pictures directory for image files
  - --filesystem=xdg-pictures
  # Allow access to removable media
  - --filesystem=/media
  - --filesystem=/run/media
  # Network access (for checking updates, if needed)
  - --share=network

modules:
  # jpegoptim for JPEG optimization
  - name: jpegoptim
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/tjko/jpegoptim/archive/refs/tags/v1.5.5.tar.gz
        sha256: 90a309d1c092de358bb411d702281ac3039b489d03adb0bc3c4ef04cf0067d38
    cleanup:
      - /share/man

  # pngquant for PNG optimization
  - name: pngquant
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app
      - make -j$FLATPAK_BUILDER_N_JOBS
      - make install
    sources:
      - type: archive
        url: http://pngquant.org/pngquant-2.12.2-src.tar.gz
        sha256: bb031c48039ee73ea0e60709bb9ab80c55bfa3a5920b798ea37a03f2757b099c
    cleanup:
      - /share/man

  # gifsicle for GIF optimization
  - name: gifsicle
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/kohler/gifsicle/archive/refs/tags/v1.93.tar.gz
        sha256: 941c0b1c3ebc748949a0d14363f0fb3c9d2c06ee122b3548315b9233eb956d88
    cleanup:
      - /share/man

  # Node.js (needed for SVGO)
  - name: nodejs
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app
      - make -j$FLATPAK_BUILDER_N_JOBS
      - make install
    sources:
      - type: archive
        url: https://nodejs.org/dist/v18.19.0/node-v18.19.0.tar.gz
        sha256: dd4c1dc1cb94e1e29f65a3a592247edeb8ceb23483123b0e1847d75c5f0b0c17
    cleanup:
      - /include
      - /share/doc
      - /share/man
      - /share/systemtap

  # Main PixelBatch application (SVGO installed here)
  - name: pixelbatch
    buildsystem: simple
    build-commands:
      # Install SVGO (no fake package.json, no data URLs)
      - npm install --prefix=/app svgo@4.0.0
      - ln -sf /app/node_modules/.bin/svgo /app/bin/svgo

      # Build PixelBatch
      - qmake PREFIX=/app src/PixelBatch.pro
      - make -j$FLATPAK_BUILDER_N_JOBS
      - make install
    sources:
      - type: git
        url: https://github.com/keshavbhatt/pixelbatch.git
        tag: v2.0.0
        commit: c88df5a1db313d0fbd9724f35a7e0b3cda12471d
        x-checker-data:
          type: git
          tag-pattern: ^(v[\d.]+)$
