app-id: com.ktechpit.pixelbatch
runtime: org.kde.Platform
runtime-version: '5.15-25.08'
sdk: org.kde.Sdk
command: pixelbatch

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20

build-options:
  append-path: /usr/lib/sdk/node20/bin

finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=fallback-x11
  # Wayland access
  - --socket=wayland
  # OpenGL access
  - --device=dri
  # Allow access to user's pictures directory for image files
  - --filesystem=xdg-pictures
  # Allow access to removable media
  - --filesystem=/media
  - --filesystem=/run/media

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/man
  - '*.la'
  - '*.a'

modules:
  # jpegoptim for JPEG optimization
  - name: jpegoptim
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/tjko/jpegoptim/archive/refs/tags/RELEASE.1.4.6.tar.gz
        sha256: c44dcfac0a113c3bec13d0fc60faf57a0f9a31f88473ccad33ecdf210b4c0c52

  # pngquant for PNG optimization
  - name: pngquant
    buildsystem: autotools
    sources:
      - type: archive
        url: http://pngquant.org/pngquant-2.12.2-src.tar.gz
        sha256: bb031c48039ee73ea0e60709bb9ab80c55bfa3a5920b798ea37a03f2757b099c

  # gifsicle for GIF optimization
  - name: gifsicle
    buildsystem: autotools
    sources:
      - type: archive
        url: https://github.com/kohler/gifsicle/archive/refs/tags/v1.93.tar.gz
        sha256: 941c0b1c3ebc748949a0d14363f0fb3c9d2c06ee122b3548315b9233eb956d88

  # svgo offline
  - name: pixelbatch-svgo-offline
    buildsystem: simple
    build-commands:
      - npm install --offline --cache=$PWD/npm-cache --no-audit --no-fund
      - npm install -g --offline --cache=$PWD/npm-cache --prefix=/app ./node_modules/svgo
    sources:
      - type: git
        url: https://github.com/keshavbhatt/pixelbatch-svgo-offline.git
        tag: 1.0
        commit: 47501d2037b61a1cd2cc5c01b2a2d8c12fd36675
        x-checker-data:
          type: git
          tag-pattern: ^(\d+(?:\.\d+)*)$

  # Main PixelBatch application
  - name: pixelbatch
    buildsystem: simple
    build-commands:
      # Install SVGO
      - npm install --offline

      # Build PixelBatch
      - qmake PREFIX=/app src/PixelBatch.pro
      - make -j$FLATPAK_BUILDER_N_JOBS
      - make install
    sources:
      - type: git
        url: https://github.com/keshavbhatt/pixelbatch.git
        tag: v2.0.1
        commit: cfbce8dfc2d5f7a2fb90715338bb5e4f7402f50f
        x-checker-data:
          type: git
          tag-pattern: ^(v[\d.]+)$
