app-id: io.github.dagaza.FlipStack
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: flipstack
finish-args:
  # Display (Wayland + X11 fallback)
  - --socket=fallback-x11
  - --socket=wayland
  # Audio
  - --socket=pulseaudio
  # GPU Acceleration
  - --device=dri
  # X11 Shared Memory
  - --share=ipc

modules:
  - name: flipstack
    buildsystem: simple
    build-commands:
      # --- 1. Create Directories ---
      - mkdir -p /app/bin
      - mkdir -p /app/share/flipstack
      - mkdir -p /app/share/applications
      - mkdir -p /app/share/icons/hicolor/scalable/apps
      - mkdir -p /app/share/metainfo

      # --- 2. Copy Source Code & Assets ---
      - cp -r *.py /app/share/flipstack/
      - cp -r assets /app/share/flipstack/

      # --- 3. Create Launcher Script (Inline) ---
      # We create this manually to avoid missing file errors
      - echo -e '#!/bin/sh\nexport PYTHONPATH=/app/share/flipstack\npython3 /app/share/flipstack/main.py "$@"' > /app/bin/flipstack
      - chmod +x /app/bin/flipstack
      
      # --- 4. Install System Integration Files ---
      # Desktop File
      - install -D -m 644 io.github.dagaza.FlipStack.desktop /app/share/applications/io.github.dagaza.FlipStack.desktop

      # System Icon
      - cp assets/icons/io.github.dagaza.FlipStack.svg /app/share/icons/hicolor/scalable/apps/io.github.dagaza.FlipStack.svg

      # AppStream Metadata
      - install -D -m 644 io.github.dagaza.FlipStack.metainfo.xml /app/share/metainfo/io.github.dagaza.FlipStack.metainfo.xml

    sources:
      - type: git
        url: https://github.com/dagaza/FlipStack.git
        tag: v1.0.0
        commit: 58240a0564db835adcc53c1a0a682f8017c3a09e
