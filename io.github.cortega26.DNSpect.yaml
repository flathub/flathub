app-id: io.github.cortega26.DNSpect
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
command: dnspect-launcher
finish-args:
  - --share=network
modules:
  - packaging/flatpak/python3-requirements.json
  - name: dnspect
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node22/bin
      env:
        XDG_CACHE_HOME: /run/build/dnspect/flatpak-node/cache
        npm_config_cache: /run/build/dnspect/flatpak-node/npm-cache
    build-commands:
      - sed -i 's/license = { text = "MIT" }/license = "MIT"/' dnspect-src/backend/pyproject.toml
      - npm install --offline --prefix=dnspect-src/frontend
      - npm run --prefix=dnspect-src/frontend build
      - pip3 install --verbose --no-deps --no-build-isolation --prefix=/app ./dnspect-src/backend
      - install -d /app/share/dnspect/frontend
      - cp -a dnspect-src/frontend/dist/. /app/share/dnspect/frontend/
      - install -Dm644 dnspect-src/data/dns_providers.es.json /app/share/dnspect/data/dns_providers.es.json
      - install -Dm644 dnspect-src/data/queries.txt /app/share/dnspect/data/queries.txt
      - install -Dm755 dnspect-src/packaging/flatpak/dnspect-launcher /app/bin/dnspect-launcher
      - install -Dm644 dnspect-src/packaging/flatpak/io.github.cortega26.DNSpect.desktop /app/share/applications/io.github.cortega26.DNSpect.desktop
      - install -Dm644 dnspect-src/packaging/flatpak/io.github.cortega26.DNSpect.metainfo.xml /app/share/metainfo/io.github.cortega26.DNSpect.metainfo.xml
      - install -Dm644 dnspect-src/packaging/flatpak/io.github.cortega26.DNSpect.svg /app/share/icons/hicolor/scalable/apps/io.github.cortega26.DNSpect.svg
    sources:
      - type: git
        url: https://github.com/cortega26/DNSpect.git
        commit: c0fd83e116a11d6ac9f2d8bc91b7f8207ae47161
        dest: dnspect-src
      - packaging/flatpak/generated-sources.json
