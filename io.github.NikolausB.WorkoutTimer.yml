app-id: io.github.NikolausB.WorkoutTimer
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: training
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --share=ipc
  - --share=network
modules:
  - name: training
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/NikolausB/WorkoutTimer
        tag: v1.0.4
        commit: 0a28c4a10ad0e4a5ce62186d00474b90c7436bfd