app-id: io.github.NikolausB.WorkoutTimer
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: training
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --share=ipc
  - --share=network
modules:
  - name: training
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/NikolausB/WorkoutTimer
        tag: v1.0.3
        commit: abc919b560c3da80798f68ba4afce742fb484e33