app-id: io.github.NikolausB.WorkoutTimer
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: training
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --share=ipc
  - --share=network
add-extensions:
  org.freedesktop.Platform.GL:
    version: '24.08'
    directory: lib/GL
    add-ld-path: lib
    merge-dirs: vulkan/icd.d;gl/glvnd/egl_vendor.d;OpenCL/vendors;d3d/vulkan/icd.d
    subdirectories: true
    no-autodownload: true
    autodelete: false
modules:
  - name: training
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/GL
      - install -Dm755 src/main.py /app/bin/training
      - install -Dm644 src/__init__.py /app/lib/training/__init__.py
      - install -Dm644 src/models.py /app/lib/training/models.py
      - install -Dm644 src/data_store.py /app/lib/training/data_store.py
      - install -Dm644 src/sound.py /app/lib/training/sound.py
      - install -Dm644 src/timer_core.py /app/lib/training/timer_core.py
      - install -Dm644 src/round_timer.py /app/lib/training/round_timer.py
      - install -Dm644 src/training_plan.py /app/lib/training/training_plan.py
      - install -Dm644 src/history.py /app/lib/training/history.py
      - install -Dm644 src/window.py /app/lib/training/window.py
      - install -Dm644 src/home.py /app/lib/training/home.py
      - install -Dm644 src/image_utils.py /app/lib/training/image_utils.py
      - install -Dm644 src/exercise_picker.py /app/lib/training/exercise_picker.py
      - install -Dm644 src/user_exercises.py /app/lib/training/user_exercises.py
      - install -Dm644 src/settings.py /app/lib/training/settings.py
      - install -Dm644 src/preferences.py /app/lib/training/preferences.py
      - install -Dm644 src/csv_io.py /app/lib/training/csv_io.py
      - install -Dm644 src/llm_client.py /app/lib/training/llm_client.py
      - install -Dm644 src/ai_coach.py /app/lib/training/ai_coach.py
      - install -Dm644 src/resources/sounds/beep.ogg /app/lib/training/resources/sounds/beep.ogg
      - install -Dm644 src/resources/sounds/round_start.ogg /app/lib/training/resources/sounds/round_start.ogg
      - install -Dm644 src/resources/sounds/round_end.ogg /app/lib/training/resources/sounds/round_end.ogg
      - install -Dm644 src/resources/sounds/exercise_complete.ogg /app/lib/training/resources/sounds/exercise_complete.ogg
      - install -Dm644 src/resources/sounds/training_complete.ogg /app/lib/training/resources/sounds/training_complete.ogg
      - install -Dm644 src/resources/exercises/exercises.json /app/lib/training/resources/exercises/exercises.json
      - install -Dm644 src/resources/plans/default_plans.json /app/lib/training/resources/plans/default_plans.json
      - >
        for dir in src/resources/exercises/images/*/; do
        dirname=$(basename "$dir");
        mkdir -p /app/lib/training/resources/exercises/images/$dirname;
        cp $dir/*.jpg /app/lib/training/resources/exercises/images/$dirname/;
        done
      - install -Dm644 data/io.github.NikolausB.WorkoutTimer.desktop /app/share/applications/io.github.NikolausB.WorkoutTimer.desktop
      - install -Dm644 data/io.github.NikolausB.WorkoutTimer.metainfo.xml /app/share/metainfo/io.github.NikolausB.WorkoutTimer.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/io.github.NikolausB.WorkoutTimer.svg /app/share/icons/hicolor/scalable/apps/io.github.NikolausB.WorkoutTimer.svg
      - install -Dm644 data/icons/hicolor/symbolic/apps/io.github.NikolausB.WorkoutTimer-symbolic.svg /app/share/icons/hicolor/symbolic/apps/io.github.NikolausB.WorkoutTimer-symbolic.svg
    sources:
      - type: git
        url: https://github.com/NikolausB/training-flatpak
        tag: v1.0.0