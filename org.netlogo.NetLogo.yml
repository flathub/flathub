app-id: org.netlogo.NetLogo
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk17

command: netlogo-wrapper.sh

build-options:
  env:
    JAVA_HOME: /usr/lib/sdk/openjdk17/

finish-args:
  - --socket=x11
  - --share=network
  - --share=ipc
  - --device=dri
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --socket=pulseaudio

modules:

  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk17/install.sh

  - name: netlogo
    buildsystem: simple
    build-commands:
      - mkdir -p /app/netlogo /app/bin

      # app install
      - cp -r . /app/netlogo/

      # launcher
      - install -Dm755 netlogo-wrapper.sh /app/bin/netlogo-wrapper.sh

      # desktop
      - install -Dm644 org.netlogo.NetLogo.desktop /app/share/applications/org.netlogo.NetLogo.desktop

      # metainfo
      - install -Dm644 org.netlogo.NetLogo.metainfo.xml /app/share/metainfo/org.netlogo.NetLogo.metainfo

      # icons
      - install -Dm644 icons/hicolor/512x512/apps/org.netlogo.NetLogo.png /app/share/icons/hicolor/512x512/apps/org.netlogo.NetLogo.png
      - install -Dm644 icons/hicolor/256x256/apps/org.netlogo.NetLogo.png /app/share/icons/hicolor/256x256/apps/org.netlogo.NetLogo.png
      - install -Dm644 icons/hicolor/128x128/apps/org.netlogo.NetLogo.png /app/share/icons/hicolor/128x128/apps/org.netlogo.NetLogo.png
      - install -Dm644 icons/hicolor/64x64/apps/org.netlogo.NetLogo.png  /app/share/icons/hicolor/64x64/apps/org.netlogo.NetLogo.png
      - install -Dm644 icons/hicolor/48x48/apps/org.netlogo.NetLogo.png  /app/share/icons/hicolor/48x48/apps/org.netlogo.NetLogo.png

    sources:
      - type: archive
        url: https://downloads.netlogo.org/7.0.3/NetLogo-7.0.3-64.tgz
        sha256: 7923c9c1e834f462208403ea07a5758629ea6dc57029cb31e01222595be10471
        strip-components: 1

      - type: file
        path: netlogo-wrapper.sh
      - type: file
        path: org.netlogo.NetLogo.desktop
      - type: file
        path: org.netlogo.NetLogo.metainfo.xml
      - type: dir
        path: icons
        dest: icons
