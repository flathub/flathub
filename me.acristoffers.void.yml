app-id: me.acristoffers.void
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20
command: void-gui
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=host
  - --filesystem=/tmp
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    add-ld-path: .
    version: '25.08'
    autodownload: true
    autodelete: false
cleanup-commands:
  - mkdir -p /app/lib/ffmpeg
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/void-gui/cargo
    LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib
    BINDGEN_EXTRA_CLANG_ARGS: -isystem /usr/lib/gcc/x86_64-unknown-linux-gnu/15.2.0/include
    TMPDIR: /tmp
modules:
  - name: void-gui
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/void-gui/cargo
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --package void-gui
      - install -Dm755 target/release/void-gui -t ${FLATPAK_DEST}/bin/
      - install -Dm644 void-gui/assets/icon.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm644 ${FLATPAK_ID}.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 void-gui/assets/gschema.xml ${FLATPAK_DEST}/share/glib-2.0/schemas/${FLATPAK_ID}.gschema.xml
      - glib-compile-schemas ${FLATPAK_DEST}/share/glib-2.0/schemas/
    sources:
      - cargo-sources.json
      - type: git
        url: https://github.com/acristoffers/void-rs.git
        commit: 9f78e9dcd241209883a80e0452c4af232065a193
