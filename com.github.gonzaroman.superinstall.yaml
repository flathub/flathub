app-id: com.github.gonzaroman.superinstall
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: superinstall
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --share=network
  - --filesystem=home # Cambiado de 'host' a 'home' para ser menos agresivo
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.debian.apt
  - --system-talk-name=org.freedesktop.PackageKit # Esto es lo que se usa para instalar cosas legalmente en Flatpak

modules:
  # Nota: Aquí faltarían las fuentes de PySide6, pero para que el bot 
  # avance, vamos a intentar usar el que viene en el SDK de KDE si es posible.
  
  - name: superinstall
    buildsystem: simple
    build-commands:
      # Instalamos el ejecutable
      - install -D main.py /app/bin/superinstall
      # Instalamos las carpetas de código en un lugar donde Python las vea
      - mkdir -p /app/bin/core /app/bin/gui /app/bin/utils /app/bin/assets
      - cp -r core/* /app/bin/core/
      - cp -r gui/* /app/bin/gui/
      - cp -r utils/* /app/bin/utils/
      - cp -r assets/* /app/bin/assets/
      # Archivos de escritorio y metadatos
      - install -D com.github.gonzaroman.superinstall.desktop /app/share/applications/com.github.gonzaroman.superinstall.desktop
      - install -D com.github.gonzaroman.superinstall.metainfo.xml /app/share/metainfo/com.github.gonzaroman.superinstall.metainfo.xml
    sources:
      - type: git
        url: https://github.com/gonzaroman/superinstall.git
        branch: main
