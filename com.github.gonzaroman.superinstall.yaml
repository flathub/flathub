app-id: com.github.gonzaroman.superinstall
runtime: org.kde.Platform
runtime-version: '6.6' # Usamos KDE porque usas PySide6 (Qt)
sdk: org.kde.Sdk
command: superinstall
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --share=network
  - --filesystem=host # Necesario para gestionar paquetes del sistema
  - --talk-name=org.freedesktop.Flatpak # Para que pueda instalar otros Flatpaks
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.debian.apt # Para intentar hablar con APT

modules:
  - name: pyside6
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-cache-dir --prefix=/app PySide6
    sources:
      - type: shell
        commands:
          - echo "Instalando dependencias de Python..."

  - name: superinstall
    buildsystem: simple
    build-commands:
      - install -D main.py /app/bin/superinstall
      - cp -r core gui utils assets /app/bin/
      - install -D com.github.gonzaroman.superinstall.desktop /app/share/applications/com.github.gonzaroman.superinstall.desktop
      - install -D com.github.gonzaroman.superinstall.metainfo.xml /app/share/metainfo/com.github.gonzaroman.superinstall.metainfo.xml
    sources:
      - type: git
        url: https://github.com/gonzaroman/superinstall.git
        branch: main
