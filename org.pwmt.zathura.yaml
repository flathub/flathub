---
app-id: org.pwmt.zathura

runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk

command: zathura

finish-args:
  - --device=dri
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=cups

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/man
  - '*.la'
  - '*.a'

modules:
  - name: girara
    buildsystem: meson
    sources:
      - type: archive
        url: https://pwmt.org/projects/girara/download/girara-2026.02.04.tar.xz
        sha256: 342eca8108bd05a2275e3eacb18107fa3170fa89a12c77e541a5f111f7bba56d
        x-checker-data:
          type: anitya
          project-id: 6750
          url-template: https://pwmt.org/projects/girara/download/girara-$version.tar.xz
  - name: zathura
    buildsystem: meson
    config-opts:
      - -Dseccomp=disabled
      - -Dlandlock=disabled
    cleanup:
      - /share/bash-completion
      - /share/fish
      - /share/zsh
    sources:
      - type: archive
        url: https://pwmt.org/projects/zathura/download/zathura-2026.03.27.tar.xz
        sha256: afeba5e3d59474a95c2a4ed35e1ff155fb5c0777a9bf0fa9b7869c16d7e509d4
        x-checker-data:
          type: anitya
          project-id: 5298
          url-template: https://pwmt.org/projects/zathura/download/zathura-$version.tar.gz
  - name: zathura-pdf-poppler
    buildsystem: meson
    sources:
      - type: archive
        url: https://pwmt.org/projects/zathura-pdf-poppler/download/zathura-pdf-poppler-2026.02.03.tar.xz
        sha256: e9c35542d5c8de9c5b3a4b83e7dc86cd82bfac90319f472127bacf6651bce77f
        x-checker-data:
          type: anitya
          project-id: 14847
          url-template: https://pwmt.org/projects/zathura-pdf-poppler/download/zathura-pdf-poppler-$version.tar.xz
    modules:
      - name: popplerdata
        buildsystem: cmake-ninja
        sources:
          - type: archive
            url: https://poppler.freedesktop.org/poppler-data-0.4.12.tar.gz
            sha256: c835b640a40ce357e1b83666aabd95edffa24ddddd49b8daff63adb851cdab74
            x-checker-data:
              type: anitya
              project-id: 3687
              url-template: https://poppler.freedesktop.org/poppler-data-$version.tar.xz
      - name: poppler
        buildsystem: cmake-ninja
        config-opts:
          - -DCMAKE_INSTALL_LIBDIR=/app/lib
          - -DCMAKE_INSTALL_INCLUDEDIR=/app/include
          - -DBUILD_GTK_TESTS=OFF
          - -DBUILD_CPP_TESTS=OFF
          - -DENABLE_CPP=OFF
          - -DENABLE_BOOST=OFF
          - -DENABLE_GOBJECT_INTROSPECTION=OFF
          - -DENABLE_LIBOPENJPEG=openjpeg2
          - -DENABLE_QT5=OFF
          - -DENABLE_QT6=OFF
        cleanup:
          - /bin
          - /share
        sources:
          - type: archive
            url: https://poppler.freedesktop.org/poppler-26.02.0.tar.xz
            sha256: dded8621f7b2f695c91063aab1558691c8418374cd583501e89ed39487e7ab77
            x-checker-data:
              type: anitya
              project-id: 3686
              url-template: https://poppler.freedesktop.org/poppler-$version.tar.xz
  - name: zathura-djvu
    buildsystem: meson
    sources:
      - type: archive
        url: https://pwmt.org/projects/zathura-djvu/download/zathura-djvu-2026.02.03.tar.xz
        sha256: f52c9dff6b8a2865be3e51aebba9ac50a279e1d721dc860b7f6bdfa1e39c1135
        x-checker-data:
          type: anitya
          project-id: 11036
          url-template: https://pwmt.org/projects/zathura-djvu/download/zathura-djvu-$version.tar.xz
    modules:
      - name: djvulibre
        config-opts:
          - --disable-desktopfiles
        cleanup:
          - /bin
        sources:
          - type: archive
            url: http://downloads.sourceforge.net/djvu/djvulibre-3.5.29.tar.gz
            sha256: d3b4b03ae2bdca8516a36ef6eb27b777f0528c9eda26745d9962824a3fdfeccf
            x-checker-data:
              type: anitya
              project-id: 10159
              url-template: http://downloads.sourceforge.net/djvu/djvulibre-$version.tar.gz
  - name: zathura-ps
    buildsystem: meson
    sources:
      - type: archive
        url: https://pwmt.org/projects/zathura-ps/download/zathura-ps-2026.02.03.tar.xz
        sha256: b3556ff2960b7a5d014e873bd0474c37f3f082e370c6ed8efb9487ba6167eda8
        x-checker-data:
          type: anitya
          project-id: 14848
          url-template: https://pwmt.org/projects/zathura-ps/download/zathura-ps-$version.tar.xz
    modules:
      - name: ghostscript
        config-opts:
          - --disable-contrib
          - --disable-cups
          - --disable-dbus
          - --disable-gtk
          - --without-pcl
          - --without-tesseract
          - --without-pdftoraster
        make-args:
          - soinstall
        cleanup:
          - /bin
          - /share/doc/ghostscript
        sources:
          - type: archive
            url: https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10060/ghostscript-10.06.0.tar.xz
            sha256: 64352648c2c081c8a9fb1a12dc1965e01ead7c57f58b72d1b54f6ef1cef3c561
            x-checker-data:
              type: anitya
              project-id: 1157
      - name: libspectre
        sources:
          - type: archive
            url: http://libspectre.freedesktop.org/releases/libspectre-0.2.12.tar.gz
            sha256: 55a7517cd3572bd2565df0cf450944a04d5273b279ebb369a895391957f0f960
            x-checker-data:
              type: anitya
              project-id: 1724
              url-template: http://libspectre.freedesktop.org/releases/libspectre-$version.tar.gz
