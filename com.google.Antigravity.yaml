app-id: com.google.Antigravity
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: antigravity
separate-locales: false

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --socket=ssh-auth
  - --device=all
  - --filesystem=host
  - --filesystem=xdg-run/gnupg:ro
  - --allow=devel
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.gnome.keyring.SystemPrompter
  - --env=GTK_USE_PORTAL=1
  - --env=ELECTRON_TRASH=gio

modules:
  - shared-modules/libsecret/libsecret.json
  - name: antigravity
    buildsystem: simple
    build-commands:
      - install -Dm755 antigravity.sh /app/bin/antigravity
      - install -Dm644 com.google.Antigravity.metainfo.xml /app/share/metainfo/com.google.Antigravity.metainfo.xml
      - install -Dm644 com.google.Antigravity.desktop /app/share/applications/com.google.Antigravity.desktop
      - install -Dm644 antigravity-128.png /app/share/icons/hicolor/128x128/apps/com.google.Antigravity.png
      - install -Dm644 antigravity-256.png /app/share/icons/hicolor/256x256/apps/com.google.Antigravity.png
      - install -Dm644 antigravity-512.png /app/share/icons/hicolor/512x512/apps/com.google.Antigravity.png
      - mkdir -p /app/antigravity
      - tar -xf antigravity-linux-x64.tar.gz -C /app/antigravity --strip-components=1
      - rm -rf /app/antigravity/resources/app/ThirdPartyNotices.txt
    sources:
      - type: file
        path: antigravity.sh
      - type: file
        path: com.google.Antigravity.metainfo.xml
      - type: file
        path: com.google.Antigravity.desktop
      - type: file
        path: icons/antigravity-128.png
      - type: file
        path: icons/antigravity-256.png
      - type: file
        path: icons/antigravity-512.png
      - type: file
        url: https://edgedl.me.gvt1.com/edgedl/release2/j0qc3/antigravity/stable/1.20.6-5891862175809536/linux-x64/Antigravity.tar.gz
        sha256: ad382bf321a6216d07f95af1f613e03f5a07fdf6fc6632b769ce83d81afdd567
        dest-filename: antigravity-linux-x64.tar.gz
        x-checker-data:
          type: html
          url: https://antigravity.google/download/linux
          version-pattern: stable/([\d.]+-\d+)/linux-x64
          url-pattern: (https://edgedl\.me\.gvt1\.com/edgedl/release2/j0qc3/antigravity/stable/[\d.]+-\d+/linux-x64/Antigravity\.tar\.gz)
