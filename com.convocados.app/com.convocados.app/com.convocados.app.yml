app-id: com.convocados.app
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: convocados_app

finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --share=network
  - --device=dri
  - --talk-name=org.freedesktop.secrets

modules:
  - name: convocados_app
    buildsystem: simple
    build-commands:
      # Copia o bundle completo para /app/convocados/ mantendo a estrutura
      # bin/ lib/ data/ intacta (Flutter usa caminhos relativos ao binário).
      - mkdir -p /app/bin /app/convocados
      - cp -r build/linux/x64/release/bundle/. /app/convocados/
      # Wrapper em /app/bin/ que garante que o workdir seja /app/convocados
      # antes de executar o binário (necessário para lib/ e data/).
      - printf '#!/bin/sh\ncd /app/convocados\nexec ./convocados_app "$@"\n' > /app/bin/convocados_app
      - chmod +x /app/bin/convocados_app
    sources:
      - type: dir
        path: .