app-id: com.convocados.app
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: convocados_app

finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --share=network
  - --device=dri
  - --talk-name=org.freedesktop.secrets

modules:
  - name: convocados_app
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin /app/convocados
      - cp -r . /app/convocados/

      - printf '#!/bin/sh\ncd /app/convocados\nexec ./convocados_app "$@"\n' > /app/bin/convocados_app
      - chmod +x /app/bin/convocados_app

      # instalar arquivos desktop
      - install -Dm644 com.convocados.app.desktop /app/share/applications/com.convocados.app.desktop
      - install -Dm644 com.convocados.app.metainfo.xml /app/share/metainfo/com.convocados.app.metainfo.xml
      - install -Dm644 com.convocados.app.png /app/share/icons/hicolor/256x256/apps/com.convocados.app.png

    sources:
      - type: archive
        dest-filename: convocados-linex.tar.gz
        url: https://flathub.web.app/1.0.0.1/convocados-linex.tar.gz
        sha256: 7fda03e3129c9d3d9e0540ec6f513c4a3bfe4d4746931e89a58c1587fa023b2f

      - type: file
        dest-filename: com.convocados.app.desktop
        url: https://flathub.web.app/1.0.0.1/com.convocados.app.desktop
        sha256: e1899564f3291a36dd4e585ce4fa9a5210886701914cb0f22b3c58eff8af8874

      - type: file
        dest-filename: com.convocados.app.metainfo.xml
        url: https://flathub.web.app/1.0.0.1/com.convocados.app.metainfo.xml
        sha256: 0a91f432f0a321f445ecf7d5a44e1c37153153b4a81456932eaafda0d86be080

      - type: file
        dest-filename: com.convocados.app.png
        url: https://flathub.web.app/1.0.0.1/com.convocados.app.png
        sha256: 14f360295318b1394c43ad5bd801626f2a795e83098326ffd730dc65b93108ef
