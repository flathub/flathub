app-id: io.github.lkm.lkm
runtime: org.kde.Platform
runtime-version: "6.7"
sdk: org.kde.Sdk
command: lkm-gui

finish-args:
  # Wayland + X11
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Network access — needed to fetch kernel indexes (Mainline PPA, XanMod, etc.)
  - --share=network
  # Host filesystem access — needed to read /etc/os-release, run package managers
  - --filesystem=host
  # D-Bus — needed for pkexec privilege escalation
  - --system-talk-name=org.freedesktop.PolicyKit1
  # Allow running host binaries (apt-get, pacman, dnf, xbps-install, etc.)
  - --talk-name=org.freedesktop.Flatpak

modules:
