app-id: com.opera.opera-gx
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.chromium.Chromium.BaseApp
base-version: '25.08'
command: opera-gx
separate-locales: false
finish-args:
  - --require-version=1.8.2
  - --device=all
  - --env=GTK_PATH=/app/lib/gtkmodules
  - --share=ipc
  - --share=network
  - --socket=cups
  - --socket=pcsc # FIDO2
  - --socket=pulseaudio
  - --socket=x11
  - --socket=wayland
  - --system-talk-name=org.freedesktop.UPower
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6
  - --talk-name=org.gnome.SessionManager
  - --system-talk-name=org.freedesktop.Avahi
  - --own-name=org.mpris.MediaPlayer2.chromium.*
  - --filesystem=xdg-download
  - --filesystem=/run/.heim_org.h5l.kcm-socket
  - --persist=.pki
  # For GNOME proxy resolution
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --talk-name=ca.desrt.dconf
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf
  - --env=GIO_EXTRA_MODULES=/app/lib/gio/modules
  - --env=GSETTINGS_BACKEND=dconf
  # For KDE proxy resolution (KDE5 only)
  - --filesystem=~/.config/kioslaverc
  # Enables PWAs
  - --filesystem=~/.local/share/applications:create
  - --filesystem=~/.local/share/icons:create

modules:
  - name: dconf
    buildsystem: meson
    config-opts:
      - -Dbash_completion=false
      - -Dman=false
      - -Dvapi=false
    cleanup:
      - /etc
      - /include
      - ca.desrt.dconf.service
      - dconf.service
      - dconf-service
      - '*.pc'
    sources:
      - type: archive
        url: https://download.gnome.org/sources/dconf/0.49/dconf-0.49.0.tar.xz
        sha256: 16a47e49a58156dbb96578e1708325299e4c19eea9be128d5bd12fd0963d6c36
        x-checker-data:
          type: gnome
          name: dconf
          stable-only: true
      # From: https://src.fedoraproject.org/rpms/dconf
      - type: patch
        path: dconf-override.patch

  - name: zypak
    sources:
      - type: git
        url: https://github.com/refi64/zypak
        tag: v2025.09
        commit: 693a71c5ffa80ec9c9ce2ae03b1ccc493c698e53
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: opera-gx
    buildsystem: simple
    build-commands:
      # Unpack Opera from deb archive
      - bsdtar --to-stdout -xf opera-gx.deb 'data.tar*' | bsdtar -xf -
      - mv usr/lib/x86_64-linux-gnu/opera-gx-stable ${FLATPAK_DEST}/opera-gx
      - mv ${FLATPAK_DEST}/opera-gx/opera ${FLATPAK_DEST}/opera-gx/opera-gx
      - install -Dm 644 cobalt.ini ${FLATPAK_DEST}/etc
      - install -Dm 644 ${FLATPAK_ID}.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm 644 usr/share/applications/opera-gx.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - sed -i 's/^Icon=opera-gx$/Icon=com.opera.opera-gx/' ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm 644 opera-gx.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm 755 opera.sh ${FLATPAK_DEST}/bin/opera-gx
      - install -Dm0644 usr/share/doc/opera-gx-stable/copyright -t $FLATPAK_DEST/share/licenses/$FLATPAK_ID/opera-gx
    sources:
      - type: file
        dest-filename: opera-gx.deb
        only-arches:
          - x86_64
        url: https://get.geo.opera.com/pub/opera_gx/128.0.5807.51/linux/opera-gx-stable_128.0.5807.51_amd64.deb
        sha256: 3d4b710fafc8331bc14741faa04e096a30319368151fb5ccd0eb0e92d3e47f1b
        x-checker-data:
          is-main-source: true
          type: anitya
          project-id: 7242
          stable-only: true
          url-template: https://get.geo.opera.com/pub/opera/desktop/$version/linux/opera-gx-stable_${version}_amd64.deb
      - type: file
        path: cobalt.ini
      - type: file
        path: com.opera.opera-gx.metainfo.xml
      - type: file
        path: opera-gx.svg
      - type: file
        path: opera.sh

  - name: opera-codecs
    buildsystem: simple
    build-commands:
      - mkdir /app/opera-gx/lib_extra
      - install -Dm 644 -t /app/opera-gx/lib_extra libffmpeg.so
    sources:
      - type: archive
        url: https://github.com/Ld-Hagen/nwjs-ffmpeg-prebuilt/releases/download/nwjs-ffmpeg-0.107.0/0.107.0-linux-x64.zip
        sha256: 6f90ac26d47c98ff06865f371d905cfe5f5a5d1b895ccf99d22acf5d0f33c0b4
        x-checker-data:
          type: json
          url: https://api.github.com/repos/Ld-Hagen/nwjs-ffmpeg-prebuilt/releases/latest
          version-query: .tag_name | sub("^nwjs-ffmpeg-"; "")
          url-query: .assets[] | select(.name==$version + "-linux-x64.zip") | .browser_download_url
