id: org.electroncash.ElectronCash
runtime: org.kde.Platform
runtime-version: '5.15-24.08'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '5.15-24.08'
command: electron-cash

finish-args:
  - --socket=x11
  - --share=ipc
  - --socket=pulseaudio
  - --share=network
  - --persist=.electron-cash
  - --device=all
  - --socket=session-bus
  - --talk-name=org.kde.StatusNotifierItem
  - --talk-name=org.freedesktop.StatusNotifierWatcher
  - --filesystem=xdg-data/icons:ro
  - --filesystem=~/.icons:ro

build-options:
  env:
    BASEAPP_REMOVE_WEBENGINE: "1"

cleanup:
  - /include
  - /share/man
  - /share/pkgconfig
  - "*.a"
  - "*.la"
  - /lib/pkgconfig

cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  # Shared modules - libusb for hardware wallets
  - shared-modules/libusb/libusb.json

  # libevent - required by Tor
  - name: libevent
    buildsystem: autotools
    config-opts:
      - --disable-openssl
    sources:
      - type: archive
        url: https://github.com/libevent/libevent/releases/download/release-2.1.12-stable/libevent-2.1.12-stable.tar.gz
        sha256: 92e6de1be9ec176428fd2367677e61ceffc2ee1cb119035037a27d346b0403bb

  # Tor - for anonymous networking (required for CashFusion)
  - name: tor
    buildsystem: autotools
    config-opts:
      - --disable-systemd
      - --disable-zstd
      - --with-libevent-dir=/app
    sources:
      - type: archive
        url: https://dist.torproject.org/tor-0.4.8.10.tar.gz
        sha256: e628b4fab70edb4727715b23cf2931375a9f7685ac08f2c59ea498a178463a86
        x-checker-data:
          type: anitya
          project-id: 1367
          url-template: https://dist.torproject.org/tor-$version.tar.gz
    post-install:
      # Copy libevent libraries to electroncash directory (Tor needs them)
      - mkdir -p ${FLATPAK_DEST}/lib/python3.12/site-packages/electroncash/tor/bin
      - cp ${FLATPAK_DEST}/lib/libevent-2.1.so.7 ${FLATPAK_DEST}/lib/python3.12/site-packages/electroncash/tor/bin/
      - cp ${FLATPAK_DEST}/lib/libevent_core-2.1.so.7 ${FLATPAK_DEST}/lib/python3.12/site-packages/electroncash/tor/bin/
      - cp ${FLATPAK_DEST}/lib/libevent_extra-2.1.so.7 ${FLATPAK_DEST}/lib/python3.12/site-packages/electroncash/tor/bin/
      - cp ${FLATPAK_DEST}/lib/libevent_pthreads-2.1.so.7 ${FLATPAK_DEST}/lib/python3.12/site-packages/electroncash/tor/bin/
      # Copy tor binary to Electron-Cash's expected location
      - cp ${FLATPAK_DEST}/bin/tor ${FLATPAK_DEST}/lib/python3.12/site-packages/electroncash/tor/bin/tor
      - chmod +x ${FLATPAK_DEST}/lib/python3.12/site-packages/electroncash/tor/bin/tor

  # libsecp256k1 - cryptographic library (required for CashFusion)
  # Using Bitcoin ABC fork which has the old schnorr API
  - name: libsecp256k1
    buildsystem: autotools
    config-opts:
      - --enable-module-recovery
      - --enable-experimental
      - --enable-module-ecdh
      - --enable-module-schnorr
      - --disable-jni
    sources:
      - type: git
        url: https://github.com/Bitcoin-ABC/secp256k1.git
        commit: 869d3526658d7356e1ff354da1c941578684a943

  # zbar - QR code scanning
  - name: zbar
    buildsystem: autotools
    config-opts:
      - --disable-doc
      - --disable-video
      - --enable-codes=qrcode
      - --with-python=python3
      - --without-dbus
      - --without-gtk
      - --without-imagemagick
      - --without-java
      - --without-npapi
      - --without-qt
      - --without-qt5
      - --without-xshm
      - --without-xv
    sources:
      - type: archive
        url: https://linuxtv.org/downloads/zbar/zbar-0.23.93.tar.gz
        sha256: 78ae427a529f0399561bc198de5c2c7ca3f11d05fa9e903e65e501168433d218

  # Python core dependencies
  - python3-requirements.json

  # Python binary dependencies (excluding PyQt which comes from BaseApp)
  - python3-requirements-binaries.json

  # Main Electron Cash application
  - name: electron-cash
    buildsystem: simple
    build-commands:
      # Install Python package
      - pip3 install --exists-action=i --no-index --find-links="file://${PWD}" --prefix=${FLATPAK_DEST} .
      # Copy libsecp256k1 to electroncash package directory
      - cp /app/lib/libsecp256k1.so.0.0.0 ${FLATPAK_DEST}/lib/python3.12/site-packages/electroncash/libsecp256k1.so.0
      # Rename the original electron-cash script
      - mv ${FLATPAK_DEST}/bin/electron-cash ${FLATPAK_DEST}/bin/electron-cash.real
      # Create wrapper script to set LD_LIBRARY_PATH for Tor and KDE platform theme
      - |
        cat > ${FLATPAK_DEST}/bin/electron-cash << 'EOF'
        #!/bin/bash
        export LD_LIBRARY_PATH=/app/lib/python3.12/site-packages/electroncash/tor/bin:${LD_LIBRARY_PATH}
        # Enable KDE platform theme for proper system tray integration
        export QT_QPA_PLATFORMTHEME=kde
        exec /app/bin/electron-cash.real "$@"
        EOF
      - chmod +x ${FLATPAK_DEST}/bin/electron-cash
      # Install metainfo, icons, and desktop file
      - install -Dm644 org.electroncash.ElectronCash.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 icons/electron-cash.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm644 icons/electron_dark_icon.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}-dark.svg
      - install -Dm644 icons/electron_light_icon.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}-light.svg
      - for s in 16 22 24 32 48 64 128 256; do install -Dm644 icons/electron-cash.png ${FLATPAK_DEST}/share/icons/hicolor/${s}x${s}/apps/${FLATPAK_ID}.png; done
      - install -Dm644 icons/electron-cash.png ${FLATPAK_DEST}/share/pixmaps/${FLATPAK_ID}.png
      - install -Dm644 org.electroncash.ElectronCash.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - desktop-file-edit --set-key="Icon" --set-value=${FLATPAK_ID} --set-key="Exec" --set-value="electron-cash %u" ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
    sources:
      - type: archive
        url: https://github.com/Electron-Cash/Electron-Cash/archive/refs/tags/4.4.3.tar.gz
        sha256: 7fdcb7cc645601a066514694192c29d3feceb90f59385ada1bb7207e4916026f
        x-checker-data:
          type: anitya
          project-id: 10603
          version-pattern: ^([\d.]+)$
          url-template: https://github.com/Electron-Cash/Electron-Cash/archive/refs/tags/$version.tar.gz
      - type: file
        url: https://files.pythonhosted.org/packages/69/8a/b9dc7678803429e4a3bc9ba462fa3dd9066824d3c607490235c6a796be5a/setuptools-75.8.0-py3-none-any.whl
        sha256: e3982f444617239225d675215d51f6ba05f845d4eec313da4418fdbb56fb27e3
      - type: file
        path: org.electroncash.ElectronCash.metainfo.xml
      - type: file
        path: org.electroncash.ElectronCash.desktop
      - type: patch
        path: tray-icon-fix.patch
