app-id: io.github.promethyxx.Oxyon
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: oxyon
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=home
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/oxyon/cargo
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - '*.a'
  - '*.la'
modules:
  - name: boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app --with-libraries=filesystem,system
      - ./b2 -j $FLATPAK_BUILDER_N_JOBS install
    sources:
      - type: archive
        url: https://sourceforge.net/projects/boost/files/boost/1.86.0/boost_1_86_0.tar.bz2
        sha256: 1bed88e40401b2cb7a1f76d4bab499e352fa4d0c5f31c0dbae64e24d34d7513b
  - name: cmark
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMARK_STATIC=OFF
    sources:
      - type: archive
        url: https://github.com/commonmark/cmark/archive/refs/tags/0.31.1.tar.gz
        sha256: 3da93db5469c30588cfeb283d9d62edfc6ded9eb0edc10a4f5bbfb7d722ea802
  - name: libdvdcss
    sources:
      - type: archive
        url: https://download.videolan.org/pub/libdvdcss/1.4.3/libdvdcss-1.4.3.tar.bz2
        sha256: 233cc92f5dc01c5d3a96f5b3582be7d5cee5a35a52d3a08158745d3d86070079
  - name: libdvdread
    sources:
      - type: archive
        url: https://download.videolan.org/pub/videolan/libdvdread/6.1.3/libdvdread-6.1.3.tar.bz2
        sha256: ce35454997a208cbe50e91232f0e73fb1ac3471965813a13b8730a8f18a15369
  - name: mkvtoolnix
    buildsystem: simple
    build-commands:
      - ./configure
        --enable-optimization
        --prefix=/app
        --with-boost=/app
        --with-docbook-xsl-root=/usr/share/xml/docbook/xml/xsl-stylesheets
        --disable-update-check
        --disable-gui
      - ./drake -j $FLATPAK_BUILDER_N_JOBS apps:mkvpropedit
      - install -Dm755 src/mkvpropedit /app/bin/mkvpropedit
    sources:
      - type: archive
        url: https://mkvtoolnix.download/sources/mkvtoolnix-97.0.tar.xz
        sha256: 5d43bf66e011ff5af09516a2dba2fb717b1631791a3a7498fcf74849a86929d3
    modules:
      - name: ruby
        sources:
          - type: archive
            url: https://cache.ruby-lang.org/pub/ruby/3.4/ruby-3.4.7.tar.gz
            sha256: 23815a6d095696f7919090fdc3e2f9459b2c83d57224b2e446ce1f5f7333ef36
        cleanup:
          - '*'
  - name: pandoc
    buildsystem: simple
    build-commands:
      - find . -name pandoc -type f -exec install -Dm755 {} /app/bin/pandoc \;
    sources:
      - type: archive
        url: https://github.com/jgm/pandoc/releases/download/3.6.3/pandoc-3.6.3-linux-amd64.tar.gz
        sha256: d04c95c138202f87d6b00ac19aa3dd874c681f60a9feb3b55c74f764d6d1a17d
        only-arches: [x86_64]
      - type: archive
        url: https://github.com/jgm/pandoc/releases/download/3.6.3/pandoc-3.6.3-linux-arm64.tar.gz
        sha256: 4e774cb1bdb6e56bc55b8eb79200bd9aa6a39905a04ecda7267f5149116f0881
        only-arches: [aarch64]
  - name: oxyon
    buildsystem: simple
    build-commands:
      - cargo --offline build --profile dist --no-default-features --features api
      - install -Dm755 target/dist/oxyon /app/bin/oxyon
      - install -Dm644 assets/io.github.promethyxx.Oxyon.desktop /app/share/applications/io.github.promethyxx.Oxyon.desktop
      - install -Dm644 assets/io.github.promethyxx.Oxyon.metainfo.xml /app/share/metainfo/io.github.promethyxx.Oxyon.metainfo.xml
      - install -Dm644 assets/Oxyon_icon.png /app/share/icons/hicolor/512x512/apps/io.github.promethyxx.Oxyon.png
    sources:
      - type: git
        url: https://github.com/Promethyxx/oxyon.git
        tag: 1.3.8
        commit: 08e5100839df85322059c8068972af7f74ec7c09
      - cargo-sources.json
