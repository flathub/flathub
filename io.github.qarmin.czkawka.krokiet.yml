app-id: io.github.qarmin.czkawka.krokiet
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: krokiet
finish-args:
- "--share=ipc"
- "--socket=fallback-x11"
- "--socket=wayland"
- "--filesystem=host"
- "--device=dri"
build-options:
  append-path: "/usr/lib/sdk/rust-stable/bin"
  env:
    CARGO_HOME: "/run/build/krokiet/cargo"
modules:
- name: krokiet
  buildsystem: simple
  build-commands:
  - cargo --offline fetch --manifest-path Cargo.toml
  # It appears that all GUI backends provided by slint have some issues:
  # - winit_software - resizing the app breaks it, will be fixed in Slint 1.15 and Krokiet 11.0 - https://github.com/slint-ui/slint/issues/7663
  # - winit_femtovg - blurry fonts - https://github.com/slint-ui/slint/issues/6215
  # - winit_skia_opengl / winit_skia_vulkan - downloads files during the build - this may be a solution, but too hard for now, for me
  # - femtovg_wgpu - does not support OpenGL, so it will not work on a large portion of computers
  - cargo --offline build --release --features "heif, libavif, libraw, winit_femtovg" --no-default-features --bin krokiet
  - install -Dm755 ./target/release/krokiet -t /app/bin/
  - install -Dm644 ./krokiet/LICENSE_CC_BY_4_ICONS /app/share/licenses/io.github.qarmin.czkawka.krokiet/LICENSE_CC_BY_4_ICONS
  - install -Dm644 ./krokiet/LICENSE_GPL_APP /app/share/licenses/io.github.qarmin.czkawka.krokiet/LICENSE_GPL_APP
  - install -Dm644 ./krokiet/LICENSE_MIT_CODE /app/share/licenses/io.github.qarmin.czkawka.krokiet/LICENSE_MIT_CODE
  - install -Dm644 ./data/icons/io.github.qarmin.czkawka.krokiet.svg -t /app/share/icons/hicolor/scalable/apps/
  - install -Dm644 ./data/io.github.qarmin.czkawka.krokiet.desktop -t /app/share/applications/
  - install -Dm644 ./data/io.github.qarmin.czkawka.krokiet.metainfo.xml -t /app/share/metainfo
  sources:
  - cargo-sources.json
  - type: git
    url: https://github.com/qarmin/czkawka.git
    tag: 10.0.0_flatpak
    commit: e33ada1a5f2ef1876f5086ecfc0367632e2bbece
