id: ink.freesign.Freesign

runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20

command: freesign
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc

build-options:
  append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin

modules:
  - name: freesign
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/jaigner-hub/freesign
        tag: v1.2.1
        commit: 14545b9c577800bc5006876431fea5ed00d511bb
      - cargo-sources.json
      - node-sources.json

    build-options:
      env:
        CARGO_HOME: /run/build/freesign/cargo
        XDG_CACHE_HOME: /run/build/freesign/flatpak-node/cache
        npm_config_cache: /run/build/freesign/flatpak-node/npm-cache
        npm_config_offline: "true"
        LC_ALL: C.utf8

    build-commands:
      - npm ci --offline
      - cargo --offline fetch --manifest-path src-tauri/Cargo.toml --verbose
      - npm run --offline tauri build -- --no-bundle
      - install -Dm644 -t /app/share/metainfo/ flatpak/ink.freesign.Freesign.metainfo.xml
      - install -Dm644 -t /app/share/applications/ flatpak/ink.freesign.Freesign.desktop
      - install -Dm755 -t /app/bin/ src-tauri/target/release/freesign
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/ink.freesign.Freesign.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/ink.freesign.Freesign.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/ink.freesign.Freesign.png
      - install -Dm644 src-tauri/icons/icon.svg /app/share/icons/hicolor/scalable/apps/ink.freesign.Freesign.svg

    post-install:
      - install -Dm644 LICENSE /app/share/licenses/ink.freesign.Freesign/LICENSE
      - install -Dm644 renderer/fonts/Caveat-OFL.txt /app/share/licenses/ink.freesign.Freesign/Caveat-OFL.txt
      - install -Dm644 renderer/fonts/DancingScript-OFL.txt /app/share/licenses/ink.freesign.Freesign/DancingScript-OFL.txt
      - install -Dm644 renderer/fonts/GreatVibes-OFL.txt /app/share/licenses/ink.freesign.Freesign/GreatVibes-OFL.txt
      - install -Dm644 renderer/fonts/Sacramento-OFL.txt /app/share/licenses/ink.freesign.Freesign/Sacramento-OFL.txt
      - install -Dm644 renderer/fonts/Pacifico-OFL.txt /app/share/licenses/ink.freesign.Freesign/Pacifico-OFL.txt
      - install -Dm644 renderer/fonts/HomemadeApple-LICENSE.txt /app/share/licenses/ink.freesign.Freesign/HomemadeApple-LICENSE.txt
