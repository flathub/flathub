id: fr.quentium.acters
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: stacer
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11

modules:
  - name: acters
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/QuentiumYT/Stacer.git
        #tag: v1.6.2
        #commit: e55330ca3f043945fdffd7ac5b8283e7ccaee9f9
        commit: 5b3073d6bcdf75a72f151a532e1c0a279b3d164f
        x-checker-data:
          type: git
          tag-pattern: "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
