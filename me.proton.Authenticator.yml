app-id: me.proton.Authenticator
runtime: org.gnome.Platform
sdk: org.gnome.Sdk
runtime-version: "50"
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: proton-authenticator
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --talk-name=org.freedesktop.secrets
  - --env=WEBKIT_DISABLE_DMABUF_RENDERER=1
  # NOTE: Snapdragon X Elite (ARMv9, BTI-enforcing) crashes with SIGILL in
  # WebKitWebProcess due to a BTI (Branch Target Identification) violation in
  # WebKit 2.46.x's JIT codegen — JIT indirect branches land on non-BTI entry
  # points in the BTI-compiled JSC library.  This is a GNOME Platform runtime
  # issue (both Platform 49 and 50 ship webkit2gtk 2.46.9); the system WebKit
  # on Fedora 44 is 2.52.1 and is unaffected.  No Flatpak finish-arg can work
  # around this: WEBKIT_DISABLE_JIT=1 is not forwarded to the WebKit subprocess
  # through the sandbox process launcher, and JSC_useJIT=false has the same
  # limitation.  Tracked upstream; will resolve when GNOME Platform ships a
  # WebKit with BTI-aware JIT (>= 2.48 or when the runtime is updated).
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/proton-authenticator/cargo
modules:
  - name: proton-authenticator
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/proton-authenticator/cargo
    build-commands:
      # cargo-sources.json has already populated ${CARGO_HOME} with all crates.
      # The pre-built frontend dist (authenticator-dist.tar.gz) has been
      # extracted on top of the git checkout, so applications/authenticator/dist/
      # already exists when tauri-build runs.
      # tauri.conf.json → "frontendDist": "../dist"
      # tauri-build (the build.rs dependency) reads tauri.conf.json and embeds
      # the dist/ frontend; no separate tauri CLI step is needed.
      - |
        export CARGO_NET_OFFLINE=true
        cargo build \
          --release \
          --features tauri/custom-protocol \
          --manifest-path applications/authenticator/src-tauri/Cargo.toml

      - install -Dm755 applications/authenticator/src-tauri/target/release/proton-authenticator
        /app/bin/proton-authenticator

      - install -Dm644 applications/authenticator/src-tauri/icons/32x32.png
        /app/share/icons/hicolor/32x32/apps/me.proton.Authenticator.png
      - install -Dm644 applications/authenticator/src-tauri/icons/128x128.png
        /app/share/icons/hicolor/128x128/apps/me.proton.Authenticator.png
      - install -Dm644 applications/authenticator/src-tauri/icons/128x128@2x.png
        /app/share/icons/hicolor/256x256/apps/me.proton.Authenticator.png

      - install -Dm644 me.proton.Authenticator.desktop
        /app/share/applications/me.proton.Authenticator.desktop

      - install -Dm644 me.proton.Authenticator.metainfo.xml
        /app/share/metainfo/me.proton.Authenticator.metainfo.xml

      - install -Dm644 LICENSE
        /app/share/licenses/me.proton.Authenticator/LICENSE

    sources:
      - type: git
        url: https://github.com/ProtonMail/WebClients.git
        commit: 7d223376dd948c22fc893698075d120da5ee56aa

      - type: archive
        path: authenticator-dist.tar.gz
        sha256: 3ed54f97cca9bc9fc2155d754010fc264dd602bc3162759461c20fdb1e746f58
        strip-components: 0

      - cargo-sources.json

      - type: file
        path: me.proton.Authenticator.desktop

      - type: file
        path: me.proton.Authenticator.metainfo.xml
