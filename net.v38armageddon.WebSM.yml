id: net.v38armageddon.WebSM
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk

command: WebSM

finish-args:
  - --device=all
  # TODO: Replace this with wayland and fallback-x11 once Wayland support
  #       becomes available.
  - --socket=x11
  - --share=ipc
  - --share=network
  - --filesystem=xdg-pictures
  - --filesystem=xdg-music
  - --filesystem=xdg-videos
  - --filesystem=/run/media
  - --filesystem=/media
  - --talk-name=org.freedesktop.portal.Audio
  - --talk-name=org.freedesktop.portal.Camera
  - --talk-name=org.freedesktop.portal.Flatpak
  - --filesystem=/usr/lib:ro
  - --filesystem=/lib:ro
  - --env=LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu
  - --env=WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS=1

modules:
  - name: WebSM
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/v38armageddon/WebSM/releases/download/v6.0/WebSM-linux-standalone.tar.xz
        sha256: f54e073180191e7de8b201378d50901084ed38653c3e06a877f97919ac61e721
      - type: file
        path: net.v38armageddon.WebSM.desktop
    build-commands:
      # Extract the software
      - mkdir -p /app/bin publish /app/share/applications
      - tar -xJf WebSM-linux-standalone.tar.xz -C publish
      - cp -r ./publish/* /app/bin/
      # Install all assets
      - install -Dm644 net.v38armageddon.WebSM.desktop /app/share/applications/
      - install -Dm644 publish/Assets/Icons/icon_foreground.png /app/share/icons/hicolor/48x48/apps/net.v38armageddon.WebSM.png
      # HACK: Link libs to the binaries so Uno detects WebKit
      - ln -s /usr/lib/x86_64-linux-gnu/libwebkit2gtk-4.1.so.0 /app/bin/libwebkit2gtk-4.1.so
      - ln -s /usr/lib/x86_64-linux-gnu/libwebkit2gtk-4.1.so.0 /app/bin/libwebkit2gtk-4.0.so
      - ln -s /usr/lib/x86_64-linux-gnu/libwebkit2gtk-4.1.so.0 /app/bin/libwebkit2gtk-4.0.so.37
      - ln -s /usr/lib/x86_64-linux-gnu/libgdk-3.so.0 /app/bin/libgdk-3.so
      - ln -s /usr/lib/x86_64-linux-gnu/libgtk-3.so.0 /app/bin/libgtk-3.so
      - ln -s /usr/lib/x86_64-linux-gnu/libjavascriptcoregtk-4.1.so.0 /app/bin/libjavascriptcoregtk-4.1.so
      # chmod and link executable file
      - chmod +x /app/bin/WebSM
      - ln -s /app/bin/WebSM /app/WebSM
