app-id: com.efzynx.TruckersToolLinux
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'

command: run.sh
separate-locales: false

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-documents/Euro Truck Simulator 2:create
  - --filesystem=xdg-data/Euro Truck Simulator 2:create
  - --filesystem=~/.steam:create
  - --filesystem=~/Games:create
  - --env=ELECTRON_TRASH=gio

build-options:
  append-path: /usr/lib/sdk/node20/bin
  env:
    NPM_CONFIG_LOGLEVEL: info
    ELECTRON_CACHE: /run/build/truckers-tool-linux/electron-cache
    ELECTRON_BUILDER_CACHE: /run/build/truckers-tool-linux/electron-builder-cache

modules:
  - name: truckers-tool-linux
    buildsystem: simple
    build-options:
      env:
        npm_config_offline: 'true'
        npm_config_cache: /run/build/truckers-tool-linux/flatpak-node/npm-cache
        XDG_CACHE_HOME: /run/build/truckers-tool-linux/flatpak-node/cache
    build-commands:
      # Build the application using npm
      - npm ci --offline
      - npm run build:all
      
      # Use electron-builder to build linux unpacked directory
      - npx electron-builder --linux dir
      
      # Bundling App
      - cp -a release/linux-unpacked /app/main
      
      # Install the launch script
      - install -Dm755 run.sh -t /app/bin/
      
      # Install desktop file dan metadata (Dari Root)
      - install -Dm644 com.efzynx.TruckersToolLinux.desktop -t /app/share/applications/
      - install -Dm644 com.efzynx.TruckersToolLinux.metainfo.xml -t /app/share/metainfo/
      
      # Install ikon aplikasi
      - install -Dm644 build/icon.png /app/share/icons/hicolor/512x512/apps/com.efzynx.TruckersToolLinux.png
      
    sources:
      # Source code dari Upstream (Git/Archive)
      - type: git
        url: https://github.com/efzynx/truckers-tool-linux.git
        branch: main
        
      # Binary Electron v40.8.5 untuk linux-x64
      - type: file
        url: https://github.com/electron/electron/releases/download/v40.8.5/electron-v40.8.5-linux-x64.zip
        sha256: 3bce6ee4e4e481f7ce6d0be384f6c539ce16e0b9b7f46115aec6516770f6c26d
        dest: electron-cache
        dest-filename: electron-v40.8.5-linux-x64.zip

      # File ekstra (dikopikan otomatis oleh flatpak builder ke build directory)
      - type: file
        path: run.sh
      - type: file
        path: com.efzynx.TruckersToolLinux.desktop
      - type: file
        path: com.efzynx.TruckersToolLinux.metainfo.xml
      - flatpak-node-sources.json
