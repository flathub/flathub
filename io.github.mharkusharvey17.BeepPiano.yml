id: io.github.mharkusharvey17.BeepPiano
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: BeepPiano
modules:
  - name: application-module
    buildsystem: simple
    build-commands:
      - install -D BeepPiano /app/bin/BeepPiano
    sources:
      - type: git
        url: https://github.com/mharkusharvey17/BeepPiano.git
        branch: main
