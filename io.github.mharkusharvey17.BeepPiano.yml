app-id: io.github.mharkusharvey17.BeepPiano
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: BeepPiano
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=all
  - --socket=pulseaudio
modules:
  - name: beep-piano
    buildsystem: simple
    build-commands:
      - install -Dm755 BeepPiano /app/bin/BeepPiano
      - install -Dm644 io.github.mharkusharvey17.BeepPiano.desktop /app/share/applications/io.github.mharkusharvey17.BeepPiano.desktop
      - install -Dm644 io.github.mharkusharvey17.BeepPiano.metainfo.xml /app/share/metainfo/io.github.mharkusharvey17.BeepPiano.metainfo.xml
      - install -Dm644 io.github.mharkusharvey17.BeepPiano.png /app/share/icons/hicolor/128x128/apps/io.github.mharkusharvey17.BeepPiano.png
    sources:
      - type: dir
        path: .
