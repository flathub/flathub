app-id: rocks.thorium.Thorium
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.chromium.Chromium.BaseApp
base-version: '25.08'
command: thorium
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  - --require-version=1.8.2
  - --device=all
  - --share=ipc
  - --share=network
  - --socket=cups
  - --socket=pcsc
  - --socket=pulseaudio
  - --socket=fallback-x11
  - --socket=wayland
  - --system-talk-name=org.bluez
  - --system-talk-name=org.freedesktop.Avahi
  - --system-talk-name=org.freedesktop.UPower
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6
  - --talk-name=org.gnome.SessionManager
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=org.mpris.MediaPlayer2.chromium.*
  - --filesystem=/run/.heim_org.h5l.kcm-socket
  - --filesystem=xdg-run/pipewire-0
  - --filesystem=xdg-download
  - --persist=.pki
  - --env=GIO_EXTRA_MODULES=/app/lib/gio/modules
  - --env=GSETTINGS_BACKEND=dconf
modules:
  - name: dconf
    buildsystem: meson
    config-opts:
      - -Dbash_completion=false
      - -Dman=false
      - -Dvapi=false
    cleanup:
      - /etc
      - /include
      - ca.desrt.dconf.service
      - dconf.service
      - dconf-service
      - '*.pc'
    sources:
      - type: archive
        url: https://download.gnome.org/sources/dconf/0.49/dconf-0.49.0.tar.xz
        sha256: 16a47e49a58156dbb96578e1708325299e4c19eea9be128d5bd12fd0963d6c36
        x-checker-data:
          type: gnome
          name: dconf
          stable-only: true

  - name: zypak
    sources:
      - type: git
        url: https://github.com/refi64/zypak
        tag: v2025.09
        commit: 693a71c5ffa80ec9c9ce2ae03b1ccc493c698e53
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: thorium
    buildsystem: simple
    build-commands:
      - mkdir -p /app/thorium
      - bsdtar -Oxf thorium.deb data.tar.xz | bsdtar -xf - -C /app/thorium --strip-components=4
        ./opt/chromium.org/thorium
      - install -Dm 755 thorium.sh /app/bin/thorium
      - install -Dm 644 -t /app/etc cobalt.ini
      - install -Dm 644 -t /app/share/metainfo rocks.thorium.Thorium.metainfo.xml
      - install -Dm 644 rocks.thorium.Thorium.desktop /app/share/applications/rocks.thorium.Thorium.desktop
      - for size in 16 24 32 48 64 128 256; do install -Dm 644 /app/thorium/product_logo_${size}.png
        /app/share/icons/hicolor/${size}x${size}/apps/rocks.thorium.Thorium.png;
        done
      - install -Dm 644 /app/thorium/LICENSES.chromium.html -t /app/share/licenses/rocks.thorium.Thorium/
    sources:
      - type: file
        url: https://github.com/Alex313031/thorium/releases/download/M138.0.7204.300/thorium-browser_138.0.7204.300_SSE3.deb
        sha256: 24ec07b74fb2f920fdca16b909f917131bcc6d2cec873546a92e5269ac838b58
        dest-filename: thorium.deb
        only-arches: [x86_64]
      - type: file
        path: cobalt.ini
      - type: file
        path: rocks.thorium.Thorium.metainfo.xml
      - type: file
        path: rocks.thorium.Thorium.desktop
      - type: file
        path: thorium.sh
