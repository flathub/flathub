# Flatpak manifest for Taskwire — Modern Linux System Monitor
# Submit this file to flathub/flathub via PR against the new-pr branch.
#
# Build locally:
#   flatpak-builder --user --install --force-clean build-dir flatpak/io.github.majoraexp.Taskwire.yaml
#
# Run:
#   flatpak run io.github.majoraexp.Taskwire

app-id: io.github.majoraexp.Taskwire
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: Taskwire
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.9'

finish-args:
  # GUI
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Hardware access for GPU, sensors, temperatures, fans
  - --device=all
  # Network monitoring (ss, psutil.net_io_counters)
  - --share=network
  # Run host commands via flatpak-spawn (lsblk, nvidia-smi, ss, systemctl, pkexec)
  - --talk-name=org.freedesktop.Flatpak
  # Systemd service management
  - --system-talk-name=org.freedesktop.systemd1

cleanup-commands:
  - /app/cleanup-BaseApp.sh

cleanup:
  - /app/include
  - /app/lib/pkgconfig
  - '*.a'
  - '*.la'

modules:
  - name: psutil
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=${FLATPAK_DEST} --no-deps --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/2a/80/336820c1ad9286a4ded7e845b2eccfcb27851ab8ac6abece774a6ff4d3de/psutil-7.0.0.tar.gz
        sha256: 7be9c3eba38beccb6495ea33afd982a44074b78f28c434a1f51cc07fd315c456

  - name: taskwire
    buildsystem: simple
    build-commands:
      # Install application source
      - install -d ${FLATPAK_DEST}/share/taskwire/src
      - cp Taskwire/main.py ${FLATPAK_DEST}/share/taskwire/
      - cp Taskwire/app_icon.png ${FLATPAK_DEST}/share/taskwire/
      - cp Taskwire/src/ui.py ${FLATPAK_DEST}/share/taskwire/src/
      - cp Taskwire/src/styles.py ${FLATPAK_DEST}/share/taskwire/src/
      - cp Taskwire/src/system_monitor.py ${FLATPAK_DEST}/share/taskwire/src/
      - cp Taskwire/src/version.py ${FLATPAK_DEST}/share/taskwire/src/
      - cp Taskwire/src/flatpak_helper.py ${FLATPAK_DEST}/share/taskwire/src/
      - touch ${FLATPAK_DEST}/share/taskwire/src/__init__.py
      # Install launcher
      - install -Dm755 taskwire-runner.sh ${FLATPAK_DEST}/bin/Taskwire
      # Install desktop entry
      - install -Dm644 io.github.majoraexp.Taskwire.desktop ${FLATPAK_DEST}/share/applications/io.github.majoraexp.Taskwire.desktop
      # Install metainfo
      - install -Dm644 io.github.majoraexp.Taskwire.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.majoraexp.Taskwire.metainfo.xml
      # Install icon to hicolor icon theme
      - install -Dm644 Taskwire/app_icon.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/io.github.majoraexp.Taskwire.png
    sources:
      - type: archive
        url: https://github.com/majoraexp/Taskwire/archive/refs/tags/v1.55.tar.gz
        sha256: 60609495b0c55b86a5bff8f9089152699e2ed564e5204016cc832fe200a9e218
      - type: file
        path: taskwire-runner.sh
