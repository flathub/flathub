        only-arches: [x86_64]
      - type: archive
        url: https://gesturedevelop.com/flatpak/AirSQLiteManager/AirSQLiteManager-0.9.3-arm64.tar.xz
        sha256: 5a7d2858f7f77525a68003125378af9c28de1b29e838af2ca0b3835611c7ed4d
        only-arches: [aarch64]
  - name: libxml2
    config-opts:
      - --without-python
      - --without-icu
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libxml2/2.12/libxml2-2.12.6.tar.xz
        sha256: 889c593a881a3db5fdd96cc9318c87df34eb648edfc458272ad46fd607353fbb
finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=x11
  # Wayland access
  - --socket=wayland
  # Needs to talk to the network:
  #- --share=network
  # Needs to save files locally
  - --filesystem=home
  - --filesystem=/run/media:rw   # Accès aux clés USB / Disques externes
  - --filesystem=/media:rw       # Compatibilité pour les anciens systèmes
