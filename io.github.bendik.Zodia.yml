id: io.github.bendik.Zodia
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: zodia

finish-args:
  - --share=network          # p2p overlay and iroh relay
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio      # voice calls (mic + speaker via PulseAudio/PipeWire)
  - --talk-name=org.freedesktop.Notifications

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    # Cargo still needs a writable home for lock files; vendor dir is separate.
    CARGO_HOME: /run/build/io.github.bendik.Zodia/cargo-home

modules:
  - name: zodia
    buildsystem: simple
    build-commands:
      # Point cargo at the pre-populated vendor directory (from cargo-sources.json).
      - mkdir -p .cargo
      - |
        printf '[source.crates-io]\nreplace-with = "vendored-sources"\n\n[source.vendored-sources]\ndirectory = "/run/build/io.github.bendik.Zodia/cargo/vendor"\n' > .cargo/config.toml
      - cargo --offline build --release -p zodia-app
      - install -Dm755 target/release/zodia                             /app/bin/zodia
      - install -Dm644 app/data/io.github.bendik.Zodia.desktop         /app/share/applications/io.github.bendik.Zodia.desktop
      - install -Dm644 app/data/io.github.bendik.Zodia.metainfo.xml    /app/share/metainfo/io.github.bendik.Zodia.metainfo.xml
      - install -Dm644 app/data/io.github.bendik.Zodia.svg             /app/share/icons/hicolor/scalable/apps/io.github.bendik.Zodia.svg
    sources:
      - type: git
        url: https://github.com/bendik/zodia.git
        tag: v0.4.1
        commit: 064765c4db566c2611d50b76763c51e36d37a7f6

      # Generated from Cargo.lock by flatpak-cargo-generator.py.
      # Regenerate after any dependency change:
      #   python3 flatpak-cargo-generator.py Cargo.lock -o flatpak/cargo-sources.json
      - cargo-sources.json
