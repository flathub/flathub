name: pcsc-lite
buildsystem: meson
config-opts:
  - -Dlibudev=false
  - -Dlibsystemd=false
  - -Dusb=false
  - -Dlibusb=false
  - -Dpolkit=false
  - -Dserial=false
  - -Dipcdir=/run/pcscd
cleanup:
  - /include
  - /bin/pcsc-spy
  - /lib/libpcscspy*
  - /lib/pkgconfig
  - /share/doc
  - /share/man
post-install:
  - rm -rf /app/sbin
  - install -Dm644 ../COPYING /app/share/licenses/$FLATPAK_ID/pcsc-lite/COPYING
sources:
  - type: archive
    url: https://pcsclite.apdu.fr/files/pcsc-lite-2.3.3.tar.xz
    sha256: cdff7d7153a0b37aa74e26dfec89ec7dc5c5286aa21b91b903e38739d227e8e7
