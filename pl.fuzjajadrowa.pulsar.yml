app-id: pl.fuzjajadrowa.pulsar
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: Pulsar
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=xdg-download
  - --filesystem=xdg-videos
  - --filesystem=xdg-music
  - --filesystem=xdg-pictures
  - --env=PULSAR_DIST=flatpak
  - --env=PULSAR_REQUIREMENTS_DIR=/app/lib/pulsar/requirements
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/pulsar/cargo
    RUSTUP_HOME: /run/build/pulsar/rustup
    CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
modules:
  - name: requirements
    buildsystem: simple
    build-commands:
      - install -d /app/lib/pulsar/requirements
      - install -Dm755 pulsar-bridge-linux /app/lib/pulsar/requirements/pulsar-bridge
      - tar -xJf ffmpeg-linux.tar.xz
      - install -Dm755 ffmpeg /app/lib/pulsar/requirements/ffmpeg
    sources:
      - type: file
        url: https://github.com/FuzjaJadrowa/Pulsar-Bridge/releases/download/b18/pulsar-bridge-linux
        sha256: 8a5004f86241dcf7d2dd802cd6d8607835fe3c8c86ea787dd9c8e521104fe136
      - type: file
        url: https://github.com/FuzjaJadrowa/FFbuilder/releases/download/ffmpeg-n8.0-v3/ffmpeg-linux.tar.xz
        sha256: 5040fa7b815568568b3bd01d0398bd9b5684610aa2504595d66fd0752b42d740
        dest-filename: ffmpeg-linux.tar.xz

  - name: pulsar
    buildsystem: simple
    build-commands:
      - cargo --offline build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/Pulsar /app/bin/Pulsar
      - install -Dm644 pl.fuzjajadrowa.pulsar.desktop /app/share/applications/pl.fuzjajadrowa.pulsar.desktop
      - install -Dm644 pl.fuzjajadrowa.pulsar.metainfo.xml /app/share/metainfo/pl.fuzjajadrowa.pulsar.metainfo.xml
      - install -Dm644 src/assets/icons/icon.png /app/share/icons/hicolor/512x512/apps/pl.fuzjajadrowa.pulsar.png
    sources:
      - type: git
        url: https://github.com/fuzjajadrowa/Pulsar.git
        commit: 15076a67d1231f3f4b1580b8adee3ed24a13dde4
      - type: file
        path: pl.fuzjajadrowa.pulsar.desktop
      - type: file
        path: pl.fuzjajadrowa.pulsar.metainfo.xml
      - cargo-sources.json
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/gtk-doc
  - /share/doc