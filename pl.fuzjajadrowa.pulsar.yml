app-id: pl.fuzjajadrowa.pulsar
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: Pulsar
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=xdg-download
  - --filesystem=xdg-videos
  - --filesystem=xdg-music
  - --filesystem=xdg-pictures
  - --env=PULSAR_DIST=flatpak
  - --env=PULSAR_REQUIREMENTS_DIR=/app/lib/pulsar/requirements
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/pulsar/cargo
    RUSTUP_HOME: /run/build/pulsar/rustup
    CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  - name: pulsar-bridge
    buildsystem: simple
    build-commands:
      - python3 -m PyInstaller --clean --onefile --name pulsar-bridge main.py
      - install -d /app/lib/pulsar/requirements
      - install -Dm755 dist/pulsar-bridge /app/lib/pulsar/requirements/pulsar-bridge
    cleanup:
      - /bin
      - /lib/python3*/site-packages
      - /lib/python3*/dist-packages
    modules:
      - bridge-sources.json
    sources:
      - type: git
        url: https://github.com/FuzjaJadrowa/Pulsar-Bridge.git
        commit: e05a4245e09c6e448a073782efb8876b50c7ac2c

  - name: pulsar
    buildsystem: simple
    build-commands:
      - install -d /app/lib/pulsar/requirements
      - ln -sf /usr/bin/ffmpeg /app/lib/pulsar/requirements/ffmpeg
      - ln -sf /usr/bin/ffprobe /app/lib/pulsar/requirements/ffprobe
      - cargo --offline build --release --manifest-path src-tauri/Cargo.toml
      - install -Dm755 src-tauri/target/release/Pulsar /app/bin/Pulsar
      - install -Dm644 src-tauri/flatpak/pl.fuzjajadrowa.pulsar.desktop /app/share/applications/pl.fuzjajadrowa.pulsar.desktop
      - install -Dm644 src-tauri/flatpak/pl.fuzjajadrowa.pulsar.metainfo.xml /app/share/metainfo/pl.fuzjajadrowa.pulsar.metainfo.xml
      - install -Dm644 src/assets/icons/icon.png /app/share/icons/hicolor/512x512/apps/pl.fuzjajadrowa.pulsar.png
    sources:
      - type: git
        url: https://github.com/fuzjajadrowa/Pulsar.git
        commit: 2e67a4864be1aef428cb8eb2bf81e4fa79a21e23
      - cargo-sources.json
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/gtk-doc
  - /share/doc