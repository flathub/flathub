app-id: com.tuxflow.TuxFlow
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
    - org.freedesktop.Sdk.Extension.rust-stable
command: tuxflow

finish-args:
    - --share=ipc
    - --socket=fallback-x11
    - --socket=wayland
    - --socket=session-bus
    - --device=dri
    - --share=network
    - --talk-name=org.freedesktop.Notifications
    - --filesystem=home

build-options:
    append-path: /usr/lib/sdk/rust-stable/bin
    env:
        CARGO_HOME: /run/build/tuxflow/cargo
        CARGO_NET_OFFLINE: "true"
        RUST_BACKTRACE: "1"

modules:
    - name: vte
      buildsystem: meson
      config-opts:
          - -Dgtk4=true
          - -Dgtk3=false
          - -Dvapi=false
          - -Ddocs=false
      sources:
          - type: archive
            url: https://download.gnome.org/sources/vte/0.78/vte-0.78.7.tar.xz
            sha256: 6fd1edc332d9f9519ce4c0f07135fdf72d64dfd990dc4fabc6ce91b1b7e83dd0

    - name: tuxflow
      buildsystem: simple
      build-commands:
          - cargo build --release --offline
          - install -Dm755 target/release/tuxflow /app/bin/tuxflow
          - install -Dm755 target/release/tuxflow-mcp /app/bin/tuxflow-mcp
          - install -Dm644 data/com.tuxflow.TuxFlow.desktop /app/share/applications/com.tuxflow.TuxFlow.desktop
          - install -Dm644 data/com.tuxflow.TuxFlow.metainfo.xml /app/share/metainfo/com.tuxflow.TuxFlow.metainfo.xml
          - install -Dm644 data/icons/com.tuxflow.TuxFlow.svg /app/share/icons/hicolor/scalable/apps/com.tuxflow.TuxFlow.svg
      sources:
          - type: git
            url: https://github.com/markovic-nikola/tuxflow.git
            commit: a8185762232c149bbfaab89ff03ae4b035439ce9
          - cargo-sources.json
