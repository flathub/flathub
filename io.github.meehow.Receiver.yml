app-id: io.github.meehow.Receiver
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: receiver
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --own-name=org.mpris.MediaPlayer2.receiver

modules:
  - name: receiver
    buildsystem: meson
    config-opts:
      - --buildtype=release
    sources:
      - type: archive
        url: https://github.com/meehow/receiver/archive/refs/tags/v0.3.2.tar.gz
        sha256: 3952ce880c4f2128c28aca6f6172fa5656edb16f385f2e3c8f911d7ecba30f9d
