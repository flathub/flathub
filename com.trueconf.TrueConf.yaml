app-id: com.trueconf.TrueConf
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: TrueConf
separate-locales: false
tags:
  - proprietary
finish-args:
  - --device=all # Camera
  - --share=ipc
  - --share=network
  - --socket=pulseaudio # Sound in/out
  # TrueConf cannot use Wayland. It crashes with a 11/SEGV, even without the flatpak wrapper.
  - --socket=x11
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=xdg-download
  # Workaround for attempts to access the wayland socket. Setting QT_QPA_PLATFORM=xcb does not help.
  - --env=XDG_SESSION_TYPE=x11
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/aclocal
  - /share/emacs
  - /share/examples
  - /share/man
  - /share/info
  - /share/et
  - '*.la'
modules:
  - name: krb5
    subdir: src
    config-opts:
      - --localstatedir=/var/lib
      - --sbindir=${FLATPAK_DEST}/bin
      - --disable-static
      - --disable-rpath
    sources:
      - type: archive
        url: https://kerberos.org/dist/krb5/1.22/krb5-1.22.2.tar.gz
        sha256: 3243ffbc8ea4d4ac22ddc7dd2a1dc54c57874c40648b60ff97009763554eaf13
        x-checker-data:
          type: html
          url: https://kerberos.org/dist/
          version-pattern: Kerberos V5 Release ([\d\.-]*) - current release
          url-template: https://kerberos.org/dist/krb5/$version0.$version1/krb5-$version.tar.gz
    cleanup:
      - /bin
  - name: double-conversion
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
    sources:
      - type: archive
        url: https://github.com/google/double-conversion/archive/refs/tags/v3.4.0.tar.gz
        sha256: 42fd4d980ea86426e457b24bdfa835a6f5ad9517ddb01cdb42b99ab9c8dd5dc9
        x-checker-data:
          type: anitya
          project-id: 7454
          url-template: https://github.com/google/double-conversion/archive/refs/tags/v$version.tar.gz
  - name: gsl
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/gsl/gsl-2.8.tar.gz
        sha256: 6a99eeed15632c6354895b1dd542ed5a855c0f15d9ad1326c6fe2b2c9e423190
        x-checker-data:
          type: anitya
          project-id: 1267
          stable-only: true
          url-template: https://ftp.gnu.org/gnu/gsl/gsl-$version.tar.gz
      - type: patch
        path: patches/gsl-cblas-linkage.patch
    cleanup:
      - /bin
  - name: c-ares
    sources:
      - type: archive
        url: https://github.com/c-ares/c-ares/releases/download/v1.34.6/c-ares-1.34.6.tar.gz
        sha256: 912dd7cc3b3e8a79c52fd7fb9c0f4ecf0aaa73e45efda880266a2d6e26b84ef5
        x-checker-data:
          type: anitya
          project-id: 5840
          url-template: https://github.com/c-ares/c-ares/releases/download/v$version/c-ares-$version.tar.gz
  - name: libidn
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/libidn/libidn-1.43.tar.gz
        sha256: bdc662c12d041b2539d0e638f3a6e741130cdb33a644ef3496963a443482d164
        x-checker-data:
          type: anitya
          project-id: 1639
          url-template: https://ftp.gnu.org/gnu/libidn/libidn-$version.tar.gz
    cleanup:
      - /bin
  - name: libdns_sd
    config-opts:
      - --disable-static
      - --enable-compat-libdns_sd
      - --with-distro=none
      - --disable-introspection
      - --disable-libdaemon
      - --disable-libevent
      - --disable-core-docs
      - --disable-manpages
      - --disable-mono
      - --disable-monodoc
      - --disable-autoipd
      - --disable-qt3
      - --disable-qt4
      - --disable-qt5
      - --disable-python
      - --disable-pygobject
      - --disable-gtk
      - --disable-gtk3
      - --disable-glib
      - --disable-gobject
      - --disable-doxygen-doc
      - --disable-doxygen-dot
      - --disable-doxygen-xml
      - --disable-doxygen-html
      - --disable-xmltoman
    sources:
      - type: archive
        url: https://www.avahi.org/download/avahi-0.8.tar.gz
        sha256: 060309d7a333d38d951bc27598c677af1796934dbd98e1024e7ad8de798fedda
        x-checker-data:
          type: anitya
          project-id: 147
          url-template: https://www.avahi.org/download/avahi-$version.tar.gz
    cleanup:
      - /bin
      - /lib/avahi
  - name: lsb-release-compat
    buildsystem: simple
    build-commands:
      - make install PREFIX=${FLATPAK_DEST}
    sources:
      - type: git
        url: https://gitlab.com/nanonyme/lsb-release-compat.git
        commit: f4f908b62dcc9cd081eb2a42b6ad7cf98db4bb10
  - name: lshw
    buildsystem: simple
    build-commands:
      - make install PREFIX=${FLATPAK_DEST} SBINDIR=${FLATPAK_DEST}/bin
    sources:
      - type: archive
        url: https://ezix.org/software/files/lshw-B.02.20.tar.gz
        sha256: 06d9cf122422220e5dc94e8ea5b01816a69bb6b59368f63d7f21fff31fc6922a
        x-checker-data:
          type: html
          url: https://ezix.org/download/?package=lshw.ezix.org
          version-pattern: Latest version</h2><table><tr><td><a href="/software/files/lshw-(.\.[\d\.-]*)\.tar\.gz"
          url-template: https://ezix.org/software/files/lshw-$version.tar.gz
  - name: TrueConf
    buildsystem: simple
    build-commands:
      - ln -s ${FLATPAK_DEST}/extra/client/TrueConf ${FLATPAK_DEST}/bin/TrueConf
      - install -Dm 755 apply_extra.sh ${FLATPAK_DEST}/bin/apply_extra
      - install -Dm 644 ld.so.conf -t ${FLATPAK_DEST}/etc/
      - install -Dm 644 krb5.conf -t ${FLATPAK_DEST}/etc/
      - install -Dm 644 trueconf.png ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/${FLATPAK_ID}.png
      - install -Dm 644 ${FLATPAK_ID}.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm 644 ${FLATPAK_ID}.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
    sources:
      - type: extra-data
        filename: trueconf.rpm
        url: https://mirror.trueconf.com/fedora/43/x86_64/release/trueconf-8.5.2.398-1.fc43.x86_64.rpm
        sha256: ff269703f89615417d8505297c93ae36fd4d7a0589cf7ed1f80ead9741501325
        size: 206589391
        # Temporarily disabled due to a bug in rpmrepochecker.
        # <size package="206589391" installed="604310417" archive="604525104"/>
        # A false positive occurred because the comparison used the 'installed' size instead of the 'package' size.
        # BROKEN|LATEST: trueconf.rpm
        # Has a new version:
        #  URL:       https://mirror.trueconf.com/fedora/43/x86_64/release/trueconf-8.5.2.398-1.fc43.x86_64.rpm
        #  MD5:       None
        #  SHA1:      None
        #  SHA256:    ff269703f89615417d8505297c93ae36fd4d7a0589cf7ed1f80ead9741501325
        #  SHA512:    None
        #  Size:      604525104 <-- Bug
        #  Version:   8.5.2.398
        #  Timestamp: 2025-11-25 10:40:49
        #x-checker-data:
        #  type: rpm-repo
        #  package-name: trueconf
        #  root: https://mirror.trueconf.com/fedora/43/x86_64/release
        #  is-main-source: true
      - type: script
        dest-filename: apply_extra.sh
        commands:
          - bsdtar -xf trueconf.rpm --strip-components=3 --exclude='./opt/trueconf/client/qt5/plugins/platforms/*wayland*'
            --exclude='./opt/trueconf/client/qt5/plugins/*wayland*' --exclude='./opt/trueconf/client/qt5/qml/QtWayland'
            ./opt/trueconf/client
          - chmod 755 client/qt5/libexec/QtWebEngineProcess
          - rm trueconf.rpm
      - type: file
        path: com.trueconf.TrueConf.desktop
      - type: file
        path: com.trueconf.TrueConf.metainfo.xml
      - type: file
        path: krb5.conf
      - type: file
        path: trueconf.png
      - type: inline
        dest-filename: ld.so.conf
        contents: |
          /app/extra/client/lib
          /app/extra/client/qt5/lib
