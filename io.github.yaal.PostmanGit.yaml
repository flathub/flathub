app-id: io.github.yaal.PostmanGit
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: Postman
separate-locales: false
tags:
  - proprietary
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=home
  - --talk-name=com.canonical.AppMenu.Registrar
build-options:
  no-debuginfo: true  #Prevents "Read-only file system" warning in Git module
modules:
  - name: Git
    buildsystem: autotools
    config-opts:
      - --prefix=/app
    sources:
      - type: archive
        url: https://www.kernel.org/pub/software/scm/git/git-2.53.0.tar.xz
        sha256: 5818bd7d80b061bbbdfec8a433d609dc8818a05991f731ffc4a561e2ca18c653
  - name: Postman
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra ${FLATPAK_DEST}/bin/apply_extra
      - install -Dm644 logo-mark.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm644 -t /app/share/applications io.github.yaal.PostmanGit.desktop
      - install -Dm644 -t /app/share/metainfo io.github.yaal.PostmanGit.appdata.xml
      - install -Dm755 run.sh ${FLATPAK_DEST}/bin/Postman
      - icon_in="${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg";
        icon_out="${FLATPAK_ID}.png"; for s in {32,64,128,256,512}; do rsvg-convert
        "${icon_in}" -w "${s}" -h "${s}" -a -f png -o "${icon_out}"; install -p -Dm644
        "${icon_out}" -t "${FLATPAK_DEST}/share/icons/hicolor/${s}x${s}/apps/"; done;
    sources:
      - type: script
        dest-filename: apply_extra
        commands:
          - tar --no-same-owner -xf Postman.tar.gz
          - rm Postman.tar.gz
          - mkdir -p /app/extra/Postman
          - mv Postman/app/* /app/extra/Postman
      - type: extra-data
        only-arches:
          - x86_64
        url: https://dl.pstmn.io/download/version/12.3.6/linux64
        sha256: 6ed267a735e5d268fac37c467b840d9b763526dbd7fc19100ad5653a1da00590
        size: 141206168
        x-checker-data:
          type: json
          url: https://dl.pstmn.io/api/version/latest?platform=linux64&channel=stable
          version-query: .version
          url-query: '"https://dl.pstmn.io/download/version/\($version)/linux64"'
        filename: Postman.tar.gz
      - type: extra-data
        only-arches:
          - aarch64
        url: https://dl.pstmn.io/download/version/12.3.6/linuxarm64
        sha256: 94bbb97dd88d50c14e7b45514b5843768ba87d0861186b56ee84de01c7d3f858
        size: 145024581
        x-checker-data:
          type: json
          url: https://dl.pstmn.io/api/version/latest?platform=linuxarm64&channel=stable
          version-query: .version
          url-query: '"https://dl.pstmn.io/download/version/\($version)/linuxarm64"'
        filename: Postman.tar.gz
      - type: script
        dest-filename: run.sh
        commands:
          - export TMPDIR="$XDG_CACHE_HOME"
          - zypak-wrapper.sh /app/extra/Postman/Postman "$@"
      - type: file
        path: io.github.yaal.PostmanGit.desktop
      - type: file
        path: io.github.yaal.PostmanGit.appdata.xml
      - type: file
        path: logo-mark.svg
