app-id: com.sona.app
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '23.08'
command: sona
separate-locales: false

finish-args:
  - --share=network          # needed for Supabase + music API
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio      # needed for audio playback
  - --device=dri
  - --filesystem=xdg-music   # optional: access music folder

modules:
  - name: sona
    buildsystem: simple
    build-commands:
      # copy app files into the flatpak
      - install -Dm755 sona.sh /app/bin/sona
      - install -d /app/lib/sona
      - cp -r . /app/lib/sona
      # desktop entry + icon
      - install -Dm644 flatpak/com.sona.app.desktop /app/share/applications/com.sona.app.desktop
      - install -Dm644 assets/icon.png /app/share/icons/hicolor/512x512/apps/com.sona.app.png

    sources:
      - type: dir
        path: ..
