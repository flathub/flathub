app-id: io.github.alamahant.Sadhana
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
# Needed because it provides QPdfView and related pdf functionality that the app uses.
base: io.qt.qtwebengine.BaseApp
base-version: '6.10' 
command: Sadhana
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
# Needed for playing mantra recitation and puja audio files
  - --socket=pulseaudio
modules:
  - name: Sadhana
    buildsystem: cmake-ninja
    config-opts:
      - -DFLATPAK_BUILD=ON
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/alamahant/Sadhana.git
        tag: v1.0.0
        commit: 45fabbf8621a06fb8e91bd16bcf35ec09ce87eb7

# By adding this cleanup I managed to get the flatpak size from 106MB to 47MB and pdf seems to work.
cleanup-commands:
  - rm -rf ${FLATPAK_DEST}/include/QtWebEngine*
  - rm -rf ${FLATPAK_DEST}/lib/*WebEngine*
  - rm -rf ${FLATPAK_DEST}/lib/x86_64-linux-gnu/*WebEngine*
  - rm -rf ${FLATPAK_DEST}/lib/qml/QtWebEngine*