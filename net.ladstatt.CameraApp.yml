id: net.ladstatt.CameraApp
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk25
command: CameraApp
finish-args:
  - --socket=x11
  - --share=ipc
  - --device=all
  - --share=network
modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk25/install.sh
  - name: camera-app
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/openjdk25/bin
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk25
    build-commands:
      - find env/target
      - mvn clean package -pl "net.ladstatt.apps.camera.dist.linux:app-image" -am -B -Dmaven.repo.local=./offline-repository --offline -Denforcer.skip=true
      - mkdir -p /app/bin
      - cp -ar apps/camera/dist/linux/app-image/target/classes/CameraApp/lib /app/
      - cp -ar apps/camera/dist/linux/app-image/target/classes/CameraApp/bin/CameraApp /app/bin/
      - install -Dm644 apps/camera/icons/src/main/resources/camera-app-icon-16.png /app/share/icons/hicolor/16x16/apps/net.ladstatt.CameraApp.png
      - install -Dm644 apps/camera/icons/src/main/resources/camera-app-icon-32.png /app/share/icons/hicolor/32x32/apps/net.ladstatt.CameraApp.png
      - install -Dm644 apps/camera/icons/src/main/resources/camera-app-icon-64.png /app/share/icons/hicolor/64x64/apps/net.ladstatt.CameraApp.png
      - install -Dm644 apps/camera/icons/src/main/resources/camera-app-icon-128.png /app/share/icons/hicolor/128x128/apps/net.ladstatt.CameraApp.png
      - install -Dm644 apps/camera/icons/src/main/resources/camera-app-icon-256.png /app/share/icons/hicolor/256x256/apps/net.ladstatt.CameraApp.png
      - install -Dm644 apps/camera/icons/src/main/resources/camera-app-icon-512.png /app/share/icons/hicolor/512x512/apps/net.ladstatt.CameraApp.png
      - install -Dm644 apps/camera/dist/linux/flatpak/flatpak-package/src/main/resources/meta/net.ladstatt.CameraApp.metainfo.xml /app/share/metainfo/net.ladstatt.CameraApp.metainfo.xml
      - install -Dm644 apps/camera/dist/linux/flatpak/flatpak-package/src/main/resources/meta/net.ladstatt.CameraApp.desktop -t /app/share/applications
    sources:
      - type: git
        url: https://github.com/rladstaetter/CameraApp.git
        commit: a09c82ec2719ad8b3b68e04fb26df3655aa9dd66
      - type: archive
        url: https://download2.gluonhq.com/openjfx/25/openjfx-25_linux-aarch64_bin-jmods.zip
        sha256: 9ad4ca7b769ca4ee6419f1e99143dd6ff812f8be4fddb46a7d7cacbeea148af4
        dest: "env/target/javafx-jmods-25"
        only-arches: [aarch64]
      - type: archive
        url: https://download2.gluonhq.com/openjfx/25/openjfx-25_linux-x64_bin-jmods.zip
        sha256: 96e520f48610d8ffb94ca30face1f11ffe8a977ddc1c4ff80b1a9e9f048bd94e
        dest: "env/target/javafx-jmods-25"
        only-arches: [x86_64]
      - maven-dependencies-aarch64.yml
      - maven-dependencies-x86_64.yml