app-id: com.blitzfc.qbz
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node20
  - org.freedesktop.Sdk.Extension.rust-stable
command: qbz
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri

  # User music library
  - --filesystem=xdg-music

  # External drives and NAS mounts for local libraries
  # Audiophiles commonly store music on NAS or external storage
  # FileChooser portal doesnt work for background library scanning
  - --filesystem=/mnt:ro
  - --filesystem=/media:ro
  - --filesystem=/run/media:ro

  # Tray icon (uses app-specific path)
  - --filesystem=xdg-run/com.blitzfc.qbz:create

  # Notifications and tray
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

  # MPRIS media controls
  - --talk-name=org.mpris.MediaPlayer2.*
  - --own-name=org.mpris.MediaPlayer2.qbz

modules:
  # ALSA utils for device enumeration (aplay -L)
  # Required for DAC selection in bit-perfect playback mode
  - name: alsa-utils
    buildsystem: autotools
    config-opts:
      - --disable-alsamixer
      - --disable-xmlto
      - --with-udev-rules-dir=/app/lib/udev/rules.d
    cleanup:
      - /share/man
      - /share/sounds
    sources:
      - type: archive
        url: https://www.alsa-project.org/files/pub/utils/alsa-utils-1.2.12.tar.bz2
        sha256: 98bc6677d0c0074006679051822324a0ab0879aea558a8f68b511780d30cd924

  # Tray icon support
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

  - name: qbz
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
      env:
        npm_config_nodedir: /usr/lib/sdk/node20
        XDG_CACHE_HOME: /run/build/qbz/flatpak-node/cache
        npm_config_cache: /run/build/qbz/flatpak-node/npm-cache
        npm_config_offline: "true"
        npm_config_audit: "false"
        npm_config_fund: "false"
        CARGO_HOME: /run/build/qbz/cargo
        CARGO_NET_OFFLINE: "true"
    build-commands:
      - install -Dm0644 cargo/config .cargo/config.toml
      - npm ci --offline --no-audit --no-fund
      - export PATH="$PWD/node_modules/.bin:$PATH" && npm run build
      - export PATH="$PWD/node_modules/.bin:$PATH" && npm run tauri build -- --no-bundle
      - install -Dm755 src-tauri/target/release/qbz-nix /app/bin/qbz
      - install -Dm644 flatpak/com.blitzfc.qbz.desktop /app/share/applications/com.blitzfc.qbz.desktop
      - install -Dm644 flatpak/com.blitzfc.qbz.metainfo.xml /app/share/metainfo/com.blitzfc.qbz.metainfo.xml
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.blitzfc.qbz.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.blitzfc.qbz.png
    sources:
      - type: git
        url: https://github.com/vicrodh/qbz.git
        tag: v1.1.13
        commit: 008dfbcbb0dad0fe716fa51c3f7e956c182368fc
        x-checker-data:
          type: git
          tag-pattern: '^v(\d+\.\d+\.\d+)$'
      - type: file
        path: cargo/config
        dest: cargo
        dest-filename: config
      - cargo-sources.json
      - npm-sources.json
