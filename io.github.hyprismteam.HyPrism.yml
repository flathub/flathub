app-id: io.github.hyprismteam.HyPrism
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: hyprism-launcher-wrapper.sh

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --device=input
  - --env=LD_LIBRARY_PATH=/app/lib
  - --env=ELECTRON_TRASH=gio
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto
modules:

  - name: HyPrism
    buildsystem: simple
    build-commands:
      - install -d /app/HyPrism
      - cp -R linux-unpacked/* /app/HyPrism
      - chmod +x /app/HyPrism/chrome-sandbox /app/HyPrism/HyPrism
      - install -Dm755 Properties/linux/flatpak/hyprism-launcher-wrapper.sh /app/bin/hyprism-launcher-wrapper.sh
      - install -Dm644 Frontend/src/assets/images/appicon_512.png /app/share/icons/hicolor/256x256/apps/io.github.hyprismteam.HyPrism.png
      - install -Dm644 Properties/linux/io.github.hyprismteam.HyPrism.desktop /app/share/applications/io.github.hyprismteam.HyPrism.desktop
      - install -Dm644 Properties/linux/io.github.hyprismteam.HyPrism.metainfo.xml /app/share/metainfo/io.github.hyprismteam.HyPrism.metainfo.xml
      - ln -s /app/HyPrism/HyPrism /app/bin/HyPrism
    sources:
      - type: git
        url:  https://github.com/hyprismteam/HyPrism
        branch: 9bc2b05a5d271e441736f8d17ee1935d5ef400ba
      - type: archive
        url: https://github.com/hyprismteam/HyPrism/releases/download/v3.0.1/HyPrism-linux-x64-3.0.1.tar.xz
        sha256: b9e9629df1a826bbc4bca28c3fe8e0651537b10967d00ba9f6852a94b5554b68
        dest: linux-unpacked
