app-id: org.astian.midori_browser
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.mozilla.firefox.BaseApp
base-version: '25.08'
command: launch-midori

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --persist=.midori
  - --env=DICPATH=/usr/share/hunspell
  - --filesystem=xdg-download:rw
  - --talk-name=org.a11y.Bus
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.gtk.vfs.*

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/aclocal
  - /share/doc
  - /share/info
  - /share/man
  - '*.la'
  - '*.a'

modules:
  - name: midori
    buildsystem: simple
    build-commands:
      - mv midori /app/
      - install -Dm755 launch-midori.sh /app/bin/launch-midori
      - install -Dm644 org.astian.midori_browser.desktop /app/share/applications/org.astian.midori_browser.desktop
      - install -Dm644 org.astian.midori_browser.metainfo.xml /app/share/metainfo/org.astian.midori_browser.metainfo.xml
      - install -Dm644 /app/midori/browser/chrome/icons/default/default128.png /app/share/icons/hicolor/128x128/apps/org.astian.midori_browser.png
      - install -Dm644 LICENSES/MPL-2.0.txt /app/share/licenses/org.astian.midori_browser/midori-desktop/MPL-2.0.txt

    sources:
      - type: archive
        url: https://github.com/goastian/midori-desktop/releases/download/v11.6.5/midori-11.6.5.linux-x86_64.tar.xz
        sha256: 8e154566119a7a7c2ad782db294debc58bd7790965efe03688566bdf7a554a4f
        strip-components: 0
        only-arches:
          - x86_64

      - type: archive
        url: https://github.com/goastian/midori-desktop/releases/download/v11.6.5/midori-11.6.5.linux-aarch64.tar.xz
        sha256: 1ef94c5837e6b16716b88eaa346c68a10870004e78f0d5bd7fee3bc52ed7050d
        strip-components: 0
        only-arches:
          - aarch64

      - type: file
        path: launch-midori.sh

      - type: file
        path: org.astian.midori_browser.desktop

      - type: file
        path: org.astian.midori_browser.metainfo.xml

      - type: file
        path: LICENSES/MPL-2.0.txt