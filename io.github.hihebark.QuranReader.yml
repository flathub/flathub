app-id: io.github.hihebark.QuranReader
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: quran-reader

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

modules:
