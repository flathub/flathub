app-id: io.github.hihebark.QuranReader
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: quran-reader

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

modules:
  - name: quran-reader
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/hihebark/quran-reader.git
        tag: v0.1.2
        commit: bcf5539525d0f72bb29f33dd4f58bf66ff5f9c0e
