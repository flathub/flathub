app-id: games.xolat.birdy
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: birdy.sh

finish-args:
  - --share=ipc
  - --socket=pulseaudio
  - --socket=x11
  - --device=dri

modules:
  - name: SDL2
    buildsystem: cmake
    builddir: true
    sources:
      - type: git
        url: https://github.com/libsdl-org/SDL.git
        tag: release-2.32.4
  - shared-modules/SDL2/SDL2_image.json
  - shared-modules/SDL2/SDL2_ttf.json
  - name: box2d
    buildsystem: cmake
    builddir: true
    sources:
      - type: git
        url: https://github.com/erincatto/box2d.git
        commit: 411acc32eb6d4f2e96fc70ddbdf01fe5f9b16230
  - name: libzip
    buildsystem: cmake
    builddir: true
    sources:
      - type: git
        url: https://github.com/nih-at/libzip.git
        tag: v1.11.3
  - name: birdy
    buildsystem: simple
    build-commands:
      - cmake -S . -B build
      - cmake --build build/ --config Release
      - mv build/Birdy-wants-crisps birdy
      - install -Dm 755 birdy -t /app/bin/
      - echo "#"'!'"/bin/bash" > birdy.sh
      - echo "" >> birdy.sh
      - echo "cd /app/share/birdy/ && birdy" >> birdy.sh
      - install -Dm 755 birdy.sh -t /app/bin/
      - cd Birdy-wants-crisps/ && mv Res.pak ../ && mv level.tmx ../ && mv fonts/ ../ && mv music/ ../
      - install -Dm 644 Res.pak -t /app/share/birdy/
      - install -Dm 644 level.tmx -t /app/share/birdy/
      - cp -r fonts/ /app/share/birdy/
      - cp -r music/ /app/share/birdy/
    sources:
      - type: git
        url: https://codeberg.org/xolatgames/Birdy-wants-crisps.git
        tag: v1.4.2
  - name: metadata
    buildsystem: simple
    build-commands:
      - install -Dm 644 games.xolat.birdy.svg -t /app/share/icons/hicolor/scalable/apps/
      - install -Dm 644 games.xolat.birdy.desktop -t /app/share/applications/
      - install -Dm 644 games.xolat.birdy.metainfo.xml -t /app/share/metainfo/
    sources:
      - type: file
        url: https://xolat.games/files/misc/birdy/v1.4.2/games.xolat.birdy.svg
        sha256: 98b8b8558a52dac982012394dbebdb1ed7c49bc825789b80b5d359a49fa8b107
      - type: file
        url: https://xolat.games/files/misc/birdy/v1.4.2/games.xolat.birdy.desktop
        sha256: 0aada6d6b7cc7edf6620aa6226da17c332b01cb8fa1c57ac3d48eca7da24d72b
      - type: file
        url: https://xolat.games/files/misc/birdy/v1.4.2/games.xolat.birdy.metainfo.xml
        sha256: f2aea17cd8e2fcca3521bd4095f0dcae8ff6db38fcd9e2cd0ccd4b505cfe524e
