app-id: io.github.sonm.monfree
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: monfree

tags:
  - proprietary

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri

modules:
  - name: monfree
    buildsystem: simple
    build-commands:
      - install -D monfree /app/bin/monfree
      - install -D io.github.sonm.monfree.desktop /app/share/applications/io.github.sonm.monfree.desktop
      - install -D MonFree.png /app/share/icons/hicolor/256x256/apps/io.github.sonm.monfree.png
      - install -D io.github.sonm.monfree.metainfo.xml /app/share/metainfo/io.github.sonm.monfree.metainfo.xml
      - install -D LICENSE.txt /app/share/licenses/io.github.sonm.monfree/LICENSE

    sources:
      - type: archive
        only-arches: [x86_64]
        url: https://github.com/sonm/monfree/releases/download/v1.0.0/monfree-x86_64.tar.gz
        sha256: bc18484d223dcb1b173b284244913df606e39b7a821be463de71fd17ac5a996a
        strip-components: 0
      - type: archive
        only-arches: [aarch64]
        url: https://github.com/sonm/monfree/releases/download/v1.0.0/monfree-aarch64.tar.gz
        sha256: b3e95537a81501f84337bb1ef2dc5eb0ef6cccb3c5bec9f60cd6e6bbe7259c6e
        strip-components: 0
      - type: archive
        url: https://github.com/sonm/monfree/releases/download/v1.0.0/monfree-assets.tar.gz
        sha256: 4d532a0ca8ac2e1ea9956db562cb80419f07a564d14aecc61cc913110e8b2a91
        strip-components: 0

  - name: zenity
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/zenity.git
        tag: 4.2.2
        commit: c0f30c18e55b6a0cf5c2deb1c7449debb79027dc
