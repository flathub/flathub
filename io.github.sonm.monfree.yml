app-id: io.github.sonm.monfree
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: monfree

tags:
  - proprietary

finish-args:
  - --share=ipc
  #- --socket=x11
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

  - --socket=pulseaudio
  - --device=all
  - --filesystem=xdg-run/pipewire-0

  - --filesystem=xdg-music:create
  - --filesystem=xdg-documents:create
  
  #- --filesystem=xdg-config/monfree:create
  - --persist=.config/monfree
  
modules:
  - name: monfree
    only-arches:
      - x86_64
    buildsystem: simple
    build-commands:
      - chmod +x monfree
      - install -D monfree /app/bin/monfree
      - install -D io.github.sonm.monfree.desktop /app/share/applications/io.github.sonm.monfree.desktop
      - install -D MonFree.png /app/share/icons/hicolor/256x256/apps/io.github.sonm.monfree.png
      - install -D io.github.sonm.monfree.metainfo.xml /app/share/metainfo/io.github.sonm.monfree.metainfo.xml
      - install -D LICENSE.txt /app/share/licenses/io.github.sonm.monfree/LICENSE

    sources:
      - type: archive
        url: https://github.com/sonm/monfree/releases/download/v1.0.0/monfree-1.0.0-x86_64-flatpak-bin.tar.gz
        sha256: c387961767fb92399b22fca21a03111eba36705e1a4a1a992229126f8ef89943
        strip-components: 0

      - type: file
        url: https://github.com/sonm/monfree/releases/download/v1.0.0/LICENSE.txt
        sha256: adb01c7b2c50e5df3840027bd979a2f9b0f80d258df0581f925c95fd9eb37446
      - type: file
        url: https://github.com/sonm/monfree/releases/download/v1.0.0/io.github.sonm.monfree.desktop
        sha256: 29d7ab0094402876511b118fb026508da53702e2f1b9ffe41b0198ac14a018a4
      - type: file
        url: https://github.com/sonm/monfree/releases/download/v1.0.0/MonFree.png
        sha256: fa9e270e249b94a1c94bb9e0ad330a35558e5ec74602bc989bd9f45d590ab5ed
      - type: file
        url: https://github.com/sonm/monfree/releases/download/v1.0.0/io.github.sonm.monfree.metainfo.xml
