app-id: com.gesturedevelop.AirSQLiteManager
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: AirSQLiteManager
finish-args:
  # X11 + XShm access
  - --share=ipc
  - --socket=x11
  # Wayland access
  #- --socket=wayland
  - --device=dri
  # Needs to talk to the network:
  #- --share=network
  # Needs to save files locally
  #- --filesystem=home
  #- --filesystem=/run/media:rw   # Accès aux clés USB / Disques externes
  #- --filesystem=/media:rw       # Compatibilité pour les anciens systèmes
modules:
  - name: AirSQLiteManager
    buildsystem: simple
    build-commands:
      - install -Dm644 "snap/gui/airsqlitemanager.desktop" "/app/share/applications/com.gesturedevelop.AirSQLiteManager.desktop"
      - install -Dm644 "snap/gui/airsqlitemanager.png" "/app/share/icons/hicolor/128x128/apps/com.gesturedevelop.AirSQLiteManager.png"
      - install -Dm644 "snap/gui/com.gesturedevelop.AirSQLiteManager.appdata.xml" "/app/share/metainfo/com.gesturedevelop.AirSQLiteManager.appdata.xml"
      - mkdir -p /app/lib/AirSQLiteManager
      - cp -ra . /app/lib/AirSQLiteManager/
      - rm -rf /app/lib/AirSQLiteManager/snap
      - mkdir -p /app/bin
      - ln -s /app/lib/AirSQLiteManager/AirSQLiteManager /app/bin/AirSQLiteManager
    sources:
      - type: archive
        url: https://gesturedevelop.com/flatpak/AirSQLiteManager/AirSQLiteManager-0.9.3-x86-64.tar.xz
        sha256: fa61d353b2e0e2d4e22f33079986bff567d823d3b8ea6a3c5245d3c6704f456e
        only-arches:
          - x86_64
      - type: archive
        url: https://gesturedevelop.com/flatpak/AirSQLiteManager/AirSQLiteManager-0.9.3-arm64.tar.xz
        sha256: 97f5a1ec5874ebace0e2364a8fea29cf8c7595dc2f996d33633d84dd1880b5c8
        only-arches:
          - aarch64
#end