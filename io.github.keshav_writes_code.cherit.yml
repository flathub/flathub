id: io.github.keshav_writes_code.cherit

runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk

command: cherit
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
  - org.freedesktop.Sdk.Extension.rust-stable
build-options:
  append-path: /usr/lib/sdk/node22/bin:/usr/lib/sdk/rust-stable/bin

modules:
  - name: cherit
    buildsystem: simple
    build-options:
      env:
        HOME: /run/build/cherit
        CARGO_HOME: /run/build/cherit/cargo
        # Use the npm cache directory generated by flatpak-node-generator
        XDG_CACHE_HOME: /run/build/cherit/flatpak-node/npm-cache
        # Ensure npm stays offline
        npm_config_offline: 'true'
        npm_config_cache: /run/build/cherit/flatpak-node/npm-cache
    sources:
      - type: git
        url: https://github.com/Keshav-writes-code/Cherit.git
        branch: feat/flatpak-support
      - cargo-sources.json
      - node-sources.json
    build-commands:
      - mkdir -p apps/app/src-tauri/.cargo
      - echo -e '[source.crates-io]\nreplace-with = "vendored-sources"\n\n[source.vendored-sources]\ndirectory = "/run/build/cherit/cargo/vendor"' > apps/app/src-tauri/.cargo/config.toml
      - npm install --offline
      - npm run tauri build --workspace=cherit -- -b deb
      - ar -x apps/app/src-tauri/target/release/bundle/deb/*.deb
      - |
        cd apps/app/src-tauri/target/release/bundle/deb/cherit*/
        tar -xf data.tar.gz
        install -Dm755 usr/bin/cherit /app/bin/cherit
        install -Dm644 usr/share/applications/cherit.desktop /app/share/applications/io.github.keshav_writes_code.cherit.desktop
        install -Dm644 usr/share/metainfo/*.metainfo.xml /app/share/metainfo/io.github.keshav_writes_code.cherit.metainfo.xml
      - install -Dm644 apps/app/src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/io.github.keshav_writes_code.cherit.png
      - install -Dm644 apps/app/src-tauri/icons/64x64.png /app/share/icons/hicolor/64x64/apps/io.github.keshav_writes_code.cherit.png
      - install -Dm644 apps/app/src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.keshav_writes_code.cherit.png
      - install -Dm644 apps/app/src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/io.github.keshav_writes_code.cherit.png
      - sed -i 's/Icon=cherit/Icon=io.github.keshav_writes_code.cherit/' /app/share/applications/io.github.keshav_writes_code.cherit.desktop

