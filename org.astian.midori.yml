app-id: org.astian.midori
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.mozilla.firefox.BaseApp
base-version: '24.08'
add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: '24.08'
    add-ld-path: .
  org.astian.midori.systemconfig:
    directory: etc/midori
    no-autodownload: true
command: launch-script.sh
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --shared-network
  - --socket=pulseaudio
  - --share=ipc
  - --filesystem=xdg-download:rw
  - --filesystem=/run/.heim_org.h5l.kcm-socket
  - --filesystem=xdg-run/speech-dispatcher:ro
  - --env=DICPATH=/usr/share/hunspell
  - --persist=.midori
  - --device=dri
  - --socket=pcsc
  - --socket=cups
  - --talk-name=org.freedesktop.FileManager1
  - --system-talk-name=org.freedesktop.NetworkManager
  - --talk-name=org.a11y.Bus
  - --talk-name=org.gtk.vfs.*
  - --talk-name=org.pulseaudio.Server
  - --own-name=org.mpris.MediaPlayer2.firefox.*
  - --own-name=org.astian.midori.*
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
  - /share/aclocal
  - /share/gtk-doc
  - /share/doc
  - /share/info
  - /man
  - /share/man
  - '*.la'
  - '*.a'
modules:
  - name: midori_browser
    buildsystem: simple
    build-commands:
      - mv midori ${FLATPAK_DEST}/
      - mkdir -p ${FLATPAK_DEST}/lib/ffmpeg
      - mkdir -p ${FLATPAK_DEST}/etc/midori

      - install -Dm0755 metadata/launch-script.sh ${FLATPAK_DEST}/bin/launch-script.sh
      - install -Dm0644 metadata/policies.json ${FLATPAK_DEST}/midori/distribution/policies.json
      - install -Dm0644 metadata/icons/${FLATPAK_ID}.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm0644 metadata/${FLATPAK_ID}.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm0644 metadata/${FLATPAK_ID}.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop

      - install -Dm0644 midori-license.txt ${FLATPAK_DEST}/share/licenses/${FLATPAK_ID}/LICENSE

    sources:
      - type: archive
        url: https://github.com/goastian/midori-desktop/releases/download/v11.6.3/midori-11.6.3.linux-x86_64.tar.xz
        sha256: d4f820d33d501ef534beb951da7c33a72f0c4837f5e14b4289e9ad5f21d580d7
        strip-components: 0
        only-arches:
          - x86_64
        x-checker-data:
          type: json
          url: https://api.github.com/repos/goastian/midori-desktop/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name | test("linux-x86_64\\.tar\\.xz$")) | .browser_download_url
          is-main-source: true

      - type: archive
        url: https://github.com/goastian/midori-desktop/releases/download/v11.6.3/midori-11.6.3.linux-aarch64.tar.xz
        sha256: c7b861091cfa9b99e4e7033a499a7255261bf36365c4fe1a4608a0e885c34b5c
        strip-components: 0
        only-arches:
          - aarch64
        x-checker-data:
          type: json
          url: https://api.github.com/repos/goastian/midori-desktop/releases/latest
          version-query: .tag_name | sub("^v"; "")
          url-query: .assets[] | select(.name | test("linux-aarch64\\.tar\\.xz$")) | .browser_download_url

      - type: file
        path: metadata/launch-script.sh
        dest: metadata

      - type: file
        path: metadata/policies.json
        dest: metadata

      - type: file
        path: metadata/org.astian.midori.desktop
        dest: metadata

      - type: file
        path: metadata/org.astian.midori.metainfo.xml
        dest: metadata

      - type: file
        path: metadata/icons/org.astian.midori.svg
        dest: metadata/icons

      - type: file
        url: https://raw.githubusercontent.com/goastian/midori-desktop/main/LICENSE
        sha256: a799adf18bfb1911f16086dc0e2a6d1cd0e31272f47e7ee6841b465b74d249de
        dest-filename: midori-license.txt
