app-id: io.github.rajnisht7.ClipVault
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: clipvault

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-data/clipvault:create
  - --socket=session-bus
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: wl-clipboard
    buildsystem: meson
    build-options:
      env:
        DESTDIR: /app
    sources:
      - type: git
        url: https://github.com/bugaevc/wl-clipboard.git
        tag: v2.2.1

  - name: python-websockets
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/w/websockets/websockets-12.0.tar.gz
        sha256: 81df9cbcbb6c260de1e007e58c011bfebe2dafc8435107b0537f393dd38c8b1b
        
  - name: python-flit-core
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/f/flit_core/flit_core-3.9.0.tar.gz
        sha256: 72ad266176c4a3fcfab5f2930d76896059851240570ce9a98733b658cb786eba

        
  - name: python-typing-extensions
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/t/typing_extensions/typing_extensions-4.12.2.tar.gz
        sha256: 1a7ead55c7e559dd4dee8856e3a88b41225abfe1ce8df57b7c13915fe121ffb8  
        
  - name: python-pypng
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/p/pypng/pypng-0.20220715.0.tar.gz
        sha256: 739c433ba96f078315de54c0db975aee537cbc3e1d0ae4ed9aab0ca1e427e2c1

  - name: python-qrcode
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/q/qrcode/qrcode-7.4.2.tar.gz
        sha256: 9dd969454827e127dbd93696b20747239e6d540e082937c90f14ac95b30f5845
        
  - name: python-pillow
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation .
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/p/pillow/pillow-11.0.0.tar.gz
        sha256: 72bacbaf24ac003fea9bff9837d1eedb6088758d41e100c1552930151f677739
        
        
  - name: clipvault
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation .
      - install -Dm644 io.github.rajnisht7.ClipVault.desktop /app/share/applications/io.github.rajnisht7.ClipVault.desktop
      - install -Dm644 io.github.rajnisht7.ClipVault.metainfo.xml /app/share/metainfo/io.github.rajnisht7.ClipVault.metainfo.xml
      - install -Dm644 io.github.rajnisht7.ClipVault.png /app/share/icons/hicolor/128x128/apps/io.github.rajnisht7.ClipVault.png
    sources:
      - type: dir
        path: ../ClipVault/src
      - type: file
        path: io.github.rajnisht7.ClipVault.desktop
      - type: file
        path: io.github.rajnisht7.ClipVault.metainfo.xml
      - type: file
        path: io.github.rajnisht7.ClipVault.png
