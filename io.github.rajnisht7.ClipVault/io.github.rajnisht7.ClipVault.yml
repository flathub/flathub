app-id: io.github.rajnisht7.clipVault
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: clipvault

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-data/clipvault:create
  # Needed for wl-paste (Wayland clipboard tool)
  - --socket=session-bus
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: wl-clipboard
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/bugaevc/wl-clipboard.git
        tag: v2.2.1

  - name: xclip
    buildsystem: autotools
    sources:
      - type: git
        url: https://github.com/astrand/xclip.git
        tag: "0.13"

  - name: python-websockets
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps websockets
    sources:
      - type: url
        url: https://files.pythonhosted.org/packages/source/w/websockets/websockets-12.0.tar.gz
        sha256: 81df9cbcbb6c260de1e007e58c011bfebe2dafc8435107b0537f393dd38c8b1b

  - name: python-qrcode
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps qrcode pillow
    sources:
      - type: url
        url: https://files.pythonhosted.org/packages/source/q/qrcode/qrcode-7.4.2.tar.gz
        sha256: 9dd969454827bf011591f3a21db1b8aa0e0f3f9af0ce5ded8c1e50bfd84de09d

  - name: clipvault
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps .
      - install -Dm644 data/io.github.clipvault.desktop /app/share/applications/io.github.clipvault.desktop
      - install -Dm644 data/io.github.clipvault.metainfo.xml /app/share/metainfo/io.github.clipvault.metainfo.xml
    sources:
      - type: dir
        path: ..
