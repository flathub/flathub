id: dev.redact.Redact
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: electron-wrapper
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --filesystem=xdg-download
  - --talk-name=org.kde.StatusNotifierWatcher
modules:
  - name: redact
    buildsystem: simple
    build-commands:
      - cp -r redact /app/lib/redact
      - mkdir -p /app/lib/redact/locales
      - mkdir -p /app/lib/redact/resources
      - find /app/lib/redact -maxdepth 1 -name '??.pak' -o -name '??-??.pak' -o -name '???-???.pak' | xargs -I{} mv {} /app/lib/redact/locales/
      - mv /app/lib/redact/app.asar /app/lib/redact/resources/
      - mv /app/lib/redact/app.asar.unpacked /app/lib/redact/resources/
      - mv /app/lib/redact/assets /app/lib/redact/resources/
      - mv /app/lib/redact/chromium /app/lib/redact/resources/
      - mv /app/lib/redact/native /app/lib/redact/resources/
      - rm /app/lib/redact/app-update.yml
      - install -Dm755 electron-wrapper /app/bin/electron-wrapper
      - install -Dm644 dev.redact.Redact.desktop /app/share/applications/dev.redact.Redact.desktop
      - install -Dm644 redact/resources/assets/icon.svg /app/share/icons/hicolor/scalable/apps/dev.redact.Redact.svg
      - install -Dm644 dev.redact.Redact.metainfo.xml /app/share/metainfo/dev.redact.Redact.metainfo.xml
    sources:
      - type: archive
        url: https://update-desktop.redact.dev/build/Redact-0.21.18.zip
        sha256: 4e5eac3c71e5480e133e00ce1245b9c5906581bbbd64c83257b35647cfbd7af0
        dest: redact
      - type: script
        dest-filename: electron-wrapper
        commands:
          - exec zypak-wrapper /app/lib/redact/redact "$@"
      - type: file
        path: dev.redact.Redact.desktop
      - type: file
        path: dev.redact.Redact.metainfo.xml
