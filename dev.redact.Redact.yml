id: dev.redact.Redact
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: electron-wrapper
separate-locales: false
only-arches:
  - x86_64
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --filesystem=xdg-download
  - --talk-name=org.kde.StatusNotifierWatcher
modules:
  - name: redact
    buildsystem: simple
    only-arches:
      - x86_64
    build-commands:
      - install -Dm755 apply_extra /app/bin/apply_extra
      - install -Dm755 electron-wrapper /app/bin/electron-wrapper
      - install -Dm644 dev.redact.Redact.desktop /app/share/applications/dev.redact.Redact.desktop
      - install -Dm644 dev.redact.Redact.svg /app/share/icons/hicolor/scalable/apps/dev.redact.Redact.svg
    sources:
      - type: script
        dest-filename: apply_extra
        commands:
          - unzip -q Redact.zip
          - rm Redact.zip
      - type: script
        dest-filename: electron-wrapper
        commands:
          - exec zypak-wrapper /app/extra/redact "$@"
      - type: extra-data
        filename: Redact.zip
        url: https://update-desktop.redact.dev/build/Redact-0.21.18.zip
        sha256: 4e5eac3c71e5480e133e00ce1245b9c5906581bbbd64c83257b35647cfbd7af0
        size: 324594964
        only-arches:
          - x86_64
      - type: file
        path: dev.redact.Redact.desktop
      - type: file
        path: dev.redact.Redact.svg
