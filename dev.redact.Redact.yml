id: dev.redact.Redact
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: electron-wrapper
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - name: redact
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra /app/bin/apply_extra
      - install -Dm755 electron-wrapper /app/bin/electron-wrapper
      - install -Dm644 dev.redact.Redact.desktop /app/share/applications/dev.redact.Redact.desktop
      - install -Dm644 dev.redact.Redact.png /app/share/icons/hicolor/256x256/apps/dev.redact.Redact.png
      - install -Dm644 dev.redact.Redact.512.png /app/share/icons/hicolor/512x512/apps/dev.redact.Redact.png
      - install -Dm644 dev.redact.Redact.svg /app/share/icons/hicolor/scalable/apps/dev.redact.Redact.svg
    sources:
      - type: script
        dest-filename: apply_extra
        commands:
          - unzip -q Redact.zip
          - rm Redact.zip
      - type: script
        dest-filename: electron-wrapper
        commands:
          - exec zypak-wrapper /app/extra/redact "$@"
      - type: extra-data
        filename: Redact.zip
        url: https://update-desktop.redact.dev/build/Redact-0.21.18.zip
        sha256: 4e5eac3c71e5480e133e00ce1245b9c5906581bbbd64c83257b35647cfbd7af0
        size: 324594964
      - type: file
        path: dev.redact.Redact.desktop
      - type: file
        path: dev.redact.Redact.png
      - type: file
        path: dev.redact.Redact.512.png
      - type: file
        path: dev.redact.Redact.svg
