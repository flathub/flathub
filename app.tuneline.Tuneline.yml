# Flatpak manifest for Tuneline.
# Ships a pre-built Linux tarball and builds the libmpv stack as nested
# modules (adapted from io.github.celluloid_player.Celluloid).

app-id: app.tuneline.Tuneline
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: tuneline

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  # Secrets are accessed via org.freedesktop.portal.Secret (libsecret
  # routes through the portal automatically when sandboxed).

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - "*.la"
  - "*.a"

modules:
  # libmpv runtime stack (libass, libplacebo, libmpv) — ffmpeg ships in
  # the freedesktop runtime. media_kit dlopens libmpv.so.2 from /app/lib.

  - name: libass
    cleanup:
      - /include
      - /lib/*.la
      - /lib/pkgconfig
    config-opts:
      - --disable-static
    sources:
      - type: archive
        url: https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.xz
        sha256: 78f1179b838d025e9c26e8fef33f8092f65611444ffa1bfc0cfac6a33511a05a
        x-checker-data:
          type: anitya
          project-id: 1560
          stable-only: true
          url-template: https://github.com/libass/libass/releases/download/$version/libass-$version.tar.xz

  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Ddemos=false  # skips plplay and its Nuklear submodule
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: libmpv
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/applications
      - /share/bash-completion
      - /share/doc
      - /share/icons
      - /share/man
      - /share/zsh
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dbuild-date=false
      - -Dalsa=disabled
      - -Dlua=disabled
      - -Dcplayer=false
      - -Dmanpage-build=disabled
      - -Dhtml-build=disabled
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/v0.41.0.tar.gz
        sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209
        x-checker-data:
          type: anitya
          project-id: 5348
          stable-only: true
          url-template: https://github.com/mpv-player/mpv/archive/v$version.tar.gz

  - name: tuneline
    buildsystem: simple
    # Flutter Linux ships a self-contained bundle (binary + co-located
    # data/ and lib/ next to it) and the binary RPATHs to that layout.
    # We keep the bundle intact under /app/tuneline/ — a non-FHS,
    # app-private namespace — and expose only the entrypoint via /app/bin.
    build-commands:
      - mkdir -p /app/tuneline
      - cp -r lib /app/tuneline/lib
      - cp -r data /app/tuneline/data
      - install -Dm755 tuneline /app/tuneline/tuneline
      - mkdir -p /app/bin
      - ln -s /app/tuneline/tuneline /app/bin/tuneline
      - install -Dm644 share/applications/app.tuneline.Tuneline.desktop /app/share/applications/app.tuneline.Tuneline.desktop
      - install -Dm644 share/metainfo/app.tuneline.Tuneline.metainfo.xml /app/share/metainfo/app.tuneline.Tuneline.metainfo.xml
      - install -Dm644 share/icons/hicolor/512x512/apps/app.tuneline.Tuneline.png /app/share/icons/hicolor/512x512/apps/app.tuneline.Tuneline.png
    sources:
      - type: archive
        url: https://tuneline.app/downloads/tuneline-0.1.0-linux-x86_64.tar.gz
        sha256: dcb07d7ca26bc2e46df0b86d9996cec6d0fe41740e2eaed7a88b2979fdda0dfe
        x-checker-data:
          type: anitya
          project-id: 389740
          stable-only: true
          url-template: https://tuneline.app/downloads/tuneline-$version-linux-x86_64.tar.gz
