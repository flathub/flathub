id: com.openwebui.open-webui
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: run.sh

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network

modules:
  - name: open-webui
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node24/bin
      env:
        XDG_CACHE_HOME: /run/build/open-webui/flatpak-node/cache
        npm_config_cache: /run/build/open-webui/flatpak-node/npm-cache
    build-commands:
      - |
        ln -s $XDG_CACHE_HOME/node-gyp $HOME/.electron-gyp
        npm install --offline
      - npm run build
      - patch -i asar.patch node_modules/app-builder-lib/out/asar/asarUtil.js
      - npx electron-builder --dir
      - mv dist/linux*-unpacked /app/main
      - install -Dm644 -t /app/share/applications com.openwebui.open-webui.desktop
      - install -Dm644  build/icon.png /app/share/icons/hicolor/512x512/apps/com.openwebui.open-webui.png
      - install -Dm644 -t /app/share/metainfo build/com.openwebui.open-webui.metainfo.xml
      - install -Dm755 -t /app/bin run.sh
    sources:
      - type: git
        url: https://github.com/open-webui/desktop.git
        tag: v0.0.9
        commit: 44c40eabd66904b7951bbcf3d2f1e50635546ebf
      - generated-sources.json
      - type: script
        dest-filename: run.sh
        commands:
          - zypak-wrapper.sh /app/main/open-webui "$@"
      - type: file
        path: com.openwebui.open-webui.desktop
      - type: file
        path: asar.patch
