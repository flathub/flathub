<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d5f5"/>
      <stop offset="100%" stop-color="#c9a6e0"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="60%" stop-color="#922b21"/>
      <stop offset="100%" stop-color="#7b241c"/>
    </linearGradient>
    <linearGradient id="olive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dce82"/>
      <stop offset="100%" stop-color="#4a9e4e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#6c3d99" stroke-width="4" opacity="0.5"/>

  <!-- Glass group -->
  <g filter="shadow">
    <!-- Glass bowl (martini shape) -->
    <path d="M 170 190 L 256 320 L 342 190 Z" fill="url(#glass)" opacity="0.25" stroke="url(#glass)" stroke-width="2.5"/>

    <!-- Liquid in glass -->
    <path d="M 195 230 L 256 320 L 317 230 Z" fill="url(#liquid)" opacity="0.85"/>

    <!-- Liquid shine -->
    <path d="M 210 240 L 240 290 L 215 240 Z" fill="#fff" opacity="0.15"/>

    <!-- Glass rim -->
    <line x1="170" y1="190" x2="342" y2="190" stroke="url(#glass)" stroke-width="3" stroke-linecap="round"/>

    <!-- Glass stem -->
    <line x1="256" y1="320" x2="256" y2="400" stroke="url(#glass)" stroke-width="4" stroke-linecap="round"/>

    <!-- Glass base -->
    <ellipse cx="256" cy="400" rx="50" ry="8" fill="url(#glass)" opacity="0.7"/>
    <line x1="206" y1="400" x2="306" y2="400" stroke="url(#glass)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Cocktail pick / skewer -->
  <g filter="glow">
    <line x1="220" y1="140" x2="310" y2="250" stroke="#d4a847" stroke-width="3" stroke-linecap="round"/>

    <!-- Olive 1 -->
    <circle cx="248" cy="172" r="14" fill="url(#olive)"/>
    <ellipse cx="248" cy="172" rx="5" ry="6" fill="#c0392b" opacity="0.9"/>

    <!-- Olive 2 -->
    <circle cx="275" cy="206" r="14" fill="url(#olive)"/>
    <ellipse cx="275" cy="206" rx="5" ry="6" fill="#c0392b" opacity="0.9"/>
  </g>

  <!-- Play triangle (subtle, integrated) -->
  <g opacity="0.9" filter="glow">
    <path d="M 330 100 L 330 160 L 380 130 Z" fill="#e94560" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- Subtle sparkle dots -->
  <circle cx="180" cy="160" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="340" cy="175" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="200" cy="350" r="2" fill="#fff" opacity="0.3"/>
</svg>
