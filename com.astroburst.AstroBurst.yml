app-id: com.astroburst.AstroBurst
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: astroburst

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --env=WEBKIT_DISABLE_COMPOSITING_MODE=1

modules:
  - name: astroburst
    buildsystem: simple
    build-commands:
      - install -Dm755 astroburst -t /app/bin/
      - install -Dm644 com.astroburst.AstroBurst.desktop -t /app/share/applications/
      - install -Dm644 com.astroburst.AstroBurst.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 com.astroburst.AstroBurst.xml -t /app/share/mime/packages/
      - install -Dm644 128x128.png /app/share/icons/hicolor/128x128/apps/com.astroburst.AstroBurst.png
      - install -Dm644 256x256.png /app/share/icons/hicolor/256x256/apps/com.astroburst.AstroBurst.png
      - install -Dm644 512x512.png /app/share/icons/hicolor/512x512/apps/com.astroburst.AstroBurst.png
    sources:
      - type: archive
        url: https://github.com/samuelkriegerbonini-dev/AstroBurst/releases/download/v0.4.6.3/astroburst-0.4.6-linux-x86_64.tar.gz
        sha256: a420d9b26c56600d4e03c469f5832fb70acac534eefa412bdd27668d315012b8
      - type: file
        path: com.astroburst.AstroBurst.desktop
      - type: file
        path: com.astroburst.AstroBurst.metainfo.xml
      - type: file
        path: com.astroburst.AstroBurst.xml
      - type: file
        path: icons/128x128.png
      - type: file
        path: icons/256x256.png
      - type: file
        path: icons/512x512.png
