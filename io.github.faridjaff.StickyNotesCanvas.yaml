app-id: io.github.faridjaff.StickyNotesCanvas
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: sticky-notes-canvas
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/node22/bin
  env:
    XDG_CACHE_HOME: /run/build/sticky-notes-canvas/flatpak-node/cache
    npm_config_cache: /run/build/sticky-notes-canvas/flatpak-node/npm-cache
    npm_config_offline: 'true'
    ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

modules:
  - name: sticky-notes-canvas
    buildsystem: simple
    build-commands:
      - npm install --offline --legacy-peer-deps
      - mkdir -p node_modules/electron/dist
      - |
        if [ "$FLATPAK_ARCH" = "x86_64" ]; then ARCH=x64; else ARCH=arm64; fi
        unzip -q "electron-v32.3.3-linux-${ARCH}.zip" -d node_modules/electron/dist
        echo "v32.3.3" > node_modules/electron/dist/version
      - npx --offline electron-builder --linux dir
          --config.electronDist=node_modules/electron/dist
          --config.electronVersion=32.3.3
      - cp -a dist/linux-unpacked /app/sticky-notes-canvas
      - install -Dm755 sticky-notes-canvas.sh /app/bin/sticky-notes-canvas
      - install -Dm644 flatpak/io.github.faridjaff.StickyNotesCanvas.desktop
          /app/share/applications/io.github.faridjaff.StickyNotesCanvas.desktop
      - install -Dm644 flatpak/io.github.faridjaff.StickyNotesCanvas.metainfo.xml
          /app/share/metainfo/io.github.faridjaff.StickyNotesCanvas.metainfo.xml
      - install -Dm644 build/icons/16x16.png   /app/share/icons/hicolor/16x16/apps/io.github.faridjaff.StickyNotesCanvas.png
      - install -Dm644 build/icons/24x24.png   /app/share/icons/hicolor/24x24/apps/io.github.faridjaff.StickyNotesCanvas.png
      - install -Dm644 build/icons/32x32.png   /app/share/icons/hicolor/32x32/apps/io.github.faridjaff.StickyNotesCanvas.png
      - install -Dm644 build/icons/48x48.png   /app/share/icons/hicolor/48x48/apps/io.github.faridjaff.StickyNotesCanvas.png
      - install -Dm644 build/icons/64x64.png   /app/share/icons/hicolor/64x64/apps/io.github.faridjaff.StickyNotesCanvas.png
      - install -Dm644 build/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.faridjaff.StickyNotesCanvas.png
      - install -Dm644 build/icons/256x256.png /app/share/icons/hicolor/256x256/apps/io.github.faridjaff.StickyNotesCanvas.png
      - install -Dm644 build/icons/512x512.png /app/share/icons/hicolor/512x512/apps/io.github.faridjaff.StickyNotesCanvas.png

    sources:
      - type: git
        url: https://github.com/faridjaff/sticky-notes-canvas
        commit: 80c41475abe5e5ba69182dcaa530bc936e7c3a7e

      - type: file
        url: https://github.com/electron/electron/releases/download/v32.3.3/electron-v32.3.3-linux-x64.zip
        sha256: 0e1f1540492e48e3b8805f87c5096c3b99995c4c1b581ee57e9c836538bae813
        only-arches:
          - x86_64

      - type: file
        url: https://github.com/electron/electron/releases/download/v32.3.3/electron-v32.3.3-linux-arm64.zip
        sha256: 6b18f435855284852be2b2c1b49e58df380a56784d78b358a13ea77bbace4a8a
        only-arches:
          - aarch64

      - type: script
        dest-filename: sticky-notes-canvas.sh
        commands:
          - exec zypak-wrapper /app/sticky-notes-canvas/sticky-notes-canvas "$@"

      - generated-sources.json
